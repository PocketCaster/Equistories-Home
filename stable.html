  if(!breeds.length) return;

  const breedSel=card.querySelector('#bt_breed');
  const getBreed=()=>breeds.find(b=>b.id===breedSel.value);

  function drawList(){
    const b=getBreed(); if(!b) return;
    const list=card.querySelector('#bt_list');
    const traits=b.rareTraits||[];
    if(!traits.length){ list.innerHTML=`<p class="small" style="color:var(--equi-faint);">No traits configured for ${escAttr(b.name)} yet. Add some below, or load the Irish Lightblood defaults.</p>`; return; }
    list.innerHTML = traits.map((t,i)=>{
      const detail = t.type==="health" ? ` → ${escAttr(t.healthName||'')} ${t.healthChance||0}%`
        : t.type==="conditional" ? ` (needs ${escAttr(t.requiresLabel||t.requires?.locus||'gene')})` : '';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-bottom:1px solid #2e241a;">
        <span class="small"><b>${escAttr(t.name)}</b> · ${t.chance}% · <span style="color:var(--equi-accent-2);">${t.type}</span>${detail}</span>
        <button data-del="${i}" class="secondary" style="padding:2px 10px;color:var(--equi-bad-soft);">Remove</button>
      </div>`;
    }).join("");
    list.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=async()=>{
      b.rareTraits.splice(+btn.dataset.del,1); await saveGlobalBreeds(); drawList();
    });
  }

  // show/hide extra fields based on type
  const typeSel=card.querySelector('#bt_type'), extra=card.querySelector('#bt_extra');
  function drawExtra(){
    const t=typeSel.value;
    if(t==="health") extra.innerHTML=`<input id="bt_hname" placeholder="Health condition (e.g. deaf)" /><input id="bt_hchance" type="number" min="0" max="100" placeholder="% health risk" />`;
    else if(t==="conditional") extra.innerHTML=`<input id="bt_reqlocus" placeholder="Required gene locus (e.g. leopard)" /><input id="bt_reqcodes" placeholder="Codes, comma-sep (e.g. nLp,LpLp)" />`;
    else extra.innerHTML='';
  }
  typeSel.onchange=drawExtra; drawExtra();

  breedSel.onchange=drawList; drawList();

  card.querySelector('#bt_load_ilb').onclick=async()=>{
    const b=getBreed(); if(!b) return;
    if(!confirm(`Load the Irish Lightblood trait defaults into "${b.name}"? This replaces its current trait list.`)) return;
    b.rareTraits = JSON.parse(JSON.stringify(ILB_TRAIT_DEFAULTS));
    card.querySelector('#bt_status').textContent='Saving…';
    const ok=await saveGlobalBreeds();
    card.querySelector('#bt_status').textContent = ok?'Loaded ILB defaults.':'⚠ Save failed.';
    drawList();
  };

  card.querySelector('#bt_add').onclick=async()=>{
    const b=getBreed(); if(!b) return;
    const name=card.querySelector('#bt_name').value.trim();
    const chance=Number(card.querySelector('#bt_chance').value)||0;
    const type=typeSel.value;
    if(!name){ card.querySelector('#bt_status').textContent='Give the trait a name.'; return; }
    const t={type,name,chance};
    if(type==="health"){
      t.healthName=card.querySelector('#bt_hname').value.trim();
      t.healthChance=Number(card.querySelector('#bt_hchance').value)||0;
    } else if(type==="conditional"){
      const locus=card.querySelector('#bt_reqlocus').value.trim();
      const codes=card.querySelector('#bt_reqcodes').value.split(',').map(s=>s.trim()).filter(Boolean);
      t.requires={locus, anyOf:codes}; t.requiresLabel=locus;
    }
    if(!b.rareTraits) b.rareTraits=[];
    b.rareTraits.push(t);
    card.querySelector('#bt_status').textContent='Saving…';
    const ok=await saveGlobalBreeds();
    card.querySelector('#bt_status').textContent = ok?'Added.':'⚠ Save failed.';
    card.querySelector('#bt_name').value=''; card.querySelector('#bt_chance').value='';
    drawExtra(); drawList();
  };
}

// ============================================
// BREEDING — foal calculator (preview only; no real foals yet)
// ============================================
let __breedSire=null, __breedDam=null;

// A locus as it actually exists FOR THIS BREED: its normal options plus any
// extra allele rows added by mutations/overrides attached to that breed, and
// minus anything the breed's allele restrictions forbid. The breeding engine
// (splitCode, crossLocus, defaults, genotype parsing) reads locus.options
// directly, so a mutation allele would be invisible to it unless it is merged
// in here first. Custom genes come through allLoci() and are resolved the
// same way, so they get the same treatment.
function locusForBreed(locus, breedKey){
  const opts = getLocusOptions(locus, breedKey);
  if(opts === locus.options) return locus;
  return Object.assign({}, locus, {options: opts});
}
function breedLociForBreed(breedKey){
  const allowed = new Set(["extension","agouti", ...getAllowedLoci(breedKey)]);
  return allLoci().filter(l=>allowed.has(l.key)).map(l=>locusForBreed(l, breedKey));
}

// Read a horse's genotype STRING (e.g. "Ee AtAt stysty pngpng nn dd ...") back
// into per-locus codes. The string is exactly what the Add-a-horse form wrote
// out, so every token matches one of that locus's option codes. Each token is
// consumed once, so a code can't be claimed by two loci.
function parseGenotypeString(genoStr, loci){
  const out={};
  if(!genoStr) return out;
  const tokens=String(genoStr).trim().split(/\s+/).filter(Boolean).map(normGeno);
  const used=new Array(tokens.length).fill(false);
  loci.forEach(l=>{
    const codes=(l.options||[]).map(o=>o.code);
    for(let i=0;i<tokens.length;i++){
      if(used[i]) continue;
      if(codes.includes(tokens[i])){ out[l.key]=tokens[i]; used[i]=true; break; }
    }
  });
  return out;
}

// A horse's per-locus genotype. Priority:
//   1. structured genoObj (newer horses)
//   2. parsed from the horse's own genotype string (what's on the roster card)
//   3. the locus's no-gene homozygote — only for loci the horse never recorded
function horseGenoByLocus(horse, loci){
  const out={};
  const parsed = parseGenotypeString(horse && horse.genotype, loci);
  loci.forEach(l=>{
    const fromObj = horse && horse.genoObj && normGeno(horse.genoObj[l.key]);
    out[l.key] = fromObj || parsed[l.key] || defaultCodeForLocus(l);
  });
  return out;
}

// The "doesn't have this gene" genotype is the all-lowercase option (ee, aa,
// splspl, sbsb, lplp, ff ...). The old /^n/ rule grabbed the first n-prefixed
// code instead, which for splash/sabino/flaxen/leopard is the CARRIER — that
// turned every horse into a phantom carrier of four genes.
function defaultCodeForLocus(locus){
  const opts=(locus.options||[]).map(o=>o.code).filter(Boolean);
  const lower=opts.find(c=>c===c.toLowerCase());
  return lower || opts[0] || "";
}

function findBreedByName(name){
  if(!name) return null;
  const list=(state.customBreeds||[]);
  return list.find(b=>String(b.name||"").toLowerCase()===String(name).toLowerCase())||null;
}
// A breed's trait list, layered on top of the global baseline. Anything the
// breed defines itself wins outright (matched through the alias table, so
// "Somatic Mutation" and "Somatic" are treated as one trait); anything it
// doesn't mention falls back to the GLOBAL_TRAIT_DEFAULTS rate.
function traitKey(name){
  const k=String(name||'').trim().toLowerCase();
  return TRAIT_NAME_ALIASES[k] || k;
}
function breedRareTraits(breedName){
  const b=findBreedByName(breedName);
  const own=(b&&Array.isArray(b.rareTraits))?b.rareTraits:[];
  const ownKeys=new Set(own.map(t=>traitKey(t.name)));
  const baseline=GLOBAL_TRAIT_DEFAULTS.filter(t=>!ownKeys.has(traitKey(t.name)));
  return [...own, ...baseline];
}
function breedRiskRules(breedName){ const b=findBreedByName(breedName); return (b&&Array.isArray(b.geneRisks))?b.geneRisks:[]; }
function breedLethals(breedName){ const b=findBreedByName(breedName); return (b&&Array.isArray(b.lethals))?b.lethals:[]; }

function pedigreeResolver(allHorses){
  const src = (Array.isArray(allHorses) && allHorses.length) ? allHorses : (state.horses||[]);
  const byId={}; src.forEach(h=>byId[h.id]=h);
  return function(h){
    const horse = h.id ? byId[h.id] : null;
    if(!horse || !horse.pedigree) return {};
    const ped={};
    if(horse.pedigree.sire?.inRosterId) ped.sire={id:horse.pedigree.sire.inRosterId};
    if(horse.pedigree.dam?.inRosterId)  ped.dam ={id:horse.pedigree.dam.inRosterId};
    return ped;
  };
}

// Gender classification for breeding roles.
//   sire slot = male: Stallion / Colt / Rig
//   dam slot  = female: Mare / Filly
//   Gelding can't breed; unset gender can fill either slot (best effort).
function canSire(h){ const g=(h.gender||"").toLowerCase(); return g==="stallion"||g==="colt"||g==="rig"||g===""; }
function canDam(h){  const g=(h.gender||"").toLowerCase(); return g==="mare"||g==="filly"||g===""; }
function isBreedingAge(h){ return (Number(h.age)||0) >= 3; }
// A slot is the owner's to use only when nothing occupies it — neither a
// recorded breeding nor a reservation held for another member.
function ownerOpenSlots(h){
  const recs=h.breedingRecords||[];
  let open=0;
  for(let i=0;i<(h.breedingSlots||0);i++){
    if(!recs.find(r=>r.slotIndex===i)) open++;
  }
  return open;
}
function hasOpenSlot(h){ return ownerOpenSlots(h) > 0; }
function isBreedable(h){ return isBreedingAge(h) && hasOpenSlot(h); }

function renderBreeding(){
  const wrap=document.createElement('div');
  const horses=state.horses||[];
  const byName=(a,b)=>String(a.name||'').localeCompare(String(b.name||''));

  // Your own horses that can still breed: old enough (3+) with a free slot.
  // Fully local, so the tab can never hang or blank waiting on the network.
  const mineSires=horses.filter(h=>canSire(h)&&isBreedable(h)).sort(byName);
  const mineDams =horses.filter(h=>canDam(h) &&isBreedable(h)).sort(byName);

  // Slots other members have set aside FOR ME. Fetched in the background and
  // folded in when they arrive (see the loader at the end of this function),
  // never awaited up front — that's what used to hang the whole card.
  const lent=(state.reservedForMe||[]).map(x=>x.horse);
  const lentSires=lent.filter(h=>canSire(h)).sort(byName);
  const lentDams =lent.filter(h=>canDam(h)).sort(byName);
  const sires=[...mineSires, ...lentSires];
  const dams =[...mineDams,  ...lentDams];

  const isLent=id=>(state.reservedForMe||[]).some(x=>x.horse.id===id);
  const lentFrom=id=>{
    const hit=(state.reservedForMe||[]).find(x=>x.horse.id===id);
    return hit ? (hit.res.ownerName||hit.res.__owner||"another member") : "";
  };
  const slotsLeft=h=>ownerOpenSlots(h);
  const optFor=(h,sel)=>{
    if(isLent(h.id))
      return `<option value="${escAttr(h.id)}" ${sel===h.id?'selected':''}>${escAttr(h.name)} (${escAttr(h.breed||'?')}) · reserved for you by ${escAttr(lentFrom(h.id))}</option>`;
    return `<option value="${escAttr(h.id)}" ${sel===h.id?'selected':''}>${escAttr(h.name)} (${escAttr(h.breed||'?')}) · ${slotsLeft(h)} slot${slotsLeft(h)===1?'':'s'} free</option>`;
  };

  const noSires = sires.length===0;
  const noDams  = dams.length===0;

  wrap.innerHTML=`
    <div class="card">
      <h2 style="margin-top:0;">🧬 Foal Calculator</h2>
      <p class="small" style="color:var(--equi-dim);">Pick a stallion and a mare from your horses that still have an open breeding slot (age 3+). You'll get two possible foals (A and B), each with a full genetic code, coat colour, averaged stats, rare-trait chances, and any inbreeding or health risks. This is a preview tool; it doesn't use up a slot or create a foal yet.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <label class="small">Sire (stallion / colt)</label>
          <select id="bc_sire">${noSires?'<option value="">— none available —</option>':'<option value="">— pick a sire —</option>'+sires.map(h=>optFor(h,__breedSire)).join("")}</select>
          <div id="bc_sireInfo" class="small" style="color:var(--equi-dim);margin-top:4px;"></div>
        </div>
        <div>
          <label class="small">Dam (mare / filly)</label>
          <select id="bc_dam">${noDams?'<option value="">— none available —</option>':'<option value="">— pick a dam —</option>'+dams.map(h=>optFor(h,__breedDam)).join("")}</select>
          <div id="bc_damInfo" class="small" style="color:var(--equi-dim);margin-top:4px;"></div>
        </div>
      </div>
      ${(noSires||noDams)?`<p class="small" style="color:var(--equi-accent);margin-top:10px;">${noSires&&noDams?'None of your horses have an open breeding slot yet (they need to be age 3+ with a free slot).':noSires?'You have no eligible sire (a stallion, colt or rig aged 3+ with a free slot).':'You have no eligible dam (a mare or filly aged 3+ with a free slot).'}</p>`:''}
      <div id="bc_resnote" style="margin-top:8px;"></div>
      <button id="bc_resdiag" class="secondary" style="margin-top:4px;padding:4px 10px;font-size:.95em;">Why can't I see a reserved slot?</button>
      <div id="bc_resdiagout" style="margin-top:6px;"></div>
      <button id="bc_calc" style="margin-top:12px;">Calculate foals</button>
      <button id="bc_live" style="margin-top:12px;margin-left:6px;">Proceed with Breeding</button>
    </div>
    <div id="bc_result"></div>`;

  const sireSel=wrap.querySelector('#bc_sire'), damSel=wrap.querySelector('#bc_dam');
  // Reserved horses aren't in your roster, so look there too.
  const findH=id=>horses.find(x=>x.id===id)
    || (state.reservedForMe||[]).map(x=>x.horse).find(x=>x.id===id);
  const showInfo=(sel,box)=>{
    const h=findH(sel.value);
    wrap.querySelector(box).innerHTML = h
      ? `${escAttr(h.genotype||'no genetics set')} · Lv ${h.level||1}${h.genoObj?'':' · <span style="color:var(--equi-accent);">no structured genetics — using defaults</span>'}`
      : '';
  };
  sireSel.onchange=()=>{ __breedSire=sireSel.value; showInfo(sireSel,'#bc_sireInfo'); };
  damSel.onchange =()=>{ __breedDam =damSel.value;  showInfo(damSel,'#bc_damInfo'); };
  if(__breedSire) showInfo(sireSel,'#bc_sireInfo');
  if(__breedDam)  showInfo(damSel,'#bc_damInfo');

  const renderPreview=(sire,dam)=>{
    const box=wrap.querySelector('#bc_result');
    box.innerHTML = computeFoalPreview(sire,dam,horses);
    const reroll=box.querySelector('#bc_reroll');
    if(reroll) reroll.onclick=()=>renderPreview(sire,dam);
  };
  const lbBtn=wrap.querySelector('#bc_live');
  if(lbBtn) lbBtn.onclick=()=>{
    const sire=findH(sireSel.value), dam=findH(damSel.value);
    const box=wrap.querySelector('#bc_result');
    if(!sire||!dam){ box.innerHTML=`<div class="card"><p class="small" style="color:var(--equi-accent);">Pick both a sire and a dam first.</p></div>`; return; }
    if(sire.id===dam.id){ box.innerHTML=`<div class="card"><p class="small" style="color:var(--equi-accent);">A horse can't breed with itself — pick two different horses.</p></div>`; return; }
    showBreedingConfirm(sire, dam, (sel, mods)=>{
      const roll=rollBreeding(sire,dam,mods);
      renderLiveBreeding(box, sire, dam, roll, sel);
      box.scrollIntoView({behavior:'smooth', block:'start'});
    });
  };
  wrap.querySelector('#bc_calc').onclick=()=>{
    const sire=findH(sireSel.value), dam=findH(damSel.value);
    const box=wrap.querySelector('#bc_result');
    if(!sire||!dam){ box.innerHTML=`<div class="card"><p class="small" style="color:var(--equi-accent);">Pick both a sire and a dam.</p></div>`; return; }
    if(sire.id===dam.id){ box.innerHTML=`<div class="card"><p class="small" style="color:var(--equi-accent);">A horse can't breed with itself — pick two different horses.</p></div>`; return; }
    renderPreview(sire,dam);
  };

  // Background top-up: fetch the slots other members have reserved for me and
  // re-render once, so their horses appear in the pickers. Deliberately fired
  // AFTER wrap is returned-ready and never awaited — if the network is slow or
  // down, the card is already on screen and simply shows your own horses.
  // Retry until it actually finds something. The old version latched a "loaded"
  // flag on the very first render — so if that ran before the database
  // connection or your login was ready, it returned nothing and never tried
  // again for the whole session, which looked exactly like "no reservations".
  const diagBtn=wrap.querySelector('#bc_resdiag');
  if(diagBtn) diagBtn.onclick=async()=>{
    const out=wrap.querySelector('#bc_resdiagout');
    out.innerHTML='<span class="small" style="opacity:.6;">Checking…</span>';
    try{ out.innerHTML='<div style="background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:6px;padding:10px;">'
      + await diagnoseReservations() + '</div>'; }
    catch(e){ out.innerHTML='<span class="small" style="color:var(--equi-rust);">Diagnostic failed: '+escAttr(String(e&&e.message||e))+'</span>'; }
  };

  const note=wrap.querySelector('#bc_resnote');
  const showNote=(html)=>{ const n=wrap.querySelector('#bc_resnote'); if(n) n.innerHTML=html; };
  if(state.reservedForMe && state.reservedForMe.length){
    showNote(`<span class="small" style="color:var(--equi-accent-2);">${state.reservedForMe.length} slot${state.reservedForMe.length===1?'':'s'} reserved for you by other members — listed above.</span>`);
  } else if(!state.__resBusy){
    state.__resBusy = true;
    showNote('<span class="small" style="opacity:.6;">Checking for slots reserved for you…</span>');
    // Belt and braces: whatever happens inside, this settles. A stuck promise
    // used to leave the tab reading "Checking…" for the rest of the session,
    // because __resBusy never cleared and nothing ever retried.
    withTimeout(loadReservedForMe(), 20000, "timeout").then(list=>{
      state.__resBusy = false;
      state.reservedForMe = list || [];
      if(state.reservedForMe.length){
        // The active tab lives in `activeTab`, not on state — checking the wrong
        // one meant this never fired, so the data loaded but the screen never
        // redrew and the note sat on "Checking…" forever.
        if(activeTab==="breeding") render();
      } else {
        showNote('<span class="small" style="color:var(--equi-faint);">No slots are reserved for you right now. '
          +'If a member says they reserved one: they need to be on the current version of the Manager, '
          +'and the site\'s database permissions must be published. Reopening this tab checks again.</span>');
      }
    }).catch(err=>{
      state.__resBusy = false;
      state.reservedForMe = [];
      if(err && /timeout/i.test(String(err.message||err)) && !err.denied){
        showNote('<span class="small" style="color:var(--equi-rust);">The check for reserved slots timed out. '
          +'Reopen this tab to try again — the “Why can\'t I see a reserved slot?” button below will show what the database actually holds.</span>');
        return;
      }
      showNote(err && err.denied
        ? '<span class="small" style="color:var(--equi-rust);">The database refused to read reserved slots. '
          +'This means the <b>breedingReservations</b> permissions haven\'t been published yet — '
          +'until they are, reservations can\'t reach anyone. Your own horses are unaffected.</span>'
        : '<span class="small" style="color:var(--equi-rust);">Couldn\'t check for reserved slots — the database didn\'t answer. '
          +'Your own horses are unaffected.</span>');
    });
  }

  return wrap;
}

function pct(x){ return (x*100).toFixed(x>=0.0995?0:1)+'%'; }

// Pick one outcome from a crossLocus() probability list (weighted random).
function rollOutcome(outcomes){
  if(!outcomes || !outcomes.length) return "";
  const r=Math.random(); let acc=0;
  for(const o of outcomes){ acc+=o.p; if(r<=acc) return o.code; }
  return outcomes[outcomes.length-1].code;
}

// Roll ONE complete foal: a genotype code per locus, then run it through the
// game's own computeGenoResult() to get the real genotype string + phenotype
// (colour name + patterns) — exactly the same engine used when a horse is made.
function rollFoal(sire, dam, loci, sireGeno, damGeno, breedName){
  const selections={};
  loci.forEach(l=>{ selections[l.key]=rollOutcome(crossLocus(sireGeno[l.key], damGeno[l.key], l)); });
  const geno=computeGenoResult(selections, breedName);
  return { selections, genotype:geno.genotype, phenotype:geno.phenotype };
}

// ═══════════════════════════════════════════════════════════════════════════
// LIVE BREEDING — creates real horses
// ═══════════════════════════════════════════════════════════════════════════

// First breeding slot with nothing in it (no recorded breeding, no reservation).
function firstOpenSlotIndex(h){
  const recs=h.breedingRecords||[];
  for(let i=0;i<(h.breedingSlots||0);i++){ if(!recs.find(r=>r.slotIndex===i)) return i; }
  return -1;
}

// Breeding tokens the player currently owns, read from the consumables the
// shop put in their inventory. Matches on the effect string, so a token only
// works if the shop item's effect matches BREEDING_TOKENS[key].effect exactly.
function availableBreedingTokens(){
  const byEffect={};
  Object.values(BREEDING_TOKENS).forEach(t=>byEffect[t.effect]=t);
  const out=[];
  (state.consumables||[]).forEach(c=>{
    const def=byEffect[c.effect];
    if(def) out.push({key:def.key, label:def.label, desc:def.desc, invId:c.invId, left:c.left});
  });
  return out;
}

// Look up what a rolled marking is worth, so a foal's Net Worth reflects it.
function markingValue(label){
  const m=[...GENO_MODIFIERS["Rare Markings"], ...(state.customMarkings||[])]
    .find(x=>String(x.label).toLowerCase()===String(label).toLowerCase());
  return m ? (Number(m.value)||0) : 0;
}

// Roll a complete breeding: two candidate foals plus whether they're twins.
// Pure — creates nothing. mods comes from modifiersFromTokens().
function rollBreeding(sire, dam, mods){
  const m = mods && mods.ok!==false ? mods : defaultBreedingModifiers();
  const breedName = dam.breed || sire.breed || "";
  const breedKey = (breedName||"").trim().toLowerCase();
  const loci = breedLociForBreed(breedKey);
  const sireGeno=horseGenoByLocus(sire,loci), damGeno=horseGenoByLocus(dam,loci);

  const rareCfg=breedRareTraits(breedName);
  const traitNamesOf=(h)=>{
    const fromMods=(h.genoModifiers||[]).map(x=>String(x.label||'').trim());
    const fromList=(h.rareTraits||h.markings||[]).map(x=>String(x||'').trim());
    return [...new Set([...fromMods,...fromList])];
  };
  const aliasFor=(n)=>TRAIT_NAME_ALIASES[n.toLowerCase()]||n.toLowerCase();
  const matchTraits=(names)=>{
    const out=[];
    names.forEach(n=>{
      const want=aliasFor(n);
      const hit=rareCfg.find(t=>t.name.toLowerCase()===want||aliasFor(t.name)===want);
      if(hit && !out.includes(hit.name)) out.push(hit.name);
    });
    return out;
  };
  const sireTraits=matchTraits(traitNamesOf(sire));
  const damTraits =matchTraits(traitNamesOf(dam));

  const pedOf=pedigreeResolver(state.horses||[]);
  const inb=inbreedingCoefficient({id:sire.id},{id:dam.id},pedOf,5);
  const riskMult=inbreedingRiskMultiplier(inb.coi);
  const lethals=breedLethals(breedName);

  const one=()=>{
    const foal=rollFoal(sire,dam,loci,sireGeno,damGeno,breedKey);
    const settled={};
    loci.forEach(l=>{ settled[l.key]=[{code:foal.selections[l.key],p:1}]; });
    let rows=resolveRareTraits(rareCfg,sireTraits,damTraits,settled,riskMult);
    rows=applyTraitToken(rows, m.trait);
    rows=applyHealthToken(rows, m.health);
    const traits=[];
    rows.forEach(t=>{
      if(Math.random()<t.chance){
        const e={name:t.name, health:null};
        if(t.healthName && Math.random()<t.healthChance) e.health=t.healthName;
        traits.push(e);
      }
    });
    foal.traits=traits;
    foal.gender=rollGender(m);
    foal.lethal=loci.map(l=>foal.selections[l.key])
      .filter((c,i)=>isLethalGenotype(loci[i].key,c,lethals));
    return foal;
  };

  return { foals:[one(), one()], twins:rollTwins(m), loci, sireGeno, damGeno,
           breedName, breedKey, coi:inb.coi, mods:m };
}

// Turn one rolled foal into a real horse on the player's roster.
function createFoalFromRoll(sire, dam, foal, name, roll){
  const stats=foalStatsWithPrepotency(sire.stats||{}, dam.stats||{}, STATS, roll.mods.prepotency);
  const h=newHorse({
    name, breed:roll.breedName, age:FOAL_START_AGE, gender:foal.gender,
    genotype:foal.genotype, phenotype:foal.phenotype,
    genoObj:Object.assign({}, foal.selections),
    ownerName:(state.profile && state.profile.memberName) || bankAccount.userId || "",
    pedigree:{
      sire:{name:sire.name, link:"", inRosterId:sire.id},
      dam: {name:dam.name,  link:"", inRosterId:dam.id},
    },
  });
  h.stats=stats;
  h.baseStats=Object.assign({}, stats);   // survives recomputeHorse on reload
  h.stage="foal";
  h.sireId=sire.id; h.sireName=sire.name;
  h.damId =dam.id;  h.damName =dam.name;
  h.genoModifiers=(foal.traits||[]).map(t=>({label:t.name, value:markingValue(t.name), rare:true}));
  h.healthConditions=(foal.traits||[]).filter(t=>t.health).map(t=>({trait:t.name, condition:t.health}));
  h.bornFrom={sireId:sire.id, damId:dam.id, date:new Date().toISOString().slice(0,10)};
  return h;
}

// Consume one slot on each parent and link the record to the new foal.
// Twins take a single slot — one breeding, two foals.
function recordBreedingOnParents(sire, dam, foals){
  const date=new Date().toISOString().slice(0,10);
  const names=foals.map(f=>f.name).join(" & ");
  const firstId=foals[0] ? foals[0].id : null;
  [[sire,"sire",dam],[dam,"dam",sire]].forEach(([h,role,partner])=>{
    if(!Array.isArray(h.breedingRecords)) h.breedingRecords=[];
    const idx=firstOpenSlotIndex(h);
    if(idx<0) return;
    h.breedingRecords.push({
      id:uid2(), slotIndex:idx, role, partnerName:partner.name,
      partnerOwner:partner.ownerName||"", date, note:foals.length>1?"Twins":"",
      foalId:firstId, foalName:names, reservedFor:"",
    });
    h.breedingFilled=(h.breedingFilled||0)+1;
  });
}

// The one popup in live breeding: confirms the slot cost and takes the item
// choice. Tokens have to be picked HERE rather than after the foals appear,
// because Gender, Trait, Twin and Prepotency all change the roll itself.
function showBreedingConfirm(sire, dam, onConfirm){
  const tokens=availableBreedingTokens();
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:22px;max-width:520px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);max-height:90vh;overflow-y:auto;">
    <h3 style="margin-top:0;color:var(--equi-accent);">Proceed with breeding?</h3>
    <div style="background:var(--equi-ink);padding:10px;border-radius:6px;margin-bottom:10px;">
      <b>${escAttr(sire.name)}</b> &times; <b>${escAttr(dam.name)}</b><br>
      <span class="small" style="color:var(--equi-dim);">Uses one breeding slot each &mdash; ${escAttr(sire.name)} would have ${ownerOpenSlots(sire)-1} left, ${escAttr(dam.name)} ${ownerOpenSlots(dam)-1}. A real foal is created once you name it.</span>
    </div>
    <label class="small" style="color:var(--equi-brass-light);text-transform:uppercase;display:block;">Use an item in this breeding?</label>
    ${tokens.length ? `<div id="bcf_tokens" style="margin-top:4px;">
        <p class="small" style="color:var(--equi-faint);margin:0 0 6px;">Optional &mdash; up to ${MAX_TOKENS_PER_BREEDING}, one of each type.</p>
        ${tokens.map(t=>`<label style="display:block;margin:4px 0;cursor:pointer;">
          <input type="checkbox" data-token="${escAttr(t.key)}" data-inv="${escAttr(t.invId)}" />
          <b>${escAttr(t.label)}</b> <span class="small" style="opacity:.75;">&times;${t.left}</span>
          <div class="small" style="opacity:.7;margin-left:20px;">${escAttr(t.desc)}</div>
        </label>`).join("")}
        <div id="bcf_gender_pick" style="display:none;margin:6px 0 0 20px;">
          <select id="bcf_gender" style="padding:6px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;">
            <option value="Colt">Colt</option><option value="Filly">Filly</option>
          </select>
        </div>
        <div id="bcf_warn" class="small" style="color:var(--equi-rust);margin-top:4px;"></div>
      </div>`
      : `<p class="small" style="color:var(--equi-faint);margin-top:4px;">You don't own any breeding items. You can breed without one.</p>`}
    <button id="bcf_go" style="margin-top:14px;width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;">Breed</button>
    <button id="bcf_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:9px;border-radius:6px;cursor:pointer;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  const chosen=()=>[...overlay.querySelectorAll('[data-token]:checked')].map(cb=>{
    const t={key:cb.dataset.token, invId:cb.dataset.inv};
    if(t.key==="gender") t.gender=overlay.querySelector('#bcf_gender').value;
    return t;
  });
  overlay.querySelectorAll('[data-token]').forEach(cb=>cb.onchange=()=>{
    const sel=chosen();
    const gp=overlay.querySelector('#bcf_gender_pick');
    if(gp) gp.style.display=sel.some(t=>t.key==="gender")?'block':'none';
    const v=validateTokenSelection(sel);
    overlay.querySelector('#bcf_warn').textContent=v.ok?'':v.reason;
    overlay.querySelector('#bcf_go').disabled=!v.ok;
  });
  overlay.querySelector('#bcf_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#bcf_go').onclick=()=>{
    const sel=chosen();
    const mods=modifiersFromTokens(sel);
    if(!mods.ok){ alert(mods.reason); return; }
    overlay.remove();
    onConfirm(sel, mods);
  };
}

// Create the chosen foal(s), consume a slot on each parent, spend the items.
async function commitBreeding(sire, dam, picks, roll, sel){
  const created=picks.map(p=>createFoalFromRoll(sire,dam,p.foal,p.name,roll));
  recordBreedingOnParents(sire,dam,created);
  created.forEach(f=>{
    state.horses.push(f);
    addLog(`${f.name} was born to ${dam.name} by ${sire.name}${f.genoModifiers.length?` — ${f.genoModifiers.map(m=>m.label).join(", ")}`:''}.`);
    saveHorse(f);
  });
  saveHorse(sire); saveHorse(dam);
  for(const t of (sel||[])){
    try{ await spendConsumable(bankAccount.userId, t.invId); }
    catch(err){ console.warn('[Stable] token spend failed:', err && err.message); }
  }
  save();
  return created;
}

// Render a live breeding INLINE, the same way the calculator does — no popup.
// Once Proceed with Breeding is confirmed the player is committed — there is no
// cancel. The only way out is a Reroll Token, and that only if they brought one.
// An unused Reroll Token is never spent, so it stays in the saddlebag for later.
function renderLiveBreeding(box, sire, dam, roll, sel, rerollUsed){
  const card=(f,i)=>`
    <div class="card" style="border-color:var(--equi-faint);background:#1a1510;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <h3 style="margin:0;color:var(--equi-brass-light);">Foal ${i===0?'A':'B'}</h3>
        <span class="tag" style="background:#2a2016;color:var(--equi-brass-light);">${escAttr(f.gender)}</span>
      </div>
      <div style="margin-top:8px;"><span class="small" style="color:var(--dim);">Colour</span><br><b>${escAttr(f.phenotype||'—')}</b></div>
      <div style="margin-top:8px;"><span class="small" style="color:var(--dim);">Genotype</span><br><code style="font-size:.92em;color:var(--equi-dim);word-break:break-word;">${escAttr(f.genotype)}</code></div>
      <div style="margin-top:8px;"><span class="small" style="color:var(--dim);">Rare markings &amp; traits</span><br>${
        f.traits.length?f.traits.map(t=>`<span class="tag" style="margin:2px 2px 0 0;background:#2a2016;color:var(--equi-brass-light);">${escAttr(t.name)}${t.health?` <span style="color:var(--equi-rust);">· ${escAttr(t.health)}</span>`:''}</span>`).join(""):'<span class="small" style="color:var(--equi-faint);">none</span>'
      }</div>
      ${f.lethal.length?`<div class="small" style="color:var(--equi-bad);margin-top:6px;">☠ Lethal genotype — this foal would not survive.</div>`:''}
      <div style="margin-top:10px;">
        <input id="lb_name_${i}" placeholder="Name this foal" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;" />
        ${roll.twins?'':`<button data-keep="${i}" style="margin-top:6px;width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:9px;border-radius:6px;font-weight:bold;cursor:pointer;">Keep this foal</button>`}
      </div>
    </div>`;

  box.innerHTML=`
    <div class="card">
      <h3 style="margin-top:0;color:var(--equi-accent);">Breeding — ${escAttr(sire.name)} × ${escAttr(dam.name)}</h3>
      <p class="small" style="color:var(--equi-dim);">Name the foal you want to keep — this breeding is locked in.</p>
      ${roll.twins?`<div class="card" style="border-color:var(--equi-good);"><b style="color:var(--equi-good-soft);">Twins!</b> <span class="small">Both foals are yours — this still uses only one breeding slot each.</span></div>`:''}
      ${roll.coi>0?`<div class="card" style="border-color:var(--equi-rust);"><span class="small">⚠ Inbreeding coefficient ${(roll.coi*100).toFixed(1)}% — health risks were raised on this pairing.</span></div>`:''}
      ${(sel&&sel.length)?`<p class="small" style="color:var(--equi-accent-2);">Items in use: ${sel.map(t=>escAttr(BREEDING_TOKENS[t.key].label)+(t.gender?` (${escAttr(t.gender)})`:'')).join(", ")} — spent when you keep a foal. An unused Reroll Token is returned.</p>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">${roll.foals.map(card).join("")}</div>
      ${roll.twins?`<button id="lb_keep_both" style="margin-top:10px;width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;">Keep both foals</button>`:''}
      ${roll.mods.reroll?`<button id="lb_reroll" class="secondary" style="margin-top:8px;width:100%;padding:9px;">🎲 Reroll this breeding — uses your Reroll Token</button>`:''}
    </div>`;

  const done=async(picks)=>{
    // A Reroll Token that was never clicked is not consumed — it goes back to
    // the saddlebag for another breeding.
    const toSpend=(sel||[]).filter(t=>t.key!=="reroll" || rerollUsed===true);
    const created=await commitBreeding(sire,dam,picks,roll,toSpend);
    render();
    alert(created.length>1
      ? `Twins! ${created.map(f=>f.name).join(" and ")} have joined your roster.`
      : `${created[0].name} has joined your roster at 6 months old.`);
  };
  box.querySelectorAll('[data-keep]').forEach(b=>b.onclick=()=>{
    const i=Number(b.dataset.keep);
    const nm=(box.querySelector('#lb_name_'+i).value||'').trim();
    if(!nm){ alert("Give the foal a name first."); return; }
    done([{foal:roll.foals[i], name:nm}]);
  });
  const both=box.querySelector('#lb_keep_both');
  if(both) both.onclick=()=>{
    const names=[0,1].map(i=>(box.querySelector('#lb_name_'+i).value||'').trim());
    if(names.some(n=>!n)){ alert("Name both foals first."); return; }
    done([{foal:roll.foals[0],name:names[0]},{foal:roll.foals[1],name:names[1]}]);
  };
  const rr=box.querySelector('#lb_reroll');
  if(rr) rr.onclick=()=>{
    const again=rollBreeding(sire,dam,roll.mods);
    again.mods=Object.assign({},roll.mods,{reroll:false});   // one reroll per token
    renderLiveBreeding(box,sire,dam,again,sel,true);         // token is now spent
  };
}

function computeFoalPreview(sire,dam,allHorses){
  const breedName = dam.breed || sire.breed || "";
  const breedKey = (breedName||"").trim().toLowerCase();
  const loci = breedLociForBreed(breedKey);

  const sireGeno=horseGenoByLocus(sire,loci);
  const damGeno =horseGenoByLocus(dam,loci);

  // Odds tables (per gene) — kept as an at-a-glance reference under the foals.
  const foalByLocus={};
  loci.forEach(l=>{ foalByLocus[l.key]=crossLocus(sireGeno[l.key], damGeno[l.key], l); });

  const fstats=foalStats(sire.stats||{}, dam.stats||{}, STATS);

  const pedOf=pedigreeResolver(allHorses);
  const inb=inbreedingCoefficient({id:sire.id}, {id:dam.id}, pedOf, 5);
  const riskMult=inbreedingRiskMultiplier(inb.coi);

  const rareCfg=breedRareTraits(breedName);
  const traitNamesOf = (h)=>{
    const fromMods=(h.genoModifiers||[]).map(m=>String(m.label||'').trim());
    const fromList=(h.rareTraits||h.markings||[]).map(x=>String(x||'').trim());
    return [...new Set([...fromMods,...fromList])];
  };
  const cfgNames=rareCfg.map(t=>t.name.toLowerCase());
  // The marking picker and the breed's trait-percentage list grew up apart, so
  // a few names describe the same trait with different wording. Match through
  // an alias table so a horse ticked "Somatic Mutation" is recognised by the
  // "Somatic" percentage rule.
  const aliasFor=(n)=>{
    const k=n.toLowerCase();
    return TRAIT_NAME_ALIASES[k] || k;
  };
  const matchTraits=(names)=>{
    const out=[];
    names.forEach(n=>{
      const want=aliasFor(n);
      const hit=rareCfg.find(t=>t.name.toLowerCase()===want || aliasFor(t.name)===want);
      if(hit && !out.includes(hit.name)) out.push(hit.name);
    });
    return out;
  };
  const sireTraits=matchTraits(traitNamesOf(sire));
  const damTraits =matchTraits(traitNamesOf(dam));
  const traitRows=resolveRareTraits(rareCfg, sireTraits, damTraits, foalByLocus, riskMult);

  const riskRules=breedRiskRules(breedName);
  const geneRiskFlags=foalRisks(foalByLocus, riskRules);
  const lethals=breedLethals(breedName);
  const lethalFlags=[];
  Object.entries(foalByLocus).forEach(([lk,outcomes])=>{
    outcomes.forEach(o=>{ if(isLethalGenotype(lk,o.code,lethals)) lethalFlags.push({locus:lk,code:o.code,p:o.p}); });
  });

  // ── Roll Foal A and Foal B, each with a full genotype + phenotype + gender ──
  const foalA=rollFoal(sire,dam,loci,sireGeno,damGeno,breedName);
  const foalB=rollFoal(sire,dam,loci,sireGeno,damGeno,breedName);

  // Roll the rare traits for ONE specific foal. The odds panel below works from
  // the whole probability spread, but a rolled foal has settled genes — so its
  // conditional traits are judged on what it actually got (a foal that came out
  // sbsb can't roll Gulastra Plume even if the pairing made it possible).
  const rollTraitsFor=(foal)=>{
    const settled={};
    loci.forEach(l=>{ settled[l.key]=[{code:foal.selections[l.key], p:1}]; });
    const rows=resolveRareTraits(rareCfg, sireTraits, damTraits, settled, riskMult);
    const got=[];
    rows.forEach(t=>{
      if(Math.random() < t.chance){
        const entry={name:t.name, health:null};
        if(t.healthName && Math.random() < t.healthChance) entry.health=t.healthName;
        got.push(entry);
      }
    });
    return got;
  };
  foalA.traits=rollTraitsFor(foalA);
  foalB.traits=rollTraitsFor(foalB);

  const genderA = Math.random()<0.5?'Colt':'Filly';
  const genderB = Math.random()<0.5?'Colt':'Filly';
  // Flag if a rolled foal happens to carry a lethal genotype.
  const foalLethals=(sel)=>{
    const hits=[];
    loci.forEach(l=>{ const c=sel[l.key]; if(isLethalGenotype(l.key,c,lethals)) hits.push(c); });
    return hits;
  };

  const foalCard=(foal,gender,label)=>{
    const lethHits=foalLethals(foal.selections);
    const lethLine=lethHits.length?`<div class="small" style="color:var(--equi-bad);margin-top:6px;">☠ Lethal genotype: ${escAttr(lethHits.join(', '))} — this foal would not survive.</div>`:'';
    return `<div class="card" style="border-color:var(--equi-faint);background:#1a1510;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <h3 style="margin:0;color:var(--equi-brass-light);">${label}</h3>
        <span class="tag" style="background:#2a2016;color:var(--equi-brass-light);">${gender}</span>
      </div>
      <div style="margin-top:8px;"><span class="small" style="color:var(--dim);">Colour</span><br><b>${escAttr(foal.phenotype||'—')}</b></div>
      <div style="margin-top:8px;"><span class="small" style="color:var(--dim);">Genotype</span><br><code style="font-size:.92em;color:var(--equi-dim);word-break:break-word;">${escAttr(foal.genotype||'—')}</code></div>
      <div style="margin-top:8px;"><span class="small" style="color:var(--dim);">Rare markings &amp; traits</span><br>${
        (foal.traits && foal.traits.length)
          ? foal.traits.map(t=>`<span class="tag" style="margin:2px 2px 0 0;background:#2a2016;color:var(--equi-brass-light);">${escAttr(t.name)}${t.health?` <span style="color:var(--equi-rust);">· ${escAttr(t.health)}</span>`:''}</span>`).join("")
          : `<span class="small" style="color:var(--equi-faint);">none rolled</span>`
      }</div>
      ${lethLine}
    </div>`;
  };

  const statHtml = STATS.map(s=>`
    <div style="display:flex;justify-content:space-between;padding:2px 8px;">
      <span class="small" style="color:var(--dim);">${STAT_LABELS[s]}</span>
      <span class="small" style="color:var(--accent);font-weight:bold;">${fstats[s]} <span style="color:var(--equi-faint);font-weight:normal;">(${sire.stats?.[s]??0}+${dam.stats?.[s]??0})/2</span></span>
    </div>`).join("");

  const traitHtml = traitRows.length ? traitRows.map(t=>{
    const health = t.healthName
      ? ` · <span style="color:var(--equi-rust);">${pct(t.healthChance)} ${escAttr(t.healthName)}${t.healthInflated?' ⚠':''} (${pct(t.healthOverall)} overall)</span>`
      : '';
    const cond = t.conditional ? ` <span class="small" style="color:var(--equi-accent-2);">(needs ${escAttr(t.requiresLabel||'gene')})</span>` : '';
    return `<div style="padding:3px 8px;"><b class="small">${escAttr(t.name)}</b> · ${pct(t.chance)}${cond}${health}</div>`;
  }).join("") : `<p class="small" style="color:var(--equi-faint);padding:0 8px;">No rare traits possible from these parents.</p>`;

  const lociHtml = loci.map(l=>{
    const outs=foalByLocus[l.key];
    if(outs.length===1 && outs[0].p>=0.999) return "";
    const rows=outs.map(o=>`<span class="tag" style="margin:2px;">${escAttr(o.code)} · ${pct(o.p)}</span>`).join("");
    return `<div style="margin:6px 0;"><b class="small" style="color:var(--equi-brass-light);">${escAttr(l.label||l.key)}</b><div>${rows}</div></div>`;
  }).filter(Boolean).join("");

  const inbHtml = inb.coi>0 ? `
    <div class="card" style="border-color:var(--equi-rust);">
      <h3 style="margin-top:0;color:var(--equi-rust);">⚠ Inbreeding detected</h3>
      <p class="small">Inbreeding coefficient: <b>${pct(inb.coi)}</b> — health-risk odds are raised <b>${riskMult.toFixed(2)}×</b> on this pairing. Shared ancestors: ${inb.contributors.length}.</p>
    </div>` : '';

  const riskHtml = (geneRiskFlags.length||lethalFlags.length) ? `
    <div class="card" style="border-color:var(--equi-rust);">
      <h3 style="margin-top:0;color:var(--equi-rust);">Possible health & genetic risks</h3>
      ${lethalFlags.map(f=>`<div class="small" style="color:var(--equi-bad);">☠ <b>Lethal:</b> ${escAttr(f.code)} — ${pct(f.p)} chance (this genotype is fatal).</div>`).join("")}
      ${geneRiskFlags.map(f=>`<div class="small" style="color:var(--equi-rust);">⚕ ${escAttr(f.code)} — ${escAttr(f.risk)} · ${pct(f.p)} (${escAttr(f.severity)}).</div>`).join("")}
    </div>` : '';

  return `
    <div class="card">
      <h3 style="margin-top:0;">Foal preview — ${escAttr(sire.name)} × ${escAttr(dam.name)}</h3>
      <p class="small" style="color:var(--equi-dim);">Breed: ${escAttr(breedName||'unspecified')} (mare's breed governs genetics). Two possible foals rolled below — in live breeding you'll choose one.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        ${foalCard(foalA,genderA,'Foal A')}
        ${foalCard(foalB,genderB,'Foal B')}
      </div>
      <div style="text-align:right;margin-top:6px;"><button id="bc_reroll" class="secondary" style="font-size:.95em;padding:4px 12px;">🎲 Roll again</button></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px;">
        <div>
          <h4 style="color:var(--equi-brass-light);margin:0 0 6px;">Base stats (floored average)</h4>
          ${statHtml}
        </div>
        <div>
          <h4 style="color:var(--equi-brass-light);margin:0 0 6px;">Rare trait odds</h4>
          <p class="small" style="color:var(--equi-faint);margin:0 0 6px;">Chances for this pairing. What each foal actually rolled is on its card above.</p>
          ${traitHtml}
        </div>
      </div>
      <details style="margin-top:12px;">
        <summary style="cursor:pointer;color:var(--equi-accent);font-size:.95em;">Show per-gene odds</summary>
        <div style="margin-top:8px;">${lociHtml || '<p class="small" style="color:var(--equi-faint);">Both parents are identical at every gene — the foal matches them.</p>'}</div>
      </details>
    </div>
    ${inbHtml}
    ${riskHtml}`;
}

function calcShowEarnings(h){
  return (h.compHistory||[]).reduce((sum, c)=>{
    if(!c.placement || c.placement === 0) return sum;
    return sum + (SHOW_EARNING_VALUES[c.placement] || SHOW_EARNING_OTHER);
  }, 0);
}

function calcGenoPrice(h){
  const base = h.genoBasePrice || 0;
  const mods = (h.genoModifiers||[]).reduce((s, m)=>s + (m.value||0), 0);
  return base + mods;
}

function calcNetWorth(h){
  if(h.customNetWorth !== null && h.customNetWorth !== undefined && h.customNetWorth !== "") {
    return Number(h.customNetWorth);
  }
  return calcGenoPrice(h) + calcShowEarnings(h);
}

function calcSlotPrice(h){
  return Math.round(calcNetWorth(h) * 0.05);
}

function renderHorseProfilePage(app, h){
  // Owner-only controls (Edit Lineage) — a public visitor's horse won't be in
  // our own roster, so this is a safe check.
  const isOwn = state.horses.some(x=>x.id===h.id);
  if(!h.pedigree) h.pedigree={};

  // Build the shareable link so it also carries the Stable Data URL as a
  // `stable` param — this is what lets someone who has never configured
  // Admin settings in their own browser still load this public profile.
  const shareUrl = new URL(window.location.origin + window.location.pathname);
  shareUrl.searchParams.set('horse', h.id);
  if(STABLE_URL) shareUrl.searchParams.set('stable', STABLE_URL);

  const pct = h.level>=10?100:Math.min(100,((h.exp-(LEVEL_TABLE[h.level]?.exp||0))/((LEVEL_TABLE[h.level+1]?.exp||1)-(LEVEL_TABLE[h.level]?.exp||0)))*100);

  const genoPrice    = calcGenoPrice(h);
  const showEarnings = calcShowEarnings(h);
  const netWorth     = calcNetWorth(h);
  const slotPrice    = calcSlotPrice(h);

  const dStatsP = disciplineStats(h);
  // Each stat is one uniform grid cell: label pinned left, number pinned right,
  // so the gap between a stat and its number reads the same on every row, and
  // the grid gap keeps neighbouring cells (highlighted or not) clearly apart.
  const statBars = STATS.map(s=>{
    const base=h.stats[s]||0, bonus=getEquippedStatBonus(h,s), eff=base+bonus;
    const key = dStatsP.includes(s);
    return `<div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:5px 10px;border-radius:5px;white-space:nowrap;${key?'background:#2a1f12;border:1px solid #4a3a1a;':'border:1px solid transparent;'}" ${key?`title="Key stat for ${h.discipline}"`:''}>

      <span style="font-size:1em;font-weight:bold;color:var(--equi-accent);" title="${bonus?`Base ${base} + ${bonus} from tack = ${eff}`:`Base ${base}`}">${base}${bonus?` <span style="color:var(--equi-good);font-weight:normal;">(+${bonus})</span>`:""}</span>
    </div>`;
  }).join("");

  let slotsHtml="";
  for(let i=0;i<h.breedingSlots;i++){
    const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===i);
    slotsHtml+=`<div class="slot${rec?" filled":""}" title="${rec?(rec.partnerName||"Used"):"Open slot"}">${i+1}</div>`;
  }

      ${r.foalId?` → <span onclick="goToProfile('${r.foalId}')" style="color:var(--equi-accent);cursor:pointer;text-decoration:underline;">Foal: ${r.foalName}</span>`:r.foalName?` → Foal: ${r.foalName} (unlinked)`:""}
      ${r.note?`<br><i style="opacity:.7;">${r.note}</i>`:""}
    </div>`).join("")) : `<div class="small" style="opacity:.6;">No breeding records.</div>`;

  const inv=state.tackInventory||[];
  const tackEquippedHtml=(h.tackEquipped||[]).map(tid=>{
    const item=inv.find(t=>t.id===tid);
    if(!item) return "";
    const s=Object.entries(item.stats||{}).map(([k,v])=>`+${v} ${STAT_LABELS[k]}`).join(", ");
    if(item.image){
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;width:150px;">
        <img src="${item.image}" style="width:150px;height:150px;object-fit:contain;cursor:zoom-in;border:1px solid var(--equi-good);border-radius:6px;background:var(--equi-ink);"
             onclick="openLightbox('${jsStr(item.image)}','${jsStr(item.name)}')" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
        <span class="tag" style="display:none;background:#1a3a2a;color:var(--equi-good-soft);border-color:var(--equi-good);">${item.name}</span>
        <div class="small" style="text-align:center;color:var(--equi-good-soft);">${item.name}${s?`<br><span style="color:var(--equi-good);">${s}</span>`:""}</div>
      </div>`;
    }
    return `<span class="tag" style="background:#1a3a2a;color:var(--equi-good-soft);border-color:var(--equi-good);">${item.name}${s?` (${s})`:""}</span>`;
  }).join(" ")||`<span class="small">Nothing equipped.</span>`;

  const trophies=(h.compHistory||[]).filter(c=>c.placement>=1&&c.placement<=3);
  const allPrizeImages=trophies.flatMap(c=>(c.prizes||[]).map(p=>({...p, discipline:c.discipline, placeStr:["1st","2nd","3rd"][c.placement-1]})));
  const ribbonWall=allPrizeImages.length?`<div style="display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;">
    ${allPrizeImages.map(p=>`<img src="${p.dataUrl}" style="width:280px;height:280px;object-fit:contain;cursor:zoom-in;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||(p.discipline+' — '+p.placeStr))}')" onerror="this.style.display='none'" />`).join("")}
  </div>`:null;

    const icon=pl===1?"":pl===2?"":pl===3?"":pl?"":"";
    const label=pl?["1st","2nd","3rd","4th","5th","6th"][pl-1]||pl+"th":"Participant";
    const prizes=c.prizes||[];
    return `<div class="artlog-entry" style="display:flex;gap:8px;align-items:flex-start;">
      ${c.image?`<img src="${c.image}" class="artlog-thumb" style="flex:none;cursor:zoom-in;" onclick="openLightbox('${jsStr(c.image)}','${jsStr(c.discipline)}')" onerror="this.style.display='none'" />`:""}
      <div style="flex:1;">

        ${c.note?`<div class="small" style="opacity:.8;">${c.note}</div>`:""}
        ${prizes.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
          ${prizes.map(p=>`<div style="text-align:center;">
            <img src="${p.dataUrl}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--equi-line);cursor:zoom-in;display:block;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||'Prize')}')" onerror="this.style.display='none'" />
          </div>`).join("")}
        </div>`:""}
      </div>
    </div>`;
  }).join("")}</div>` : `<div class="small" style="opacity:.6;">No competition history.</div>`;

  // Collage-style art log: 300px thumbnails in a grid, newest first. Entries
  // without an image still show as a tile so the log stays complete.
  const artLogHtml=h.artLog.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;max-height:680px;overflow-y:auto;padding-right:4px;">${h.artLog.map(e=>`

              :`<div style="width:100%;height:300px;display:flex;align-items:center;justify-content:center;font-size:2.6em;color:var(--equi-line);background:#100b08;">🎨</div>`}
      <div style="padding:8px 10px;">
        <b style="font-size:.95em;">${e.label}</b> <span class="tag">+${e.exp} EXP</span>${e.placement?` <span class="tag">${["1st","2nd","3rd","4th","5th","6th"][e.placement-1]||e.placement+"th"}</span>`:""}
        <div class="small" style="opacity:.85;">${e.art||""}${e.lit?` · ${e.lit}`:""}${e.link?` · <a href="${e.link}" target="_blank" style="color:var(--equi-accent);">link</a>`:""}</div>
      </div>
    </div>`).join("")}</div>`:
    `<div class="small" style="opacity:.6;">No art logged yet.</div>`;

  const photoHtml = h.profileImage
    ? `<img src="${h.profileImage}" onclick="openLightbox('${jsStr(h.profileImage)}','${jsStr(h.name)}')" style="width:min(300px,55vw);height:min(300px,55vw);border-radius:10px;object-fit:cover;border:3px solid var(--equi-accent);cursor:zoom-in;" />`
    : `<div style="width:min(300px,55vw);height:min(300px,55vw);border-radius:10px;border:3px solid var(--equi-line);display:flex;align-items:center;justify-content:center;font-size:3.5em;background:var(--equi-ink);"></div>`;

  const refColumnHtml = (h.referenceImage || bankAccount.linked)
    ? `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:20px;padding-top:20px;border-top:1px solid var(--equi-line);">
        <div class="small" style="text-align:center;">Reference / Registration${h.referenceLink?` · <a href="${h.referenceLink}" target="_blank">View on site</a>`:""}</div>
        ${h.referenceImage
          ? `<img src="${h.referenceImage}" onclick="openLightbox('${jsStr(h.referenceImage)}','${jsStr(h.name+' — Reference / Registration')}')" style="width:min(560px,92%);max-height:460px;border-radius:10px;object-fit:contain;border:3px solid var(--accent, var(--equi-accent));cursor:zoom-in;background:var(--equi-ink);box-shadow:0 6px 20px rgba(0,0,0,.45);" />`
          : `<div style="width:min(560px,92%);height:260px;border-radius:10px;border:3px solid var(--equi-line);display:flex;align-items:center;justify-content:center;font-size:1em;background:var(--equi-ink);color:var(--equi-faint);text-align:center;padding:10px;">No reference sheet uploaded yet.</div>`}
        ${bankAccount.linked?`
          <button id="pp_ref_change_btn" class="secondary" style="font-size:.92em;">Change Image</button>
          <div id="pp_ref_url_wrap" style="display:none;width:100%;max-width:420px;">
            <input type="text" id="pp_ref_url" placeholder="Paste a direct link to the reference sheet image (.jpg/.png/.gif)" value="${escAttr(h.referenceImage||"")}" style="width:100%;font-size:.9em;" />
            <div id="pp_ref_preview" style="margin-top:8px;">${h.referenceImage?urlImagePreviewHTML(h.referenceImage, h.name+' — Reference Sheet'):''}</div>
          </div>
        `:""}
      </div>`
    : "";

  app.innerHTML=`
    <style>
      body { background:var(--equi-bg); color:var(--equi-text); font-family:var(--equi-serif); margin:0; padding:0; }
      .pcard { background:var(--equi-panel); border:1px solid var(--equi-line); border-radius:10px; padding:clamp(18px,3vw,28px); margin-bottom:20px; }
      .pcard h3 { color:var(--equi-accent); margin-top:0; font-family:var(--equi-display); }
      .pcard .small { font-size:1em; color:var(--equi-dim); }
      a { color:var(--equi-accent); }
      .statbar-wrap { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
      .statbar-bg { flex:1; height:8px; background:var(--equi-ink); border-radius:4px; overflow:hidden; }
      .statbar-fill { height:100%; background:linear-gradient(90deg,var(--equi-good),var(--equi-accent)); }
      .expbar-bg { height:10px; background:var(--equi-ink); border-radius:5px; overflow:hidden; margin-top:6px; }
      .expbar-fill { height:100%; background:linear-gradient(90deg,#8a6fb0,var(--equi-accent)); }
      .tag { display:inline-block; font-size:.97em; padding:4px 10px; border-radius:10px; background:var(--equi-ink); color:var(--equi-dim); border:1px solid var(--equi-line); margin-left:5px; }
      .slot { width:26px; height:26px; border-radius:50%; border:1px solid var(--equi-accent); display:inline-flex; align-items:center; justify-content:center; font-size:1.1em; margin-right:6px; }
      .slot.filled { background:var(--equi-accent); color:var(--equi-ink); }
      .artlog-panel { background:var(--equi-ink); border:1px solid var(--equi-line); border-radius:6px; padding:12px; overflow-y:auto; }
      .artlog-entry { padding:10px 0; border-bottom:1px dashed var(--equi-raised); }
      .artlog-entry:last-child { border-bottom:none; }
      .artlog-thumb { width:60px; height:60px; border-radius:5px; object-fit:cover; border:1px solid var(--equi-line); }
      .breedslots { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
      .worth-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--equi-raised); font-size:1.04em; }
      .worth-row:last-child { border-bottom:none; font-weight:bold; color:var(--equi-accent); }
    </style>

    <div style="width:100%;margin:0 auto;padding:clamp(16px,3vw,32px);">
      <div style="margin-bottom:12px;"><span data-act="back-to-roster" style="color:var(--equi-accent);text-decoration:none;cursor:pointer;">← Back to Stable Manager</span></div>

      <div class="pcard">
        <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
          ${photoHtml}
          ${bankAccount.linked?`
            <button id="pp_photo_change_btn" class="secondary" style="width:min(300px,55vw);font-size:.85em;">Change Image</button>
            <div id="pp_photo_url_wrap" style="display:none;width:100%;">
              <input type="text" id="pp_photo_url" placeholder="Paste a direct link to the photo (.jpg/.png/.gif)" value="${escAttr(h.profileImage||"")}" style="max-width:min(300px,55vw);width:100%;font-size:.9em;" />
            </div>
          `:""}
          ${(h.ownerName||h.owner)?`<div class="small" style="text-align:center;">Owner: ${memberLink(h.owner||h.ownerName, h.ownerName||h.owner)}</div>`:""}
          ${h.riderName?`<div class="small" style="text-align:center;">Rider: ${h.riderName}</div>`:""}
          ${h.stableName?`<div class="small" style="text-align:center;">Stable: ${h.stableLink?`<a href="${h.stableLink}" target="_blank">${h.stableName}</a>`:h.stableName}</div>`:""}
        </div>
        <div style="flex:1;min-width:220px;">
          <h1 style="margin:0 0 4px;color:var(--equi-accent);font-size:1.9em;">${h.name}</h1>
          ${(h.badges||[]).length?`<div style="margin-bottom:6px;">${h.badges.map(b=>`<span class="tag" style="background:#3a2a10;color:var(--equi-brass-light);border-color:var(--equi-accent);">${b}</span>`).join(" ")}</div>`:""}
          <div class="small" style="font-size:1.1em;">${h.breed}${h.gender?` · ${h.gender}`:""} · Age ${h.age} (${h.stage})</div>
          ${fullPhenotype(h)?`<div class="small">Phenotype: ${fullPhenotype(h)}</div>`:""}
          ${h.genotype?`<div class="small">Genotype: ${h.genotype}</div>`:""}
          <div style="margin-top:8px;"><span class="tag" style="font-size:1.02em;">Level ${h.level}</span> <span class="tag" style="font-size:1.02em;">${h.exp} EXP</span></div>
          <div class="expbar-bg" style="margin-top:6px;max-width:260px;"><div class="expbar-fill" style="width:${pct}%"></div></div>
          <div style="margin-top:12px;">
            <h3 style="margin-bottom:8px;">Stats</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px 14px;">${statBars}</div>
          </div>
          <div style="margin-top:16px;font-size:.98em;color:var(--equi-dim);">Net Worth: <b style="color:var(--equi-accent);">฿${netWorth.toLocaleString()}</b> &nbsp;|&nbsp; Breeding Slot: <b style="color:var(--equi-accent);">฿${slotPrice.toLocaleString()}</b></div>
          <details style="margin-top:4px;">
            <summary style="cursor:pointer;font-size:.85em;color:var(--equi-faint);">Breakdown</summary>
            <div style="margin-top:6px;font-size:.85em;max-width:280px;">
              <div class="small" style="margin-bottom:4px;font-size:.9em;">Lightblood Pricing Guide · Slot = Net Worth × 5%.</div>
              <div class="worth-row" style="padding:4px 0;"><span>Genotype Base Price</span><span>฿${(h.genoBasePrice||0).toLocaleString()}</span></div>
              ${(h.genoModifiers||[]).map(m=>`<div class="worth-row" style="padding:4px 0;"><span>${m.label}</span><span>฿${(m.value||0).toLocaleString()}</span></div>`).join("")}
              <div class="worth-row" style="padding:4px 0;"><span>Total Genotype Value</span><span>฿${genoPrice.toLocaleString()}</span></div>
              <div class="worth-row" style="padding:4px 0;"><span>Show Earnings</span><span>฿${showEarnings.toLocaleString()}</span></div>
              ${h.customNetWorth!==null&&h.customNetWorth!==undefined&&h.customNetWorth!==""?`<div class="worth-row" style="padding:4px 0;"><span style="color:var(--equi-warn);">⚠ Custom override</span><span>฿${Number(h.customNetWorth).toLocaleString()}</span></div>`:""}
              <div class="worth-row" style="padding:4px 0;margin-top:2px;padding-top:6px;border-top:1px solid var(--equi-line);"><span>NET WORTH</span><span>฿${netWorth.toLocaleString()}</span></div>
              <div class="worth-row" style="padding:4px 0;"><span>Breeding Slot (5%)</span><span>฿${slotPrice.toLocaleString()}</span></div>
            </div>
          </details>
          <button id="pp_edit_profile_btn" class="secondary" style="margin-top:12px;font-size:.95em;padding:6px 14px;">Edit Profile</button>
        </div>
        </div>
        ${refColumnHtml}
      </div>

      ${h.personality||h.horseHistory ? `<div class="pcard">
        ${h.personality?`<h3>Personality</h3><p style="font-size:1.06em;line-height:1.7;white-space:pre-wrap;">${h.personality}</p>`:""}
        ${h.horseHistory?`<h3>History</h3><p style="font-size:1.06em;line-height:1.7;white-space:pre-wrap;">${h.horseHistory}</p>`:""}
      </div>` : ""}

      <div class="pcard">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
          <h3 style="margin:0;">Pedigree</h3>
          ${isOwn?`<button data-act="edit-lineage-profile" data-id="${h.id}" class="secondary" style="margin-top:0;font-size:.98em;padding:4px 12px;">Edit Lineage</button>`:''}
        </div>
        <div style="margin-top:10px;">${renderPedigreeChart(h)}</div>
        <h3 style="margin-top:16px;">Breeding Slots</h3>
        <div class="breedslots">${slotsHtml||'<span class="small">none yet</span>'}</div>
        <div style="margin-top:10px;">${breedingRecHtml}</div>
      </div>

      <div class="pcard">
        <h3>Equipped Tack</h3>
        <div>${tackEquippedHtml}</div>
      </div>

      <div class="pcard">
        <h3>Ribbon Wall</h3>
        ${ribbonWall || '<div class="small" style="opacity:.6;">No placements yet.</div>'}
        <h3 style="margin-top:16px;">Competition History</h3>
        ${compHistoryHtml}
      </div>

      <div class="pcard">
        <h3>Art Log</h3>
        ${artLogHtml}
      </div>

      <div style="text-align:center;margin:20px 0;">
        <div class="small" style="margin-bottom:6px;">Shareable link to this profile:</div>
        <input readonly value="${shareUrl.toString()}" onclick="this.select()" style="max-width:480px;width:100%;text-align:center;padding:8px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:6px;font-family:var(--equi-mono);" />
      </div>
    </div>
  `;

  const backLink = app.querySelector('[data-act="back-to-roster"]');
  if(backLink) backLink.onclick = goToRoster;

  const editProfileBtn = app.querySelector('#pp_edit_profile_btn');
  if(editProfileBtn) editProfileBtn.onclick = ()=>showProfileModal(h.id);
  const editLinBtn = app.querySelector('[data-act="edit-lineage-profile"]');
  if(editLinBtn) editLinBtn.onclick = ()=>showLineageModal(h.id);

  // FIX: profile photo used to be a file upload run through resizeImageFile
  // and base64-encoded, which could still blow past the JSONP/Sheets size
  // limit for a full-res phone photo. It's now a pasted direct image link,
  // same as the show/prize/training art elsewhere in the app — save fires
  // on blur so we're not hammering the sheet on every keystroke.
  const photoChangeBtn = app.querySelector('#pp_photo_change_btn');
  const photoUrlWrap = app.querySelector('#pp_photo_url_wrap');
  if(photoChangeBtn && photoUrlWrap){
    photoChangeBtn.onclick = ()=>{
      photoUrlWrap.style.display = 'block';
      photoChangeBtn.style.display = 'none';
      const inp = app.querySelector('#pp_photo_url');
      if(inp) inp.focus();
    };
  }

  const refChangeBtn = app.querySelector('#pp_ref_change_btn');
  const refUrlWrap = app.querySelector('#pp_ref_url_wrap');
  if(refChangeBtn && refUrlWrap){
    refChangeBtn.onclick = ()=>{
      refUrlWrap.style.display = 'block';
      refChangeBtn.style.display = 'none';
      const inp = app.querySelector('#pp_ref_url');
      if(inp) inp.focus();
    };
  }

  const photoInput = app.querySelector('#pp_photo_url');
  if(photoInput){
    photoInput.onblur = async ()=>{
      const url = photoInput.value.trim() || null;
      if(url === (h.profileImage||null)) return;
      h.profileImage = url;
      render();
      const ok = await saveHorse(h);
      if(!ok) alert(`${h.name}'s photo was updated here, but saving it to the database failed. Try again — if it keeps happening, sign out and sign back in (top of the page).`);
    };
  }

  const refInput = app.querySelector('#pp_ref_url');
  if(refInput){
    refInput.oninput = ()=>{
      app.querySelector('#pp_ref_preview').innerHTML = urlImagePreviewHTML(refInput.value.trim(), h.name+' — Reference Sheet');
    };
    refInput.onblur = async ()=>{
      const url = refInput.value.trim() || null;
      if(url === (h.referenceImage||null)) return;
      h.referenceImage = url;
      let bonusMsg = "";
      if(url && !h.refBonusGiven){
        h.refBonusGiven = true;
        h.exp += REF_SHEET_EXP;
        checkLevelUp(h);
        addLog(`${h.name} — Reference sheet submitted · +${REF_SHEET_EXP} EXP`);
        bonusMsg = ` +${REF_SHEET_EXP} EXP awarded for first reference sheet submission!`;
      }
      render();
      const ok = await saveHorse(h);
      if(!ok) alert(`${h.name}'s reference sheet was updated here, but saving it to the database failed. Try again — if it keeps happening, sign out and sign back in (top of the page).`);
      else if(bonusMsg) alert(`Reference sheet saved for ${h.name}.${bonusMsg}`);
    };
  }
}



// ============================================
// PROFILE EDIT MODAL (owner, rider, stable, personality, history)
// ============================================

function showProfileModal(horseId){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';

  function field(id, label, val, placeholder, type='input'){
    const inp = type==='textarea'
      ? `<textarea id="${id}" rows="4" placeholder="${placeholder}" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;margin-top:3px;box-sizing:border-box;font-family:var(--equi-serif);resize:vertical;">${val||''}</textarea>`
      : `<input id="${id}" value="${val||''}" placeholder="${placeholder}" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;margin-top:3px;box-sizing:border-box;" />`;
    return `<div style="margin-bottom:10px;"><label style="font-size:.98em;color:var(--equi-dim);text-transform:uppercase;display:block;">${label}</label>${inp}</div>`;
  }

  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:24px;max-width:760px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);margin:auto;">
    <h3 style="margin-top:0;color:var(--equi-accent);">Edit Profile — ${h.name}</h3>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;">${field('pm_breed','Breed',h.breed,'e.g. Thoroughbred')}</div>
      <div style="width:110px;">${field('pm_age','Age',h.age,'e.g. 5')}</div>
    </div>
    <div class="small" style="margin:-4px 0 10px;opacity:.7;">Changing age here won't skip training age-up milestones — the horse's stage (foal/yearling/adult) still updates from those. Changing breed won't recompute existing genetics.</div>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;">${field('pm_barn','Barn Name (optional)',h.barnName,'e.g. Fortune — the everyday name')}</div>
      <div style="width:150px;">${field('pm_height','Height (optional)',h.height,'e.g. 16.2 hh')}</div>
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:.98em;color:var(--equi-dim);text-transform:uppercase;display:block;">Discipline</label>
      <select id="pm_discipline" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;margin-top:3px;box-sizing:border-box;font-family:var(--equi-serif);">
        <option value="">— none chosen —</option>
        ${Object.keys(DISCIPLINES).map(d=>`<option value="${d}"${h.discipline===d?' selected':''}>${d} — ${DISCIPLINES[d].stats.map(x=>STAT_LABELS[x]).join(', ')}</option>`).join("")}
      </select>
      <div class="small" style="opacity:.7;margin-top:3px;">The stats for this discipline get highlighted on the horse's card, profile and training tab.</div>
    </div>
    ${field('pm_import','Import Sheet Link (optional)',h.importLink,'https://… reference/import sheet')}
    ${field('pm_owner','Owner Name',h.ownerName,'e.g. @YourUsername')}
    ${field('pm_ownerlink','Owner Link (optional)',h.ownerLink,'https://… (DeviantArt, Toyhouse…)')}
    ${field('pm_rider','Rider Name (optional)',h.riderName,'e.g. Jane Smith')}
    ${field('pm_stable','Stable / Boarding (optional)',h.stableName,'e.g. Willowbrook Stables')}
    ${field('pm_stablelink','Stable Link (optional)',h.stableLink,'https://…')}
    ${field('pm_personality','Personality',h.personality,'Describe this horse - personality, quirks, and character...','textarea')}
    ${field('pm_history','History',h.horseHistory,'Background story, significant events, journey so far…','textarea')}
    <button id="pm_save" style="width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1.1em;">Save</button>
    <button id="pm_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:10px;border-radius:6px;cursor:pointer;font-size:1.1em;">Cancel</button>
    <div id="pm_status" style="margin-top:8px;font-size:.92em;color:var(--equi-dim);text-align:center;min-height:1.2em;"></div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#pm_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#pm_save').onclick=async()=>{
    const saveBtn = overlay.querySelector('#pm_save');
    const statusEl = overlay.querySelector('#pm_status');
    saveBtn.disabled = true;
    const origLabel = saveBtn.textContent;
    saveBtn.textContent = 'Saving…';
    statusEl.textContent = 'Saving — this can take up to 15 seconds…';
    const slowNotice = setTimeout(()=>{
      statusEl.textContent = "Still working — slow connections or a busy sheet can take a bit longer. Don't close this window.";
    }, 6000);
    try{
      h.breed = overlay.querySelector('#pm_breed').value.trim() || h.breed;
      const newAge = Number(overlay.querySelector('#pm_age').value);
      if(!isNaN(newAge) && newAge >= 0) h.age = newAge;
      h.barnName   = overlay.querySelector('#pm_barn').value.trim();
      h.height     = overlay.querySelector('#pm_height').value.trim();
      h.importLink = overlay.querySelector('#pm_import').value.trim();
      h.discipline = overlay.querySelector('#pm_discipline').value;
      h.ownerName  = overlay.querySelector('#pm_owner').value.trim();
      h.ownerLink  = overlay.querySelector('#pm_ownerlink').value.trim();
      h.riderName  = overlay.querySelector('#pm_rider').value.trim();
      h.stableName = overlay.querySelector('#pm_stable').value.trim();
      h.stableLink = overlay.querySelector('#pm_stablelink').value.trim();
      h.personality  = overlay.querySelector('#pm_personality').value.trim();
      h.horseHistory = overlay.querySelector('#pm_history').value.trim();
      // Save the horse record and the shared stable state in parallel —
      // they're independent writes, so there's no need to wait on one
      // before starting the other. Roughly halves the worst-case wait
      // compared to running them one after another.
      const [ok] = await Promise.all([ saveHorse(h), save() ]);
      clearTimeout(slowNotice);
      overlay.remove(); render();
      if(!ok) alert(`Profile was updated here, but saving it to the database failed. Try again — if it keeps happening, sign out and sign back in (top of the page).`);
    }catch(err){
      clearTimeout(slowNotice);
      console.error('[EquiStories] Edit Profile save failed:', err);
      saveBtn.disabled = false;
      saveBtn.textContent = origLabel;
      statusEl.textContent = '';
      alert(`Something went wrong while saving this profile. Try again, or check your Stable Data URL in Admin settings.\n(Open your browser's console — F12 or right-click → Inspect → Console — for the technical error.)`);
    }
  };
}
