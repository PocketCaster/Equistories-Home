// BREEDING SLOT MODAL
// ============================================

// ═══════════════════════════════════════════════════════════════════════════
// BREEDING SLOT RESERVATIONS — the cross-member half
// ═══════════════════════════════════════════════════════════════════════════
// Marking a slot for another member writes a small shared record as well as the
// note on the owner's own horse. It has to exist separately because a horse is
// stored as one JSON blob, and Firestore can neither query nor write rules
// against anything inside it — so without this, a reservation is invisible to
// the very person it was made for.
//
// Slot consumption stays with the owner: rules only let a member write their
// OWN horses. The reserved member flips the record to "used" when they breed,
// and the owner's app takes the slot on their next load (reconcileReservations).

function myMemberId(){
  return (state.profile && state.profile.memberName) || bankAccount.userId || "";
}
// Reservations are matched on an EXACT, case-sensitive Firestore query, so
// "@PocketCaster", "pocketcaster" and "PocketCaster " would all miss each other.
// Everything is squashed to one key before it's stored or looked up.
function memberKey(s){
  return String(s||"").trim().replace(/^@+/,"").toLowerCase();
}
// Every name you might have been reserved under: your display name AND your
// bank username, which are often different.
function myMemberKeys(){
  const raw=[(state.profile && state.profile.memberName)||"", bankAccount.userId||""];
  const keys=new Set();
  raw.forEach(v=>{ const k=memberKey(v); if(k) keys.add(k); });
  return [...keys];
}
function sameMember(a,b){
  return String(a||"").trim().toLowerCase() === String(b||"").trim().toLowerCase();
}
function reservationDocId(horseId, slotIndex){ return `res_${horseId}_${slotIndex}`; }

async function writeReservation(h, slotIndex, reservedFor){
  const DB=await waitForDB(); if(!DB || !DB.putWithField) return false;
  const id=reservationDocId(h.id, slotIndex);
  try{
    const typed=String(reservedFor||"").trim();
    return await DB.putWithField('breedingReservations', id, bankAccount.userId, {
      id, horseId:h.id, horseName:h.name, breed:h.breed||"",
      gender:h.gender||"", slotIndex,
      ownerName:myMemberId(), reservedFor:typed, reservedForKey:memberKey(typed),
      status:"open", date:new Date().toISOString().slice(0,10),
    }, 'reservedFor', memberKey(typed));
  }catch(e){ console.warn('[Stable] reservation write failed:', e && e.message); return false; }
}
async function removeReservation(horseId, slotIndex){
  const DB=await waitForDB(); if(!DB || !DB.remove) return false;
  try{ return await DB.remove('breedingReservations', reservationDocId(horseId, slotIndex)); }
  catch(e){ console.warn('[Stable] reservation removal failed:', e && e.message); return false; }
}
// Reservations other members have set aside for ME, with the horse itself.
// A plain-language report of what the database actually contains, so a missing
// reservation stops being guesswork. Shows who you are, what was searched for,
// and every reservation record that exists — including ones addressed to a
// different spelling of your name.
async function diagnoseReservations(){
  const L=[];
  const add=(t,c)=>L.push(`<div class="small" style="color:${c||'var(--equi-dim)'};">${t}</div>`);
  const me=(state.profile && state.profile.memberName)||"";
  const bank=bankAccount.userId||"";
  add(`<b>Signed in as:</b> bank username “${escAttr(bank||'(none)')}”, profile name “${escAttr(me||'(none)')}”`);
  if(!bank && !me){
    add("You don't appear to be signed in — nothing can be matched to you.", "var(--equi-rust)");
    return L.join("");
  }
  add(`<b>Searching for reservations addressed to:</b> ${myMemberKeys().map(k=>'“'+escAttr(k)+'”').join(', ')||'(nothing)'}`);

  const DB=await waitForDB();
  if(!DB){ add("Not connected to the database.", "var(--equi-rust)"); return L.join(""); }
  add("Connected to the database. ✓", "var(--equi-good-soft)");

  let rows=null;
  try{
    rows=await withTimeout(DB.listAllRaw('breedingReservations'), 8000, "timeout");
  }catch(e){
    const msg=String((e&&e.message)||e);
    if(/permission|insufficient/i.test(msg)){
      add("<b>The database refused to read reservations.</b> The <b>breedingReservations</b> rules "
        +"have not been published yet — until they are, no reservation can be created or seen by anyone.", "var(--equi-rust)");
    } else if(/timeout/i.test(msg)){
      add("The database didn't answer in time.", "var(--equi-rust)");
    } else {
      add("Couldn't read reservations: "+escAttr(msg), "var(--equi-rust)");
    }
    return L.join("");
  }

  if(!rows.length){
    add("<b>There are no reservation records at all.</b> Nobody's reservation has ever been saved. "
      +"Either the person reserving is on an older version of the Manager, or the rules weren't published "
      +"when they tried — their slot is only a note on their own copy.", "var(--equi-rust)");
    return L.join("");
  }

  add(`<b>${rows.length} reservation record${rows.length===1?'':'s'} exist:</b>`, "var(--equi-good-soft)");
  const mine=myMemberKeys();
  rows.forEach(r=>{
    const addressed=String(r.reservedFor||"(blank)");
    const hit=mine.includes(memberKey(addressed));
    add(`&nbsp;&nbsp;• <b>${escAttr(r.body.horseName||r.body.horseId||r.docId)}</b> `
      +`from ${escAttr(r.owner||'?')} → addressed to “${escAttr(addressed)}” `
      +(hit?'<b style="color:var(--equi-good-soft);">— that\'s you ✓</b>'
           :'<span style="color:var(--equi-rust);">— not a match for your names</span>')
      +(r.body.status==="used"?' <span style="opacity:.7;">(already used)</span>':''));
  });
  const matches=rows.filter(r=>mine.includes(memberKey(r.reservedFor||"")));
  if(!matches.length){
    add("<b>None are addressed to you.</b> Compare the spelling above with your bank username — "
      +"whoever reserved it should use exactly that.", "var(--equi-rust)");
  } else {
    const open=matches.filter(r=>r.body.status!=="used");
    add(open.length
      ? `<b>${open.length} should be showing in your pickers.</b> If they aren't, reopen the Breeding tab.`
      : "They're all marked as already used.", open.length?"var(--equi-good-soft)":"var(--equi-rust)");
  }
  return L.join("");
}

async function loadReservedForMe(){
  const DB=await waitForDB(); if(!DB || !DB.listByField) return [];
  const keys=myMemberKeys();
  if(!keys.length) return [];
  // Also try the raw spellings, so reservations written before the key was
  // normalised are still found instead of silently vanishing.
  const raws=[(state.profile && state.profile.memberName)||"", bankAccount.userId||""]
    .map(v=>String(v||"").trim()).filter(Boolean);
  const lookups=[...new Set([...keys, ...raws, ...raws.map(r=>"@"+r)])];
  try{
    const seen=new Set(); const recs=[];
    let denied=false;
    for(const k of lookups){
      let found=[];
      try{ found=await withTimeout(DB.listByField('breedingReservations','reservedFor',k), 8000, "timeout"); }
      catch(e){
        const msg=String((e&&e.message)||e);
        if(/permission|insufficient/i.test(msg)) denied=true;
        found=[];
      }
      (found||[]).forEach(r=>{ if(r && r.id && !seen.has(r.id)){ seen.add(r.id); recs.push(r); } });
    }
    // A permission error means one specific thing: the rules for this
    // collection haven't been published. Say so instead of "no response".
    if(denied && !recs.length){ const err=new Error("denied"); err.denied=true; throw err; }
    const open=recs.filter(r=>r && r.status!=="used" && r.horseId);
    const out=[];
    for(const r of open){
      // Fetching the horse itself must never be able to stall the whole load —
      // that left the Breeding tab reading "Checking…" forever. If it doesn't
      // come back we still list the horse from what the reservation records,
      // and fetch the full record when it's actually needed.
      let horse=null;
      try{ horse=await withTimeout(DB.get('horses', r.horseId), 6000, "timeout"); }
      catch(e){ console.warn('[Stable] reserved horse fetch failed:', r.horseId, e && e.message); }
      if(!horse){
        horse={ id:r.horseId, name:r.horseName||"(unnamed horse)", breed:r.breed||"",
                gender:r.gender||"", age:3, stage:"adult",
                stats:{}, genoModifiers:[], artLog:[], compHistory:[],
                breedingRecords:[], breedingSlots:0, pedigree:{}, __partial:true };
      }
      out.push({res:r, horse});
    }
    return out;
  }catch(e){
    console.warn('[Stable] could not load reservations:', e && e.message);
    // Let a permissions failure reach the caller so the Breeding tab can say
    // what's actually wrong instead of reporting a generic no-response.
    if(e && e.denied) throw e;
    return [];
  }
}
// Owner side: a reservation the other member has used means that slot is spent.
// Only the owner can write the horse, so this catches up on their next load.
async function reconcileReservations(){
  const DB=await waitForDB(); if(!DB || !DB.listByField) return 0;
  const me=bankAccount.userId;
  if(!me) return 0;
  let changed=0;
  try{
    const mine=await DB.listByField('breedingReservations','owner',me).catch(()=>[]);
    for(const r of (mine||[])){
      if(!r || r.status!=="used") continue;
      const h=state.horses.find(x=>x.id===r.horseId);
      if(!h) continue;
      const rec=(h.breedingRecords||[]).find(x=>x.slotIndex===r.slotIndex);
      if(rec && !rec.partnerName){
        rec.partnerName = r.usedWith || (r.reservedFor+"'s horse");
        rec.partnerOwner = r.reservedFor;
        rec.foalName = r.foalName || "";
        rec.date = r.usedDate || rec.date;
        rec.note = (rec.note?rec.note+" · ":"") + "bred by "+r.reservedFor;
        addLog(`${h.name}'s reserved slot ${r.slotIndex+1} was used by ${r.reservedFor}.`);
        saveHorse(h); changed++;
      }
    }
  }catch(e){ console.warn('[Stable] reconcile failed:', e && e.message); }
  if(changed){ save(); }
  return changed;
}

        <label class="small" style="color:var(--equi-dim);text-transform:uppercase;display:block;margin-top:8px;">Link to a foal on your roster</label>
        <select id="bs_foal_select" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;margin-top:3px;">
          <option value="">— select foal —</option>
          ${state.horses.filter(x=>x.id!==h.id).map(x=>`<option value="${escAttr(x.id)}">${escAttr(x.name)}</option>`).join("")}
        </select>
        ${btn('bs_link_foal','Link Foal','var(--equi-accent)','var(--equi-panel)')}
        <div id="bs_foal_member" style="margin-top:2px;"></div>
        <p class="small" style="color:var(--equi-dim);margin:6px 0 0;">Foals from before the site often live on someone else's roster — use the box above to link one of theirs.</p>` : ""}
      ${btn('bs_clear','Clear this slot','var(--equi-bad)','#fff')}
      ${ghost('bs_cancel','Cancel')}`;
    box.querySelector('#bs_cancel').onclick=close;
    const lb=box.querySelector('#bs_link_foal'); if(lb) lb.onclick=doLinkFoal;
    const mp=box.querySelector('#bs_foal_member');
    if(mp) mp.appendChild(memberHorsePicker('bs_mf', "Or link a foal owned by another member", (foal, who)=>{
      const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===slotIndex);
      if(!rec) return;
      rec.foalId=foal.id; rec.foalName=foal.name; rec.foalOwner=who;
      addLog(`Linked ${h.name}'s breeding record to ${foal.name} (owned by ${who}).`);
      saveHorse(h); save(); close(); render();
    }));
    box.querySelector('#bs_clear').onclick=doClear;
  }

  // ── actions ───────────────────────────────────────────────────────────────
  function doRecordPast(){
    const role=box.querySelector('#bs_role').value;
    const partnerName=box.querySelector('#bs_partner_name').value.trim();
    const partnerOwner=box.querySelector('#bs_partner_owner').value.trim();
    const date=box.querySelector('#bs_date').value.trim();
    const note=box.querySelector('#bs_note').value.trim();
    if(!partnerName){ alert("Please enter the partner's name."); return; }
    if(!h.breedingRecords) h.breedingRecords=[];
    h.breedingRecords.push({ id:uid2(), slotIndex, role, partnerName, partnerOwner, date, note, foalId:null, foalName:"", reservedFor:"" });
    h.breedingFilled=(h.breedingFilled||0)+1;
    addLog(`${h.name}'s breeding slot ${slotIndex+1} marked as used (${role==="sire"?"sired":"bred"} with ${partnerName}).`);
    saveHorse(h); save(); close(); render();
  }
  function doReserve(){
    const reservedFor=box.querySelector('#bs_reserve_for').value.trim();
    const note=box.querySelector('#bs_reserve_note').value.trim();
    if(!reservedFor){ alert("Enter the member's name or handle to reserve this slot for them."); return; }
    if(!h.breedingRecords) h.breedingRecords=[];
    h.breedingRecords.push({ id:uid2(), slotIndex, role:"", partnerName:"", partnerOwner:"", date:"", note, foalId:null, foalName:"", reservedFor });
    h.breedingFilled=(h.breedingFilled||0)+1;
    addLog(`${h.name}'s breeding slot ${slotIndex+1} reserved for ${reservedFor}.`);
    saveHorse(h); save();
    // Tell the owner whether it actually reached the other member. Silently
    // failing here is exactly how a reservation ends up invisible to them.
    const status=box.querySelector('#bs_reserve_status');
    if(status) status.innerHTML='<span class="small" style="opacity:.75;">Sharing…</span>';
    writeReservation(h, slotIndex, reservedFor).then(ok=>{
      if(ok){ close(); render(); return; }
      if(status) status.innerHTML=
        '<span class="small" style="color:var(--equi-rust);">Saved on your side, but it could NOT be shared — '
        +escAttr(reservedFor)+' won\'t see it yet. Usually this means the site needs its database '
        +'permissions updated. The slot is still reserved for you locally.</span>';
    }).catch(()=>{
      if(status) status.innerHTML='<span class="small" style="color:var(--equi-rust);">Saved locally, but sharing failed.</span>';
    });
  }
  function doConvert(){
    const role=box.querySelector('#bs_role').value;
    const partnerName=box.querySelector('#bs_partner_name').value.trim();
    if(!partnerName){ alert("Enter the partner's name to record this breeding."); return; }
    const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===slotIndex);
    if(rec){
      rec.role=role; rec.partnerName=partnerName; rec.partnerOwner=rec.reservedFor||"";
      addLog(`${h.name}'s reserved slot ${slotIndex+1} recorded as bred with ${partnerName} (was reserved for ${rec.reservedFor}).`);
      saveHorse(h); save(); close(); render();
      removeReservation(h.id, slotIndex);
    }
  }
  function doRelease(){
    h.breedingRecords=(h.breedingRecords||[]).filter(r=>r.slotIndex!==slotIndex);
    h.breedingFilled=Math.max(0,(h.breedingFilled||0)-1);
    addLog(`Released the reservation on ${h.name}'s breeding slot ${slotIndex+1}.`);
    saveHorse(h); save(); close(); render();
    removeReservation(h.id, slotIndex);
  }
  function doClear(){
    if(!confirm('Clear this breeding record? This cannot be undone.')) return;
    h.breedingRecords=(h.breedingRecords||[]).filter(r=>r.slotIndex!==slotIndex);
    h.breedingFilled=Math.max(0,(h.breedingFilled||0)-1);
    saveHorse(h); save(); close(); render();
  }
  function doLinkFoal(){
    const foalId=box.querySelector('#bs_foal_select').value;
    if(!foalId){ alert("Please select a foal first."); return; }
    const foal=state.horses.find(x=>x.id===foalId);
    const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===slotIndex);
    if(rec && foal){
      rec.foalId=foal.id; rec.foalName=foal.name;
      addLog(`Linked ${h.name}'s breeding record to foal ${foal.name}.`);
      saveHorse(h); save(); close(); render();
    }
  }

  if(isUsed) drawUsed();
  else if(isReserved) drawReserved();
  else drawChoose();
}

const PED_SLOTS = [
  {key:"sire",  label:"Sire",  col:2, parent:null,   side:"top"},
  {key:"dam",   label:"Dam",   col:2, parent:null,   side:"bot"},
  {key:"ss",    label:"SS",    col:3, parent:"sire", side:"top"},
  {key:"sd",    label:"SD",    col:3, parent:"sire", side:"bot"},
  {key:"ds",    label:"DS",    col:3, parent:"dam",  side:"top"},
  {key:"dd",    label:"DD",    col:3, parent:"dam",  side:"bot"},
  {key:"sss",   label:"SSS",   col:4, parent:"ss",   side:"top"},
  {key:"ssd",   label:"SSD",   col:4, parent:"ss",   side:"bot"},
  {key:"sds",   label:"SDS",   col:4, parent:"sd",   side:"top"},
  {key:"sdd",   label:"SDD",   col:4, parent:"sd",   side:"bot"},
  {key:"dss",   label:"DSS",   col:4, parent:"ds",   side:"top"},
  {key:"dsd",   label:"DSD",   col:4, parent:"ds",   side:"bot"},
  {key:"dds",   label:"DDS",   col:4, parent:"dd",   side:"top"},
  {key:"ddd",   label:"DDD",   col:4, parent:"dd",   side:"bot"},
];

function pedEntry(h, key){
  return (h.pedigree || {})[key] || {name:"", link:"", inRosterId:""};
}
// The name to SHOW for a pedigree slot. A typed name wins, but if you only
// picked a horse from your roster (or another member's) we use that horse's
// name rather than calling the parent "Unknown" — which is what it did before,
// silently throwing away a perfectly good link.
function pedName(entry){
  const typed=String((entry&&entry.name)||"").trim();
  if(typed) return typed;
  if(entry && entry.inRosterId){
    const r=state.horses.find(x=>x.id===entry.inRosterId);
    if(r && r.name) return r.name;
  }
  if(entry && entry.externalName) return entry.externalName;
  return "";
}

function pedLink(entry, label){
  const name = pedName(entry) || "Unknown";
  const inRoster = entry.inRosterId ? state.horses.find(x=>x.id===entry.inRosterId) : null;
  if(inRoster && name !== "Unknown"){
    return `<span onclick="goToProfile('${inRoster.id}')" style="color:var(--equi-accent);text-decoration:underline;font-weight:bold;cursor:pointer;">${name}</span>`;
  }
  if(entry.link && name !== "Unknown"){
    return `<a href="${entry.link}" target="_blank" style="color:var(--equi-accent);text-decoration:none;font-weight:bold;">${name}</a>`;
  }
  return `<span style="color:${name==="Unknown"?"var(--equi-line)":"var(--equi-text)"};font-weight:${name!=="Unknown"?"bold":"normal"};">${name}</span>`;
}

// Stats the horse's chosen discipline calls for (used to highlight them).
function disciplineStats(h){
  const d = h && h.discipline ? DISCIPLINES[h.discipline] : null;
  return d ? d.stats : [];
}

function renderPedigreeChart(h){
  // Laid out to match the bloodline block used in the horse logs: third
  // generation on the long leader, second generation on the short leader, and
  // the Sire/Dam flush left between their own halves of the tree.
  const L3='------------------------------------------';
  const L2='-----------------';
  function nm(key){
    const e=pedEntry(h,key);
    return pedName(e) ? pedLink(e,key.toUpperCase()) : '<span style="color:var(--equi-faint);">Unknown</span>';
  }
  const line=(lead,label,key,strong)=>`<div style="padding:1px 0;white-space:pre;overflow-x:auto;">`
    +`<span style="color:var(--equi-faint);">${lead}</span>`
    +`<span style="color:${strong?'var(--equi-accent)':'var(--equi-dim)'};font-weight:${strong?'bold':'normal'};">${lead?' ':''}${label}: </span>`
    +`${nm(key)}</div>`;

  return `<div style="font-family:var(--equi-mono);font-size:.95em;background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:8px;padding:14px;line-height:1.7;">
    <div style="font-family:var(--equi-serif);color:var(--equi-accent);margin-bottom:8px;font-weight:bold;">Bloodline:</div>
    ${line(L3,'SSS','sss')}
    ${line(L2,'SS','ss')}
    ${line(L3,'SSD','ssd')}
    ${line('','Sire','sire',true)}
    ${line(L3,'SDS','sds')}
    ${line(L2,'SD','sd')}
    ${line(L3,'SDD','sdd')}
    ${line(L3,'DSS','dss')}
    ${line(L2,'DS','ds')}
    ${line(L3,'DSD','dsd')}
    ${line('','Dam','dam',true)}
    ${line(L3,'DDS','dds')}
    ${line(L2,'DD','dd')}
    ${line(L3,'DDD','ddd')}
  </div>`;
}

// ── Finding another member's horse ─────────────────────────────────────────
// Horses are readable by everyone, but a horse's NAME lives inside the json
// blob, so it can't be searched directly. The owner field IS queryable though —
// so we ask who owns it, fetch just that member's horses with one indexed
// lookup, and let you pick from the list. No scanning the whole game.
const __memberHorseCache={};
// Never leave the caller hanging: if the database doesn't answer within a few
// seconds we give up and say so, rather than sitting on "Looking…" forever.
function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error(label||"timeout")), ms)),
  ]);
}
async function horsesOfMember(handle){
  const key=String(handle||"").trim();
  if(!key) return {ok:true, list:[]};
  if(__memberHorseCache[key]) return {ok:true, list:__memberHorseCache[key]};
  const DB=await waitForDB();
  if(!DB || !DB.listByOwner) return {ok:false, reason:"offline"};
  try{
    const list=await withTimeout(DB.listByOwner('horses', key), 8000, "timeout");
    __memberHorseCache[key]=list||[];
    return {ok:true, list:__memberHorseCache[key]};
  }catch(e){
    const msg=String((e&&e.message)||e);
    console.warn('[Stable] member horse lookup failed:', msg);
    return {ok:false, reason: /permission|insufficient/i.test(msg) ? "denied"
                            : /timeout/i.test(msg) ? "timeout" : "error", detail:msg};
  }
}
// A reusable "whose horse is it? → which one?" control. Calls onPick(horse).
function memberHorsePicker(idPrefix, labelText, onPick){
  const box=document.createElement('div');
  box.style.cssText='border:1px solid #3a4a6a;border-radius:6px;padding:10px;margin-top:8px;';
  box.innerHTML=`
    <div class="small" style="color:var(--equi-accent-2);text-transform:uppercase;">${escAttr(labelText)}</div>
    <div style="display:flex;gap:6px;margin-top:5px;">
      <input id="${idPrefix}_owner" placeholder="Their bank username" style="flex:1;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;" />
      <button id="${idPrefix}_find" class="secondary" style="white-space:nowrap;padding:7px 12px;margin:0;">Find</button>
    </div>
    <div id="${idPrefix}_result" style="margin-top:6px;"></div>`;
  const res=()=>box.querySelector('#'+idPrefix+'_result');
  box.querySelector('#'+idPrefix+'_find').onclick=async()=>{
    const who=box.querySelector('#'+idPrefix+'_owner').value.trim();
    if(!who){ res().innerHTML='<span class="small" style="color:var(--equi-rust);">Enter their username first.</span>'; return; }
    res().innerHTML='<span class="small" style="opacity:.7;">Looking…</span>';
    const r=await horsesOfMember(who);
    if(!r.ok){
      const why = r.reason==="offline" ? "You're not connected to the database right now."
        : r.reason==="denied" ? "The database refused the request — the site's permissions need publishing."
        : r.reason==="timeout" ? "The database didn't answer in time. Check your connection and try again."
        : "Something went wrong reading from the database.";
      res().innerHTML=`<span class="small" style="color:var(--equi-rust);">${why}</span>`;
      return;
    }
    const list=r.list;
    if(!list.length){
      res().innerHTML=`<span class="small" style="color:var(--equi-rust);">No horses found under “${escAttr(who)}”. That's their <b>bank username</b>, not a display name — and it's case-sensitive.</span>`;
      return;
    }
    res().innerHTML=`
      <select id="${idPrefix}_pick" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;">
        ${list.map(x=>`<option value="${escAttr(x.id)}">${escAttr(x.name)} (${escAttr(x.breed||'?')}${x.gender?', '+escAttr(x.gender):''})</option>`).join("")}
      </select>
      <button id="${idPrefix}_use" style="margin-top:6px;width:100%;background:#3a4a6a;color:#fff;border:none;padding:8px;border-radius:6px;font-weight:bold;cursor:pointer;">Use this horse</button>`;
    res().querySelector('#'+idPrefix+'_use').onclick=()=>{
      const id=res().querySelector('#'+idPrefix+'_pick').value;
      const horse=list.find(x=>x.id===id);
      if(horse) onPick(horse, who);
    };
  };
  return box;
}

function showLineageModal(horseId){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  if(!h.pedigree) h.pedigree={};

  if(h.sireName && !h.pedigree.sire) h.pedigree.sire={name:h.sireName, link:"", inRosterId:h.sireId||""};
  if(h.damName && !h.pedigree.dam)   h.pedigree.dam ={name:h.damName,  link:"", inRosterId:h.damId||""};

  const rosterOpts = state.horses.filter(x=>x.id!==h.id).map(x=>`<option value="${x.id}">${x.name}</option>`).join("");

  function slotFields(key, label){
    const e = pedEntry(h, key);
    const inRosterVal = e.inRosterId || "";
    return `
      <div style="background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:6px;padding:10px;margin-bottom:8px;">
        <div style="font-weight:bold;color:var(--equi-accent);margin-bottom:6px;font-size:1.06em;">${label}</div>
        <label style="font-size:.97em;color:var(--equi-dim);text-transform:uppercase;display:block;">Name</label>
        <input data-ped="${key}" data-field="name" value="${e.name||''}" placeholder="e.g. Shadowfax" style="width:100%;padding:6px;background:var(--equi-bg);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:4px;margin-top:3px;box-sizing:border-box;" />
        <label style="font-size:.97em;color:var(--equi-dim);text-transform:uppercase;display:block;margin-top:6px;">External Link <span style="opacity:.6;">(off-site URL, optional)</span></label>
        <input data-ped="${key}" data-field="link" value="${e.link||''}" placeholder="https://… (DeviantArt, Toyhouse, etc.)" style="width:100%;padding:6px;background:var(--equi-bg);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:4px;margin-top:3px;box-sizing:border-box;" />
        <label style="font-size:.97em;color:var(--equi-dim);text-transform:uppercase;display:block;margin-top:6px;">Link to horse in your roster <span style="opacity:.6;">(overrides external link)</span></label>
        <select data-ped="${key}" data-field="inRosterId" style="width:100%;padding:6px;background:var(--equi-bg);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:4px;margin-top:3px;box-sizing:border-box;">
          <option value="">— not in roster —</option>
          ${rosterOpts.replace(`value="${inRosterVal}"`, `value="${inRosterVal}" selected`)}
        </select>
        ${e.ownerHandle?`<div class="small" style="color:var(--equi-accent-2);margin-top:5px;">Linked to <b>${escAttr(e.name)}</b>, owned by ${escAttr(e.ownerHandle)}</div>`:''}
        <div data-memberpick="${key}" style="margin-top:4px;"></div>
      </div>`;
  }

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:24px;max-width:560px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);margin:auto;">
    <h3 style="margin-top:0;color:var(--equi-accent);">Pedigree Editor — ${h.name}</h3>
    <p style="color:var(--equi-dim);font-size:1.02em;margin-top:0;">Fill in up to 3 generations. Names can link to on-site horse profiles or external pages. Leave blank for Unknown.</p>

    <details open style="margin-bottom:8px;"><summary style="cursor:pointer;color:var(--equi-accent);font-weight:bold;padding:6px 0;">Generation 1 — Parents</summary>
      ${slotFields('sire','Sire (Father)')}
      ${slotFields('dam','Dam (Mother)')}
    </details>

    <details style="margin-bottom:8px;"><summary style="cursor:pointer;color:var(--equi-accent);font-weight:bold;padding:6px 0;">Generation 2 — Grandparents</summary>
      ${slotFields('ss','SS - Sires Sire')}
      ${slotFields('sd','SD - Sires Dam')}
      ${slotFields('ds','DS - Dams Sire')}
      ${slotFields('dd','DD - Dams Dam')}
    </details>

    <details style="margin-bottom:8px;"><summary style="cursor:pointer;color:var(--equi-accent);font-weight:bold;padding:6px 0;">Generation 3 — Great-Grandparents</summary>
      ${slotFields('sss','SSS')}${slotFields('ssd','SSD')}
      ${slotFields('sds','SDS')}${slotFields('sdd','SDD')}
      ${slotFields('dss','DSS')}${slotFields('dsd','DSD')}
      ${slotFields('dds','DDS')}${slotFields('ddd','DDD')}
    </details>

    <div id="ln_basestats" style="border-top:1px solid var(--equi-line);margin-top:14px;padding-top:12px;">
      <label class="small" style="color:var(--equi-brass-light);text-transform:uppercase;">Base stats from parents</label>
      <p class="small" style="color:var(--equi-dim);margin:4px 0 0;">For foals bred before the site: link both parents above, then take this horse's starting stats from the average of theirs. Training it has already logged stays on top.</p>
      <button id="ln_bs_go" class="secondary" style="margin-top:6px;padding:6px 12px;">Set base stats from parents</button>
      <div id="ln_bs_status" style="margin-top:5px;"></div>
    </div>
    <button id="ln_save" style="margin-top:10px;width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1.1em;">Save Pedigree</button>
    <button id="ln_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:10px;border-radius:6px;cursor:pointer;font-size:1.1em;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  // A parent that belongs to somebody else — the common case for foals bred
  // before the site, where the dam is still on another member's roster.
  overlay.querySelectorAll('[data-memberpick]').forEach(slot=>{
    const key=slot.dataset.memberpick;
    slot.appendChild(memberHorsePicker('mp_'+key, "Or use another member's horse", (horse, who)=>{
      const nameInp=overlay.querySelector(`[data-ped="${key}"][data-field="name"]`);
      if(nameInp) nameInp.value=horse.name;
      if(!h.pedigree[key]) h.pedigree[key]={name:"",link:"",inRosterId:""};
      h.pedigree[key].externalId=horse.id;
      h.pedigree[key].ownerHandle=who;
      slot.querySelector('#mp_'+key+'_result').innerHTML =
        `<span class="small" style="color:var(--equi-good-soft);">Linked to <b>${escAttr(horse.name)}</b> (${escAttr(who)}). Save the pedigree to keep it.</span>`;
    }));
  });

  // ── Base stats from the parents ────────────────────────────────────────
  // For foals brought over from before the site: enter the horse normally,
  // link both parents here, and take the starting stats from them. Stored as
  // baseStats so training stacks on top and a reload can't undo it.
  const bsBox=overlay.querySelector('#ln_basestats');
  if(bsBox){
    const resolveParent=async(key)=>{
      const p=(h.pedigree||{})[key]||{};
      if(p.inRosterId){ const r=state.horses.find(x=>x.id===p.inRosterId); if(r) return r; }
      if(p.externalId){
        const DB=await waitForDB();
        if(DB && DB.get){ try{ return await DB.get('horses', p.externalId); }catch(e){} }
      }
      return null;
    };
    const status=(msg,col)=>{ bsBox.querySelector('#ln_bs_status').innerHTML=
      `<span class="small" style="color:${col||'var(--equi-dim)'};">${msg}</span>`; };
    bsBox.querySelector('#ln_bs_go').onclick=async()=>{
      status('Reading the parents…');
      const [sire,dam]=await Promise.all([resolveParent('sire'), resolveParent('dam')]);
      if(!sire || !dam){
        status('Both parents need to be linked first — either from your roster or another member\'s.', 'var(--equi-rust)');
        return;
      }
      const derived=foalStats(sire.stats||{}, dam.stats||{}, STATS);
      h.baseStats=Object.assign({}, derived);
      recomputeHorse(h);   // re-apply the horse's own training on top
      saveHorse(h); save();
      status(`Set from ${escAttr(sire.name)} × ${escAttr(dam.name)} — `
        + STATS.map(k=>`${STAT_LABELS[k]||k} ${derived[k]}`).join(', ')
        + '. Any training this horse has logged is still counted on top.', 'var(--equi-good-soft)');
    };
  }

  // Picking a roster horse fills the Name box straight away, so it's obvious
  // the choice registered — and so the chart has a name to draw.
  overlay.querySelectorAll('[data-field="inRosterId"]').forEach(sel=>{
    sel.onchange=()=>{
      const key=sel.dataset.ped;
      const nameInp=overlay.querySelector(`[data-ped="${key}"][data-field="name"]`);
      if(!nameInp) return;
      const picked=state.horses.find(x=>x.id===sel.value);
      if(picked) nameInp.value=picked.name;
    };
  });

  overlay.querySelector('#ln_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#ln_save').onclick=()=>{
    if(!h.pedigree) h.pedigree={};
    overlay.querySelectorAll('[data-ped]').forEach(inp=>{
      const key=inp.dataset.ped, field=inp.dataset.field;
      if(!h.pedigree[key]) h.pedigree[key]={name:"",link:"",inRosterId:""};
      h.pedigree[key][field]=inp.value.trim();
      // Picking a roster horse supersedes a cross-member link.
      if(field==="inRosterId" && inp.value.trim()){
        delete h.pedigree[key].externalId; delete h.pedigree[key].ownerHandle;
      }
    });
    // Backfill any blank name from the horse that was linked, so nothing is
    // stored as an unnamed parent.
    Object.keys(h.pedigree).forEach(k=>{
      const e=h.pedigree[k];
      if(e && !String(e.name||"").trim() && e.inRosterId){
        const r=state.horses.find(x=>x.id===e.inRosterId);
        if(r) e.name=r.name;
      }
    });
    h.sireId=h.pedigree.sire?.inRosterId||null;
    h.sireName=h.pedigree.sire?.name||"";
    h.damId=h.pedigree.dam?.inRosterId||null;
    h.damName=h.pedigree.dam?.name||"";
    addLog(`Updated pedigree for ${h.name}.`);
    saveHorse(h); save(); overlay.remove(); render();
  };
}

// Traits editor — mark which of the breed's configured rare traits this horse
// carries. Carried traits feed the Foal Calculator (a carrier can pass them on).
// ── Set Genetics ───────────────────────────────────────────────────────────
// Edit the coat-colour alleles of a horse that already exists. Mirrors the
// gene grid in Add-a-Horse, but seeded from the horse's current genetics:
// horseGenoByLocus() prefers its structured genoObj and otherwise reads the
// genotype string, so horses added before genoObj existed still open with the
// right alleles selected instead of resetting to defaults.
// Saving recomputes genotype/phenotype/base price and REPLACES only the
// colour-gene modifiers — rare markings the horse carries are preserved.
function showGeneticsModal(horseId){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  const breed=(h.breed||"").trim();
  const breedKey=breed.toLowerCase();
  const fixedBase=getFixedBase(breedKey);
  const loci=[allLoci().find(l=>l.key==="extension"), allLoci().find(l=>l.key==="agouti"),
    ...getAllowedLoci(breedKey).map(k=>allLoci().find(l=>l.key===k))]
    .filter(Boolean).map(l=>locusForBreed(l, breedKey));

  // Seed from what the horse actually has.
  const sel=Object.assign({}, horseGenoByLocus(h, loci));
  loci.forEach(l=>{ if(!sel[l.key]) sel[l.key]=defaultCodeForLocus(l); });

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:22px;max-width:820px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);">
    <h3 style="margin-top:0;color:var(--equi-accent);">Set Genetics — ${escAttr(h.name)}</h3>
    <p class="small" style="color:var(--equi-dim);margin-top:0;">Breed: <b>${escAttr(breed||"—")}</b>. Changing these updates the horse's genotype, phenotype and genetics value. Rare markings are kept as they are.</p>
    <div id="sg_wrap"></div>
    <div id="sg_preview" class="small" style="background:var(--equi-ink);padding:10px;border-radius:6px;margin-top:12px;line-height:1.5;"></div>
    <button id="sg_save" style="margin-top:12px;width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;">✓ Save Genetics</button>
    <button id="sg_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:9px;border-radius:6px;cursor:pointer;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  function draw(){
    const wrapEl=overlay.querySelector('#sg_wrap');
    wrapEl.innerHTML=`<div class="gene-grid">
      ${loci.map(locus=>{
        if(locus.requiresAny){
          const ok=Object.entries(locus.requiresAny).every(([k,codes])=>codes.includes(sel[k]));
          if(!ok) return "";
        }
        const fixedCode = fixedBase && (locus.key==="extension"||locus.key==="agouti") ? fixedBase[locus.key] : null;
        const options=getLocusOptions(locus, breedKey);
        if(!options.length) return "";
        let current = fixedCode || sel[locus.key] || options[0].code;
        if(!options.some(o=>o.code===current)) current=options[0].code;
        sel[locus.key]=current;
        const labelAttr=String(locus.label).replace(/"/g,"&quot;");
        if(fixedCode){
          const opt=options.find(o=>o.code===fixedCode);
          return `<div class="gene-cell">
            <label class="small" title="${labelAttr} — fixed for this breed">${locus.label}</label>
            <div class="small" style="padding:7px 0;opacity:.75;">${fixedCode} — ${opt?opt.desc:""} <span style="opacity:.65;">(fixed for breed)</span></div>
          </div>`;
        }
        return `<div class="gene-cell">
          <label class="small" title="${labelAttr}">${locus.label}</label>
          <select data-locus="${locus.key}">
            ${options.map(o=>`<option value="${o.code}" ${o.code===current?"selected":""}>${o.code} — ${o.desc}</option>`).join("")}
          </select>
        </div>`;
      }).join("")}
    </div>`;
    wrapEl.querySelectorAll('[data-locus]').forEach(s=>s.onchange=()=>{ sel[s.dataset.locus]=s.value; draw(); });
    preview();
  }
  function preview(){
    const r=computeGenoResult(sel, breedKey);
    const marks=rareMarkingLabels(h);
    overlay.querySelector('#sg_preview').innerHTML=
      `<b>Phenotype:</b> ${r.phenotype}${marks.length?`, ${marks.join(", ")}`:""}<br>`+
      `<b>Genotype:</b> ${r.genotype}<br>`+
      `<span style="opacity:.8;">Genetics value: ฿${r.totalPrice.toLocaleString()}</span>`;
  }
  draw();

  overlay.querySelector('#sg_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#sg_save').onclick=()=>{
    const r=computeGenoResult(sel, breedKey);
    // Keep the horse's rare markings; swap out only the colour-gene modifiers.
    const keptMarks=(h.genoModifiers||[]).filter(m=>{
      const known=knownMarkingLabels();
      return m && (m.rare===true || known.has(String(m.label||'').trim().toLowerCase()));
    });
    const tags=keptMarks.filter(m=>m.genoTag).map(m=>m.genoTag);
    h.genoObj=Object.assign({}, sel);
    h.genotype=tags.length?`${r.genotype} ${tags.join(" ")}`:r.genotype;
    h.phenotype=r.phenotype;
    h.genoBasePrice=r.genoBasePrice;
    h.genoModifiers=[...r.genoModifiers, ...keptMarks];
    addLog(`Updated ${h.name}'s genetics — ${r.phenotype}.`);
    saveHorse(h); save(); overlay.remove(); render();
  };
}

// ── Markings ───────────────────────────────────────────────────────────────
// Add or remove the rare markings on a horse that already exists. Deliberately
// touches ONLY the rare markings: the colour/pattern modifiers computeGenoResult
// produced are left alone, so removing a marking can't desync the horse from
// its genotype. The picker respects the same gene requirements as Add-a-Horse
// (Bloodmark needs grey, Peacock needs Lp, and so on).
function showMarkingsModal(horseId){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  if(!Array.isArray(h.genoModifiers)) h.genoModifiers=[];
  const breed=(h.breed||"").trim();
  const breedKey=breed.toLowerCase();
  const loci=breedLociForBreed(breedKey);
  const geno=horseGenoByLocus(h, loci);
  const hasCode=(locus,code)=>geno[locus]===code;

  const isMark=m=>{
    const known=knownMarkingLabels();
    return m && (m.rare===true || known.has(String(m.label||'').trim().toLowerCase()));
  };

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:22px;max-width:560px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);">
    <h3 style="margin-top:0;color:var(--equi-accent);">Markings — ${escAttr(h.name)}</h3>
    <p class="small" style="color:var(--equi-dim);margin-top:0;">Rare markings and custom traits this horse carries. Coat colour genes aren't listed here — use <b>Set Genetics</b> for those.</p>
    <div id="mk_list" style="margin-bottom:10px;"></div>
    <div style="display:flex;gap:6px;align-items:center;">
      <select id="mk_pick" style="flex:1;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;"></select>
      <button id="mk_add" class="secondary" style="white-space:nowrap;padding:7px 12px;">+ Add</button>
    </div>
    <button id="mk_save" style="margin-top:14px;width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;">✓ Save Markings</button>
    <button id="mk_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:9px;border-radius:6px;cursor:pointer;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  // work on a copy so Cancel really cancels
  let marks=(h.genoModifiers||[]).filter(isMark).map(m=>Object.assign({}, m));
  const others=(h.genoModifiers||[]).filter(m=>!isMark(m));

  function drawPicker(){
    const customForBreed=(state.customMarkings||[]).filter(m=>
      !m.breeds || !m.breeds.length ||
      m.breeds.some(b=>String(b).toLowerCase()===breedKey || String(b).toLowerCase()===breed.toLowerCase()));
    const items=[...GENO_MODIFIERS["Rare Markings"], ...customForBreed]
      .filter(m=>markingMeetsGeneRequirement(m.label, hasCode))
      .filter(m=>!marks.some(x=>String(x.label).toLowerCase()===String(m.label).toLowerCase()));
    overlay.querySelector('#mk_pick').innerHTML=
      `<option value="">— Pick a marking/trait —</option>`+
      items.map(m=>`<option value="${m.value}|${escAttr(m.label)}">${escAttr(m.label)} (+฿${m.value})</option>`).join("");
  }
  function drawList(){
    const list=overlay.querySelector('#mk_list');
    list.innerHTML=marks.length ? marks.map((m,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="flex:1;">${escAttr(m.label)}</span>
        <span style="color:var(--equi-accent);">+฿${(m.value||0).toLocaleString()}</span>
        <button data-remove="${i}" style="background:var(--equi-bad);color:#fff;border:none;border-radius:4px;padding:2px 9px;cursor:pointer;">✕</button>
      </div>`).join("")
      : `<div class="small" style="opacity:.6;">No rare markings on this horse.</div>`;
    list.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{
      marks.splice(Number(b.dataset.remove),1); drawList(); drawPicker();
    });
  }
  drawList(); drawPicker();

  overlay.querySelector('#mk_add').onclick=()=>{
    const val=overlay.querySelector('#mk_pick').value;
    if(!val) return;
    const [price, ...rest]=val.split('|');
    const label=rest.join('|');
    const def=[...GENO_MODIFIERS["Rare Markings"], ...(state.customMarkings||[])]
      .find(m=>String(m.label)===label);
    marks.push({label, value:Number(price)||0, genoTag:(def&&def.genoTag)||null, rare:true});
    drawList(); drawPicker();
  };
  overlay.querySelector('#mk_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#mk_save').onclick=()=>{
    h.genoModifiers=[...others, ...marks];
    // Keep any genotype tags a marking contributes (e.g. Gulastra Plume -> Sbsb)
    // in step with the markings that are actually still on the horse.
    if(h.genoObj){
      const r=computeGenoResult(h.genoObj, breedKey);
      const tags=marks.filter(m=>m.genoTag).map(m=>m.genoTag);
      h.genotype=tags.length?`${r.genotype} ${tags.join(" ")}`:r.genotype;
      h.phenotype=r.phenotype;
    }
    addLog(`Updated ${h.name}'s markings — ${marks.length?marks.map(m=>m.label).join(", "):"none"}.`);
    saveHorse(h); save(); overlay.remove(); render();
  };
}

// Resolve the bonus from depicted items: sum each item's individual
// stats/EXP/PP, then add any set bonus whose every member is depicted.
// Tack items carry stats/exp; apparel items carry pp. The caller reads the
// fields it cares about (training uses stats/exp; prestige uses pp).
// HORSE training depicts TACK: stats + EXP (apparel grants rider PP through
// the Rider Prestige block instead — different animal, different form).
function resolveDepictedBonus(depictedIds){
  const pool=state.tackInventory||[];
  const byId=id=>pool.find(i=>i.id===id);
  const total={ stats:{}, exp:0, notes:[] };
  depictedIds.forEach(id=>{
    const it=byId(id); if(!it) return;
    Object.entries(it.stats||{}).forEach(([s,v])=>total.stats[s]=(total.stats[s]||0)+v);
    if(Number(it.exp)) total.exp+=Number(it.exp);
    total.notes.push(it.name);
  });
  const depSet=new Set(depictedIds);
  (state.tackSets||[]).forEach(set=>{
    const members=pool.filter(i=>i.setId===set.id);
    if(members.length>0 && members.every(m=>depSet.has(m.id))){
      const b=set.bonus||{};
      Object.entries(b.stats||{}).forEach(([s,v])=>total.stats[s]=(total.stats[s]||0)+v);
      total.exp+=Number(b.exp)||0;
      total.notes.push(`◈ ${set.name} set`);
    }
  });
  return total;
}

  function refreshPrompt(){
    const h=currentHorse();
    const opts=trainingOptionsFor(h);
    const t=opts.find(x=>x.id===card.querySelector('#tr_type').value);
    const t2=combinedMode?opts.find(x=>x.id===card.querySelector('#tr_type2').value):null;
    if(!t) return;
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    // Highlight which of this training's stats matter for the horse's discipline.
    const dS=disciplineStats(h);
    const statsMarked=Object.entries(allStats).map(([s,v])=>
      dS.includes(s) ? `<b style="color:var(--equi-brass-light);">★ +${v} ${STAT_LABELS[s]}</b>` : `+${v} ${STAT_LABELS[s]}`).join(", ");
    card.querySelector('#tr_prompt').innerHTML=`<div class="prompt-box">
      ${t2?`<b>${t.name}</b> + <b>${t2.name}</b>`:`<b>${t.name}</b>`}<br>
      <span style="font-size:1.02em;">${t.prompt}${t2?`<br><span style="opacity:.8;">${t2.prompt}</span>`:""}</span><br>
      <span class="small">Stats: ${statsMarked}</span>
      ${h.discipline?`<br><span class="small" style="color:var(--equi-brass-light);">${h.discipline} needs: ${dS.map(x=>STAT_LABELS[x]).join(", ")}</span>`
        :`<br><span class="small" style="opacity:.7;">No discipline chosen — set one in Edit Profile to see which stats to train.</span>`}
    </div>`;
  }

  function refreshMilestoneStatus(){
    const h=currentHorse();
    const m=MILESTONES[h.stage];
    const box=card.querySelector('#tr_milestone_status');
    if(!m){ box.innerHTML=''; return; }
    const done=new Set(h.completedMilestones||[]);
    const doneCount=m.options.filter(o=>done.has(o.id)).length;
    const ready=doneCount>=m.required;
    box.innerHTML=`<div class="prompt-box" style="border-color:${ready?'var(--equi-good)':'var(--equi-line)'};">
      <b>${h.name}</b> is a <b>${h.stage}</b> — ${doneCount}/${m.required} age-up milestone${m.required>1?'s':''} completed
      ${ready?` · <button id="tr_ageup" style="margin-left:6px;">Age Up to ${m.next}</button>`:''}
    </div>`;
    const btn=box.querySelector('#tr_ageup');
    if(btn) btn.onclick=()=>{
      h.stage=m.next;
      // Advance the AGE too. Horses added by hand start at 3 so this never
      // mattered, but a bred foal starts at 6 months — without this it would
      // climb foal -> adult and still read age 0.5, so isBreedingAge (age >= 3)
      // would never let it breed.
      h.age=Math.max(Number(h.age)||0, STAGE_MIN_AGE[m.next] ?? (Number(h.age)||0));
      addLog(`${h.name} aged up to ${m.next}! Now ${h.age} year${h.age===1?'':'s'} old.`);
      saveHorse(h); save(); render();
    };
  }

  let trRPP={collect:()=>null};
  function refreshRPP(){
    const slot=card.querySelector('#tr_rpp_slot');
    if(!slot) return;
    slot.innerHTML=riderPPBlockHtml('train','training',currentHorse());
    trRPP=bindRiderPPBlock(card,'train');
  }
  refreshRPP();
  refreshPrompt();
  refreshMilestoneStatus();
  card.querySelector('#tr_type').onchange=refreshPrompt;
  card.querySelector('#tr_type2').onchange=refreshPrompt;
  card.querySelector('#tr_horse').onchange=()=>{
    refreshRPP();   // default the rider to the newly selected horse's rider
    const h=currentHorse();
    card.querySelector('#tr_type').innerHTML=buildTrainingOpts(h);
    card.querySelector('#tr_type2').innerHTML=buildTrainingOpts(h);
    refreshPrompt();
    refreshMilestoneStatus();
  };

  card.querySelector('#tr_mode_single').onclick=()=>{
    combinedMode=false;
    card.querySelector('#tr_mode_single').classList.add('active');
    card.querySelector('#tr_mode_combined').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='none';
    card.querySelector('#tr_lbl1').textContent='Training Type';
    refreshPrompt();
  };
  card.querySelector('#tr_mode_combined').onclick=()=>{
    combinedMode=true;
    card.querySelector('#tr_mode_combined').classList.add('active');
    card.querySelector('#tr_mode_single').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='';
    card.querySelector('#tr_lbl1').textContent='First Training';
    refreshPrompt();
  };

  card.querySelectorAll('[data-bonus]').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(selectedBonuses.has(k)){selectedBonuses.delete(k);p.classList.remove('active');}
    else{selectedBonuses.add(k);p.classList.add('active');}
    if(k==="Additional Creature (per)"){ const row=card.querySelector('#tr_creatureRow'); if(row) row.classList.toggle('hide', !selectedBonuses.has(k)); }
  });

  // Depicted tack: toggleable chips from owned tack with stat/EXP bonuses.
  // (Rider apparel is picked in the Rider Prestige form, not here.)
  const depicted=new Set();
  const bonusItems=(state.tackInventory||[])
    .filter(it=> (it.stats && Object.keys(it.stats).length) || Number(it.exp)>0);
  const depBox=card.querySelector('#tr_depicted');
  const depNone=card.querySelector('#tr_depicted_none');
  if(bonusItems.length && depBox){
    depNone.style.display='none';
    depBox.innerHTML=bonusItems.map(it=>{
      const bits=[...Object.entries(it.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]||s}`),
        it.exp?`+${it.exp} EXP`:''].filter(Boolean).join(", ");
      return `<button type="button" class="pill" data-dep="${it.id}" title="${escAttr(bits)}">${escAttr(it.name)}</button>`;
    }).join("");
    depBox.querySelectorAll('[data-dep]').forEach(b=>b.onclick=()=>{
      const id=b.dataset.dep;
      if(depicted.has(id)){depicted.delete(id);b.classList.remove('active');}
      else{depicted.add(id);b.classList.add('active');}
    });
  }
  card.__depicted=depicted;   // expose for submit handler

  // "Item used" picker: EXP/stat treats only (breed tokens are held for the
  // breeding/import flow, not spent here). Single-select-per-treat via chips.
  const usedItems=new Set();
  const treatPool=(state.consumables||[]).filter(c=> (c.effect==='exp'||c.effect==='stat') && c.left>0);
  const consBox=card.querySelector('#tr_consumables');
  const consNone=card.querySelector('#tr_consumables_none');
  if(treatPool.length && consBox){
    consNone.style.display='none';
    consBox.innerHTML=treatPool.map(c=>{
      const eff = c.effect==='exp' ? `+${c.effectValue} EXP` : `+${c.effectValue} ${STAT_LABELS[c.effectStat]||c.effectStat}`;
      return `<button type="button" class="pill" data-cons="${escAttr(c.invId)}" title="${escAttr(eff)} · ${c.left} left">${escAttr(c.name)} <span style="opacity:.7;">(${eff}${c.left>1?` · ${c.left} left`:''})</span></button>`;
    }).join("");
    consBox.querySelectorAll('[data-cons]').forEach(b=>b.onclick=()=>{
      const id=b.dataset.cons;
      if(usedItems.has(id)){ usedItems.delete(id); b.classList.remove('active'); }
      else { usedItems.add(id); b.classList.add('active'); }
      if(typeof recalcTrTotal==='function') recalcTrTotal();
    });
  }
  card.__usedItems=usedItems;

  card.querySelector('#tr_lit').oninput=()=>{
    const wc=parseInt(card.querySelector('#tr_lit').value)||0;
    const exp=calcLitExp(wc);
    const prev=card.querySelector('#tr_lit_preview');
    prev.textContent=wc===0?"":(wc<200?"⚠ Min 200 words for EXP":`✓ +${exp} EXP`);
    prev.style.color=wc<200&&wc>0?"#c9a23a":"var(--equi-good)";
  };

  // FIX (was the training-entry save bug): this used to read an uploaded
  // file and embed it as base64, which was either too large for the
  // GET/JSONP request or (after compression) still ate into the Sheets
  // cell-size limit. Art images are now pasted links instead — a URL is
  // just a short string, so there's nothing left to compress, chunk, or
  // fail to fit.
  card.querySelector('#tr_image_url').oninput=()=>{
    uploadedImage = card.querySelector('#tr_image_url').value.trim() || null;
  };
  card.querySelector('#tr_image_url').onblur=()=>{
    card.querySelector('#tr_image_preview').innerHTML = urlImagePreviewHTML(uploadedImage, 'Training Art');
  };

  // Live total: mirrors the submit math below so players can double-check
  // before logging. KEEP IN SYNC with the #tr_go handler.
  const recalcTrTotal=()=>{
    const box=card.querySelector('#tr_total'); if(!box) return;
    try{
      const h=state.horses.find(x=>x.id===card.querySelector('#tr_horse').value);
      const artRows=readArtRows(card);
      if(!h || !artRows.length){ box.innerHTML='<span class="small" style="opacity:.6;">Pick a horse and at least one art type to see this log\'s total.</span>'; return; }
      const t=trainingOptionsFor(h).find(x=>x.id===card.querySelector('#tr_type').value);
      const t2=combinedMode?trainingOptionsFor(h).find(x=>x.id===card.querySelector('#tr_type2').value):null;
      const imgCount=artRowsImages(artRows);
      const allStats={...((t&&t.stats)||{})};
      if(t2) Object.entries(t2.stats).forEach(([st,v])=>allStats[st]=(allStats[st]||0)+v);
      if(imgCount>1) Object.keys(allStats).forEach(st=>allStats[st]=allStats[st]*imgCount);
      const previewRider = (trRPP && trRPP.riderId) ? trRPP.riderId() : '';
      applyRiderTrainingBonus(h, allStats, previewRider);
      let exp=artRowsExp(artRows);
      exp+=calcLitExp(parseInt(card.querySelector('#tr_lit').value)||0);
      selectedBonuses.forEach(k=>{ if(!BONUS_EXP[k]) return;
        if(k==="Additional Creature (per)"){ const nEl=card.querySelector('#tr_creature_n'); exp+=BONUS_EXP[k]*Math.max(1,parseInt(nEl&&nEl.value)||1); }
        else exp+=BONUS_EXP[k]; });
      exp+=riderTrainingExp(h, previewRider);
      const cbL=(card.querySelector('#tr_cb_label').value||'').trim();
      const cbE=parseInt(card.querySelector('#tr_cb_exp').value)||0;
      if(cbL && cbE) exp+=cbE;
      const depIds=[...(card.__depicted||[])];
      if(depIds.length){ const b=resolveDepictedBonus(depIds); exp+=b.exp;
        Object.entries(b.stats).forEach(([st,v])=>allStats[st]=(allStats[st]||0)+v); }
      // Items used (EXP/stat treats) in the live total
      [...(card.__usedItems||[])].forEach(invId=>{
        const c=(state.consumables||[]).find(x=>x.invId===invId); if(!c) return;
        if(c.effect==='exp') exp+=Number(c.effectValue)||0;
        else if(c.effect==='stat') allStats[c.effectStat]=(allStats[c.effectStat]||0)+(Number(c.effectValue)||0);
      });
      const statBits=Object.entries(allStats).filter(([,v])=>v).map(([st,v])=>`+${v} ${STAT_LABELS[st]||st}`);
      const ppEl=card.querySelector('.rpp_sum'); const pp=ppEl?Number(ppEl.textContent)||0:0;
      box.innerHTML=`<b style="color:var(--accent,#d29a3e);">This log will grant:</b> <b>+${exp} EXP</b>`
        +(statBits.length?` &nbsp;·&nbsp; ${statBits.join(', ')}`:'')
        +(pp>0?` &nbsp;·&nbsp; Rider <b>+${pp} PP</b>`:'')
        +(imgCount>1?` <span class="small" style="opacity:.7;">(collage ×${imgCount})</span>`:'');
    }catch(err){ box.textContent=''; }
  };
  // Add / remove rows of the sheet breakdown.
  // If we arrived here via Edit, load the entry into this form.
  (function prefillFromEdit(){
    if(!editingLogEntry || editingLogEntry.type==='competition') return;
    const h = state.horses.find(x=>x.id===editingLogEntry.horseId);
    const e = h && (h.artLog||[]).find(x=>x.id===editingLogEntry.entryId);
    if(!h || !e) { editingLogEntry=null; return; }

    const set=(sel,val)=>{ const el=card.querySelector(sel); if(el && val!=null) el.value=val; };
    set('#tr_horse', h.id);
    set('#tr_image_url', e.image||'');
    set('#tr_link', e.link||'');
    set('#tr_lit', (e.lit||'').replace(/[^0-9]/g,'') || '');
    if(e.label) set('#tr_cb_label', e.label);

    // rebuild the sheet breakdown
    const rowsHost=card.querySelector('#tr_artrows');
    if(rowsHost){
      const rows = (e.artMix && e.artMix.length) ? e.artMix
                 : (e.art ? [{art:e.art, n:1}] : []);
      rowsHost.innerHTML = rows.length
        ? rows.map((r,i)=>artRowHTML(r.art, r.n, i>0)).join("")
        : artRowHTML("",1,false);
    }
    // bonus pills
    selectedBonuses = new Set(e.bonuses||[]);
    card.querySelectorAll('[data-bonus]').forEach(p=>{
      p.classList.toggle('active', selectedBonuses.has(p.dataset.bonus));
    });
    // featured rider
    const rsel=card.querySelector('.rpp_rider');
    if(rsel && e.featuredRiderId) rsel.value = e.featuredRiderId;

    // make it obvious this is an edit, and offer a way out
    const btn=card.querySelector('#tr_go');
    if(btn) btn.textContent = '\u2713 Save changes to this entry';
    const banner=document.createElement('div');
    banner.className='result';
    banner.style.cssText='margin-top:10px;border-color:var(--equi-accent);color:var(--equi-accent);display:flex;gap:10px;align-items:center;flex-wrap:wrap;';
    banner.innerHTML = `<span style="flex:1;">Editing an existing entry for <b>${escAttr(h.name)}</b>${e.label?` — ${escAttr(e.label)}`:''}. Saving replaces it and recalculates EXP, stats and Prestige.</span>
      <button type="button" class="secondary" id="tr_cancel_edit" style="margin:0;padding:4px 12px;">Cancel edit</button>`;
    card.insertBefore(banner, card.firstChild.nextSibling);
    const cx=banner.querySelector('#tr_cancel_edit');
    if(cx) cx.onclick=()=>cancelEditLogEntry();
    setTimeout(()=>{ try{ recalcTrTotal(); }catch(err){} }, 0);
  })();

  const addArtBtn=card.querySelector('#tr_add_art');
  if(addArtBtn) addArtBtn.onclick=()=>{
    const rows=card.querySelector('#tr_artrows');
    rows.insertAdjacentHTML('beforeend', artRowHTML("",1,true));
    recalcTrTotal();
  };
  card.addEventListener('click', ev=>{
    const rm=ev.target.closest && ev.target.closest('[data-art-remove]');
    if(!rm) return;
    const row=rm.closest('[data-artrow]');
    if(row) row.remove();
    recalcTrTotal();
  });

  card.addEventListener('input', recalcTrTotal);
  card.addEventListener('change', recalcTrTotal);
  card.addEventListener('click', ev=>{ if(ev.target.closest && ev.target.closest('.pill')) setTimeout(recalcTrTotal,0); });
  recalcTrTotal();

  card.querySelector('#tr_go').onclick=async()=>{
    // Replacing an entry: reverse the original before logging the new one, so
    // EXP, stats and rider Prestige are recalculated rather than stacked.
    const wasEditing = consumeEditedEntry();
    const hId=card.querySelector('#tr_horse').value;
    const h=state.horses.find(x=>x.id===hId);
    const tId=card.querySelector('#tr_type').value;
    const tId2=combinedMode?card.querySelector('#tr_type2').value:null;
    const artRows=readArtRows(card);
    const litWords=parseInt(card.querySelector('#tr_lit').value)||0;
    const link=card.querySelector('#tr_link').value.trim();
    const res=card.querySelector('#tr_result');

    if(!uploadedImage){ res.innerHTML='<div class="result fail">An image is required to log training.</div>'; return; }
    if(!artRows.length){ res.innerHTML='<div class="result fail">Please add at least one art type for this sheet.</div>'; return; }
    if(combinedMode && tId===tId2){ res.innerHTML='<div class="result fail">Please choose two different training types.</div>'; return; }

    const t=trainingOptionsFor(h).find(x=>x.id===tId);
    const t2=tId2?trainingOptionsFor(h).find(x=>x.id===tId2):null;
    const label=t2?`${t.name} + ${t2.name}`:t.name;
    // Collage: N images = N training sessions. Each image grants its own art EXP
    // and stat gains, so we multiply both by the count. Word count / custom /
    // rider bonuses are per-submission and are NOT multiplied.
    const imgCount=artRowsImages(artRows);
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    if(imgCount>1) Object.keys(allStats).forEach(s=>allStats[s]=allStats[s]*imgCount);
    // Resolve the FEATURED rider first — tier perks apply only when the rider is
    // actually in this entry, not just assigned to the horse.
    const featuredRiderId = (trRPP && trRPP.riderId) ? trRPP.riderId() : '';
    const riderNote=applyRiderTrainingBonus(h, allStats, featuredRiderId);
    Object.entries(allStats).forEach(([s,v])=>h.stats[s]=(h.stats[s]||0)+v);

    const m=MILESTONES[h.stage];
    const milestoneIds=[];
    if(m){
      if(!Array.isArray(h.completedMilestones)) h.completedMilestones=[];
      [t,t2].filter(Boolean).forEach(tr=>{
        if(m.options.some(o=>o.id===tr.id)){
          milestoneIds.push(tr.id);
          if(!h.completedMilestones.includes(tr.id)) h.completedMilestones.push(tr.id);
        }
      });
    }

    let expGain=artRowsExp(artRows);
    const sources=artRowsSources(artRows);
    const litExp=calcLitExp(litWords);
    if(litExp>0){expGain+=litExp; sources.push(`Lit ${litWords}w (+${litExp})`);}
    selectedBonuses.forEach(k=>{
      if(!BONUS_EXP[k]) return;
      if(k==="Additional Creature (per)"){
        const nEl=card.querySelector('#tr_creature_n');
        const n=Math.max(1, parseInt(nEl && nEl.value)||1);
        const add=BONUS_EXP[k]*n;
        expGain+=add; sources.push(`Additional Creature ×${n} (+${add})`);
      } else { expGain+=BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`); }
    });
    if(riderNote) sources.push(riderNote);
    const rExp=riderTrainingExp(h, featuredRiderId);
    if(rExp>0){ expGain+=rExp; sources.push(`Rider +${rExp} EXP`); }
    // Custom bonus: a free-typed modifier (seasonal event, breed bonus, etc.).
    const cbLabel=(card.querySelector('#tr_cb_label').value||'').trim();
    const cbExp=parseInt(card.querySelector('#tr_cb_exp').value)||0;
    let customBonus=null;
    if(cbLabel && cbExp){ expGain+=cbExp; sources.push(`${cbLabel} (+${cbExp})`); customBonus={label:cbLabel, exp:cbExp}; }

    // Depicted tack: individual bonuses + any COMPLETE set bonus (stats + EXP).
    const depictedIds=[...(card.__depicted||[])];
    let depictedNames=[];
    if(depictedIds.length){
      const b=resolveDepictedBonus(depictedIds);
      Object.entries(b.stats).forEach(([s,v])=>{ allStats[s]=(allStats[s]||0)+v; });
      if(b.exp){ expGain+=b.exp; }
      b.notes.forEach(n=>sources.push(n));
      depictedNames=b.notes;
    }

    // Items used: EXP/stat treats spent on this horse. Apply the effect to the
    // totals and remember which to spend AFTER a successful save.
    const usedIds=[...(card.__usedItems||[])];
    const treatsToSpend=[];
    usedIds.forEach(invId=>{
      const c=(state.consumables||[]).find(x=>x.invId===invId);
      if(!c) return;
      if(c.effect==='exp'){ expGain+=Number(c.effectValue)||0; sources.push(`${c.name} (+${c.effectValue} EXP)`); }
      else if(c.effect==='stat'){ const st=c.effectStat; const v=Number(c.effectValue)||0; allStats[st]=(allStats[st]||0)+v; sources.push(`${c.name} (+${v} ${STAT_LABELS[st]||st})`); }
      treatsToSpend.push(invId);
    });

    h.exp+=expGain;
    checkLevelUp(h);

    const trainEntry={id:uid2(),day:state.log.length+1,type:"training",label,art:artRowsLabel(artRows),artMix:artRows,imgCount:imgCount>1?imgCount:undefined,lit:litWords?`${litWords} words`:null,bonuses:[...selectedBonuses],customBonus,depicted:depictedNames.length?depictedNames:undefined,itemsUsed:treatsToSpend.length?treatsToSpend.map(id=>{const c=(state.consumables||[]).find(x=>x.invId===id);return c?c.name:id;}):undefined,exp:expGain,link:link||null,image:uploadedImage,statsDelta:allStats,milestoneIds};

    // Spend the treats from the shared inventory now that the effect is locked in.
    if(treatsToSpend.length){
      for(const invId of treatsToSpend){
        try{ await spendConsumable(bankAccount.userId, invId); }catch(e){}
        const c=(state.consumables||[]).find(x=>x.invId===invId);
        if(c){ c.left-=1; if(c.left<=0) state.consumables=state.consumables.filter(x=>x!==c); }
      }
    }

    // Rider Prestige chosen in the form's Rider Prestige block.
    // Stamp the featured rider even when the entry earns no Prestige — it's what
    // justified the tier perk above, so the log has to show it.
    if(featuredRiderId && state.riders.some(r=>r.id===featuredRiderId)){
      trainEntry.featuredRiderId = featuredRiderId;
    }
    const rppPick = trRPP.collect();
    if(rppPick){
      const rdr = state.riders.find(r=>r.id===rppPick.riderId);
      if(rdr){
        trainEntry.featuredRiderId = rdr.id;
        await grantRiderPPForEntry(rdr, 'training', trainEntry, h, { pp:rppPick.pp, sources:rppPick.sources });
        sources.push(`${rdr.name} +${rppPick.pp} PP`);
      }
    }
    h.artLog.unshift(trainEntry);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    const statsNote=statsStr||"EXP only";
    addLog(`${h.name} — ${label} (${statsNote}) · +${expGain} EXP`);

    res.innerHTML=`<div class="result">⏳ Saving…</div>`;
    // FIX: previously these calls were fired without awaiting or checking
    // their result, so a failed save (still-too-large image, network
    // hiccup) gave no feedback at all — the entry just silently vanished
    // on reload with no error shown.
    const [hOk, entryOk] = await Promise.all([ saveHorse(h), saveArtEntry(h, trainEntry) ]);
    await save();

    if(hOk && entryOk){
      res.innerHTML=`<div class="result success">✓ Training logged & saved! ${statsNote} · +${expGain} EXP (${sources.join(", ")})</div>`;
    } else {
      res.innerHTML=`<div class="result fail">⚠ Training was recorded here, but saving it to the database failed. Try again — if it keeps happening, sign out and sign back in (top of the page).</div>`;
    }

    uploadedImage=null;
    card.querySelector('#tr_image_preview').innerHTML='';
    card.querySelector('#tr_image_url').value='';
    card.querySelector('#tr_lit').value='';
    card.querySelector('#tr_lit_preview').textContent='';
    card.querySelector('#tr_link').value='';
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=>p.classList.remove('active'));
    refreshMilestoneStatus();
  };

  return wrap;
}

// ============================================
// COMPETITIONS TAB
// ============================================

function renderCompete(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse on the Stable Roster tab first.</div>'; return wrap; }

  const modeCard=el('div','card');
  modeCard.innerHTML=`
    <h3>Competitions</h3>
    <div class="pill-select">
      <div class="pill active" id="comp_mode_log">Log a Show</div>
      <div class="pill" id="comp_mode_history">Show History & Ribbon Wall</div>
    </div>
  `;
  wrap.appendChild(modeCard);

  const contentArea=el('div');
  wrap.appendChild(contentArea);

  function showMode(mode){
    modeCard.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    modeCard.querySelector(`#comp_mode_${mode}`).classList.add('active');
    contentArea.innerHTML='';
    if(mode==='log') contentArea.appendChild(buildShowLogForm());
    else             contentArea.appendChild(buildShowHistory());
  }

  modeCard.querySelector('#comp_mode_log').onclick=()=>showMode('log');
  modeCard.querySelector('#comp_mode_history').onclick=()=>showMode('history');
  showMode('log');
  return wrap;
}

function buildShowLogForm(){
  const wrap=el('div');
  const prizeImages=[];
  let artImage=null;

  const card=el('div','card');
  const discOpts=Object.keys(DISCIPLINES).map(d=>`<option value="${d}">${d}</option>`).join("");
  const eligible=state.horses.filter(h=>h.stage==="adult");
  if(!eligible.length){
    card.innerHTML=`<h3>Log a Show</h3><p class="small">No horses are old/broke enough to compete yet — horses must reach the <b>adult</b> stage (complete their age-up milestones on the Training tab) before entering competitions.</p>`;
    wrap.appendChild(card);
    return wrap;
  }
  card.innerHTML=`
    <h3>Log a Show</h3>
    <p class="small" style="margin-top:0;color:var(--equi-dim);">Record any competition — past or present. Add ribbons, trophies, and prizes as photos.</p>

    <div class="row">
      <div><label>Horse</label>
        <select id="cs_horse">${eligible.map(h=>`<option value="${h.id}">${h.name}</option>`).join("")}</select>
