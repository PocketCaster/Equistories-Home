<script>
// Set up a readiness promise SYNCHRONOUSLY, before the deferred module below
// runs. The main app script executes before any module script, so it can't touch
// window.EquiDB directly at boot — it awaits this promise instead.
window.__equiDBReady = new Promise(resolve => { window.__equiDBResolve = resolve; });
// NOTE: the old ?fs=off safety valve used to flip the app back to Google
// Sheets. Sheets has been retired as a data backend, so the switch now does
// nothing except explain itself.
try{
  if(new URLSearchParams(location.search).get('fs')==='off'){
    console.warn('[EquiStories] ?fs=off is no longer supported — the app is Firestore-only now.');
  }
}catch(e){}
</script>

<script type="module">
// ============================================
// FIRESTORE DATA LAYER  (fast replacement for the Apps Script + JSONP transport)
// Loads as a module and exposes window.EquiDB for the main app script.
// Docs are stored as { owner, id, json, updatedAt } — the same shape the Sheets
// backend used (a JSON blob keyed by owner), so nothing else had to be redesigned
// and Firestore's type quirks (no undefined, no nested arrays) can't bite us.
// ============================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs, writeBatch }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, signInWithCustomToken, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         sendPasswordResetEmail, signOut as fbSignOut, onAuthStateChanged, updatePassword }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJfBnY0sDc6W_yzzrpm8NKkNZv1cu7jMU",
  authDomain: "equistories-rpg.firebaseapp.com",
  projectId: "equistories-rpg",
  storageBucket: "equistories-rpg.firebasestorage.app",
  messagingSenderId: "801283742596",
  appId: "1:801283742596:web:370951947bf862efcfdbd1"
};

let db=null, authOk=false, auth=null;
const ready = (async()=>{
  try{
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    auth = getAuth(app);
    // Wait for Firebase to restore any existing session before we decide who the
    // user is — otherwise a refresh briefly looks like a signed-out visitor.
    await new Promise(res=>{ const un=onAuthStateChanged(auth, ()=>{ un(); res(); }); });
    // No real account yet? Fall back to an anonymous session so existing players
    // keep working during the migration. Once everyone has linked, Anonymous can
    // be switched off in the Firebase console and this line becomes a no-op.
    if(!auth.currentUser){
      try { await signInAnonymously(auth); } catch(e){ console.warn('[EquiDB] anon auth off:', e.code||e); }
    }
    authOk = !!auth.currentUser;
    return true;
  }catch(e){ console.error('[EquiDB] init failed:', e); db=null; return false; }
})();

// Real identity: Google stores and checks the password, sends reset emails, and
// rate-limits attacks. This app never sees a password.
const friendly = e => ({
  'auth/invalid-email':'That email address doesn\'t look right.',
  'auth/user-not-found':'No account found with that email.',
  'auth/wrong-password':'Incorrect password.',
  'auth/invalid-credential':'Incorrect email or password.',
  'auth/email-already-in-use':'That email already has an account — sign in instead.',
  'auth/weak-password':'Password must be at least 6 characters.',
  'auth/too-many-requests':'Too many attempts. Wait a minute and try again.',
  'auth/network-request-failed':'Network problem — check your connection.',
}[e && e.code] || (e && e.message) || 'Something went wrong.');

window.EquiAuth = {
  ready,
  get user(){ return auth && auth.currentUser && !auth.currentUser.isAnonymous ? auth.currentUser : null; },
  get email(){ const u=this.user; return u ? u.email : ''; },
  async token(){
    const u = this.user;
    if(!u) return null;
    try { return await u.getIdToken(); } catch(e){ return null; }
  },
  async signUp(email, password){
    try { const c = await createUserWithEmailAndPassword(auth, email, password); return {success:true, user:c.user}; }
    catch(e){ return {success:false, error:friendly(e)}; }
  },
  async signIn(email, password){
    try { const c = await signInWithEmailAndPassword(auth, email, password); return {success:true, user:c.user}; }
    catch(e){ return {success:false, error:friendly(e)}; }
  },
  async resetPassword(email){
    try { await sendPasswordResetEmail(auth, email); return {success:true}; }
    catch(e){ return {success:false, error:friendly(e)}; }
  },
  async changePassword(newPassword){
    try { await updatePassword(auth.currentUser, newPassword); return {success:true}; }
    catch(e){ return {success:false, error:friendly(e)}; }
  },
  // Swap the random email-account session for one whose uid IS the bank userId.
  // After this, Firestore rules can trust request.auth.uid as the true owner.
  async upgradeToOwner(customToken){
    try { await signInWithCustomToken(auth, customToken); return true; }
    catch(e){ console.error('[EquiAuth] owner upgrade failed:', e.code||e); return false; }
  },
  async signOut(){
    try { await fbSignOut(auth); }catch(e){}
    try { await signInAnonymously(auth); }catch(e){}   // keep writes working pre-migration
  },
};
// Tell the main app script that the module has finished loading (success OR not).
ready.then(v=>{ try{ window.__equiDBResolve(v); }catch(e){} })
     .catch(()=>{ try{ window.__equiDBResolve(false); }catch(e){} });

window.EquiDB = {
  ready,
  get available(){ return !!db; },
  get authed(){ return authOk; },

  async put(col, id, owner, obj){
    if(!db) return false;
    await setDoc(doc(db, col, String(id)), {
      owner: String(owner), id: String(id),
      json: JSON.stringify(obj),
      updatedAt: new Date().toISOString(),
    });
    return true;
  },
  // Like put(), but keeps one EXTRA field outside the json blob so rules and
  // queries can actually see it. Firestore can't read inside the blob, which is
  // why a breeding reservation needs `reservedFor` hoisted out here.
  async putWithField(col, id, owner, obj, field, value){
    if(!db) return false;
    const rec = {
      owner: String(owner), id: String(id),
      json: JSON.stringify(obj),
      updatedAt: new Date().toISOString(),
    };
    rec[field] = String(value);
    await setDoc(doc(db, col, String(id)), rec);
    return true;
  },
  // Indexed lookup on any hoisted field, e.g. every reservation set aside for me.
  async listByField(col, field, value){
    if(!db) return [];
    const snap = await getDocs(query(collection(db, col), where(field,'==',String(value))));
    const out=[];
    snap.forEach(d=>{
      try{ const o=JSON.parse(d.data().json); o.__owner=d.data().owner; out.push(o); }catch(e){}
    });
    return out;
  },
  async get(col, id){
    if(!db) return null;
    const s = await getDoc(doc(db, col, String(id)));
    if(!s.exists()) return null;
    try { return JSON.parse(s.data().json); } catch(e){ return null; }
  },
  async remove(col, id){
    if(!db) return false;
    await deleteDoc(doc(db, col, String(id)));
    return true;
  },
  // One indexed query instead of scanning every row of a sheet — this is the
  // whole reason the app gets fast.
  async listByOwner(col, owner){
    if(!db) return [];
    const snap = await getDocs(query(collection(db, col), where('owner','==',String(owner))));
    const out=[];
    snap.forEach(d=>{ try{ out.push(JSON.parse(d.data().json)); }catch(e){} });
    return out;
  },
  // Read an ENTIRE collection (used for cross-owner things like breed genetics
  // requests, which come from many different founders). Fine for small
  // collections; don't use it on horses/riders.
  async listAll(col){
    if(!db) return [];
    const snap = await getDocs(collection(db, col));
    const out=[];
    snap.forEach(d=>{ try{ out.push(JSON.parse(d.data().json)); }catch(e){} });
    return out;
  },
  // Raw rows including the hoisted fields, for diagnostics — listAll() only
  // returns the parsed json, which hides the very fields a query matches on.
  async listAllRaw(col){
    if(!db) return [];
    const snap = await getDocs(collection(db, col));
    const out=[];
    snap.forEach(d=>{
      const raw=d.data()||{};
      let body={}; try{ body=JSON.parse(raw.json||"{}"); }catch(e){}
      out.push({docId:d.id, owner:raw.owner, reservedFor:raw.reservedFor, body});
    });
    return out;
  },
  // Bulk write for the one-time migration (batched = far fewer round trips).
  async putMany(col, owner, items){
    if(!db) return 0;
    let done=0;
    for(let i=0;i<items.length;i+=400){
      const batch = writeBatch(db);
      items.slice(i,i+400).forEach(it=>{
        batch.set(doc(db, col, String(it.id)), {
          owner: String(owner), id: String(it.id),
          json: JSON.stringify(it), updatedAt: new Date().toISOString(),
        });
      });
      await batch.commit();
      done += Math.min(400, items.length-i);
    }
    return done;
  },
};
</script>

<script>
// Last-resort safety net: if anything throws hard enough to stop the app from
// rendering, show the error (and a way out) instead of a blank white page.
window.addEventListener('error', function(ev){
  try{
    const app=document.getElementById('app');
    if(app && !app.hasChildNodes()){
      app.innerHTML='<div style="font-family:var(--equi-serif);color:var(--equi-text);background:var(--equi-panel);border:1px solid var(--equi-accent);border-radius:8px;max-width:640px;margin:40px auto;padding:20px;">'
        +'<h3 style="color:var(--equi-accent);margin-top:0;">The app hit an error while starting</h3>'
        +'<div style="font-family:var(--equi-mono);font-size:.9em;background:var(--equi-ink);padding:10px;border-radius:6px;overflow:auto;">'+String(ev.message||ev.error||'Unknown error')+'</div>'
        +'<p>Try reloading the page. If it keeps happening, send the error above to the admin.</p>'
        +'<p><a href="javascript:location.reload()" style="color:var(--equi-accent);font-weight:bold;">↻ Reload the page</a></p></div>';
    }
  }catch(e){}
});

// ── Multi-image sheets / collages ──────────────────────────────────────────
// One sheet can hold several DIFFERENT kinds of image — a fullbody, a halfbody
// and a headshot, say. Each has to count at its own rate, so instead of a
// single art type times a count, the form keeps a list of {art, n} rows.
function readArtRows(card){
  return [...card.querySelectorAll('[data-artrow]')].map(r=>({
    art: (r.querySelector('[data-art-type]')||{}).value || "",
    n:   Math.max(1, parseInt((r.querySelector('[data-art-n]')||{}).value)||1),
  })).filter(x=>x.art);
}
function artRowsExp(rows){   return rows.reduce((s,r)=>s+(ART_EXP[r.art]||0)*r.n, 0); }
function artRowsImages(rows){ return rows.reduce((s,r)=>s+r.n, 0); }
function artRowsLabel(rows){  return rows.map(r=>r.n>1?`${r.art} ×${r.n}`:r.art).join(" + "); }
function artRowsSources(rows){
  return rows.map(r=>{
    const each=ART_EXP[r.art]||0;
    return r.n>1 ? `${r.art} ×${r.n} (+${each*r.n})` : `${r.art} (+${each})`;
  });
}
// One row of the breakdown. The first row can't be removed.
function artRowHTML(selected, n, removable){
  return `<div data-artrow style="display:flex;gap:6px;align-items:center;margin-top:4px;">

      <option value="">— select art type —</option>

    ${removable?`<button type="button" data-art-remove class="secondary" style="padding:4px 9px;margin:0;">✕</button>`:'<span style="width:29px;"></span>'}
  </div>`;
}

const ART_EXP = {
  "Uncolored Headshot":1, "Colored Headshot":2,
  "Uncolored Halfbody":2, "Colored Halfbody":3,
  "Uncolored Fullbody":3, "Colored Fullbody":4,

const BONUS_EXP = {

  return (rider.artLog||[]).reduce((n,e)=> n + (Number(e.pp)||0), 0);

      <div class="small" style="margin-top:6px;opacity:.7;">Nothing is ticked by default — choose only what applies. <b>Art + lit can live in one work</b>: an illustrated story ticks from both sections. Leave the rider on "no rider featured" to award no Prestige.</div>
    </div>`;
}

// Binds the block; returns collect() -> {riderId, pp, sources} (or null).
function bindRiderPPBlock(scope, prefix){
  const block = scope.querySelector(`[data-rpp="${prefix}"]`);
  if(!block) return { collect:()=>null, setTop3:()=>{}, riderId:()=>'' };
  const sel=block.querySelector('.rpp_rider');
  const recalc=()=>{
    let sum=0;
    if(sel.value){
      // scoped to .rpp_opts so apparel chips aren't counted twice
      block.querySelectorAll('.rpp_opts .pill.active[data-pp]').forEach(p=>sum+=Number(p.dataset.pp)||0);
      block.querySelectorAll('.rpp_apparel .pill.active[data-appid]').forEach(p=>sum+=Number(p.dataset.pp)||0);
      const evtEl=block.querySelector('.rpp_evt_pp'), evtLblEl=block.querySelector('.rpp_evt_label');
      const evtPP=Number(evtEl && evtEl.value)||0, evtLabel=((evtLblEl && evtLblEl.value)||'').trim();
      if(evtLabel && evtPP>0) sum+=evtPP;
    }
    block.querySelector('.rpp_sum').textContent=sum;
    return sum;
  };
  block.querySelectorAll('[data-ppopt]').forEach(p=>p.onclick=()=>{ p.classList.toggle('active'); recalc(); });
  block.querySelectorAll('[data-appid]').forEach(p=>p.onclick=()=>{ p.classList.toggle('active'); recalc(); });
  sel.onchange=recalc;
  const evtIn=block.querySelector('.rpp_evt_pp'), evtLbl=block.querySelector('.rpp_evt_label');
  if(evtIn) evtIn.oninput=recalc;
  if(evtLbl) evtLbl.oninput=recalc;
  recalc();
  return {
    collect(){
      if(!sel.value) return null;
      const picked=[...block.querySelectorAll('.rpp_opts .pill.active[data-pp]')];
      const apparel=[...block.querySelectorAll('.rpp_apparel .pill.active[data-appid]')];
      const evtEl=block.querySelector('.rpp_evt_pp'), evtLblEl=block.querySelector('.rpp_evt_label');
      const evtPP=Number(evtEl && evtEl.value)||0, evtLabel=((evtLblEl && evtLblEl.value)||'').trim();
      const evtOk=(evtLabel && evtPP>0);
      const pp=picked.reduce((n,p)=>n+(Number(p.dataset.pp)||0),0)
             + apparel.reduce((n,p)=>n+(Number(p.dataset.pp)||0),0)
             + (evtOk?evtPP:0);
      if(pp<=0) return null;
      const sources=[...picked.map(p=>`${p.dataset.ppopt} (+${p.dataset.pp})`),
                     ...apparel.map(p=>`${p.textContent.replace(/\s*\(\+\d+\)$/,'')} apparel (+${p.dataset.pp})`),
                     ...(evtOk?[`${evtLabel} (+${evtPP})`]:[])];
      return { riderId:sel.value, pp, sources };
    },
    setTop3(){ /* intentionally a no-op: nothing is auto-ticked */ },
    // Who is FEATURED in this entry — independent of how much PP it earns. The
    // rider's tier perks hang off this, so a rider left on "no rider featured"
    // contributes nothing even if the horse has one assigned.
    riderId(){ return sel.value || ''; },
  };
}

function riderPPForSource(sourceType, source){
  // Fallback only (used by the retro "rider featured" toggle). Deliberate PP is
  // chosen in the form's Rider Prestige block at log time.
  if(sourceType==='competition'){
    let pp=2; const sources=['Show or clinic entry (+2)'];
    if(source.placement>=1 && source.placement<=3){ pp+=1; sources.push('Top 3 in show (+1)'); }
    // NOTE: a placement prize is NOT a Judge's Choice — only an explicit flag counts.
    if(source.specialRibbon){ pp+=1; sources.push("Judge's Choice / special ribbon (+1)"); }
    return { pp, sources };
  }
  return { pp:1, sources:['Rider in a personal image (+1)'] };
}
function linkedRiderEntry(rider, sourceId){
  return (rider.artLog||[]).find(e=>e.sourceId===sourceId);
}
// Grant (or refresh) a rider's PP for a horse entry. Idempotent per sourceId.
async function grantRiderPPForEntry(rider, sourceType, source, horse, explicit){
  if(!rider) return;
  if(!rider.artLog) rider.artLog=[];
  const existing=linkedRiderEntry(rider, source.id);
  const {pp, sources} = explicit || riderPPForSource(sourceType, source);
  const label = sourceType==='competition'
    ? `${source.discipline||'Show'}${source.venue?` — ${source.venue}`:''} (${horse.name})`
    : `${source.label||'Training'} (${horse.name})`;
  if(existing){
    existing.pp=pp; existing.sources=sources; existing.label=label; existing.link=source.link||existing.link||null;
  } else {
    rider.artLog.push({ id:'re_'+Math.random().toString(36).slice(2,10), label,
      link:source.link||null, pp, sources, sourceType, sourceId:source.id, horseId:horse.id,
      date:new Date().toISOString() });
  }
  await saveRiderEntry(rider, linkedRiderEntry(rider, source.id));
}
// Remove a rider's linked PP for a source entry (feature toggled off / source deleted).
async function removeRiderPPForSource(sourceId){
  for(const rider of state.riders){
    const e=linkedRiderEntry(rider, sourceId);
    if(e){
      rider.artLog=rider.artLog.filter(x=>x!==e);
      if(bankAccount.linked){
        if(fsReady()) await saveRider(rider);   // the art log lives inside the rider doc
        else if(STABLE_URL) await stableGas({ action:'deleteRiderArtLogEntry', userId:bankAccount.userId, riderId:rider.id, entryId:e.id });
      }
    }
  }
}
// Toggle "rider featured here" on a horse training/comp entry.
async function toggleRiderFeatured(horse, source, sourceType){
  const rider = horse.riderId ? state.riders.find(r=>r.id===horse.riderId) : null;
  if(!rider){ alert('Assign a rider to this horse first (on the horse card), then mark entries that feature them.'); return; }
  if(source.featuredRiderId){
    // turn off
    await removeRiderPPForSource(source.id);
    source.featuredRiderId=null;
  } else {
    source.featuredRiderId=rider.id;
    await grantRiderPPForEntry(rider, sourceType, source, horse);
  }
  await saveHorse(horse); await save(); render();
}

// Bonuses a horse's ASSIGNED rider grants, by title tier (index matches
// RIDER_TITLES). Straight from the Prestige journal:
//   stat      = stat added per training image (to trained stats only, so EXP-only
//               Misc art stays stat-free). scope "one" = a single stat (Novice).
//   exp       = EXP added per training image. expMaxLevel caps which horse levels
//               it applies to (Novice: levels 1-3 only).
//   final     = one-time permanent bonus to ALL stats once the horse is fully
//               trained (level 10). Only the Custom Prestige tier grants it.
// Edit any value here and it applies everywhere.
const RIDER_TIER_BONUS = [
  { stat:0, exp:0, final:0 },                          // Stablehand
  { stat:1, scope:"one", exp:1, expMaxLevel:3, final:0 }, // Novice: +1 EXP (lvl 1-3), +1 to one stat
  { stat:1, exp:1, final:0 },                          // Apprentice: +1 EXP, +1 all
  { stat:1, exp:2, final:0 },                          // Junior: +2 EXP, +1 all
  { stat:2, exp:2, final:0 },                          // Skilled: +2 EXP, +2 all
  { stat:0, exp:2, final:0 },                          // Show Competitor: +2 EXP, no training-stat perk (show-focused)
  { stat:2, exp:3, final:0 },                          // Clinic Regular: +3 EXP, +2 all
  { stat:3, exp:3, final:0 },                          // Respected: +3 EXP, +3 all
  { stat:3, exp:4, final:0 },                          // Champion: +4 EXP, +3 all
  { stat:4, exp:5, final:0 },                          // Master: +5 EXP, +4 all
  { stat:0, exp:5, final:5 },                          // Custom: +5 fully-trained; no per-image training-stat perk
];
function riderBonusFor(rider){
  if(!rider) return { stat:0, exp:0, final:0 };
  const idx = RIDER_TITLES.indexOf(riderTitle(riderPP(rider)));
  return RIDER_TIER_BONUS[idx] || { stat:0, exp:0, final:0 };
}

// Add the assigned rider's per-image STAT bonus onto a training image's stat
// gains. Only stats the image ALREADY trains get it, so EXP-only Misc art stays
// stat-free. Novice tier ("one") boosts a single stat; others boost all trained
// stats. Returns a log note, or "" if nothing applied.
// `featuredRiderId` is the rider actually FEATURED in this entry (the Rider
// Prestige selector). Tier perks are earned by depicting the rider in the work,
// so they must not apply to entries the rider doesn't appear in — merely being
// assigned to the horse is not enough. Pass "" / null for no featured rider.
function applyRiderTrainingBonus(h, allStats, featuredRiderId){
  if(!featuredRiderId) return "";
  const rider = state.riders.find(r=>r.id===featuredRiderId);
  if(!rider) return "";
  const b = riderBonusFor(rider);
  const keys = Object.keys(allStats);
  if(b.stat<=0 || !keys.length) return "";
  const targets = b.scope==="one" ? [keys[0]] : keys;
  targets.forEach(s=> allStats[s]+=b.stat);
  const where = b.scope==="one" ? `${STAT_LABELS[keys[0]]}` : "all trained stats";
  return `${rider.name} (${riderTitle(riderPP(rider)).name}) +${b.stat} ${where}`;
}

// EXP the assigned rider adds to a training image (respecting Novice's level cap).
function riderTrainingExp(h, featuredRiderId){
  if(!featuredRiderId) return 0;
  const rider = state.riders.find(r=>r.id===featuredRiderId);
  if(!rider) return 0;
  const b = riderBonusFor(rider);
  if(b.exp<=0) return 0;
  if(b.expMaxLevel && h.level > b.expMaxLevel) return 0;
  return b.exp;
}

// Show art, prize/ribbon photos, and art log images are entered as a pasted
// direct link instead of an upload (see the note at the top of the app) —
// this sidesteps the Google Sheets cell-size limit and GET/JSONP request
// size limit entirely, since a URL is just a short string. These helpers
// give a live preview and a clear fallback if someone pastes the artwork's
// page link instead of the actual image file link.

// FIX: horse names, venues, and prize labels are free text and can contain
// apostrophes (e.g. "D'Artagnan", "Judge's Choice", "St. Mary's Fairgrounds").
// Several onclick="openLightbox('...','...')" strings interpolated this text
// directly into a single-quoted JS argument with no escaping — an apostrophe
// there breaks out of the string early, corrupting the surrounding HTML and
// (since these live inside one big innerHTML template) can take the rest of
// that render pass down with it, leaving buttons unclickable. jsStr() makes
// text safe to drop into a single-quoted onclick argument; escAttr() makes
// text safe to drop into a double-quoted HTML attribute like title="...".
function jsStr(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// base64 data URL. Uploads are synced to Google Sheets over a JSONP GET
// request, which puts the whole image in a URL query string — full-size
// phone photos (often 1-5MB) blow past the URL length limit and the sync
// silently fails, so the image looks fine locally but never actually saves.
// Keeping images small and compressed keeps them reliably under that limit.
//
// UNUSED as of the switch to pasted image links: every image in the app
// (profile photo, reference sheet, training art, competition art,
// prize/ribbon photos, tack images) is now a URL string instead of an
// uploaded file, so nothing calls this anymore. Left in place in case a
// file-upload path is ever reintroduced.
// FIX: this used one fixed quality/dimension for every image. That's fine
// for simple photos, but a busy/detailed reference sheet can still encode
// to well over Google Sheets' 50,000-character-per-cell limit even at
// 900px/.75 quality — and every image eventually gets reassembled into a
// single HorseImages cell server-side, so anything over that limit fails
// to save with no obvious reason why. Now it renders once, and if the
// result is still too big, keeps stepping quality down and then dimensions
// down until it comfortably fits (or hits a sane floor).
function resizeImageFile(file, maxDim=900, quality=0.75, opts={}){
  const maxChars   = opts.maxChars   || 45000; // margin below the 50k cell cap
  const minDim     = opts.minDim     || 250;
  const minQuality = opts.minQuality || 0.35;

  function renderAt(dim, q){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=>reject(new Error('Could not read file.'));
      reader.onload = ()=>{
        const img = new Image();
        img.onerror = ()=>reject(new Error('Could not decode image.'));
        img.onload = ()=>{
          let {width,height} = img;
          if(width>dim || height>dim){
            if(width>=height){ height=Math.round(height*(dim/width)); width=dim; }
            else { width=Math.round(width*(dim/height)); height=dim; }
          }
          const canvas=document.createElement('canvas');
          canvas.width=width; canvas.height=height;
          canvas.getContext('2d').drawImage(img,0,0,width,height);
          resolve(canvas.toDataURL('image/jpeg', q));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  return (async ()=>{
    let dim=maxDim, q=quality;
    let dataUrl = await renderAt(dim, q);
    let attempts=0;
    while(dataUrl.length > maxChars && attempts < 12){
      if(q > minQuality) q = Math.max(minQuality, +(q-0.1).toFixed(2));
      else if(dim > minDim) dim = Math.max(minDim, Math.round(dim*0.85));
      else break;
      dataUrl = await renderAt(dim, q);
      attempts++;
    }
    return dataUrl;
  })();
}

function stableGas(payload, urlOverride){
  return new Promise(resolve=>{
    const targetUrl = urlOverride || STABLE_URL;
    if(!targetUrl){ resolve({success:false,error:'No Stable Data URL configured.'}); return; }
    const cb='sCb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const url=targetUrl+'?callback='+cb+'&data='+encodeURIComponent(JSON.stringify(payload));
    const s=document.createElement('script');
    let done=false;
    // FIX: every failure (network error, timeout, or the backend genuinely
    // responding with success:false) used to just resolve silently — the
    // caller saw a boolean and the actual reason was thrown away. Now it's
    // logged to the console, tagged by action, so a failed save can
    // actually be diagnosed instead of guessed at.
    const finish=(data)=>{
      if(!data || data.success===false){
        console.error('[EquiStories save failed]', payload.action, '—', data?.error || 'no response (network/CORS/timeout)', {payload, response:data, requestUrlLength:url.length});
      }
      resolve(data);
    };
    window[cb]=(data)=>{ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} finish(data); };
    s.onerror=()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} console.error('[EquiStories save failed]', payload.action, '— Network error — request URL length:', url.length); finish({success:false,error:'Network error'});} };
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} console.error('[EquiStories save failed]', payload.action, '— Timed out — request URL length:', url.length); finish({success:false,error:'Timed out'});} },15000);
    s.src=url; document.head.appendChild(s);
  });
}

function gasPost(payload){
  return new Promise(resolve=>{
    const cb='gCb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const url=BANK_URL+'?callback='+cb+'&data='+encodeURIComponent(JSON.stringify(payload));
    const s=document.createElement('script');
    let done=false;
    window[cb]=(data)=>{ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} resolve(data); };
    s.onerror=()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve({success:false,error:'Network error'});} };
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve({success:false,error:'Timed out'});} },12000);
    s.src=url; document.head.appendChild(s);
  });
}

function gasGet(params){
  return new Promise(resolve=>{
    const cb='ggCb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const qs=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const url=BANK_URL+'?'+qs+'&callback='+cb;
    const s=document.createElement('script');
    let done=false;
    window[cb]=(data)=>{ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} resolve(data); };
    s.onerror=()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve(null);} };
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve(null);} },12000);
    s.src=url; document.head.appendChild(s);
  });
}

function saveBankAccount(){
  try{ localStorage.setItem('equi-lite-bank', JSON.stringify(bankAccount)); }catch(e){}
}

// FIX (the "takes forever then fails" bug): save() used to unconditionally
// re-chunk-upload EVERY horse's full JSON on EVERY single action — equipping
// a piece of tack, adding a training entry, logging a show — even when that
// action already called saveHorse() for the one horse that actually changed.
// That meant a single show-record save fired one full chunked upload for the
// horse you were editing (via saveHorse) AND then a second full chunked
// upload of that same horse PLUS every other horse in the stable (via this
// function's old forEach). As a stable accumulates horses and show/training
// history, that "resave literally everyone" cost grows without bound, so
// saves that used to be instant start taking longer and longer and
// eventually start timing out / failing outright.
// Now save() only re-uploads the specific horse(s) named in horseIds (via
// their id). Callers that already persisted a horse with saveHorse() pass
// nothing (the global log/tackInventory still get saved). Callers that
// mutate a horse's data without a separate saveHorse() call pass that
// horse's id (or ids) so only the horse(s) that actually changed get
// re-uploaded — not the whole roster.
async function save(horseIds){
  if(!bankAccount.linked) return;
  if(fsReady()){
    const writeAll = async()=>{
      await window.EquiDB.put('stables', bankAccount.userId, bankAccount.userId, {
        id: bankAccount.userId, log: state.log,
        tackInventory: state.tackInventory, attireInventory: state.attireInventory });
      const ids = horseIds===undefined ? [] : (Array.isArray(horseIds)?horseIds:[horseIds]);
      await Promise.all(state.horses.filter(h=>ids.includes(h.id)).map(h=>saveHorse(h)));
    };
    try{ await writeAll(); }
    catch(e){
      if(isPermissionDenied(e) && await recoverOwnerSession()){
        try{ await writeAll(); return; }
        catch(e2){ console.error('[EquiDB] save retry failed:', e2); fsSaveProblem(e2); return; }
      }
      console.error('[EquiDB] save failed:', e); fsSaveProblem(e);
    }
    return;
  }
  if(!STABLE_URL) return;
  const userId = bankAccount.userId;
  const ids = horseIds===undefined ? [] : (Array.isArray(horseIds) ? horseIds : [horseIds]);
  const tasks = [
    sendTextChunked(userId, 'stateJson', 'stable',
      JSON.stringify({ log:state.log, tackInventory:state.tackInventory, attireInventory:state.attireInventory })),
    ...state.horses.filter(h=>ids.includes(h.id)).map(h=>{
      const {artLog, profileImage, referenceImage, ...horseData}=h;
      return sendTextChunked(userId, 'horseJson', h.id, JSON.stringify(horseData));
    }),
  ];
  await Promise.all(tasks);
}

const IMAGE_CHUNK_SIZE = 5000;
async function saveHorseImageChunked(userId, horseId, imageKey, imageData){
  const totalChunks = Math.ceil(imageData.length / IMAGE_CHUNK_SIZE) || 1;
  for(let i=0;i<totalChunks;i++){
    const chunk = imageData.slice(i*IMAGE_CHUNK_SIZE, (i+1)*IMAGE_CHUNK_SIZE);
    // Retry each chunk a few times — one flaky request used to abort the whole
    // (100+ chunk) upload, which is why big legacy photos never saved.
    let saved=false;
    for(let attempt=0; attempt<3 && !saved; attempt++){
      const res = await stableGas({ action:'saveHorseImageChunk', userId, horseId, imageKey,
        chunk, chunkIndex:i, totalChunks });
      saved = !!res?.success;
    }
    if(!saved) return false;
  }
  return true;
}

// FIX: saveHorse/saveStableState used to send the horse's (or the whole
// stable log's) entire JSON as one GET/JSONP request. That request is
// carried in the URL, and once a horse builds up enough competition
// history, breeding records, etc., the URL crosses a length ceiling
// specific to Google Apps Script's web app endpoint (roughly 6-8k
// characters) and the request fails outright with a network error —
// even though the same data would be totally fine written to the sheet.
// This mirrors the same chunking trick already used for images: split the
// JSON text into small pieces, send them one at a time, and let the
// backend (saveTextChunk) stitch them back together once the last one
// arrives. No single request is ever big enough to hit the ceiling.
const TEXT_CHUNK_SIZE = 3000;
async function sendTextChunked(userId, scope, refId, text){
  const totalChunks = Math.ceil(text.length / TEXT_CHUNK_SIZE) || 1;
  for(let i=0;i<totalChunks;i++){
    const chunk = text.slice(i*TEXT_CHUNK_SIZE, (i+1)*TEXT_CHUNK_SIZE);
    const res = await stableGas({ action:'saveTextChunk', userId, scope, refId,
      chunk, chunkIndex:i, totalChunks });
    if(!res?.success) return false;
  }
  return true;
}

// HISTORY: profileImage/referenceImage were the only fields that ever got
// chunked before saving — everything else (show art in compHistory, prize/
// ribbon photos, art log entry images) rode along as raw base64 inside the
// same GET/JSONP request as the rest of the horse or entry data, which
// caused failures/hangs once real photos were attached. That was briefly
// fixed by chunk-uploading those too (keyed placeholders, resolved back on
// load) — but since Google Sheets' 50,000-char cell limit still applied
// once reassembled, and a show's worth of prize photos meant many
// sequential uploads, that approach kept hitting new walls. Show art,
// prizes, and art log images are now pasted links instead (see the note at
// the top of the app) — sidestepping both problems, since a URL never
// needs chunking or hits any size limit.

// resolveImageRefs() is kept for backward compatibility: it still resolves
// any older @img:-placeholder records saved during the brief window when
// show/prize/art images were chunk-uploaded, before switching to pasted
// links. Nothing new gets saved in that placeholder format going forward.

function resolveImageRefs(horse){
  if(!horse) return;
  const usedKeys=new Set();
  (horse.artLog||[]).forEach(e=>{
    if(typeof e.image==='string' && e.image.startsWith('@img:')){
      const key=e.image.slice(5);
      e.image = horse[key] || null;
      // FIX: without this, every image freshly pulled back from the sheet
      // looked identical (to saveHorse/saveArtEntry) to a brand-new,
      // never-uploaded image — because it's still real base64 data, not a
      // placeholder. That meant the very next save re-uploaded this and
      // every other already-stored photo all over again, one chunked
      // request at a time, which for a stable with any real show history
      // could take long enough to look like the Save button did nothing.
      // Since we just pulled this out of storage, it's already there.
      e._imgUploaded = true;
      usedKeys.add(key);
    }
  });
  (horse.compHistory||[]).forEach(r=>{
    if(typeof r.image==='string' && r.image.startsWith('@img:')){
      const key=r.image.slice(5);
      r.image = horse[key] || null;
      r._imgUploaded = true;
      usedKeys.add(key);
    }
    (r.prizes||[]).forEach((p,i)=>{
      if(p && typeof p.dataUrl==='string' && p.dataUrl.startsWith('@img:')){
        const key=p.dataUrl.slice(5);
        p.dataUrl = horse[key] || null;
        if(!r._prizeUploaded) r._prizeUploaded={};
        r._prizeUploaded[i] = true;
        usedKeys.add(key);
      }
    });
  });
  usedKeys.forEach(k=>{ delete horse[k]; });
}

// ============================================
// FIRESTORE MODE
// The app can persist to either the old Sheets/Apps Script backend or Firestore.
// The flag below flips it. Firestore keeps each horse/rider as ONE document
// (art log included), so a save is a single fast write instead of dozens of
// chunked JSONP calls — that's the speed difference.
// ============================================
const FS_FLAG='equi_use_firestore';
// FIRESTORE-ONLY: Google Sheets has been retired as a data backend. Firestore
// is always on — no per-browser toggle, no ?fs=off fallback, no silent Sheets
// mode on a fresh device.
function fsEnabled(){ return true; }
function fsReady(){ return fsEnabled() && window.EquiDB && window.EquiDB.available; }
// The Firebase module is a <script type="module">, so it runs AFTER this script.
// Never touch window.EquiDB directly at boot — always come through here.
async function waitForDB(ms=8000){
  try{
    await Promise.race([
      window.__equiDBReady || Promise.resolve(false),
      new Promise(r=>setTimeout(()=>r(false), ms)),
    ]);
  }catch(e){}
  return (window.EquiDB && window.EquiDB.available) ? window.EquiDB : null;
}

// Legacy base64 images can't ride inside a Firestore doc (1 MiB cap) any better
// than they could inside a sheet — strip them out of what we persist.
function stripBig(obj){
  const clean={...obj};
  ['profileImage','referenceImage'].forEach(k=>{
    if(typeof clean[k]==='string' && clean[k].startsWith('data:')) delete clean[k];
  });
  return clean;
}

// ── Pull shop-bought tack & attire from the shared saddlebag ────────────────
// Shops (hub + Emporium) deliver purchases into inventory/{userId}. Wearable
// items (tack/attire) should be usable here, carrying the bonuses the shop
// authored (stats/EXP/PR). One-way, non-destructive, de-duped by a stable id
// derived from the shop entry. Tokens/tickets/consumables are left alone.
const SHOP_TACK_CATS   = ["Saddle","Bridle","Shoes","Boots","Blanket","Other","Tack"];
const SHOP_ATTIRE_CATS = ["Jacket","Shirt","Breeches","Boots","Helmet","Gloves","Accessory","Attire","Apparel"];
// Load consumable EFFECT items (EXP/stat treats, breed tokens) the player owns,
// so the training log can offer an "Item used" picker. Read-only snapshot into
// state.consumables; spending happens at use time via spendConsumable().
async function loadConsumables(userId){
  state.consumables = [];
  try{
    const DB = await waitForDB();
    if(!DB || !window.EquiDB) return;
    const inv = await window.EquiDB.get('inventory', userId);
    const items = (inv && inv.items) || [];
    for(const e of items){
      if(!e || !e.effect) continue;                 // only items with an authored effect
      const left = (Number(e.usesLeft)>0) ? Number(e.usesLeft)
                  : (e.singleUse ? (Number(e.qty)||1) : (Number(e.qty)||0));
      if(left<=0) continue;
      state.consumables.push({
        invId: e.id, name: e.name||'Consumable', effect: e.effect,
        effectValue: Number(e.effectValue)||0, effectStat: e.effectStat||null,
        effectTag: e.effectTag||null, left, shopName: e.shopName||'a shop'
      });
    }
  }catch(err){ console.warn('[Stable] consumable load skipped:', err && err.message || err); }
}

// Spend ONE use of a consumable in the shared inventory doc, then return true.
// Mirrors the ledger-safe token pattern: decrement usesLeft or qty, drop it when
// depleted, write the whole inventory back.
async function spendConsumable(userId, invId){
  const DB = await waitForDB();
  if(!DB || !window.EquiDB) return false;
  const inv = await window.EquiDB.get('inventory', userId) || {id:userId, items:[]};
  inv.items = inv.items || [];
  const e = inv.items.find(x=>x && x.id===invId);
  if(!e) return false;
  if(Number(e.usesLeft)>0){
    e.usesLeft = Number(e.usesLeft)-1;
    if(e.usesLeft<=0) inv.items = inv.items.filter(x=>x!==e);
  } else {
    e.qty = (Number(e.qty)||1)-1;
    if(e.qty<=0) inv.items = inv.items.filter(x=>x!==e);
  }
  await window.EquiDB.put('inventory', userId, userId, inv);
  return true;
}

async function mergeShopInventory(userId){
  try{
    const DB = await waitForDB();
    if(!DB || !window.EquiDB) return;
    const inv = await window.EquiDB.get('inventory', userId);
    const items = (inv && inv.items) || [];
    if(!items.length) return;
    if(!Array.isArray(state.tackInventory))   state.tackInventory=[];
    if(!Array.isArray(state.attireInventory)) state.attireInventory=[];

    const catIn=(c,list)=>list.map(x=>x.toLowerCase()).includes(String(c||'').toLowerCase());
    const isConsumable=e=>Number(e.usesLeft)>0 || e.singleUse===true || Number(e.discountValue)>0;
    let added=0;
    for(const e of items){
      if(isConsumable(e)) continue;                       // tokens/tickets stay in the saddlebag
      const hasStats = e.stats && Object.keys(e.stats).length>0;
      // The shop's explicit kind wins; otherwise infer — PP means apparel,
      // stats/EXP mean tack, else the category decides.
      let isApparel = e.wearKind==='apparel';
      let isTack    = e.wearKind==='tack';
      if(!isApparel && !isTack){
        if(Number(e.pp)>0) isApparel=true;
        else if(hasStats || Number(e.exp)>0) isTack=true;
        else if(catIn(e.category, SHOP_ATTIRE_CATS)) isApparel=true;
        else if(catIn(e.category, SHOP_TACK_CATS)) isTack=true;
      }
      if(!isTack && !isApparel) continue;                  // not wearable
      const stableId = 'shop_' + (e.id || (e.source+'_'+e.itemId));
      const target   = isApparel ? state.attireInventory : state.tackInventory;
      if(target.some(t=>t.id===stableId)) continue;        // already merged
      let cat = e.category || 'Other';
      const validList = isApparel ? SHOP_ATTIRE_CATS : SHOP_TACK_CATS;
      if(!catIn(cat, validList)) cat='Other';
      else cat=validList.find(x=>x.toLowerCase()===String(cat).toLowerCase());
      if(isApparel){
        target.push({ id:stableId, name:e.name||'Shop item', category:cat, image:e.image||null,
          stats:{}, pp:Number(e.pp)||0, fromShop:e.shopName||'a shop' });
      } else {
        target.push({ id:stableId, name:e.name||'Shop item', category:cat, image:e.image||null,
          stats:hasStats?e.stats:{}, exp:Number(e.exp)||0, fromShop:e.shopName||'a shop' });
      }
      added++;
    }
    if(added){ addLog(`Added ${added} shop-bought item${added===1?'':'s'} to your inventory.`); await save(); }
  }catch(err){ console.warn('[Stable] shop inventory merge skipped:', err && err.message || err); }
}

async function fbLoadAll(userId){
  const DB = await waitForDB();
  if(!DB) throw new Error('Firestore not available');
  const [horses, riders, profile, stateDoc] = await Promise.all([
    window.EquiDB.listByOwner('horses', userId),
    window.EquiDB.listByOwner('riders', userId),
    window.EquiDB.get('profiles', userId),
    window.EquiDB.get('stables', userId),
  ]);
  return { horses, riders, profile, state: stateDoc };
}

// One-time copy of everything currently in memory (loaded from Sheets) into
// Firestore. Non-destructive: the Sheets data is left exactly as it is, so you
// can flip back at any time.
async function migrateToFirestore(){
  if(!bankAccount.linked){ alert('Sign in first.'); return; }
  const DB = await waitForDB();
  if(!DB){ alert('Could not reach Firestore. Check the browser console for details.'); return; }
  if(!confirm(`Copy your data to Firestore?\n\n• ${state.horses.length} horses\n• ${state.riders.length} riders\n• ${(state.customBreeds||[]).length} custom breeds, ${(state.customGenes||[]).length} custom genes\n• profile + inventories\n\nYour Google Sheets data is NOT changed or deleted — this only copies it. You can switch back anytime.`)) return;

  try{
    const uid=bankAccount.userId;
    const horses = state.horses.map(h=>{ const {profileImage,referenceImage,...rest}=h; return stripBig(h); });
    const nH = await window.EquiDB.putMany('horses', uid, horses);
    const nR = await window.EquiDB.putMany('riders', uid, state.riders);
    await window.EquiDB.put('profiles', uid, uid, state.profile || newPlayerProfile());
    await window.EquiDB.put('stables', uid, uid, {
      id: uid, log: state.log, tackInventory: state.tackInventory, attireInventory: state.attireInventory,
    });
    // Shared custom breeds/genes/markings/mutations (global, not per-user).
    // Guard: never overwrite an existing populated config with an empty one —
    // that could happen if you migrate while already running on Firestore.
    const haveLocal = (state.customBreeds||[]).length || (state.customGenes||[]).length
                    || (state.customMarkings||[]).length || (state.customMutations||[]).length;
    const existingCfg = await window.EquiDB.get('config','global');
    const haveRemote = existingCfg && ((existingCfg.customBreeds||[]).length || (existingCfg.customGenes||[]).length);
    if(haveLocal || !haveRemote){
      await window.EquiDB.put('config', 'global', 'global', {
        id:'global',
        customBreeds: state.customBreeds||[], customGenes: state.customGenes||[],
        customMarkings: state.customMarkings||[], customMutations: state.customMutations||[],
        tackSets: state.tackSets||[] });
    } else {
      console.warn('[Migration] kept the existing Firestore breed/gene config (nothing loaded locally to copy).');
    }
    alert(`Migration complete.\n\n• ${nH} horses\n• ${nR} riders\n• ${(state.customBreeds||[]).length} custom breeds, ${(state.customGenes||[]).length} custom genes\n• profile + inventories\n\nNow turn on "Use Firestore" to run on the fast backend.`);
    render();
  }catch(err){
    console.error('[Migration] failed:', err);
    alert('Migration failed: '+(err&&err.message?err.message:err)+'\n\nYour Sheets data is untouched.');
  }
}

// A failed Firestore save currently only whispers into the console — the horse
// stays on screen, so the player thinks it saved and loses it on reload. Warn
// loudly the first time it happens (once per visit, not per keystroke).
let __fsSaveWarned = false;
function isPermissionDenied(e){
  return !!(e && (e.code==='permission-denied' || /permission[- ]denied/i.test(e.message||'')));
}
function fsSaveProblem(e){
  if(__fsSaveWarned) return;
  __fsSaveWarned = true;
  if(isPermissionDenied(e)){
    alert('⚠ The database refused the save (permission-denied).\n\nThis is a sign-in problem, not a connection problem: the database no longer trusts this browser\u2019s session.\n\nFix: Sign out (top of the page) and sign back in with your email. That refreshes your database permissions.\n\nIf it STILL fails right after a fresh sign-in, tell the admin to check the Firestore security rules and the Anonymous sign-in setting.');
    return;
  }
  const why = (e && (e.code || e.message)) || String(e);
  alert('⚠ Saving to the database failed ('+why+').\n\nYour change is still on screen but may NOT survive a reload. Check your internet connection and try the action again. If this keeps happening, open the browser console (F12) and send the red error to the admin.');
}

// If a write is denied, the most common cause is a stale session (the owner
// upgrade never ran, or Anonymous auth was switched off under an anonymous
// session). Try ONE owner-session upgrade per visit, then let the caller
// retry the write. Requires an email session — without one there is nothing
// to upgrade and the player has to sign in again.
let __ownerRecoveryTried = false;
async function recoverOwnerSession(){
  if(__ownerRecoveryTried) return false;
  __ownerRecoveryTried = true;
  console.warn('[EquiDB] write denied — attempting owner session upgrade…');
  try{ return await upgradeToOwnerSession(); }catch(e){ return false; }
}

async function saveHorse(horse){
  if(!bankAccount.linked) return false;
  if(fsReady()){
    // One document per horse — art log included. A single write, no chunking.
    try{ return await window.EquiDB.put('horses', horse.id, bankAccount.userId, stripBig(horse)); }
    catch(e){
      if(isPermissionDenied(e) && await recoverOwnerSession()){
        try{ return await window.EquiDB.put('horses', horse.id, bankAccount.userId, stripBig(horse)); }
        catch(e2){ console.error('[EquiDB] saveHorse retry failed:', e2); fsSaveProblem(e2); return false; }
      }
      console.error('[EquiDB] saveHorse failed:', e); fsSaveProblem(e); return false;
    }
  }
  if(!STABLE_URL) return false;
  const {artLog,...horseData}=horse;

  // Legacy base64 images (from the old file-upload scheme) are hundreds of KB and
  // can't ride inside horseJson over JSONP without timing out. Pull them OUT of the
  // JSON so the profile text always saves small & fast, then migrate the image to
  // the images sheet as a best-effort background step. Editing a profile must not
  // fail just because an old photo is large. (New horses use short URL links, which
  // stay in the JSON untouched.)
  const IMAGE_KEYS = ['profileImage','referenceImage'];
  const legacyImages = [];
  for(const key of IMAGE_KEYS){
    if(horseData[key] && typeof horseData[key]==='string' && horseData[key].startsWith('data:')){
      legacyImages.push({ key, data: horseData[key] });
      delete horseData[key];   // keep it out of horseJson (horse[key] in memory is untouched)
    }
  }
  // Strip retired bookkeeping flags.
  if(Array.isArray(horseData.compHistory)){
    horseData.compHistory = horseData.compHistory.map(rec=>{
      const clean={...rec}; delete clean._imgUploaded; delete clean._prizeUploaded; return clean;
    });
  }

  // 1) The important save: the profile record itself (small, reliable).
  const textOk = await sendTextChunked(bankAccount.userId, 'horseJson', horse.id, JSON.stringify(horseData));

  // 2) Best-effort: migrate any legacy base64 image to the images sheet (with
  // retries). If it can't complete, the profile still saved — the photo just
  // needs re-adding as a URL link to persist across reloads.
  for(const img of legacyImages){
    const okImg = await saveHorseImageChunked(bankAccount.userId, horse.id, img.key, img.data);
    if(!okImg) console.warn('[EquiStories] legacy image could not be migrated for', horse.name, '— re-add it as a URL link to keep it after reload.');
  }

  return textOk;
}

async function deleteHorseFromSheets(horseId){
  if(!bankAccount.linked) return false;
  // FIX: if Firestore mode is ON but the Firebase module hasn't finished
  // loading yet, wait for it instead of silently falling through to the
  // Sheets path — that fall-through left the horse alive in Firestore.
  if(fsEnabled() && !fsReady()) await waitForDB();
  if(fsReady()){
    try{
      await window.EquiDB.remove('horses', horseId);
      return true;
    }catch(e){
      // FIX: a delete used to swallow permission-denied silently (just a
      // console.error), so the doc quietly survived in Firestore. Now we
      // retry once after an owner-session upgrade — same recovery path
      // saveHorse() already uses — and warn loudly if it still fails.
      if(isPermissionDenied(e) && await recoverOwnerSession()){
        try{ await window.EquiDB.remove('horses', horseId); return true; }
        catch(e2){ console.error('[EquiDB] deleteHorse retry failed:', e2); fsSaveProblem(e2); return false; }
      }
      console.error('[EquiDB] deleteHorse failed:', e); fsSaveProblem(e); return false;
    }
  }
  if(!STABLE_URL) return false;
  const res = await stableGas({ action:'deleteHorse', userId:bankAccount.userId, horseId });
  return !!(res && res.success);
}

// Sell / give a horse to another member. Moves the whole horse — art log, comp
// history, ribbons, images, stats — into the buyer's stable server-side, then
// removes it from ours. Requires being signed in (you can only transfer a horse
// your own account owns).
async function transferHorseToMember(h){
  if(!bankAccount.linked || !bankAccount.userId){ alert('Sign in first — you can only transfer a horse from the account that owns it.'); return; }
  const buyer = prompt(`Transfer "${h.name}" to another member.\n\nType the buyer's exact Bank User ID (their username). This moves the whole horse — art log, ribbons, everything — into their stable and removes it from yours.`);
  if(buyer===null) return;
  const toId = buyer.trim();
  if(!toId){ return; }
  if(toId === bankAccount.userId){ alert('That is your own account.'); return; }

  // Verify the buyer is a real Bank account first — the Stable can't see the
  // Players sheet, so this check has to happen here against the bank.
  const check = await gasPost({ action:'checkBalance', userId:toId });
  if(!check || check.success===false){
    alert(`No bank account found for "${toId}". Check the exact spelling of their Bank User ID (it's case-sensitive).`);
    return;
  }
  const buyerName = check.data?.displayName || toId;

  if(!confirm(`Transfer "${h.name}" to ${buyerName} (${toId})?\n\nThis cannot be undone. The horse and its entire history leave your stable and become theirs.`)) return;

  // FIRESTORE transfer: rewriting the horse doc with the buyer as its owner
  // moves it — the buyer's next load (an owner-indexed query) picks it up, and
  // ours no longer sees it. Falls back to the legacy Sheets action only if a
  // Stable URL is somehow still configured (it isn't, in Firestore-only mode).
  let ok=false, why='';
  const DB = await waitForDB();
  if(DB){
    try{
      ok = await window.EquiDB.put('horses', h.id, toId, stripBig(h));
      if(!ok) why='the database rejected the write';
    }catch(e){
      if(isPermissionDenied(e) && await recoverOwnerSession()){
        try{ ok = await window.EquiDB.put('horses', h.id, toId, stripBig(h)); }
        catch(e2){ why=(e2&&e2.message)?e2.message:String(e2); }
      } else { why=(e&&e.message)?e.message:String(e); }
    }
  } else if(STABLE_URL){
    const res = await stableGas({ action:'transferHorse', horseId:h.id, fromUserId:bankAccount.userId, toUserId:toId });
    ok = !!(res && res.success);
    if(!ok) why = res?.error || 'no response from the stable';
  } else {
    why='not connected to the database';
  }
  if(!ok){
    alert('Transfer failed: ' + why + '\n\nThe horse is unchanged and still yours.');
    return;
  }
  // Success: drop it from our local stable and refresh.
  state.horses = state.horses.filter(x=>x.id!==h.id);
  addLog(`Transferred ${h.name} to ${toId}.`);
  await save(); render();
  alert(`"${h.name}" has been transferred to ${toId}. It's now in their stable, art log and all.`);
}

async function loadGlobalBreeds(){
  // Custom breeds/genes/markings/mutations are GLOBAL (shared by every player),
  // stored under one config record rather than per-user.
  if(fsEnabled()){
    const DB = await waitForDB();
    if(DB){
      try{
        const cfg = await DB.get('config', 'global');
        state.customBreeds    = Array.isArray(cfg?.customBreeds)    ? cfg.customBreeds    : [];
        state.customGenes     = Array.isArray(cfg?.customGenes)     ? cfg.customGenes     : [];
        state.customMarkings  = Array.isArray(cfg?.customMarkings)  ? cfg.customMarkings  : [];
        state.customMutations = Array.isArray(cfg?.customMutations) ? cfg.customMutations : [];
        state.tackSets        = Array.isArray(cfg?.tackSets)        ? cfg.tackSets        : [];
        return;
      }catch(e){ console.error('[EquiDB] loadGlobalBreeds failed:', e); }
    }
  }
  if(!STABLE_URL){ state.customBreeds=[]; state.customGenes=[]; state.customMarkings=[]; state.customMutations=[]; return; }
  const res = await stableGas({ action:'loadStableState', userId:GLOBAL_CONFIG_USER_ID });
  if(res?.success && res.data){
    state.customBreeds    = Array.isArray(res.data.customBreeds)    ? res.data.customBreeds    : [];
    state.customGenes     = Array.isArray(res.data.customGenes)     ? res.data.customGenes     : [];
    state.customMarkings  = Array.isArray(res.data.customMarkings)  ? res.data.customMarkings  : [];
    state.customMutations = Array.isArray(res.data.customMutations) ? res.data.customMutations : [];
  } else {
    state.customBreeds = [];
    state.customGenes = [];
    state.customMarkings = [];
    state.customMutations = [];
  }
}

// Ask the bank for a token whose uid IS our bank userId, then adopt it. Without
// this the Firestore rules can't tell who owns what.
async function upgradeToOwnerSession(){
  try{
    if(!window.EquiAuth || !window.EquiAuth.user) return false;
    const idToken = await window.EquiAuth.token();
    if(!idToken) return false;
    const r = await gasPost({ action:'getFirestoreToken', idToken });
    if(r?.success && r.data?.token){
      const ok = await window.EquiAuth.upgradeToOwner(r.data.token);
      if(ok) console.log('[EquiAuth] signed in to Firestore as owner:', r.data.userId);
      return ok;
    }
    console.warn('[EquiAuth] owner token unavailable:', r?.error||'unknown');
  }catch(e){ console.error('[EquiAuth] upgrade error:', e); }
  return false;
}

async function loadFromSheets(){
  const userId = bankAccount.userId;

  // FIRESTORE-ONLY: four indexed reads, no chunking, no row scans — and no
  // silent fallback to Google Sheets. If Firestore can't be reached, the
  // player is told so instead of being handed an empty ghost stable.
  const DB = await waitForDB();
  if(!DB){
    state.loaded = true;
    alert('\u26a0 Could not connect to the database (the Firestore module failed to load).\n\nCheck your internet connection and reload the page. Nothing is lost \u2014 the app just can\u2019t reach your stable right now.');
    return;
  }
  try{
    const t0=performance.now();
    const fb = await fbLoadAll(userId);
    await loadGlobalBreeds();     // shared breeds/genes live in their own doc
    state.horses  = fb.horses||[];
    state.riders  = fb.riders||[];
    state.profile = fb.profile||null;
    state.log             = fb.state?.log || [];
    state.tackInventory   = fb.state?.tackInventory || [];
    state.attireInventory = fb.state?.attireInventory || [];
    await mergeShopInventory(userId);   // fold in shop-bought tack/attire (with bonuses)
    await loadConsumables(userId);      // load EXP/stat treats for the "Item used" picker
    state.horses.forEach(h=>{
      if(!h.artLog) h.artLog=[];
      // Normalisation that used to live in the Sheets loader — kept so horses
      // migrated over from Sheets don't miss arrays newer code expects.
      if(h.referenceImage && h.refBonusGiven===undefined) h.refBonusGiven=true;
      if(!Array.isArray(h.completedMilestones)) h.completedMilestones=[];
      if(!Array.isArray(h.badges)) h.badges=[];
      if(h.level>=5 && !h.badges.includes("Quality Stock")) h.badges.push("Quality Stock");
      if(h.level>=10 && !h.badges.includes("Excellent Stock")) h.badges.push("Excellent Stock");
      recomputeHorse(h);
    });
    state.loaded=true;
    // Catch up any reserved slot another member has bred with. Only the owner
    // may write their own horse, so this is where that slot is finally spent.
    reconcileReservations().then(n=>{ if(n) render(); }).catch(()=>{});
    console.log(`[EquiDB] loaded ${state.horses.length} horses + ${state.riders.length} riders in ${Math.round(performance.now()-t0)}ms`);
    render();
  }catch(err){
    console.error('[EquiDB] load failed:', err);
    state.loaded = true;
    alert('\u26a0 Loading your stable from the database failed ('+(err&&err.message?err.message:err)+').\n\nReload the page to try again. If it keeps failing right after a fresh sign-in, tell the admin to check the Firestore security rules.');
  }
}

async function loadPublicHorse(horseId, urlOverride){

  // mode (no URL, network error, timeout, or the backend genuinely
  // returning success:false) into the same null made it impossible to
  // tell "the link is broken" apart from "the backend can't find this
  // horse" apart from "the request never reached the server at all".
  if(fsEnabled()){
    const DB = await waitForDB();
    if(DB){
      try{
        const h = await DB.get('horses', horseId);
        if(h) return { success:true, data:h };
        return { success:false, error:'That horse is not in the database.' };
      }catch(e){ console.error('[EquiDB] loadPublicHorse failed:', e); }
    }
  }
  const res = await stableGas({ action:'loadPublicHorse', horseId }, urlOverride);
  return res;
}

// Finish-the-migration fix: Firestore mode was a per-browser localStorage toggle,
// so a new browser/device (or cleared storage) silently fell back to Sheets even
// for players whose data already lives in Firestore — new horses then never
// reached Firestore. If the flag is UNSET and this player's stable exists in
// Firestore, switch the flag on automatically. An explicit '0' (the settings
// toggle or ?fs=off) is always respected.
async function autoEnableFirestore(){
  try{
    if(!bankAccount.linked) return;
    if(localStorage.getItem(FS_FLAG)!==null) return;   // player already chose a backend
    const DB = await waitForDB();
    if(!DB) return;
    const stable = await window.EquiDB.get('stables', bankAccount.userId);
    if(stable){
      localStorage.setItem(FS_FLAG,'1');
      console.log('[EquiDB] found this stable in Firestore — Firestore mode enabled automatically.');
    }
  }catch(e){ console.warn('[EquiDB] auto-enable check failed:', e); }
}

// Boot-path fix: upgradeToOwnerSession() used to run ONLY inside the sign-in
// flow, so a returning visitor's restored session never got the owner uid.
// Harmless while the Firestore rules are permissive, but the moment they check
// request.auth.uid every write from a return visit would fail silently. Skip
// the round-trip when the restored session already IS the owner (custom-token
// sessions persist across reloads, so this is the common case).
async function ensureOwnerSession(){
  try{
    await waitForDB();
    const u = window.EquiAuth && window.EquiAuth.user;
    if(u && u.uid !== bankAccount.userId) await upgradeToOwnerSession();
  }catch(e){ console.warn('[EquiAuth] boot owner check failed:', e); }
}

function uid2(){ return 't_'+Math.random().toString(36).slice(2,9); }

function getEquippedStatBonus(h, stat){
  let bonus=0;
  // Equipped tack is stored by id; the items themselves live in the shared
  // state.tackInventory. (h.tackOwned is a legacy per-horse list, kept here
  // as a fallback so any older saved data still resolves.)
  const inv = state.tackInventory || [];
  (h.tackEquipped||[]).forEach(tid=>{
    const item = inv.find(t=>t.id===tid) || (h.tackOwned||[]).find(t=>t.id===tid);
    if(item && item.stats && item.stats[stat]) bonus += Number(item.stats[stat])||0;
  });
  return bonus;
}

function getEffectiveStat(h, stat){
  return (h.stats[stat]||0) + getEquippedStatBonus(h, stat);
}

function applyLevelsFromExp(h, silent){
  while(h.level<10 && h.exp>=LEVEL_TABLE[h.level+1].exp){
    h.level++;
    const t=LEVEL_TABLE[h.level];
    STATS.forEach(s=>h.stats[s]+=t.bonus);
    h.breedingSlots+=t.slots;
    if(!silent) addLog(`${h.name} reached Level ${h.level}! +${t.bonus} to all stats.`);
    if(t.badge){
      if(!Array.isArray(h.badges)) h.badges=[];
      if(!h.badges.includes(t.badge)) h.badges.push(t.badge);
      if(!silent) addLog(`${h.name} earned the ${t.badge} trophy!`);
    }
  }
}
function checkLevelUp(h){ applyLevelsFromExp(h, false); }

function recomputeHorse(h){
  // A horse's starting point. Normally every stat begins at BASE_STAT_VALUE,
  // but a FOAL starts from the average of its parents — so that average is
  // stored on the horse and used here. Without this, stats are rebuilt from
  // scratch on every page load and a bred foal silently drops back to base.
  const baseStats={};
  STATS.forEach(s=>{
    const b = h.baseStats && Number.isFinite(Number(h.baseStats[s]))
      ? Number(h.baseStats[s]) : BASE_STAT_VALUE;
    baseStats[s] = b;
  });
  h.stats = baseStats;
  h.level = 1;
  h.breedingSlots = BASE_BREEDING_SLOTS + (h.breedingFilled||0)*0;
  h.badges = [];
  h.completedMilestones = [];
  h.exp = 0;

  const chronological = [...(h.artLog||[])].reverse();
  chronological.forEach(entry=>{
    h.exp += entry.exp||0;
    // Only training entries grant stats. Shows (type "competition") award EXP
    // only — even old records that were saved with a statsDelta are ignored here,
    // so past shows stop inflating stats the next time a horse recomputes.
    if(entry.statsDelta && entry.type!=="competition"){
      Object.entries(entry.statsDelta).forEach(([s,v])=>{ h.stats[s]=(h.stats[s]||0)+v; });
    }
    if(entry.milestoneIds) entry.milestoneIds.forEach(id=>{ if(!h.completedMilestones.includes(id)) h.completedMilestones.push(id); });
  });

  // Reference sheet bonus is DERIVED here, not stored. It used to be added
  // straight to h.exp when the sheet was submitted, with no art-log entry to
  // replay — and since exp is rebuilt from zero above and every horse
  // recomputes on page load, the bonus was wiped on the next refresh. Worse,
  // refBonusGiven stayed true so it was never granted again. Deriving it makes
  // the recompute idempotent and self-correcting: horses that already had a
  // reference sheet (including ones migrated from Sheets, which were flagged as
  // paid without ever being credited) pick it up automatically, and it falls
  // away again if the reference image is ever removed.
  h.refBonusExp = h.referenceImage ? REF_SHEET_EXP : 0;
  h.exp += h.refBonusExp;

  applyLevelsFromExp(h, true);

  // Fully-trained bonus: once a horse is level 10, its assigned rider grants a
  // one-time permanent stat bonus (tier-scaled) to every stat. Applied here so a
  // recompute is idempotent (stats were reset above) and self-correcting (drops
  // away if the horse ever falls below 10, or if the rider is removed).
  h.riderFinalBonus = 0;
  if(h.level>=10 && h.riderId){
    const rider = state.riders.find(r=>r.id===h.riderId);
    const fin = rider ? riderBonusFor(rider).final : 0;
    if(fin>0){
      STATS.forEach(s=>{ h.stats[s]=(h.stats[s]||0)+fin; });
      h.riderFinalBonus = fin;
    }
  }
}

async function editArtLogImage(h, entryId){
  const e=(h.artLog||[]).find(x=>x.id===entryId);
  if(!e) return;
  const cur = (typeof e.image==='string' && !e.image.startsWith('@img:')) ? e.image : '';
  const url = prompt("Paste a new direct image link for this entry (leave blank to remove the image):", cur);
  if(url===null) return; // cancelled
  e.image = url.trim() || null;
  addLog(`${h.name} — updated an art log image.`);
  const ok = await saveArtEntry(h, e);
  await saveHorse(h); await save(); render();
  if(!ok) alert("The entry updated here, but saving to the database failed. Try again — if it keeps happening, sign out and sign back in.");
}

// ---- editing an existing log entry ----------------------------------------
// The old "Edit Training Entry" modal only exposed a handful of fields (and
// still carried the pre-Rider-PP checkbox), so a mistake in the stats, the
// training type or the Prestige meant deleting and re-logging. Instead, Edit
// now reopens the ENTRY in the real form — Training or Competitions — with
// everything filled in. Saving removes the original (reversing its EXP, stats
// and rider PP through the same path Delete uses) and logs the corrected one.
let editingLogEntry = null;   // { horseId, entryId, type }

function beginEditLogEntry(horseId, entryId){
  const h = state.horses.find(x=>x.id===horseId);
  const e = h && (h.artLog||[]).find(x=>x.id===entryId);
  if(!h || !e){ alert("Couldn't find that entry."); return; }
  editingLogEntry = { horseId, entryId, type: e.type || 'training' };
  activeTab = (e.type === 'competition') ? 'compete' : 'train';
  render();
  setTimeout(()=>{ const c=document.querySelector('#tr_go, #cs_go'); if(c) c.scrollIntoView({behavior:'smooth', block:'center'}); }, 60);
}
function cancelEditLogEntry(){ editingLogEntry = null; render(); }

// Strip the original before re-logging. Same reversal Delete performs, minus
// the save/render (the caller is mid-save and will do both).
function consumeEditedEntry(){
  if(!editingLogEntry) return null;
  const {horseId, entryId} = editingLogEntry;
  const h = state.horses.find(x=>x.id===horseId);
  if(h){
    const idx=(h.artLog||[]).findIndex(e=>e.id===entryId);
    if(idx>-1){
      removeRiderPPForSource(entryId);
      h.artLog.splice(idx,1);
      if(h.compHistory) h.compHistory = h.compHistory.filter(r=>r.artLogId!==entryId);
      recomputeHorse(h);
    }
  }
  const was = editingLogEntry;
  editingLogEntry = null;
  return was;
}

function deleteArtLogEntry(h, entryId){
  const idx=(h.artLog||[]).findIndex(e=>e.id===entryId);
  if(idx===-1) return;
  removeRiderPPForSource(entryId);   // drop any rider PP linked to this entry
  h.artLog.splice(idx,1);
  if(h.compHistory) h.compHistory = h.compHistory.filter(r=>r.artLogId!==entryId);
  recomputeHorse(h);
  addLog(`Deleted a log entry for ${h.name} — EXP/stats reversed.`);
  saveHorse(h); save(); render();
}

function deleteCompRecord(h, recId){
  const rec=(h.compHistory||[]).find(r=>r.id===recId);
  if(!rec) return;
  h.compHistory = h.compHistory.filter(r=>r.id!==recId);
  if(rec.artLogId) h.artLog = (h.artLog||[]).filter(e=>e.id!==rec.artLogId);
  recomputeHorse(h);
  addLog(`Deleted a show record for ${h.name} — EXP/stats reversed.`);
  saveHorse(h); save(); render();
}
