// NET WORTH MODAL (Lightblood pricing)
// ============================================

function showNetWorthModal(horseId){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  if(!h.genoModifiers) h.genoModifiers=[];

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';

  function inp(style=''){
    return `style="padding:6px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:4px;${style}"`;
  }

  const baseOpts = GENO_BASE_PRICES.map(p=>`<option value="${p.value}" ${h.genoBasePrice===p.value?"selected":""}>${p.label} — ฿${p.value}</option>`).join("");
  // Only the horse's own saved genotype string is available here (no live
  // locus selections), so the Bloodmark/Peacock Appaloosa prerequisite is
  // checked by looking for the required allele code as a whole token in
  // that string (genotype codes are space-separated, e.g. "EE Aa Gg ...").
  const genotypeTokens = (h.genotype||"").split(/\s+/);
  const hasSavedCode=(locus,code)=>genotypeTokens.includes(code);
  const modGroups = Object.entries(GENO_MODIFIERS).map(([group, items])=>`
    <optgroup label="— ${group} —">
      ${items.filter(m=>markingMeetsGeneRequirement(m.label, hasSavedCode))
        .map(m=>`<option value="${m.value}|${m.label}">${m.label} (+฿${m.value})</option>`).join("")}
    </optgroup>`).join("");
  const genoNote = h.genotype
    ? `<p class="small" style="color:var(--equi-good);margin:4px 0 10px;">Base genetics: <b>${h.genotype}</b> (${h.phenotype||""}) — set on the Roster tab. This section is for extra fictitious/rare markings and mane types on top of that.</p>`
    : `<p class="small" style="color:var(--equi-dim);margin:4px 0 10px;">No structured genetics set yet — use "Set Genetics" on the roster card to pick real coat color alleles. This section is for extra fictitious/rare markings and mane types.</p>`;

  const existingMods = h.genoModifiers.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
      <span style="flex:1;font-size:1.02em;">${m.label}</span>
      <span style="color:var(--equi-accent);font-size:1.02em;">+฿${m.value}</span>
      <button data-remove="${i}" style="background:var(--equi-bad);color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.98em;">✕</button>
    </div>`).join("") || `<div class="small" style="opacity:.6;">No modifiers added yet.</div>`;

  const currentNW = calcNetWorth(h);
  const currentSlot = calcSlotPrice(h);

  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:24px;max-width:540px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);margin:auto;">
    <h3 style="margin-top:0;color:var(--equi-accent);">Net Worth — ${h.name}</h3>
    <p style="color:var(--equi-dim);font-size:1.02em;margin-top:0;">Based on the Lightblood Pricing Guide. Breeding slot = Net Worth × 5%.</p>

    <label style="font-size:.98em;color:var(--equi-dim);text-transform:uppercase;display:block;margin-bottom:3px;">Genotype Base Price</label>
    <select id="nw_base" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;margin-bottom:12px;">
      <option value="0">— Select base —</option>
      ${baseOpts}
    </select>

    <label style="font-size:.98em;color:var(--equi-dim);text-transform:uppercase;display:block;margin-bottom:3px;">Add Modifier</label>
    ${genoNote}
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <select id="nw_mod_pick" style="flex:1;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;">
        <option value="">— Pick modifier —</option>
        ${modGroups}
      </select>
      <button id="nw_add_mod" style="background:var(--equi-accent);color:var(--equi-panel);border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-weight:bold;white-space:nowrap;">+ Add</button>
    </div>

    <div id="nw_mod_list" style="background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:5px;padding:8px;min-height:36px;margin-bottom:12px;">
      ${existingMods}
    </div>

    <label style="font-size:.98em;color:var(--equi-dim);text-transform:uppercase;display:block;margin-bottom:3px;">Custom Net Worth Override <span style="opacity:.6;">(optional — leave blank to use calculated value)</span></label>
    <input id="nw_custom" type="number" value="${h.customNetWorth!==null&&h.customNetWorth!==undefined&&h.customNetWorth!==""?h.customNetWorth:''}" placeholder="e.g. 5000" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;box-sizing:border-box;margin-bottom:12px;" />

    <div id="nw_preview" style="background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:6px;padding:10px;margin-bottom:12px;font-size:1.04em;">
      <div style="display:flex;justify-content:space-between;"><span>Genotype Value</span><span>฿${calcGenoPrice(h).toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;"><span>Show Earnings</span><span>฿${calcShowEarnings(h).toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:6px;border-top:1px solid var(--equi-raised);font-weight:bold;color:var(--equi-accent);"><span>Net Worth</span><span>฿${currentNW.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;color:var(--equi-accent);"><span>Slot Price (5%)</span><span>฿${currentSlot.toLocaleString()}</span></div>
    </div>

    <button id="nw_save" style="width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1.1em;">Save</button>
    <button id="nw_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:10px;border-radius:6px;cursor:pointer;font-size:1.1em;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#nw_cancel').onclick=()=>overlay.remove();

  function refreshPreview(){
    const base=Number(overlay.querySelector('#nw_base').value)||0;
    const custom=overlay.querySelector('#nw_custom').value.trim();
    const geno=base+(h.genoModifiers||[]).reduce((s,m)=>s+(m.value||0),0);
    const shows=calcShowEarnings(h);
    const nw=custom!==""?Number(custom):(geno+shows);
    const slot=Math.round(nw*0.05);
    overlay.querySelector('#nw_preview').innerHTML=`
      <div style="display:flex;justify-content:space-between;"><span>Genotype Value</span><span>฿${geno.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;"><span>Show Earnings</span><span>฿${shows.toLocaleString()}</span></div>
      ${custom!==""?`<div style="display:flex;justify-content:space-between;color:var(--equi-warn);"><span>⚠ Custom override</span><span>฿${Number(custom).toLocaleString()}</span></div>`:""}
      <div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:6px;border-top:1px solid var(--equi-raised);font-weight:bold;color:var(--equi-accent);"><span>Net Worth</span><span>฿${nw.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;color:var(--equi-accent);"><span>Slot Price (5%)</span><span>฿${slot.toLocaleString()}</span></div>`;
  }

  overlay.querySelector('#nw_base').onchange=refreshPreview;
  overlay.querySelector('#nw_custom').oninput=refreshPreview;

  overlay.querySelector('#nw_add_mod').onclick=()=>{
    const val=overlay.querySelector('#nw_mod_pick').value;
    if(!val) return;
    const [price, ...labelParts]=val.split('|');
    const label=labelParts.join('|');
    h.genoModifiers.push({label, value:Number(price), rare:true});
    refreshModList();
    refreshPreview();
    overlay.querySelector('#nw_mod_pick').value='';
  };

  function refreshModList(){
    const list=overlay.querySelector('#nw_mod_list');
    list.innerHTML=h.genoModifiers.length ? h.genoModifiers.map((m,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="flex:1;font-size:1.02em;">${m.label}</span>
        <span style="color:var(--equi-accent);font-size:1.02em;">+฿${m.value}</span>
        <button data-remove="${i}" style="background:var(--equi-bad);color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.98em;">✕</button>
      </div>`).join("") : `<div class="small" style="opacity:.6;">No modifiers added yet.</div>`;
    list.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{
      h.genoModifiers.splice(Number(b.dataset.remove),1);
      refreshModList(); refreshPreview();
    });
  }
  refreshModList();

  overlay.querySelector('#nw_save').onclick=async()=>{
    h.genoBasePrice=Number(overlay.querySelector('#nw_base').value)||0;
    const custom=overlay.querySelector('#nw_custom').value.trim();
    h.customNetWorth=custom!==""?Number(custom):null;
    const ok = await saveHorse(h);
    await save();
    overlay.remove(); render();
    if(!ok) alert(`Net worth was updated here, but saving it to the database failed. Try again — if it keeps happening, sign out and sign back in (top of the page).`);
  };
}

// ============================================
// BOOT
// ============================================

load();

})();

</script>
</body>
</html>
