      <div><label>Discipline</label><select id="cs_disc">${discOpts}</select></div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Show / Venue Name</label><input id="cs_venue" placeholder="e.g. Spring Classic 2025" /></div>
      <div><label>Date <span class="small">(optional)</span></label><input id="cs_date" placeholder="e.g. April 2025" /></div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Placement</label>
        <select id="cs_place">
          <option value="">— select —</option>
          <option value="1">1st Place</option>
          <option value="2">2nd Place</option>
          <option value="3">3rd Place</option>
          <option value="4">4th Place</option>
          <option value="5">5th Place</option>
          <option value="6">6th Place</option>
          <option value="0">Participant / No placement</option>
        </select>
      </div>
      <div><label>Class / Division <span class="small">(optional)</span></label>
        <input id="cs_class" placeholder="e.g. Open Hunter, Advanced XC" />
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Notes <span class="small">(optional)</span></label>
      <input id="cs_note" placeholder="e.g. Double clear, Reserve Champion, personal best time" />
    </div>

    <hr style="border:none;border-top:1px solid var(--equi-line);margin:14px 0;" />

    <label>Show Art / Photo <span class="small">(optional — the artwork or photo from this show)</span></label>
    <p class="small" style="margin:2px 0 6px;">This image appears in the art log and on the ribbon wall for placed entries. Paste a direct image link (not the page it's posted on) — see the note at the top of the page for how to get one.</p>
    <input type="text" id="cs_art_url" placeholder="https://…jpg / .png / .gif" />
    <div id="cs_art_preview" style="margin-top:6px;"></div>

    ${Object.keys(ART_EXP).length ? `
    <div class="row" style="margin-top:8px;">
      <div><label>What's on this sheet? <span class="small">(for EXP — optional)</span></label>
        <div id="cs_artrows">${artRowHTML("",1,false)}</div>
        <button type="button" id="cs_add_art" class="secondary" style="margin-top:6px;padding:4px 10px;">+ Add another image type</button>
        <p class="small" style="margin:4px 0 0;opacity:.75;">Leave the first row blank for "no art". One row per kind of image on the sheet — each counts at its own rate.</p>
      </div>
      <div><label>Literature Word Count <span class="small">(optional)</span></label>
        <input type="number" id="cs_lit" min="0" placeholder="min 200 for EXP" />
        <div class="small" id="cs_lit_preview" style="margin-top:2px;"></div>
      </div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Event / Placement EXP Bonus <span class="small">(optional)</span></label>
        <input type="text" id="cs_cb_label" placeholder="e.g. Winter Classic — 1st place bonus" />
      </div>
      <div><label>Bonus EXP <span class="small">(optional)</span></label>
        <input type="number" id="cs_cb_exp" min="0" placeholder="e.g. 15" />
      </div>
    </div>
    <p class="small" style="margin:4px 0 0;opacity:.75;">For EXP awarded by a host on top of the normal show maths — community events, placement bonuses, catch-up rewards for shows you never logged. Needs both a reason and an amount.</p>
    <div style="margin-top:8px;">
      <label>Bonus Elements <span class="small">(optional)</span></label>
      <div class="pill-select" id="cs_bonuses">
        ${Object.keys(BONUS_EXP).map(k=>`<div class="pill" data-bonus="${k}">${k} (+${BONUS_EXP[k]})</div>`).join("")}
      </div>
      <div id="cs_creatureRow" class="hide" style="margin-top:6px;">
        <label class="small" style="display:inline;">How many additional creatures?</label>
        <input type="number" id="cs_creature_n" min="1" value="1" style="max-width:90px;padding:4px 6px;" />
        <span class="small" style="opacity:.7;">(+2 EXP each)</span>
      </div>
    </div>
    <div style="margin-top:8px;"><label>Link to Art <span class="small">(optional)</span></label>
      <input id="cs_link" placeholder="https://… (DeviantArt, Toyhouse, etc.)" />
    </div>` : ""}

    <hr style="border:none;border-top:1px solid var(--equi-line);margin:14px 0;" />

    <label>Prizes, Ribbons & Trophies <span class="small">(add as many as you like)</span></label>
    <p class="small" style="margin:2px 0 6px;">Paste direct image links for your ribbons, trophies, sashes, prize tack, or any awards from this show. Each gets a label.</p>
    <div id="cs_prize_area"></div>
    <button id="cs_add_prize" class="secondary" style="margin-top:6px;font-size:1.02em;">+ Add Prize / Ribbon</button>

    <hr style="border:none;border-top:1px solid var(--equi-line);margin:14px 0;" />

    <div id="cs_rpp_slot"></div>

    <div id="cs_total" style="margin:10px 0 8px;padding:10px 12px;border:1px solid var(--equi-line);border-radius:8px;background:var(--equi-ink);"></div>
    <button id="cs_go" style="width:100%;margin-top:4px;">✓ Save Show Record</button>
    <div id="cs_result"></div>
  `;
  wrap.appendChild(card);

  let csRPP={collect:()=>null,setTop3:()=>{}};
  function refreshCsRPP(){
    const slot=card.querySelector('#cs_rpp_slot'); if(!slot) return;
    const h=state.horses.find(x=>x.id===card.querySelector('#cs_horse')?.value);
    slot.innerHTML=riderPPBlockHtml('show','competition',h);
    csRPP=bindRiderPPBlock(card,'show');
  }
  refreshCsRPP();
  if(card.querySelector('#cs_horse')) card.querySelector('#cs_horse').addEventListener('change', refreshCsRPP);

  card.querySelector('#cs_disc').onchange=()=>{
    const disc=card.querySelector('#cs_disc').value;
    card.querySelector('#cs_class').placeholder=`e.g. ${DISCIPLINES[disc]?.difficulties?.[0]||'Open'}`;
  };

  if(card.querySelector('#cs_lit')){
    card.querySelector('#cs_lit').oninput=()=>{
      const wc=parseInt(card.querySelector('#cs_lit').value)||0;
      const prev=card.querySelector('#cs_lit_preview');
      prev.textContent=wc===0?"":(wc<200?"⚠ Min 200 words":`✓ +${calcLitExp(wc)} EXP`);
      prev.style.color=wc<200&&wc>0?"#c9a23a":"var(--equi-good)";
    };
  }

  const selectedBonuses=new Set();
  card.querySelectorAll('[data-bonus]').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(selectedBonuses.has(k)){selectedBonuses.delete(k);p.classList.remove('active');}
    else{selectedBonuses.add(k);p.classList.add('active');}
    if(k==="Additional Creature (per)"){ const row=card.querySelector('#cs_creatureRow'); if(row) row.classList.toggle('hide', !selectedBonuses.has(k)); }
  });

  // FIX (this was the show-art part of the bug): show art photos were
  // almost always full-res phone/screenshot uploads, embedded as base64,
  // which blew past the GET/JSONP request size and/or the Sheets cell
  // limit and failed the whole show record's save. Now it's a pasted link
  // instead — just a short string, nothing to compress or chunk.
  card.querySelector('#cs_art_url').oninput=()=>{
    artImage = card.querySelector('#cs_art_url').value.trim() || null;
  };
  card.querySelector('#cs_art_url').onblur=()=>{
    card.querySelector('#cs_art_preview').innerHTML = urlImagePreviewHTML(artImage, 'Show Art');
  };

  function refreshPrizeArea(){
    const area=card.querySelector('#cs_prize_area');
    area.innerHTML=prizeImages.length ? prizeImages.map((p,i)=>`
      <div style="display:flex;align-items:flex-start;gap:8px;padding:8px;background:var(--equi-ink);border-radius:6px;margin-bottom:6px;">
        <div data-prize-thumb="${i}">${prizeThumbHTML(p.dataUrl)}</div>
        <div style="flex:1;">
          <input data-prize-url="${i}" value="${p.dataUrl||''}" placeholder="Direct image URL (https://…jpg)"
            style="width:100%;padding:5px;background:var(--equi-bg);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:4px;box-sizing:border-box;margin-bottom:4px;" />
          <input data-prize-label="${i}" value="${p.label||''}" placeholder="e.g. 1st Place Ribbon, Championship Trophy, Prize Saddle Pad…"
            style="width:100%;padding:5px;background:var(--equi-bg);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:4px;box-sizing:border-box;" />
        </div>
        <button data-remove-prize="${i}" class="danger" style="font-size:.98em;padding:3px 8px;flex:none;">✕</button>
      </div>`).join("") : '<div class="small" style="color:var(--equi-faint);padding:4px 0;">No prizes added yet.</div>';

    area.querySelectorAll('[data-prize-label]').forEach(inp=>{
      inp.oninput=()=>{ prizeImages[Number(inp.dataset.prizeLabel)].label=inp.value; };
    });
    // FIX (prize photo part of the bug): prize/ribbon photos were uploaded
    // files embedded as base64 — same problem as show art above, and there
    // were often several per show, compounding it. Now pasted links; the
    // thumbnail only re-renders on blur (not every keystroke) so typing in
    // the field doesn't lose focus.
    area.querySelectorAll('[data-prize-url]').forEach(inp=>{
      inp.oninput=()=>{ prizeImages[Number(inp.dataset.prizeUrl)].dataUrl=inp.value.trim(); };
      inp.onblur=()=>{
        const i=Number(inp.dataset.prizeUrl);
        const thumb=area.querySelector(`[data-prize-thumb="${i}"]`);
        if(thumb) thumb.innerHTML=prizeThumbHTML(prizeImages[i].dataUrl);
      };
    });
    area.querySelectorAll('[data-remove-prize]').forEach(b=>{
      b.onclick=()=>{ prizeImages.splice(Number(b.dataset.removePrize),1); refreshPrizeArea(); };
    });
  }
  refreshPrizeArea();

  card.querySelector('#cs_add_prize').onclick=()=>{
    prizeImages.push({dataUrl:"", label:""});
    refreshPrizeArea();
  };

  // Live total: mirrors the submit math below. KEEP IN SYNC with #cs_go.
  const recalcCsTotal=()=>{
    const box=card.querySelector('#cs_total'); if(!box) return;
    try{
      const artRows=readArtRows(card);
      const placement=Number(card.querySelector('#cs_place').value)||null;
      let exp=0;
      if(artRows.length){
        exp+=artRowsExp(artRows);
        const litEl=card.querySelector('#cs_lit');
        exp+=calcLitExp(parseInt(litEl && litEl.value)||0);
        exp+=1; // show entry
        selectedBonuses.forEach(k=>{ if(!BONUS_EXP[k]) return;
          if(k==="Additional Creature (per)"){ const nEl=card.querySelector('#cs_creature_n'); exp+=BONUS_EXP[k]*Math.max(1,parseInt(nEl&&nEl.value)||1); }
          else exp+=BONUS_EXP[k]; });
        if(placement) exp+=({1:4,2:3,3:2}[placement]||1);
      }
      // A host-awarded bonus stands on its own — it applies even when no art is
      // attached, so EXP for a past show can be logged after the fact.
      const cbL=(card.querySelector('#cs_cb_label').value||'').trim();
      const cbE=parseInt(card.querySelector('#cs_cb_exp').value)||0;
      if(cbL && cbE>0) exp+=cbE;
      const ppEl=card.querySelector('.rpp_sum'); const pp=ppEl?Number(ppEl.textContent)||0:0;
      if(exp>0 || pp>0){
        box.innerHTML=`<b style="color:var(--accent,#d29a3e);">This record will grant:</b> `
          +(exp>0?`<b>+${exp} EXP</b>`:`<span class="small">no show art = no EXP</span>`)
          +(pp>0?` &nbsp;·&nbsp; Rider <b>+${pp} PP</b>`:'')
          +` <span class="small" style="opacity:.7;">(shows add EXP only — no stats)</span>`;
      } else {
        box.innerHTML='<span class="small" style="opacity:.6;">Add show art (pick at least one image type) to earn EXP — placement adds a bonus on top. Or enter an event/placement EXP bonus on its own.</span>';
      }
    }catch(err){ box.textContent=''; }
  };
  // Arrived here via Edit on a show entry — load it into this form.
  (function prefillShowFromEdit(){
    if(!editingLogEntry || editingLogEntry.type!=='competition') return;
    const h = state.horses.find(x=>x.id===editingLogEntry.horseId);
    const e = h && (h.artLog||[]).find(x=>x.id===editingLogEntry.entryId);
    if(!h || !e){ editingLogEntry=null; return; }
    const rec = (h.compHistory||[]).find(r=>r.artLogId===e.id) || {};

    const set=(sel,val)=>{ const el=card.querySelector(sel); if(el && val!=null && val!=='') el.value=val; };
    set('#cs_horse', h.id);
    set('#cs_disc',  rec.discipline || e.discipline || '');
    set('#cs_venue', rec.venue || '');
    set('#cs_date',  rec.date || '');
    set('#cs_place', rec.placement || e.placement || '');
    set('#cs_note',  rec.note || '');
    set('#cs_art_url', e.image || '');
    set('#cs_lit', (e.lit||'').replace(/[^0-9]/g,'') || '');
    if(e.label) set('#cs_cb_label', e.label);

    const rowsHost=card.querySelector('#cs_artrows');
    if(rowsHost){
      const rows = (e.artMix && e.artMix.length) ? e.artMix : (e.art ? [{art:e.art, n:1}] : []);
      rowsHost.innerHTML = rows.length ? rows.map((r,i)=>artRowHTML(r.art, r.n, i>0)).join("")
                                       : artRowHTML("",1,false);
    }
    const rsel=card.querySelector('.rpp_rider');
    if(rsel && e.featuredRiderId) rsel.value = e.featuredRiderId;

    const btn=card.querySelector('#cs_go');
    if(btn) btn.textContent = '\u2713 Save changes to this show';
    const banner=document.createElement('div');
    banner.className='result';
    banner.style.cssText='margin-top:10px;border-color:var(--equi-accent);color:var(--equi-accent);display:flex;gap:10px;align-items:center;flex-wrap:wrap;';
    banner.innerHTML = `<span style="flex:1;">Editing a logged show for <b>${escAttr(h.name)}</b>${rec.venue?` — ${escAttr(rec.venue)}`:''}. Saving replaces it and recalculates EXP and Prestige.</span>
      <button type="button" class="secondary" id="cs_cancel_edit" style="margin:0;padding:4px 12px;">Cancel edit</button>`;
    card.insertBefore(banner, card.firstChild.nextSibling);
    const cx=banner.querySelector('#cs_cancel_edit');
    if(cx) cx.onclick=()=>cancelEditLogEntry();
  })();

  const csAddArt=card.querySelector('#cs_add_art');
  if(csAddArt) csAddArt.onclick=()=>{
    card.querySelector('#cs_artrows').insertAdjacentHTML('beforeend', artRowHTML("",1,true));
    recalcCsTotal();
  };
  card.addEventListener('click', ev=>{
    const rm=ev.target.closest && ev.target.closest('[data-art-remove]');
    if(!rm || !card.querySelector('#cs_artrows').contains(rm)) return;
    const row=rm.closest('[data-artrow]'); if(row) row.remove();
    recalcCsTotal();
  });
  card.addEventListener('input', recalcCsTotal);
  card.addEventListener('change', recalcCsTotal);
  card.addEventListener('click', ev=>{ if(ev.target.closest && ev.target.closest('.pill')) setTimeout(recalcCsTotal,0); });
  recalcCsTotal();

  card.querySelector('#cs_go').onclick=async()=>{
    // Replacing a logged show: reverse the original first.
    consumeEditedEntry();
    const hId=card.querySelector('#cs_horse').value;
    const h=state.horses.find(x=>x.id===hId);
    const disc=card.querySelector('#cs_disc').value;
    const venue=card.querySelector('#cs_venue').value.trim();
    const date=card.querySelector('#cs_date').value.trim();
    const placement=Number(card.querySelector('#cs_place').value)||null;
    const className=card.querySelector('#cs_class').value.trim();
    const note=card.querySelector('#cs_note').value.trim();
    const artRows=readArtRows(card);
    const litWords=parseInt(card.querySelector('#cs_lit')?.value)||0;
    const link=card.querySelector('#cs_link')?.value.trim()||"";
    const res=card.querySelector('#cs_result');
    res.innerHTML=`<div class="result">⏳ Saving…</div>`;

    let expGain=0;
    let nonPlacementExp=0;
    const sources=[];
    const discStats={};
    if(artRows.length){
      expGain+=artRowsExp(artRows); artRowsSources(artRows).forEach(x=>sources.push(x));
      const litExp=calcLitExp(litWords);
      if(litExp>0){expGain+=litExp; sources.push(`Lit ${litWords}w (+${litExp})`);}
      expGain+=1; sources.push(`Show Entry (+1)`);
      selectedBonuses.forEach(k=>{
      if(!BONUS_EXP[k]) return;
      if(k==="Additional Creature (per)"){
        const nEl=card.querySelector('#cs_creature_n');
        const n=Math.max(1, parseInt(nEl && nEl.value)||1);
        const add=BONUS_EXP[k]*n;
        expGain+=add; sources.push(`Additional Creature ×${n} (+${add})`);
      } else { expGain+=BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`); }
    });
      nonPlacementExp=expGain;
      const placeExp={1:4,2:3,3:2}[placement]||1;
      if(placement){expGain+=placeExp; sources.push(`Placement (+${placeExp})`);}
    }
    // Host-awarded bonus. Deliberately OUTSIDE the art block so EXP for an old
    // show can be recorded with no artwork attached.
    {
      const cbL=(card.querySelector('#cs_cb_label').value||'').trim();
      const cbE=parseInt(card.querySelector('#cs_cb_exp').value)||0;
      if(cbL && cbE>0){
        expGain+=cbE; nonPlacementExp+=cbE;
        sources.push(`${cbL} (+${cbE})`);
      } else if(cbL && !cbE){
        res.innerHTML=`<div class="result fail">Give the EXP bonus an amount, or clear the label.</div>`; return;
      } else if(!cbL && cbE>0){
        res.innerHTML=`<div class="result fail">Say what the EXP bonus is for.</div>`; return;
      }
      h.exp+=expGain;
      checkLevelUp(h);
      // Shows award EXP only — they do NOT add stats and do NOT count as training.
      // discStats stays empty so this record contributes zero stats on recompute.
    }

    let artLogId=null;
    let artSavePromise=Promise.resolve(true);
    if(artImage && artRows.length){
      artLogId=uid2();
      const artEntry={id:artLogId,day:state.log.length+1,type:"competition",label:`${disc}${venue?" — "+venue:""}`,
        placement,art:artRowsLabel(artRows),artMix:artRows,lit:litWords?`${litWords} words`:null,
        bonuses:[...selectedBonuses],exp:expGain,link:link||null,image:artImage,
        statsDelta:discStats,nonPlacementExp,discipline:disc};
      h.artLog.unshift(artEntry);
      artSavePromise = saveArtEntry(h, artEntry); // don't await yet — runs alongside saveHorse below
    }

    if(!h.compHistory) h.compHistory=[];
    const rec={
      id:uid2(), discipline:disc, difficulty:className, venue, date,
      placement, note, image:artImage||null, link:link||null,
      prizes:[...prizeImages], artLogId,
    };
    h.compHistory.unshift(rec);

    // Rider Prestige exactly as ticked in the form's Rider Prestige block.
    const csPick = csRPP.collect();
    if(csPick){
      const rider=state.riders.find(r=>r.id===csPick.riderId);
      if(rider){
        rec.featuredRiderId=rider.id;
        await grantRiderPPForEntry(rider, 'competition', rec, h, { pp:csPick.pp, sources:csPick.sources });
      }
    }

    const placeLabel=placement?["1st","2nd","3rd","4th","5th","6th"][placement-1]||placement+"th":"Participant";
    addLog(`${h.name} — ${disc}${venue?" at "+venue:""} · ${placeLabel}${expGain?` · +${expGain} EXP`:""}`);

    // FIX: previously fired without awaiting/checking, so a failed save
    // (oversized payload, network hiccup) never surfaced to the user —
    // the whole show record just quietly failed to persist. Also now runs
    // alongside the art log entry's save (above) instead of after it.
    const [entryOk, hOk] = await Promise.all([artSavePromise, saveHorse(h)]);
    await save();

    if(hOk && entryOk){
      res.innerHTML=`<div class="result success">✓ Show logged & saved!${expGain?` +${expGain} EXP (${sources.join(", ")})`:""} ${prizeImages.length?`${prizeImages.length} prize(s) saved.`:""}</div>`;
    } else {
      res.innerHTML=`<div class="result fail">⚠ Show was recorded here, but saving it to the database failed. Try again — if it keeps happening, sign out and sign back in (top of the page).<br><span class="small">(Open your browser's console — F12 or right-click → Inspect → Console — for the specific error, tagged "[EquiStories save failed]".)</span></div>`;
    }

    artImage=null; prizeImages.length=0;
    card.querySelector('#cs_art_preview').innerHTML='';
    card.querySelector('#cs_art_url').value='';
    ['#cs_venue','#cs_date','#cs_note','#cs_class','#cs_link'].forEach(s=>{ const el=card.querySelector(s); if(el)el.value=''; });
    card.querySelector('#cs_place').value='';
    if(card.querySelector('#cs_artrows')) card.querySelector('#cs_artrows').innerHTML=artRowHTML("",1,false);
    if(card.querySelector('#cs_cb_label')) card.querySelector('#cs_cb_label').value='';
    if(card.querySelector('#cs_cb_exp')) card.querySelector('#cs_cb_exp').value='';
    if(card.querySelector('#cs_lit')){ card.querySelector('#cs_lit').value=''; card.querySelector('#cs_lit_preview').textContent=''; }
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=>p.classList.remove('active'));
    refreshPrizeArea();
  };

  return wrap;
}

function buildShowHistory(){
  const wrap=el('div');

  // Claim a show ribbon: paste a code from EquiStories Shows to hang a ribbon on
  // the horse you entered. Uses the normal saveHorse path — same as a local show.
  // (Show results now live in the Hub's inbox — Messages tab. The claim itself
  //  still happens here, via ?claim=, because horses and the EXP model are here.)

  const claim=el('div');
  claim.style.cssText='margin-bottom:16px;padding:12px;border:1px solid var(--equi-line);border-radius:8px;background:var(--equi-ink);';
  claim.innerHTML=`
    <div class="small" style="color:var(--equi-dim);margin-bottom:6px;">Claim a show ribbon</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <input id="ribbon_claim_code" type="text" placeholder="Paste the claim code from a show" style="flex:1;min-width:220px;" />
      <button id="ribbon_claim_btn" class="btn">Add to horse</button>
    </div>
    <div id="ribbon_claim_msg" class="small" style="margin-top:6px;color:var(--equi-faint);"></div>`;
  wrap.appendChild(claim);
  claim.querySelector('#ribbon_claim_btn').onclick=async()=>{
    const msg=claim.querySelector('#ribbon_claim_msg');
    if(!bankAccount.linked || !bankAccount.userId){ msg.style.color='#b5533a'; msg.textContent='Sign in to your stable first — a show can only be added to a horse in the account that owns it.'; return; }
    const raw=(claim.querySelector('#ribbon_claim_code').value||'').trim();
    if(!raw){ msg.textContent='Paste a claim code first.'; return; }
    let data;
    try{
      const b64=raw.replace(/-/g,'+').replace(/_/g,'/');
      data=JSON.parse(decodeURIComponent(escape(atob(b64))));
    }catch(e){ msg.style.color='#b5533a'; msg.textContent='That code could not be read.'; return; }
    if(!data || data.v!==1 || !data.horseId || !data.rec){ msg.style.color='#b5533a'; msg.textContent='That is not a ribbon claim code.'; return; }
    const h=state.horses.find(x=>x.id===data.horseId);
    if(!h){ msg.style.color='#b5533a'; msg.textContent='That show is for a horse not in your stable. Are you signed into the right account?'; return; }
    msg.style.color='var(--equi-good)'; msg.textContent='Adding to '+h.name+'…';
    const out=await ingestShowRecord(h, data.rec);
    msg.style.color = out.ok ? 'var(--equi-good)' : '#b5533a';
    msg.textContent = out.msg;
    if(out.ok){ claim.querySelector('#ribbon_claim_code').value=''; showMode('history'); }
  };

// Add (or upgrade) one show record on a horse: files it in compHistory, logs the
// artwork the entrant already submitted, and awards its EXP. Shared by the paste
// box and the results inbox so both behave identically.
async function ingestShowRecord(h, incoming){
  if(!h || !incoming) return {ok:false, msg:'Nothing to add.'};
  {
    if(!h.compHistory) h.compHistory=[];

    const rec={...incoming};
    const incomingArt = rec.artImage || rec.image || null;
    const existing = h.compHistory.find(r=>r.id===rec.id);

    // Re-claiming is how a record gets UPGRADED. A show claimed with an older
    // code logged the placement but carried no artwork, so rejecting the second
    // claim outright left it permanently art-less. Instead: if the record is
    // already fully logged, say so; if the new code brings art the record is
    // missing, merge it in and log the piece.
    if(existing){
      if(existing.artLogId && (h.artLog||[]).some(e=>e.id===existing.artLogId)){
        return {ok:false, already:true, msg:'This show is already on '+h.name+', with its art logged.'};
      }
      if(!incomingArt){
        return {ok:false, already:true, msg:'This show is already on '+h.name+'. No artwork came with it — re-generate the claim code from the show results page to add the art.'};
      }
      // Fall through: merge the art onto the record already on the horse.
      Object.assign(existing, {
        artImage:incomingArt, image:existing.image||incomingArt,
        link:existing.link||rec.link||null,
        litUrl:rec.litUrl||existing.litUrl||null, litWords:Number(rec.litWords)||existing.litWords||0,
        artMix:rec.artMix||existing.artMix||null, artBonuses:rec.artBonuses||existing.artBonuses||null,
        artExp:Number(rec.artExp)||existing.artExp||0, artLabel:rec.artLabel||existing.artLabel||'',
      });
    }
    const target = existing || rec;

    // The entrant already submitted this artwork to the show, so log it here
    // rather than making them upload it a second time. Mirrors the manual
    // "Log a Show" flow: shows award EXP only and never add stats.
    const artImage = incomingArt;
    const artRows  = Array.isArray(target.artMix) ? target.artMix : [];
    let artEntry=null, expGain=0;
    if(artImage){
      const sources=[];
      if(artRows.length){
        const e=artRowsExp(artRows);
        if(e>0){ expGain+=e; sources.push(`${artRowsLabel(artRows)} (+${e})`); }
      } else if(Number(target.artExp)>0){
        // Older codes carry only a declared total.
        expGain+=Number(target.artExp); sources.push(`Art (+${Number(target.artExp)})`);
      }
      (target.artBonuses||[]).forEach(b=>{
        if(BONUS_EXP[b]){ expGain+=BONUS_EXP[b]; sources.push(`${b} (+${BONUS_EXP[b]})`); }
      });
      const litExp=calcLitExp(Number(target.litWords)||0);
      if(litExp>0){ expGain+=litExp; sources.push(`Lit ${target.litWords}w (+${litExp})`); }
      const nonPlacementExp=expGain;
      const placeExp = target.placement ? ({1:4,2:3,3:2}[target.placement]||1) : 0;
      if(placeExp>0){ expGain+=placeExp; sources.push(`Placement (+${placeExp})`); }

      artEntry={
        id:uid2(), day:state.log.length+1, type:"competition",
        label:`${target.discipline||'Show'}${target.venue?' — '+target.venue:''}`,
        placement:target.placement||null,
        art: artRows.length?artRowsLabel(artRows):(target.artLabel||'Show entry'),
        artMix: artRows.length?artRows:undefined,
        lit: target.litWords?`${target.litWords} words`:null,
        bonuses:[...(target.artBonuses||[])],
        exp:expGain, link:target.litUrl||target.link||null, image:artImage,
        statsDelta:{}, nonPlacementExp, discipline:target.discipline||'',
      };
      target.artLogId=artEntry.id;
      if(!h.artLog) h.artLog=[];
      h.artLog.unshift(artEntry);
      h.exp=(h.exp||0)+expGain;
      checkLevelUp(h);
    }

    if(!existing) h.compHistory.unshift(rec);
    const [ok, artOk] = await Promise.all([
      saveHorse(h),
      artEntry ? saveArtEntry(h, artEntry) : Promise.resolve(true),
    ]);
    await save();
    // Rider Prestige — same call the manual "Log a Show" flow makes, so a show
    // claimed from EquiStories Shows credits the rider exactly like one logged
    // by hand. The entrant chose the rider and ticked the art-based points when
    // they entered; the show-result points came from the final placement.
    let ppGain = 0, ppRider = null;
    if(ok && target.riderId){
      ppRider = state.riders.find(r=>r.id===target.riderId);
      if(ppRider){
        const srcs = Array.isArray(target.riderSources) ? target.riderSources : [];
        ppGain = Number(target.riderPP) || 0;
        if(ppGain > 0){
          try{
            await grantRiderPPForEntry(ppRider, 'competition', target, h, { pp:ppGain, sources:srcs });
          }catch(e){ console.warn('[EquiStories] rider PP failed:', e && e.message); ppGain = 0; }
        }
      }
    }

    if(ok && artOk){
      addLog(`${h.name} — ${target.discipline||'Show'}${target.venue?' at '+target.venue:''} · ${target.difficulty||'Entered'}${expGain?` · +${expGain} EXP`:''}${ppGain?` · ${ppRider.name} +${ppGain} PP`:''}`);
      const ppNote = ppGain ? ` ${ppRider.name} earned +${ppGain} PP.` : '';
      return {ok:true, exp:expGain, pp:ppGain, msg: artEntry
        ? `${existing?'Artwork added to':'Added to'} ${h.name} — show, placing and artwork logged${expGain?` (+${expGain} EXP)`:''}.${ppNote}`
        : `Added to ${h.name}'s record.${ppNote}`};
    } else {
      // Roll the whole claim back so a failed save can't leave half of it behind.
      if(!existing) h.compHistory=h.compHistory.filter(r=>r.id!==rec.id);
      else delete existing.artLogId;
      if(artEntry){
        h.artLog=(h.artLog||[]).filter(e=>e.id!==artEntry.id);
        h.exp=(h.exp||0)-expGain;
        checkLevelUp(h);
      }
      return {ok:false, msg:'Could not save. Try again.'};
    }
  }
}

  state.horses.forEach(h=>{
    const history=h.compHistory||[];
    if(!history.length) return;
    const trophies=history.filter(c=>c.placement>=1&&c.placement<=3);
    const allPrizeImages=trophies.flatMap(c=>(c.prizes||[]).map(p=>({...p, discipline:c.discipline, placeStr:["1st","2nd","3rd"][c.placement-1]})));
    const card=el('div','card');

    const ribbonWallHtml=allPrizeImages.length?`
      <div style="margin-bottom:14px;">
        <div class="small" style="margin-bottom:6px;color:var(--equi-dim);">Ribbon Wall</div>
        <div style="display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;">
          ${allPrizeImages.map(p=>`<img src="${p.dataUrl}" style="width:280px;height:280px;object-fit:contain;cursor:zoom-in;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||(p.discipline+' — '+p.placeStr))}')" onerror="this.style.display='none'" />`).join("")}
        </div>
      </div>`:
      `<div class="small" style="color:var(--equi-faint);margin-bottom:10px;">No top-3 placements yet.</div>`;

    card.innerHTML=`
      <h3>${h.name}
        <span class="tag">${history.length} shows</span>
        <span class="tag" style="background:rgba(201,138,58,.15);color:var(--equi-accent);border-color:var(--equi-accent);">${trophies.length} </span>
      </h3>
      ${ribbonWallHtml}
      <div class="small" style="margin-bottom:6px;color:var(--equi-dim);">Full Show History</div>
      <div class="artlog-panel" style="max-height:400px;">
        ${history.map(c=>{
          const pl=c.placement;
          const icon=pl===1?"":pl===2?"":pl===3?"":pl?"":"";
          const placeLabel=pl?["1st","2nd","3rd","4th","5th","6th"][pl-1]||pl+"th":"Participant";
          const prizes=c.prizes||[];
          return `<div class="artlog-entry">
            <div style="display:flex;gap:8px;align-items:flex-start;">
              ${c.image?`<img src="${c.image}" class="artlog-thumb" style="cursor:zoom-in;" onclick="openLightbox('${jsStr(c.image)}','${jsStr(c.discipline)}')" onerror="this.style.display='none'" />`:""}
              <div style="flex:1;">
                ${icon} <b>${c.discipline}</b>${c.difficulty?` — ${c.difficulty}`:""} <span class="tag">${placeLabel}</span>
                ${c.venue?`<div class="small">${c.venue}${c.date?` · ${c.date}`:""}</div>`:(c.date?`<div class="small">${c.date}</div>`:"")}
                ${c.note?`<div class="small" style="opacity:.8;">${c.note}</div>`:""}
                ${prizes.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
                  ${prizes.map(p=>`<div style="text-align:center;">
                    <img src="${p.dataUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--equi-line);cursor:zoom-in;display:block;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||'Prize')}')" onerror="this.style.display='none'" />
                  </div>`).join("")}
                </div>`:""}
                <button data-act="edit-show" data-hid="${h.id}" data-cid="${c.id}" class="secondary" style="font-size:.96em;padding:2px 7px;margin-top:6px;">Edit Placement / Prizes</button>
                <button data-act="toggle-featured-comp" data-hid="${h.id}" data-cid="${c.id}" class="secondary" style="font-size:.96em;padding:2px 7px;margin-top:6px;color:${c.featuredRiderId?'var(--equi-accent-2)':''};" title="${c.featuredRiderId?'Rider featured — grants PP. Click to remove.':'Grant the horse\\u2019s rider PP for this show'}">${c.featuredRiderId?'★ Rider PP':'☆ Rider PP'}</button>
                <button data-act="del-show" data-hid="${h.id}" data-cid="${c.id}" class="secondary" style="font-size:.96em;padding:2px 7px;margin-top:6px;">✕ Remove</button>
              </div>
            </div>
          </div>`;
        }).join("")}
      </div>
    `;
    wrap.appendChild(card);
  });

  if(!state.horses.some(h=>(h.compHistory||[]).length)){
    wrap.innerHTML='<div class="card small">No shows logged yet — use Log a Show to add your first record.</div>';
  }

  wrap.querySelectorAll('[data-act="del-show"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this show record? This will reverse its EXP and stat gains.')) return;
    const h=state.horses.find(x=>x.id===b.dataset.hid);
    if(h){ removeRiderPPForSource(b.dataset.cid); deleteCompRecord(h, b.dataset.cid); }
  });
  wrap.querySelectorAll('[data-act="toggle-featured-comp"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.hid); if(!h) return;
    const src=(h.compHistory||[]).find(r=>r.id===b.dataset.cid);
    if(src) toggleRiderFeatured(h, src, 'competition');
  });
  wrap.querySelectorAll('[data-act="edit-show"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.hid);
    if(h) showEditCompModal(h, b.dataset.cid);
  });

  return wrap;
}

function showEditCompModal(h, recId){
  const rec=(h.compHistory||[]).find(r=>r.id===recId);
  if(!rec) return;
  const newPrizes=[];

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:24px;max-width:480px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);margin:auto;">
    <h3 style="margin-top:0;color:var(--equi-accent);">Edit Show — ${rec.discipline}${rec.venue?` (${rec.venue})`:""}</h3>
    <label>Placement</label>
    <select id="ec_place" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;box-sizing:border-box;margin-bottom:10px;">
      <option value="">— Not yet judged / no placement —</option>
      ${["1st","2nd","3rd","4th","5th","6th"].map((l,i)=>`<option value="${i+1}" ${rec.placement===i+1?"selected":""}>${l}</option>`).join("")}
    </select>
    <label>Add Prize Photo URL(s)</label>
    <p class="small" style="margin:2px 0 6px;color:var(--equi-dim);">Paste a direct image link, click Add, repeat for more. See the note at the top of the page for how to get one.</p>
    <div style="display:flex;gap:6px;margin-bottom:6px;">
      <input type="text" id="ec_prize_url" placeholder="https://…jpg / .png / .gif" style="flex:1;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;box-sizing:border-box;" />
      <button id="ec_prize_add" style="padding:7px 14px;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);border-radius:5px;cursor:pointer;">Add</button>
    </div>
    <div id="ec_prize_preview" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;"></div>
    ${rec.artLogId?`<p class="small" style="color:var(--equi-dim);">This show has art logged — changing the placement will recalculate its EXP and your horse's stats/level.</p>`:`<p class="small" style="color:var(--equi-dim);">No art was logged for this show, so there's no EXP to recalculate — this just updates the record.</p>`}
    <button id="ec_save" style="margin-top:8px;width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;">Save</button>
    <button id="ec_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:10px;border-radius:6px;cursor:pointer;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#ec_prize_add').onclick=()=>{
    const inp=overlay.querySelector('#ec_prize_url');
    const url=inp.value.trim();
    if(!url) return;
    newPrizes.push({dataUrl:url, label:""});
    inp.value='';
    overlay.querySelector('#ec_prize_preview').innerHTML=newPrizes.map(p=>prizeThumbHTML(p.dataUrl)).join("");
  };

  overlay.querySelector('#ec_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#ec_save').onclick=async()=>{
    const newPlacement=Number(overlay.querySelector('#ec_place').value)||null;
    rec.placement=newPlacement;
    if(newPrizes.length) rec.prizes=[...(rec.prizes||[]), ...newPrizes];

    let entryOk = true;
    if(rec.artLogId){
      const entry=(h.artLog||[]).find(x=>x.id===rec.artLogId);
      if(entry && entry.nonPlacementExp!==undefined){
        entry.placement=newPlacement;
        const placeExp = newPlacement ? ({1:4,2:3,3:2}[newPlacement]||1) : 0;
        entry.exp = entry.nonPlacementExp + placeExp;
        // FIX: this updated the in-memory art log entry, but saveHorse()
        // never touches the ArtLog sheet — without resaving the entry
        // itself, the new EXP/placement only lived until the next reload.
        entryOk = await saveArtEntry(h, entry);
      }
    }
    recomputeHorse(h);
    addLog(`Updated show record for ${h.name} — ${rec.discipline}.`);
    const ok = await saveHorse(h) && entryOk;
    await save();
    overlay.remove();
    render();
    if(!ok) alert(`The edit was applied here, but saving it to the database failed. Try again — if it keeps happening, sign out and sign back in (top of the page).`);
  };
}


function renderArtLog(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse first.</div>'; return wrap; }

  state.horses.forEach(h=>{
    if(!h.artLog.length) return;
    const card=el('div','card');
    card.innerHTML=`<h3>${h.name} <span class="tag">Lvl ${h.level}</span> <span class="tag">${h.artLog.length} entries</span></h3>
    <div class="artlog-panel" style="max-height:400px;">
      ${h.artLog.map(e=>{
        const placeLabel=e.placement?["1st","2nd","3rd","4th","5th","6th"][e.placement-1]||"":null;
        return `<div class="artlog-entry">
          <div style="display:flex;gap:10px;align-items:flex-start;">
            ${e.image?`<img src="${e.image}" class="artlog-thumb" style="flex:none;" />`:""}
            <div style="flex:1;">
              <b>${e.label}</b>
              ${placeLabel?`<span class="tag">${placeLabel}</span>`:""}
              <span class="tag" style="background:rgba(122,155,110,.15);color:var(--equi-good);border-color:var(--equi-good);">+${e.exp} EXP</span>
              <span data-act="edit-training" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:var(--equi-accent);font-size:.92em;margin-left:6px;font-weight:bold;" title="Edit this entry (image, art type, link, rider PP)">${e.featuredRiderId?'\u2605 ':''}Edit</span><span data-act="delete-artlog" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:var(--equi-rust);font-size:.92em;margin-left:6px;font-weight:bold;" title="Delete this entry (reverses its EXP/stats)">✕ Delete</span>
              ${e.link?`<a href="${e.link}" target="_blank" class="artlog-link" style="font-size:1em;margin-left:4px;"></a>`:""}
              <div class="small" style="margin-top:2px;">${[e.art,e.lit,...(e.bonuses||[])].filter(Boolean).join(" · ")}</div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
    wrap.appendChild(card);
  });

  if(!state.horses.some(h=>h.artLog.length)){
    wrap.innerHTML='<div class="card small">No art logged yet — use the Training or Competitions tabs to add entries.</div>';
  }

  wrap.querySelectorAll('[data-lightbox]').forEach(img=>{
    img.onclick=e=>{ e.stopPropagation(); openLightbox(img.dataset.lightbox, img.dataset.caption); };
  });
  wrap.querySelectorAll('[data-act="edit-training"]').forEach(b=>b.onclick=()=>{
    beginEditLogEntry(b.dataset.id, b.dataset.entry);
  });
  wrap.querySelectorAll('[data-act="delete-artlog"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.id);
    if(!h) return;
    if(!confirm('Delete this log entry? This will reverse its EXP and stat gains.')) return;
    deleteArtLogEntry(h, b.dataset.entry);
  });

  return wrap;
}

    if(!name){ alert("Give the tack item a name first!"); return; }
    const cat=form.querySelector('#tk_cat').value;
    const stats={};
    STATS.forEach(s=>{
      const v=Number(form.querySelector(`#tk_stat_${s}`).value)||0;
      if(v!==0) stats[s]=v;
    });
    const item={ id:uid2(), name, category:cat, image:tackImage, stats };
    const exp=Number(form.querySelector('#tk_exp').value)||0;
    const setId=form.querySelector('#tk_set').value||null;
    if(exp) item.exp=exp;
    if(setId) item.setId=setId;
    if(!state.tackInventory) state.tackInventory=[];
    state.tackInventory.push(item);
    addLog(`Added "${name}" (${cat}) to the tack inventory.`);
    tackImage=null;
    await save(); render();
  };

  const inv = state.tackInventory||[];

  // ── SET BONUSES editor: named groups of items that grant an extra bonus
  //    when ALL their members are depicted together in one submission. ──
  const setsCard=el('div','card');
  const setsList=(state.tackSets||[]).map(set=>{
    const members=inv.filter(it=>it.setId===set.id);
    const b=set.bonus||{};
    const bstr=[...Object.entries(b.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]||s}`),
                b.exp?`+${b.exp} EXP`:''].filter(Boolean).join(" · ");

      </div>
      <div class="small" style="margin-top:4px;">Bonus when all worn together: <b style="color:var(--good);">${bstr||'none set'}</b></div>

    <p class="small" style="margin-top:0;">Create a named set (e.g. "Dressage Set"), give it a bonus, then assign items to it via the <b>Part of a set?</b> dropdown when adding tack. When a submission depicts <b>every</b> item in a set, the set bonus applies on top of the individual pieces.</p>
    ${setsList||'<div class="small" style="opacity:.7;margin-bottom:8px;">No sets yet.</div>'}
    <div style="border-top:1px solid var(--equi-line);margin-top:8px;padding-top:10px;">
      <label>New set name</label>
      <input id="set_name" placeholder="e.g. Winter Driving Set" style="max-width:320px;" />
      <div class="row" style="margin-top:8px;">
        ${STATS.map(s=>`<div style="min-width:78px;"><label style="font-size:.9em;">${STAT_LABELS[s]}</label><input type="number" id="set_stat_${s}" value="0" style="padding:4px 6px;" /></div>`).join("")}
      </div>
      <div class="row" style="margin-top:8px;">
        <div style="min-width:120px;"><label>Set EXP</label><input type="number" id="set_exp" value="0" style="padding:4px 6px;" /></div>
      </div>
      <button id="set_add" style="margin-top:10px;">+ Create Set</button>
    </div>`;
  wrap.appendChild(setsCard);

  setsCard.querySelector('#set_add').onclick=async()=>{
    const name=setsCard.querySelector('#set_name').value.trim();
    if(!name){ alert("Name the set first."); return; }
    const bstats={};
    STATS.forEach(s=>{ const v=Number(setsCard.querySelector(`#set_stat_${s}`).value)||0; if(v!==0) bstats[s]=v; });
    const bonus={ stats:bstats,
      exp:Number(setsCard.querySelector('#set_exp').value)||0 };
    if(!state.tackSets) state.tackSets=[];
    state.tackSets.push({ id:'set_'+Math.random().toString(36).slice(2,9), name, bonus });
    addLog(`Created tack set "${name}".`);
    await saveGlobalBreeds(); await save(); render();
  };
  setsCard.querySelectorAll('[data-act="del-set"]').forEach(b=>b.onclick=async()=>{
    if(!confirm('Delete this set? Items keep their individual bonuses; they just lose the set link.')) return;
    const id=b.dataset.id;
    state.tackSets=(state.tackSets||[]).filter(x=>x.id!==id);
    (state.tackInventory||[]).forEach(it=>{ if(it.setId===id) delete it.setId; });
    await saveGlobalBreeds(); await save(); render();
  });

  const invCard=el('div','card');
  invCard.innerHTML=`<h3>Owned Tack (${inv.length})</h3>`;
  if(!inv.length){
    invCard.innerHTML+=`<div class="small">No tack added yet.</div>`;
  } else {
    const grid=el('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px;';
    inv.forEach(item=>{
      const statsStr=Object.entries(item.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
      const extra=[];
      if(item.exp) extra.push(`+${item.exp} EXP`);
      const setName = item.setId ? (state.tackSets||[]).find(x=>x.id===item.setId) : null;
      const div=el('div');
      div.style.cssText='background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:8px;padding:8px;text-align:center;';
      div.innerHTML=`
        ${item.image?`<img src="${item.image}" style="width:100%;height:90px;object-fit:cover;border-radius:5px;" />`:`<div style="height:90px;display:flex;align-items:center;justify-content:center;font-size:2em;color:var(--equi-line);"></div>`}

        <div class="small">${item.category}</div>
        ${statsStr?`<div class="small" style="color:var(--good);margin-top:2px;">${statsStr}</div>`:""}
        ${extra.length?`<div class="small" style="color:var(--accent,#d29a3e);margin-top:2px;">${extra.join(" · ")}</div>`:""}
        ${setName?`<div class="small" style="color:var(--equi-accent-2);margin-top:2px;">◈ ${escAttr(setName.name)} set</div>`:""}
        <button class="danger" data-act="del-tack" data-id="${item.id}" style="font-size:.96em;padding:3px 8px;margin-top:6px;">Remove</button>
      `;
      grid.appendChild(div);
    });
    invCard.appendChild(grid);
  }
  wrap.appendChild(invCard);

  invCard.querySelectorAll('[data-act="del-tack"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this tack item from inventory? It will be unequipped from any horses wearing it.')) return;
    state.tackInventory=(state.tackInventory||[]).filter(t=>t.id!==b.dataset.id);
    const affectedIds=[];
    state.horses.forEach(h=>{
      if((h.tackEquipped||[]).includes(b.dataset.id)) affectedIds.push(h.id);
      h.tackEquipped=(h.tackEquipped||[]).filter(id=>id!==b.dataset.id);
    });
    save(affectedIds); render();
  });

  // --- Rider attire lives here too: one Inventory tab for tack + attire ---
  const hr=el('div'); hr.style.cssText='border-top:1px solid var(--equi-line);margin:22px 0 4px;';
  wrap.appendChild(hr);
  wrap.appendChild(renderAttireInventory());

  return wrap;
}

let editingBreedId = null;
let editingGeneId = null;
let editingMarkingId = null;
let editingMutationId = null;

// ── Breed genetics requests (submitted from the hub) ────────────────────────
// Founders describe the genetics they want; these show up in the Admin area so
// you can read a request, click "Build this" to pre-fill the breed editor, then
// mark it done. The master gene list lives here, not in the hub, so it can't
// drift — the hub only sends a request.
async function loadGeneticsRequests(){
  try{
    const DB = await waitForDB();
    if(!DB || !window.EquiDB.listAll) return [];
    const all = await window.EquiDB.listAll('breedGeneticsRequests');
    return (all||[]).filter(r=>r && r.status);
  }catch(e){ console.warn('[Admin] genetics requests load failed:', e && e.message); return []; }
}

async function setGeneticsRequestStatus(reqId, ownerId, status, adminNote){
  try{
    const DB = await waitForDB();
    if(!DB) return false;
    const rec = await window.EquiDB.get('breedGeneticsRequests', reqId);
    if(!rec) return false;
    rec.status = status;
    rec.adminNote = adminNote || '';
    rec.decidedAt = new Date().toISOString();
    return await window.EquiDB.put('breedGeneticsRequests', reqId, ownerId || rec.owner, rec);
  }catch(e){ console.error('[Admin] set request status failed:', e); return false; }
}

function grCssEsc(s){ return String(s).replace(/[^a-zA-Z0-9_-]/g,'\\$&'); }

async function renderGeneticsRequests(container){
  if(!container) return;
  const reqs = await loadGeneticsRequests();
  const pending = reqs.filter(r=>r.status==='pending');
  if(!pending.length){ container.innerHTML =
    `<p class="small" style="opacity:.7;margin:0;">No pending breed genetics requests.</p>`; return; }

  container.innerHTML = `<h3 style="margin:0 0 8px;">Pending breed genetics requests (${pending.length})</h3>`
    + pending.map(r=>`
      <div style="border:1px solid var(--equi-line);border-radius:8px;padding:12px;margin-bottom:10px;background:var(--equi-ink);">
        <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;">
          <b style="color:var(--accent,#d29a3e);font-size:1.05em;">${escAttr(r.breedName||'(unnamed breed)')}</b>
          <span class="small" style="opacity:.6;">by ${r.owner?memberLink(r.owner):'?'} · ${String(r.submittedAt||'').slice(0,10)}</span>
        </div>
        <div class="small" style="margin:8px 0;white-space:pre-wrap;">${escAttr(r.desc||'')}</div>
        ${r.special?`<div class="small" style="margin:6px 0;"><b>Special:</b> ${escAttr(r.special)}</div>`:''}
        ${r.ref?`<div class="small" style="margin:6px 0;"><a href="${escAttr(r.ref)}" target="_blank" rel="noopener">Reference →</a></div>`:''}
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
          <button data-build="${escAttr(r.breedName||'')}" style="min-height:0;padding:7px 14px;">Build this ↓</button>
          <button data-done="${escAttr(r.id)}" data-owner="${escAttr(r.owner||'')}" style="min-height:0;padding:7px 14px;">Mark done</button>
          <button data-decline="${escAttr(r.id)}" data-owner="${escAttr(r.owner||'')}" style="min-height:0;padding:7px 14px;background:#5a2020;">Decline</button>
        </div>
        <div class="small" data-msg="${escAttr(r.id)}" style="margin-top:6px;min-height:1em;"></div>
      </div>`).join("");

  container.querySelectorAll('[data-build]').forEach(b=>b.onclick=()=>{
    const nameField = document.getElementById('ad_breed_name');
    if(nameField){ nameField.value = b.dataset.build; nameField.scrollIntoView({behavior:'smooth',block:'center'}); nameField.focus(); }
  });
  container.querySelectorAll('[data-done]').forEach(b=>b.onclick=async()=>{
    const note = prompt("Mark this request done. Optional note back to the founder:", "");
    if(note===null) return;
    const msg = container.querySelector(`[data-msg="${grCssEsc(b.dataset.done)}"]`);
    if(msg) msg.textContent='Saving…';
    await setGeneticsRequestStatus(b.dataset.done, b.dataset.owner, 'done', note);
    renderGeneticsRequests(container);
  });
  container.querySelectorAll('[data-decline]').forEach(b=>b.onclick=async()=>{
    const note = prompt("Decline this request. Optional reason for the founder:", "");
    if(note===null) return;
    await setGeneticsRequestStatus(b.dataset.decline, b.dataset.owner, 'declined', note);
    renderGeneticsRequests(container);
  });
}

// A couple of Rare Markings only make sense on top of a specific base
// gene — Bloodmark is documented as a marking that only shows up on grey
// horses, and the Peacock Appaloosa Mutation only occurs on Leopard
// Complex (Lp) horses. Rather than letting them be picked on a horse that
// can't carry them, they're filtered out of the marking picker unless the
// prerequisite gene is present. Keyed by marking label -> the locus and
// the set of allele codes at that locus that satisfy the requirement.
const MARKING_GENE_REQUIREMENTS = {
  "Bloodmark": {locus:"grey", codes:["Gg","GG"]},
  "Peacock Appaloosa Mutation": {locus:"leopard", codes:["Lplp","LpLp"]},
};
// hasCodeFn(locus, code) -> boolean; callers supply different lookups
// depending on whether they have live selections (the Add-a-Horse form)
// or only a saved horse's genotype string (the Net Worth modal).
function markingMeetsGeneRequirement(label, hasCodeFn){
  const req = MARKING_GENE_REQUIREMENTS[label];
  if(!req) return true;
  return req.codes.some(c=>hasCodeFn(req.locus, c));
}

// ── Legacy genotype spellings ──────────────────────────────────────────────
// Carriers used to be written with an "n" (null) prefix: nSb, nSpl, nF, nLp,
// and tobiano used TOto/TOTO. That broke the Punnett math, because splitting
// "nSpl" yields the alleles n + Spl, so two nulls spelled themselves "nn"
// instead of "splspl". Codes are now written the standard way — CAPITAL+
// lowercase for a single allele (Sbsb, Splspl, Ff, Lplp, Toto), CAPITAL
// CAPITAL for homozygous. Horses and breed configs saved before this change
// still hold the old spelling, so everything READ from storage is mapped
// through normGeno() first. Nothing needs re-entering by hand.
const LEGACY_GENO_CODES = {
  nSb:"Sbsb", nSpl:"Splspl", nF:"Ff", nLp:"Lplp", TOto:"Toto", TOTO:"ToTo",
  // Cream & Pearl carriers, renamed to the standard CAPITAL+lowercase form.
  nCr:"Crcr", nPrl:"Prlprl"
};
function normGeno(code){
  if(!code) return code;
  return LEGACY_GENO_CODES[code] || code;
}
function normGenoList(arr){ return Array.isArray(arr) ? arr.map(normGeno) : arr; }

const GENETIC_LOCI = [
  { key:"extension", label:"Extension (E) — base pigment", base:true,
    options:[
      {code:"EE", desc:"Black-based"},
      {code:"Ee", desc:"Black-based (carries red)"},
      {code:"ee", desc:"Red-based / Chestnut"},
    ]},
  // Dominance hierarchy: A+ (wild-type) > A (bay) > At (seal bay) > a (black).
  // A+ is the "wild" allele — on chestnut (ee) it's silent (just Chestnut, same
  // as if it weren't there at all — see computeBaseColor), but on any
  // black-based horse (EE/Ee) it produces Wild Bay, the base of the whole
  // "wild chain" (Wild Buckskin = Wild Bay + Cream, Wild Amber Champagne =
  // Wild Bay + Champagne, etc. — every dilution that normally acts on Bay
  // acts the same way on Wild Bay, just tagged "Wild").
  { key:"agouti", label:"Agouti (A) — distributes black", base:true, requiresAny:{extension:["EE","Ee","ee"]},
    // Agouti is the most versatile locus: four alleles at ONE locus, in the
    // dominance order A+ (wild) > A (bay) > At (seal/liver) > a. At is a
    // dominant Liver allele — AtAt gives the very dark "black" chestnut,
    // while one At alongside ANY other agouti allele gives liver chestnut
    // (Ata, AtA, A+At, Atat). "at" is just the lowercase (absent) spelling
    // of At, so it means the same as "a" — hence Atat and Ata are the same
    // horse. Aliasing it keeps crosses from breeding nonsense like "atat".
    alleles:["A+","A","At","a"],
    alleleAliases:{ at:"a" },
    options:[
      {code:"A+A+", desc:"Chestnut / Wild Bay (homozygous)"},

  // Cream and Pearl are not two genes — they are two alleles of the SAME locus
  // (MATP / SLC45A2), alongside the non-dilute wild-type "n". A horse carries
  // exactly two of {Cr, Prl, n}, which is why "one Cream AND two Pearls" can
  // never occur. The six real genotypes (n written first on single alleles):
  //
  //   nn      no dilution
  //   nCr     one Cream   — Palomino / Buckskin / Smoky Black

    // Cream and Pearl are two alleles of ONE locus, alongside the non-dilute

    alleles:["Cr","Prl","n"],

    pairCode:{ "n+n":"nn", "Cr+n":"Crcr", "Prl+n":"Prlprl",

    options:[
