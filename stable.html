// Custom genes are defined by affiliates via Admin > Custom Genes, stored in
// state.customGenes as {id, key, label, options:[{code,desc,price}]}. This
// wraps each one in the same shape as an entry in GENETIC_LOCI (a simple
// optional locus, no requiresAny/base flags) so every place that reads
// GENETIC_LOCI can instead read allLoci() and treat built-in and custom
// genes identically — same gene grid, same Net Worth pricing, same breed
// attach/detach checkboxes.
function customGeneLoci(){
  return (state.customGenes||[]).map(g=>({
    key: g.key,
    label: `${g.label} — Custom Gene`,
    isCustomGene: true,
    options: g.options,
  }));
}
function allLoci(){
  return [...GENETIC_LOCI, ...customGeneLoci()];
}

// ============================================
// GENE MUTATIONS / OVERRIDES
// A mutation extends an existing base gene (e.g. Roan) with extra allele
// options, but ONLY for horses of one specific Custom/Created breed — it
// doesn't get its own gene-cell, it just adds rows to the base gene's
// dropdown once that breed is selected. Built-ins live in
// BUILTIN_MUTATIONS below; affiliate-defined ones live in
// state.customMutations, added via Admin > Gene Mutations/Overrides.
// Shape: {id, breedName (lowercased Custom/Created breed name), locusKey
// (which GENETIC_LOCI key it extends), label, options:[{code,desc,price}]}
// ============================================
// Built-in mutations (Sealspot Roan, Restricted Dapple, Tiger Dun) removed
// for testing — add them back yourself via Admin > Gene Mutations/Overrides
// to confirm the extend-an-existing-gene pipeline still works end-to-end.
const BUILTIN_MUTATIONS = [];
function allMutations(){
  return [...BUILTIN_MUTATIONS, ...(state.customMutations||[])];
}
function mutationsFor(breed, locusKey){
  const key=(breed||"").trim().toLowerCase();
  if(!key) return [];
  return allMutations().filter(m=>m.locusKey===locusKey && (m.breedName||"").trim().toLowerCase()===key);
}
// Returns a locus's normal option list, plus any extra allele rows added
// by mutations attached to this specific breed — this is what should
// always be read from (instead of locus.options directly) anywhere a
// gene-cell's dropdown is built or a selected code needs to be resolved
// back to a description/price, so overrides show up transparently.
function breedLociFor(breed){
  const key=(breed||"").trim().toLowerCase();
  const custom=(state.customBreeds||[]).find(b=>(b.name||"").trim().toLowerCase()===key);
  return custom ? custom.loci : breedLociList(BREED_GENETICS[key]);
}

function getLocusOptions(locus, breed){
  const muts=mutationsFor(breed, locus.key);
  let options = muts.length ? [...locus.options, ...muts.flatMap(m=>m.options.map(o=>({...o})))] : locus.options;
  // Cream and Pearl share the "creampearl" locus, but many breeds carry only
  // one of them (Andalusians have Pearl and no Cream; Appaloosas the reverse).
  // Hide any genotype needing an allele the breed cannot have.
  if(locus.key==="creampearl"){
    const list=breedLociFor(breed);
    const hasCream = !list || list.includes("cream") || list.includes("creampearl");
    const hasPearl = !list || list.includes("pearl") || list.includes("creampearl");
    options = options.filter(o=>{
      if(/Cr/.test(o.code)  && !hasCream) return false;
      if(/Prl/.test(o.code) && !hasPearl) return false;
      return true;
    });
  }
  const restrictions=getAlleleRestrictions(breed);
  const allowedCodes=restrictions && restrictions[locus.key];
  if(allowedCodes) options = options.filter(o=>allowedCodes.includes(o.code));
  return options;
}

// Generates a unique, storage-safe key for a new custom gene from its
// display name (e.g. "Glimmer Coat (Gl)" -> "custom_glimmer_coat_gl"),
// avoiding collisions with built-in loci keys or other custom genes.
function slugifyGeneKey(label, existingGenes){
  const base = 'custom_' + (label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || 'gene');
  const taken = new Set([...GENETIC_LOCI.map(l=>l.key), ...(existingGenes||[]).map(g=>g.key)]);
  let key = base, n = 1;
  while(taken.has(key)){ n++; key = `${base}_${n}`; }
  return key;
}

function computeAppaloosaPattern(lp, patn1, patn2){
  const hasP1  = patn1 && patn1!=="patn1patn1";
  const hasP2  = patn2 && patn2!=="patn2patn2";
  const p2Homo = patn2==="PATN2PATN2";
  if(!lp || lp==="lplp") return null;
  if(lp==="LpLp"){
    if(p2Homo) return {label:"Snowcap Appaloosa", price:500};
    if(hasP1)  return {label:"Fewspot Appaloosa", price:500};
    return {label:"Varnish Appaloosa", price:900};
  }
  if(hasP1 && hasP2) return {label:"SemiLeopard Appaloosa", price:700};
  if(hasP1) return {label:"Leopard Appaloosa", price:700};
  if(hasP2) return {label:"Spotted Blanket Appaloosa", price:700};
  return {label:"Snowflake Appaloosa", price:900};
}

function computeBaseColor(extension, agouti){
  const blackBased = extension==="EE" || extension==="Ee";
  const a = agouti==="AAt" ? "AA" : agouti;
  // AtA, Ata, and Atat are all het/mixed At combinations — their allele
  // descriptions all read "Liver Chestnut / Seal Bay", so all three
  // resolve the same way here. Only AtAt (homozygous At) is the darker
  // "Black Chestnut / Seal Bay" tier.
  const sealBay = ["AtA","Ata","Atat"];
  // A+ is dominant over everything else at this locus, so any genotype
  // carrying it resolves to Wild Bay on a black-based horse. A+At still
  // carries one copy of At, which keeps darkening a *chestnut* coat (At's
  // only visible effect off black) — so that's the one wild-bay genotype
  // that isn't a plain Chestnut when extension is ee.
  const wildBay = ["A+A+","A+A","A+At","A+a"];
  if(wildBay.includes(a)){
    if(!blackBased) return a==="A+At" ? {label:"Liver Chestnut", price:600} : {label:"Chestnut", price:700};
    return {label:"Wild Bay", price:500};
  }

  if(!blackBased){
    if(a==="AtAt") return {label:"Black Chestnut", price:600};
    if(sealBay.includes(a)) return {label:"Liver Chestnut", price:600};
    return {label:"Chestnut", price:700};
  }
  if(a==="AtAt" || sealBay.includes(a)) return {label:"Seal Bay", price:600};
  if(a==="aa") return {label:"Black", price:500};
  return {label:"Bay", price:500};
}

// Sooty and Pangare are both well-documented as invisible on black-based
// coats (they only affect red pigment), so breeds fixed to solid black
// don't get them. Pangare is also specifically documented as much less
// common in refined "hot-blooded" and sport/warmblood breeds, and very
// common in ponies, drafts, and primitive-leaning breeds — so it's
// included/excluded per breed below rather than blanket-applied to all.
// Sources: Wikipedia (Pangaré, Sooty), TheEquinest, AQHA, Horse Reality Wiki.
//
// A breed entry can be a plain array of extra locus keys, OR an object
// { loci:[...], fixedExtension:"ee", fixedAgouti:"AA" } for breeds that
// are fixed to one base color (e.g. Friesian is always black, Haflinger
// is always chestnut) — see getFixedBase().
const BREED_GENETICS = {
  "thoroughbred":    ["sooty","grey","roan","sabino1"],
  "quarter horse":   ["sooty","pangare","cream","dun","tobiano","sabino1","splash","frame","roan","grey","pearl"],
  "paint":           ["sooty","pangare","cream","tobiano","sabino1","splash","frame","roan","grey","pearl"],
  "appaloosa":       ["sooty","pangare","cream","leopard","patn1","patn2","roan","sabino1","grey"],
  "knabstrupper":    ["sooty","pangare","leopard","patn1","patn2","grey"],
  "arabian":         ["sooty","grey","sabino1"],
  // Friesians are overwhelmingly black (KFPS studbook requires homozygous
  // black, EE, to fully register), but real bay/chestnut ("Fire Friesian")
  // lines do exist as a rarer separately-registered variant. Rather than
  // locking the breed to black only, Extension/Agouti are left open here —
  // a flavor note nudges toward black being the norm without blocking fun.
  "friesian":        ["sooty","flaxen"],
  // Haflingers can't carry the black gene at all — Extension is fixed to
  // ee (chestnut-based) — but every Agouti genotype is still selectable;
  // since Agouti only visibly expresses on black-based horses anyway, all
  // of those combinations phenotype out to the three chestnut shades
  // (Chestnut / Liver Chestnut / Black Chestnut) via computeBaseColor.
  // They're also always flaxen — every registered Haflinger carries at
  // least one Flaxen allele — so "No Flaxen" is excluded here via
  // alleleRestrictions rather than left as a pickable (but wrong) option.
  "haflinger":       { loci:["pangare","sabino1","flaxen"], fixedExtension:"ee",
                        alleleRestrictions:{ flaxen:["Ff","FF"] } },
  "andalusian":      ["sooty","pangare","grey","dun","pearl"],
  "pre":             ["sooty","pangare","grey","dun","pearl"],
  "lipizzaner":      ["sooty","pangare","grey"],
  "clydesdale":      ["sooty","pangare","roan","tobiano","sabino1"],
  "percheron":       ["sooty","pangare","grey","roan"],
  "shetland pony":   ["sooty","pangare","cream","dun","tobiano","splash","sabino1","roan","grey"],
  "welsh pony":      ["sooty","pangare","cream","dun","tobiano","splash","sabino1","roan","grey"],
  "mustang":         ["sooty","pangare","cream","dun","roan","tobiano","sabino1","splash","frame","leopard","patn1","patn2","grey","pearl"],
  "akhal-teke":      ["sooty","cream","dun"],
  "icelandic":       ["sooty","pangare","dun","silver","roan","tobiano"],
  "gypsy vanner":    ["sooty","pangare","tobiano","sabino1","splash","roan"],
  "dutch warmblood": ["sooty","grey","roan"],
  "hanoverian":      ["sooty","grey","roan"],
  "warmblood":       ["sooty","grey","roan"],
};

function breedLociList(entry){
  return Array.isArray(entry) ? entry : (entry ? entry.loci : null);
}
function getFixedBase(breed){
  const key=(breed||"").trim().toLowerCase();
  const entry=BREED_GENETICS[key];
  if(entry && !Array.isArray(entry) && (entry.fixedExtension || entry.fixedAgouti)){
    return { extension: entry.fixedExtension||null, agouti: entry.fixedAgouti||null };
  }
  return null;
}
// Some breeds narrow (rather than fully fix) which alleles are pickable at
// a given locus — e.g. Haflingers can be Aa, aa, AtAt, etc. (Agouti stays
// fully open), but can never be "ff" (no Flaxen) since the breed always
// carries at least one Flaxen allele. Returns {locusKey:[allowedCodes]} or
// null if this breed has no such restrictions.
function getAlleleRestrictions(breed){
  const key=(breed||"").trim().toLowerCase();
  const entry=BREED_GENETICS[key];
  if(entry && !Array.isArray(entry) && entry.alleleRestrictions) return entry.alleleRestrictions;
  return null;
}

// A handful of breed names don't title-case cleanly (acronyms, hyphenation).
const BREED_DISPLAY_OVERRIDES = {
  "pre": "PRE (Pura Raza Española)",
  "akhal-teke": "Akhal-Teke",
};

function breedDisplayName(key){
  if(BREED_DISPLAY_OVERRIDES[key]) return BREED_DISPLAY_OVERRIDES[key];
  return key.replace(/\b\w/g, c=>c.toUpperCase());
}

// Locus labels carry a lot of descriptive text after " — " (dominance
// notes, what it's exclusive to, etc). Great as a hover tooltip, too long
// for a checkbox row — this trims it down to just the name + gene code.
function shortLocusLabel(locus){
  return locus.label.split(" — ")[0].trim();
}

// Builds the full Breed dropdown: hardcoded common real-world breeds, plus
// whatever Custom/Created breeds have been added via the Admin panel.
function getBreedOptionGroups(){
  const common = Object.keys(BREED_GENETICS).sort().map(key=>({key, name:breedDisplayName(key)}));
  const custom = (state.customBreeds||[]).slice().sort((a,b)=>a.name.localeCompare(b.name));
  return {common, custom};
}

function getAllowedLoci(breed){
  const key=(breed||"").trim().toLowerCase();
  const optionalKeys=allLoci().filter(l=>!l.base).map(l=>l.key);
  const custom=(state.customBreeds||[]).find(b=>(b.name||"").trim().toLowerCase()===key);
  const restricted = custom ? custom.loci : breedLociList(BREED_GENETICS[key]);
  if(!restricted){
    // No matching breed found — either nothing's been picked yet in the
    // "— Select a breed —" dropdown, or a freeform "Other" name was typed
    // that doesn't match anything on record. Either way, genes that were
    // built exclusively for a specific Custom/Created breed (Custom Genes,
    // ILB Exclusive Genetics) should never leak in here — they should only
    // ever show up once the breed they were made for is actually selected.
    const exclusiveKeys = new Set([
      ...customGeneLoci().map(l=>l.key),
      ...GENETIC_LOCI.filter(l=>l.label.includes("ILB Exclusive")).map(l=>l.key),
    ]);
    return optionalKeys.filter(k=>!exclusiveKeys.has(k));
  }
  // Silver and Flaxen are the same underlying trait complex, just visible
  // on opposite base colors (Silver on black-based, Flaxen on chestnut).
  // Breed lists were only ever written with "silver" in mind, so carry
  // "flaxen" along automatically rather than requiring every breed entry
  // to be edited by hand.
  let list = restricted.includes("silver") && !restricted.includes("flaxen")
    ? [...restricted, "flaxen"]
    : restricted;
  // Cream and Pearl were merged into the single "creampearl" locus, since they
  // are alleles of one gene. Breed lists still name them separately, so a breed
  // allowing either one gets the merged locus; getLocusOptions() then hides
  // whichever alleles that breed shouldn't be able to carry.
  if(list.includes("cream") || list.includes("pearl")) list = [...list, "creampearl"];
  return optionalKeys.filter(k=>list.includes(k));
}

// ---------------------------------------------------------------------------
// computeColorName(): turns the base coat + every dilution/modifier gene into
// the single name people actually use for that horse — "Buckskin", "Pearlino",
// "Taffy", "Dunskin" — instead of listing each locus separately.
//
// computeBaseColor() has already resolved Extension + Agouti down to one of
// seven labels, so this function starts from that and layers dilutions on top.
//
// WILD BAY RULE: per the Agouti notes above, every dilution that acts on Bay
// acts identically on Wild Bay, "just tagged Wild". So Wild Bay is resolved
// through the ordinary Bay tables and then prefixed — Buckskin -> Wild
// Buckskin, Amber Champagne -> Wild Amber Champagne, Bay Dun -> Wild Bay Dun.
// Adding a new bay dilution below automatically gives you its wild twin.
//
// ORDER MATTERS: Dun resolves before Silver so that black + silver + dun
// reads "Silver Grullo" rather than "Silver Black Dun". Grey is applied last
// because it eventually covers everything else up.
// ---------------------------------------------------------------------------

// Which base label maps to which column in the tables below.
const COLOR_BASE_KEY = {
  "Chestnut":       "chestnut",
  "Liver Chestnut": "chestnut",
  "Black Chestnut": "chestnut",
  "Wild Bay":       "bay",      // resolved as Bay, then tagged "Wild"
  "Bay":            "bay",
  "Seal Bay":       "seal",
  "Black":          "black",
};

const COLOR_TABLES = {
  // one Cream, no Pearl
  singleCream: { chestnut:"Palomino", bay:"Buckskin", seal:"Seal Buckskin", black:"Smoky Black" },
  // two Creams — heavy dilution washes agouti out, so seal collapses onto bay
  doubleCream: { chestnut:"Cremello", bay:"Perlino", seal:"Perlino", black:"Smoky Cream" },
  // one Cream + at least one Pearl (pseudo-double dilute, distinct from Pearlino)
  creamPearl:  { chestnut:"Palomino Pearl", bay:"Buckskin Pearl", seal:"Buckskin Pearl", black:"Smoky Black Pearl" },
  // two Pearls, no Cream
  doublePearl: { chestnut:"Apricot", bay:"Amber Pearl", seal:"Sable Pearl", black:"Black Pearl" },
  // Champagne, no Cream
  champagne:   { chestnut:"Gold Champagne", bay:"Amber Champagne", seal:"Sable Champagne", black:"Classic Champagne" },
  // Champagne + Cream
  champCream:  { chestnut:"Gold Cream Champagne", bay:"Amber Cream Champagne", seal:"Sable Cream Champagne", black:"Classic Cream Champagne" },
  // Champagne + two Pearls
  champPearl:  { chestnut:"Gold Champagne Pearl", bay:"Amber Champagne Pearl", seal:"Sable Champagne Pearl", black:"Classic Champagne Pearl" },
  // Dun on an otherwise undiluted base
  dunBase:     { chestnut:"Red Dun", bay:"Bay Dun", seal:"Seal Dun", black:"Grullo" },
  // Dun stacked on a single-cream dilute earns its own portmanteau
  dunCream:    { chestnut:"Dunalino", bay:"Dunskin", seal:"Dunskin", black:"Smoky Grullo" },
  // Silver on an otherwise undiluted base. Taffy is the silver seal bay.
  silverBase:  { bay:"Silver Bay", seal:"Taffy", black:"Silver Black" },
  // Roan on an otherwise undiluted base
  roanBase:    { chestnut:"Red Roan", bay:"Bay Roan", seal:"Seal Roan", black:"Blue Roan" },
};

function computeColorName(selections, allowed, baseLabel){
  // A locus only counts if the breed allows it and something is selected.
  const on = (key, offCode) =>
    allowed.has(key) && selections[key] && selections[key] !== offCode;

  // Cream and Pearl are two alleles of ONE locus (MATP/SLC45A2), so a horse
  // carries exactly two of {Cr, Prl, n}. Count each allele out of the code.
  //   nn     0 cream 0 pearl   nCr    1 cream        CrCr   2 cream
  //   nPrl   1 pearl (silent)  PrlPrl 2 pearl        CrPrl  1 cream + 1 pearl
  const cpCode = allowed.has("creampearl") ? (selections.creampearl || "nn") : "nn";
  const cream = (cpCode.match(/Cr/g)  || []).length;
  const pearl = (cpCode.match(/Prl/g) || []).length;

  const isWild = baseLabel === "Wild Bay";
  const key = COLOR_BASE_KEY[baseLabel] || "bay";
  const redBased = key === "chestnut";
  const pick = (table) => table[key];

  const champagne = on("champagne", "chch");
  const dun       = on("dun", "dd");
  const sooty     = on("sooty", "stysty");
  const pangare   = on("pangare", "pngpng");
  const roan      = on("roan", "rnrn");
  const grey      = on("grey", "gg");
  // Silver and Flaxen can be CARRIED on the wrong base without showing. A
  // chestnut carrying Silver is still just a Chestnut, so an unexpressed
  // carrier must not affect the name at all.
  const silver    = on("silver", "zz") && !redBased;
  const flaxen    = on("flaxen", "ff") &&  redBased;

  // --- core: base + cream / pearl / champagne ------------------------------
  let core;
  let diluted = true;   // flipped to false in the plain-base branch

  if (champagne) {
    if (cream >= 1)       core = pick(COLOR_TABLES.champCream);
    else if (pearl === 2) core = pick(COLOR_TABLES.champPearl);
    else                  core = pick(COLOR_TABLES.champagne);
  } else if (cream === 2) {
    core = pick(COLOR_TABLES.doubleCream);
  } else if (cream === 1 && pearl >= 1) {
    core = pick(COLOR_TABLES.creamPearl);
  } else if (cream === 1) {
    core = pick(COLOR_TABLES.singleCream);
  } else if (pearl === 2) {
    core = pick(COLOR_TABLES.doublePearl);
  } else {
    // Undiluted. Keep computeBaseColor's own shade label, which already
    // encodes Liver / Black Chestnut from Agouti. Wild Bay becomes plain
    // "Bay" here and gets its "Wild" tag back at the end.
    core = isWild ? "Bay" : baseLabel;
    diluted = false;
  }

  // --- Flaxen: red pigment only -------------------------------------------
  if (flaxen && !diluted) core = "Flaxen " + core;

  // --- Dun (before Silver, so black+silver+dun = Silver Grullo) ------------
  if (dun) {
    if (!diluted && !flaxen)                        core = pick(COLOR_TABLES.dunBase);
    else if (!champagne && cream === 1 && pearl === 0) core = pick(COLOR_TABLES.dunCream);
    else                                            core = core + " Dun";
  }

  // --- Silver: black pigment only ------------------------------------------
  if (silver) {
    if (!diluted && !dun) core = pick(COLOR_TABLES.silverBase);
    else                  core = "Silver " + core;
  }

  // --- Roan -----------------------------------------------------------------
  if (roan) {
    if (!diluted && !dun && !silver && !flaxen) core = pick(COLOR_TABLES.roanBase);
    else                                        core = core + " Roan";
  }

  // --- Wild Bay tag. Applied to the finished color, before Sooty, so the
  // result is "Sooty Wild Buckskin" and not "Wild Sooty Buckskin".
  if (isWild && !/^Wild\b/.test(core)) core = "Wild " + core;

  // --- Sooty ----------------------------------------------------------------
  if (sooty) core = "Sooty " + core;

  // --- Pangare ---------------------------------------------------------------
  if (pangare) core = core + " with Pangare";

  // --- Grey covers everything, so it wraps rather than replaces ---------------
  if (grey) {
    const greyDesc = selections.grey === "GG" ? "Dappled Grey" : "Fleabitten Grey";
    core = `${greyDesc} (was ${core})`;
  }

  return core;
}

function computeGenoResult(selections, breed){
  const allowed = new Set(["extension","agouti", ...getAllowedLoci(breed)]);
  const base = computeBaseColor(selections.extension, selections.agouti);
  // Genes folded into the single color name by computeColorName(). They still
  // record in the genotype string and still price as modifiers — they just
  // aren't listed separately in the phenotype anymore.
  const COLOR_LOCI = new Set(["sooty","pangare","creampearl","dun",
                              "champagne","silver","flaxen","grey","roan"]);
  const phenoParts = [];
  const patternParts = [];
  const modifiers = [];
  const genoParts = [];
  if(selections.extension) genoParts.push(selections.extension);
  // Agouti is always recorded now: on chestnut it no longer expresses as bay,
  // but it still sets the shade (Liver / Black Chestnut) and passes to foals.
  if(selections.agouti) genoParts.push(selections.agouti);

  allLoci().filter(l=>!l.base).forEach(locus=>{
    if(!allowed.has(locus.key)) return;
    const code = selections[locus.key];
    if(!code) return;
    if(locus.requiresAny){
      const satisfiesAll=Object.entries(locus.requiresAny).every(([reqKey,reqCodes])=>reqCodes.includes(selections[reqKey]));
      if(!satisfiesAll) return;
    }
    if(["leopard","patn1","patn2","silver","flaxen"].includes(locus.key)) return;
    const opt = getLocusOptions(locus, breed).find(o=>o.code===code);
    if(!opt) return;
    genoParts.push(code);
    if(opt.price>0){
      if(!COLOR_LOCI.has(locus.key)) patternParts.push(opt.desc);
      modifiers.push({label:opt.desc, value:opt.price});
    }
  });

  if(allowed.has("leopard")){
    const appy = computeAppaloosaPattern(selections.leopard, selections.patn1, selections.patn2);
    if(selections.leopard) genoParts.push(selections.leopard);
    if(selections.patn1 && selections.patn1!=="patn1patn1") genoParts.push(selections.patn1);
    if(selections.patn2 && selections.patn2!=="patn2patn2") genoParts.push(selections.patn2);
    if(appy){
      patternParts.push(appy.label);
      modifiers.push({label:appy.label, value:appy.price});
    }
  }

  // Silver and Flaxen: the allele is always recorded in the genotype
  // string (so carrier status is visible even when not expressed), but
  // only shows up in the phenotype/price when it's actually expressed —
  // Silver on black-based (EE/Ee), Flaxen on chestnut (ee).
  const blackBased = selections.extension==="EE" || selections.extension==="Ee";
  const redBased = selections.extension==="ee";
  if(allowed.has("silver") && selections.silver){
    genoParts.push(selections.silver);
    const opt = GENETIC_LOCI.find(l=>l.key==="silver").options.find(o=>o.code===selections.silver);
    if(opt && opt.price>0 && blackBased){
      modifiers.push({label:opt.desc, value:opt.price});
    }
  }
  if(allowed.has("flaxen") && selections.flaxen){
    genoParts.push(selections.flaxen);
    const opt = GENETIC_LOCI.find(l=>l.key==="flaxen").options.find(o=>o.code===selections.flaxen);
    if(opt && opt.price>0 && redBased){
      modifiers.push({label:opt.desc, value:opt.price});
    }
  }

  // The color name comes first, then any white pattern / appaloosa markings.
  phenoParts.push(computeColorName(selections, allowed, base.label));
  patternParts.forEach(p=>phenoParts.push(p));

  return {
    genotype: genoParts.join(" "),
    phenotype: phenoParts.join(", "),
    genoBasePrice: base.price,
    genoModifiers: modifiers,
    totalPrice: base.price + modifiers.reduce((s,m)=>s+m.value,0),
  };
}

// ═══════════════════════════════════════════════════════════════════════════
//  BREEDING ENGINE  (ported from breeding-engine-test.mjs — 35 tests + 309
//  real-loci crosses all passing). Pure functions: Punnett math, foal stats,
//  rare-trait resolution (flat / health / conditional), inbreeding COI, risks.
// ═══════════════════════════════════════════════════════════════════════════

function allelesOfLocus(locus){
  if(Array.isArray(locus.alleles) && locus.alleles.length) return locus.alleles.slice();
  return deriveAlleles(locus);
}

// Derive the allele inventory for a locus WITHOUT a hardcoded guess-list.
// Key insight: a homozygous option code is one allele written twice, so if a
// code is an even-length string whose two halves are equal, each half is a real
// allele. We collect all such alleles, then split remaining (heterozygous)
// codes by longest-known-allele-first. This works for novel/custom alleles too
// (e.g. "PATN1", "Sty", "A+") because at least one homozygote reveals each.
function deriveAlleles(locus){
  const codes=(locus.options||[]).map(o=>o.code);
  const alleles=new Set();
  // pass 1: even-length codes with equal halves => homozygous => allele = half
  codes.forEach(code=>{
    if(code.length%2===0){
      const half=code.length/2, a=code.slice(0,half), b=code.slice(half);
      if(a===b) alleles.add(a);
    }
  });
  // pass 2: for any code we can't yet fully split, peel known alleles (longest
  // first) and treat leftover as a new allele. Handles hetero-only alleles.
  const peel=(code)=>{
    const known=[...alleles].sort((a,b)=>b.length-a.length);
    let rest=code, out=[], guard=0;
    while(rest.length && guard++<8){
      const tok=known.find(t=>rest.startsWith(t));
      if(!tok) return null; // can't fully split with what we know
      out.push(tok); rest=rest.slice(tok.length);
    }
    return out.length===2?out:null;
  };
  let changed=true;
  while(changed){
    changed=false;
    for(const code of codes){
      if(peel(code)) continue;              // already splittable
      // try to isolate ONE new allele: strip a known allele off either end
      const known=[...alleles].sort((a,b)=>b.length-a.length);
      let found=false;
      for(const k of known){
        if(code.startsWith(k)){ const rem=code.slice(k.length); if(rem){ alleles.add(rem); found=true; break; } }
        if(code.endsWith(k)){ const rem=code.slice(0,code.length-k.length); if(rem){ alleles.add(rem); found=true; break; } }
      }
      if(found) changed=true;
    }
  }
  return [...alleles];
}

// Split a code into exactly two alleles using the locus's allele inventory,
// longest-match-first so "A+At" -> ["A+","At"], not ["A","+","A","t"].
function splitCode(code, locus){
  const aliases=(locus && locus.alleleAliases) || {};
  // Split using the real alleles PLUS any spelling-only lowercase forms
  // (e.g. "cr", "prl"), longest-match-first so "A+At" -> ["A+","At"].
  const spellings=[...allelesOfLocus(locus), ...Object.keys(aliases)]
    .sort((a,b)=>b.length-a.length);
  let rest=code, out=[], guard=0;
  while(rest.length && guard++<6){
    const tok=spellings.find(t=>rest.startsWith(t));
    if(!tok){ out.push(rest[0]); rest=rest.slice(1); continue; }
    out.push(tok); rest=rest.slice(tok.length);
  }
  // A diploid locus must yield exactly 2 alleles; if not, best-effort halves.
  if(out.length!==2){
    if(out.length===1) out=[out[0],out[0]];
    else if(out.length>2) out=[out[0], out.slice(1).join("")];
  }
  // Collapse spelling-only forms onto the allele they actually represent.
  return out.map(a=>aliases[a]||a);
}

// Canonicalise a pair. Priority:
//  1. If the locus lists this pair as an option (either order), use that exact
//     spelling — the game's canonical form (e.g. "nCr" not "Crn").
//  2. Otherwise it's a genetically-valid genotype the picker just doesn't list
//     (e.g. agouti "A+at"). Spell it with a STABLE allele order so the same
//     genotype always renders identically: dominant/complex alleles first,
//     null "n" and lowercase last, matching HARPG writing convention.
// Zygosity from the capital-letter rule: split the code into its two alleles
// and count how many are capitalised (i.e. how many copies of the gene the
// horse actually has).
//   0 capitals -> "none"      not carrying, not passing   (ee, aa, splspl, nn)
//   1 capital  -> "single"    one allele, passes to half  (Ee, Crcr, Lplp)
//   2 capitals -> "dominant"  two functional alleles      (EE, CrCr, LpLp)
// Counting alleles rather than raw letters keeps multi-letter names honest:
// "PATN1patn1" is one copy, not five.
//
// On multi-allele loci (agouti: A+/A/At/a, cream-pearl: Cr/Prl/n) two capitals
// can mean two DIFFERENT alleles rather than the same one twice — CrPrl is the
// false double dilute (Cream Pearl), AtA is one seal plus one bay. Those are
// still "dominant" by the capital rule, but they are not homozygous, so the
// distinction is reported separately.
function zygosityOf(code, locus){
  if(!code) return "none";
  const parts = locus ? splitCode(code, locus) : [code];
  const caps = parts.filter(a=>a && a[0]===a[0].toUpperCase() && a[0]!==a[0].toLowerCase()).length;
  return caps===0 ? "none" : caps===1 ? "single" : "dominant";
}
// True only when the same capital allele appears twice (EE, CrCr, AtAt).
function isHomozygous(code, locus){
  if(zygosityOf(code, locus)!=="dominant") return false;
  const parts = locus ? splitCode(code, locus) : [code];
  return parts[0]===parts[1];
}
function zygosityLabel(code, locus){
  const z = zygosityOf(code, locus);
  if(z==="none") return "";
  if(z==="single") return "single";
  return isHomozygous(code, locus) ? "homozygous" : "two alleles";
}

// ── Rare markings in the phenotype ─────────────────────────────────────────
// Markings picked in "Rare Markings & Custom Traits" are stored in
// h.genoModifiers alongside the colour/pattern modifiers that computeGenoResult
// produces. Only the colour ones are baked into h.phenotype, so the markings
// were invisible everywhere. These helpers pull the marking labels back out
// and append them for display, so the list stays correct even when markings
// are added or removed after the horse was created.
function knownMarkingLabels(){
  return new Set([
    ...GENO_MODIFIERS["Rare Markings"].map(m=>String(m.label).trim().toLowerCase()),
    ...(state.customMarkings||[]).map(m=>String(m.label||'').trim().toLowerCase()),
  ]);
}
function rareMarkingLabels(h){
  const known = knownMarkingLabels();
  return (h.genoModifiers||[])
    .filter(m => m && (m.rare===true || known.has(String(m.label||'').trim().toLowerCase())))
    .map(m => String(m.label||'').trim())
    .filter(Boolean);
}
// Colour/pattern phenotype plus any rare markings the horse carries.
function fullPhenotype(h){
  const base = String(h.phenotype||'').trim();
  const seen = base.toLowerCase();
  const marks = rareMarkingLabels(h).filter(l => !seen.includes(l.toLowerCase()));
  return [base, ...marks].filter(Boolean).join(", ");
}

function alleleRank(x, order){
  // "n" (no-allele) conventionally leads pairs like nCr, nLp, nSpl…
  if(x==="n") return -1;
  const i=order.indexOf(x);
  return i<0 ? 999 : i;
}
function canonPair(a,b, order, locus){
  if(locus && locus.pairCode){
    // Explicit spelling for loci where the code isn't just allele+allele
    // (Cream/Pearl: n+Cr is written "Crcr", not "nCr" or "Crn").
    const hit = locus.pairCode[a+"+"+b] || locus.pairCode[b+"+"+a];
    if(hit) return hit;
  }
  if(locus && locus.options){
    const want1=a+b, want2=b+a;
    const hit=locus.options.find(o=>o.code===want1||o.code===want2);
    if(hit) return hit.code;
  }
  return alleleRank(a,order)<=alleleRank(b,order) ? a+b : b+a;
}

// Is a genotype code lethal for this locus? Breeds/loci may define lethal
// homozygotes (e.g. Frame Overo "OO" = Lethal White). We check a lethal list.
function isLethalGenotype(locusKey, code, lethalRules){
  const c=normGeno(code);
  return (lethalRules||[]).some(r=>r.locus===locusKey && normGenoList(r.codes||[]).includes(c));
}

// Punnett cross of two parent codes at one locus. Returns [{code, p}] summing 1.
function crossLocus(sireCode, damCode, locus){
  const [s1,s2]=splitCode(sireCode,locus);
  const [d1,d2]=splitCode(damCode,locus);
  // allele priority order for canonicalisation = order they appear in options,
  // flattened; ensures "Aa" not "aA"
  const order=[];
  allelesOfLocus(locus).forEach(a=>{ if(!order.includes(a)) order.push(a); });
  const combos=[[s1,d1],[s1,d2],[s2,d1],[s2,d2]];
  const tally={};
  combos.forEach(([x,y])=>{ const c=canonPair(x,y,order,locus); tally[c]=(tally[c]||0)+0.25; });
  return Object.entries(tally).map(([code,p])=>({code,p})).sort((a,b)=>b.p-a.p);
}

// Foal base stats = floor(average) of the two parents, per stat.
function foalStats(sireStats, damStats, statKeys){
  const out={};
  statKeys.forEach(k=>{
    const s=Number(sireStats[k])||0, d=Number(damStats[k])||0;
    out[k]=Math.floor((s+d)/2);
  });
  return out;
}

// ── RARE TRAITS (three types) ──────────────────────────────────────────────
// A breed defines rareTraits: [{ type, name, chance, ... }]
//   type "flat":   rolled if a parent carries it; carrier passes at `chance`.
//   type "health": like flat, PLUS if passed, a second roll `healthChance` for
//                  a linked condition `healthName` (e.g. Silken -> metabolic).
//   type "conditional": only possible when the foal meets `requires`
//                  (a locus + codes, e.g. Peacock needs an LP genotype).
//
// carrierChance: given the per-carrier % and how many parents carry, the odds a
// foal expresses it. 0 carriers -> 0. 1 -> p. 2 -> 1-(1-p)^2.
// Odds a foal inherits a rare trait.
//
// Rare markings are INHERITED, not spontaneous — a trait can only appear if at
// least one parent carries it. A pairing where neither parent has the trait
// yields 0, which is why an untraited pair correctly reports that no rare
// traits are possible.
//
//   neither parent   0        cannot occur
//   one parent       p        the breed's stated chance
//   both parents     1-(1-p)^2
//
// e.g. a 20% trait: 0% -> 20% -> 36%.
//
// (Gene-driven traits such as Gulastra Plume are "conditional" instead and
// don't come through here — they're gated on the foal's own genotype, so they
// can arise without either parent showing the trait.)
function carrierChance(pPercent, sireHas, damHas){
  const p=Math.max(0,Math.min(100,Number(pPercent)||0))/100;
  if(p<=0) return 0;
  const carriers=(sireHas?1:0)+(damHas?1:0);
  if(carriers===0) return 0;
  if(carriers===1) return p;
  return 1-Math.pow(1-p, 2);
}

// Does a set of foal locus-outcomes satisfy a requirement like
// { locus:"leopard", anyOf:["Lplp","LpLp"] }? Returns the summed probability
// that the requirement is met (since outcomes are probabilistic).
function requirementMetProb(requires, foalGenotypeByLocus){
  if(!requires) return 1;
  const outcomes=foalGenotypeByLocus[requires.locus]||[];
  const want=new Set(normGenoList(requires.anyOf||[]));
  return outcomes.filter(o=>want.has(o.code)).reduce((s,o)=>s+o.p,0);
}

// Resolve every rare trait for a foal into display rows:
//   { name, chance, healthName?, healthChance?, conditional?, note? }
// sireTraits/damTraits are arrays of trait NAMES each parent carries.
// ═══════════════════════════════════════════════════════════════════════════
// BREEDING TOKENS
// ═══════════════════════════════════════════════════════════════════════════
// Specialty items that modify a breeding. These are PURE functions with no UI
// and no data writes — live breeding will build a modifiers object from the
// tokens a player spends, then pass it through the roll. Keeping the effects
// isolated here means each one is testable on its own and live breeding only
// has to call them.
//
// Tokens live in the shared `inventory` doc like every other consumable, with
// an `effect` string from BREEDING_TOKENS[key].effect, and are spent through
// the existing ledger-safe spendConsumable().

const BASE_TWIN_CHANCE = 10;   // percent, before any token
const TRAIT_TOKEN_MULT = 1.5;  // multiplier on a carried trait's pass-on odds
const TWIN_TOKEN_MULT  = 1.5;  // multiplier on the twin chance
const PREPOTENCY_BONUS = 2;    // added to the floored average, capped at the best parent

const BREEDING_TOKENS = {
  ticket: {
    key:"ticket", label:"Breeding Ticket", effect:"breeding_ticket",
    desc:"Waives the breeding fee for one group/NPC or member-owned horse."
  },
  twin: {
    key:"twin", label:"Twin Token", effect:"breeding_twin",
    desc:`Raises the chance of twins from ${BASE_TWIN_CHANCE}% to ${BASE_TWIN_CHANCE*TWIN_TOKEN_MULT}%. Twins mean you keep BOTH foals.`
  },
  trait: {
    key:"trait", label:"Trait Token", effect:"breeding_trait",
    desc:`Multiplies the pass-on odds of every trait a parent carries by ${TRAIT_TOKEN_MULT}×. Cannot create a trait neither parent has.`
  },
  gender: {
    key:"gender", label:"Gender Pick Token", effect:"breeding_gender",
    desc:"Choose the foal's gender before the roll."
  },
  health: {
    key:"health", label:"Health Token", effect:"breeding_health",
    desc:"Guarantees a healthy foal — suppresses conditions attached to non-lethal traits. Does NOT prevent lethal genotypes."
  },
  reroll: {
    key:"reroll", label:"Reroll Token", effect:"breeding_reroll",
    desc:"Rerolls the whole breeding — genotype, traits and gender."
  },
  colour: {
    key:"colour", label:"Colour Guarantee Token", effect:"breeding_colour",
    desc:"After the roll, swap one gene to another result the parents could have produced."
  },
  prepotency: {
    key:"prepotency", label:"Prepotency Token", effect:"breeding_prepotency",
    desc:`Foal stats become the average +${PREPOTENCY_BONUS}, capped at the better parent's stat.`
  },
};

// House rule: at most TWO tokens on a single breeding, and never two of the
// same type — so no doubling a Trait token to 2.25x. Validation lives here so
// live breeding, the shop and any future UI all enforce the same thing.
const MAX_TOKENS_PER_BREEDING = 2;

function validateTokenSelection(tokens){
  const list=(tokens||[]).map(t=>typeof t==="string"?{key:t}:t).filter(t=>t&&t.key);
  const unknown=list.find(t=>!BREEDING_TOKENS[t.key]);
  if(unknown) return {ok:false, reason:`Unknown token: ${unknown.key}`};
  const seen=new Set(), dupe=list.find(t=>seen.has(t.key)?true:(seen.add(t.key),false));
  if(dupe) return {ok:false, reason:`Only one ${BREEDING_TOKENS[dupe.key].label} may be used per breeding.`};
  if(list.length>MAX_TOKENS_PER_BREEDING)
    return {ok:false, reason:`A breeding can use at most ${MAX_TOKENS_PER_BREEDING} tokens.`};
  const g=list.find(t=>t.key==="gender");
  if(g && g.gender!=="Colt" && g.gender!=="Filly")
    return {ok:false, reason:"Pick Colt or Filly for the Gender Pick Token."};
  return {ok:true, tokens:list};
}

// The modifier bundle live breeding will thread through a roll.
function defaultBreedingModifiers(){
  return { ticket:false, twin:false, trait:false, health:false,
           reroll:false, prepotency:false,
           gender:null,          // "Colt" | "Filly" when a gender token is spent
           colourSwaps:{},       // { locusKey: newCode } from a colour token
           tokensUsed:[] };
}
// Accepts ["twin","trait"] or [{key:"gender",gender:"Filly"}, {key:"trait"}].
// Returns {ok:false, reason} if the selection breaks the house rule.
function modifiersFromTokens(tokens){
  const v=validateTokenSelection(tokens);
  if(!v.ok) return v;
  const m=defaultBreedingModifiers();
  v.tokens.forEach(t=>{
    if(typeof m[t.key]==="boolean") m[t.key]=true;
    if(t.key==="gender") m.gender=t.gender;
    if(t.key==="colour" && t.locusKey) m.colourSwaps[t.locusKey]=t.code||null;
    m.tokensUsed.push(t.key);
  });
  return Object.assign({ok:true}, m);
}

// ── Trait token ────────────────────────────────────────────────────────────
// Multiplies each row's chance. resolveRareTraits already returns rows only for
// traits a parent carries (or gene-driven conditionals), so this can never
// invent a trait from nothing. Health odds stay put; only the overall figure
// moves, because that's the trait chance times the condition chance.
function applyTraitToken(rows, on, mult){
  const k=Number(mult)||TRAIT_TOKEN_MULT;
  if(!on) return rows;
  return (rows||[]).map(r=>{
    const chance=Math.min(1, r.chance*k);
    const out=Object.assign({}, r, {chance, traitBoosted:true});
    if(r.healthName) out.healthOverall = chance * r.healthChance;
    return out;
  });
}

// ── Health token ───────────────────────────────────────────────────────────
// Strips the condition riding on a non-lethal trait: the foal can still be
// Silken or Unrelated Bleu, it just won't come with metabolic disease or Moon
// Blindness. Lethal genotypes (frame overo OO) are handled by isLethalGenotype
// and are deliberately untouched.
function applyHealthToken(rows, on){
  if(!on) return rows;
  return (rows||[]).map(r=>{
    if(!r.healthName) return r;
    const out=Object.assign({}, r);
    delete out.healthName; delete out.healthChance;
    delete out.healthOverall; delete out.healthInflated;
    out.healthSuppressed=true;
    return out;
  });
}

// ── Twin token ─────────────────────────────────────────────────────────────
function twinChance(mods){
  const base=BASE_TWIN_CHANCE/100;
  return Math.min(1, mods && mods.twin ? base*TWIN_TOKEN_MULT : base);
}
function rollTwins(mods){ return Math.random() < twinChance(mods); }

// ── Gender token ───────────────────────────────────────────────────────────
function rollGender(mods){
  if(mods && (mods.gender==="Colt"||mods.gender==="Filly")) return mods.gender;
  return Math.random()<0.5 ? "Colt" : "Filly";
}

// ── Prepotency token ───────────────────────────────────────────────────────
// Average +2, but never above the better parent — so it rewards breeding up to
// a stronger horse and does nothing for two evenly matched parents.
function foalStatsWithPrepotency(sireStats, damStats, statKeys, on){
  const base=foalStats(sireStats, damStats, statKeys);
  if(!on) return base;
  const out={};
  statKeys.forEach(k=>{
    const s=Number(sireStats[k])||0, d=Number(damStats[k])||0;
    out[k]=Math.min(base[k]+PREPOTENCY_BONUS, Math.max(s,d));
  });
  return out;
}

// ── Colour guarantee token ─────────────────────────────────────────────────
// Every genotype this pairing could actually have produced at one gene.
function locusAlternatives(sireCode, damCode, locus){
  return crossLocus(sireCode, damCode, locus).filter(o=>o.p>0).map(o=>o.code);
}
// Swap a rolled foal's gene to another result the parents could have given —
// e.g. ee x Ee can yield Ee or ee, so a bay foal may be changed to chestnut.
// Anything the cross could not produce is refused.
function applyColourSwap(foal, locusKey, newCode, loci, sireGeno, damGeno, breedKey){
  const locus=(loci||[]).find(l=>l.key===locusKey);
  if(!locus) return {ok:false, reason:"That gene isn't used by this breed."};
  const allowed=locusAlternatives(sireGeno[locusKey], damGeno[locusKey], locus);
  if(!allowed.includes(newCode))
    return {ok:false, reason:"These parents could not produce that genotype.", allowed};
  const selections=Object.assign({}, foal.selections, {[locusKey]:newCode});
  const geno=computeGenoResult(selections, breedKey);
  return {ok:true, allowed,
          foal:Object.assign({}, foal, {selections, genotype:geno.genotype, phenotype:geno.phenotype})};
}

function resolveRareTraits(rareTraits, sireTraits, damTraits, foalGenotypeByLocus, riskMult){
  const mult = Number(riskMult)>0 ? Number(riskMult) : 1;
  const has=(list,name)=>Array.isArray(list)&&list.includes(name);
  const rows=[];
  (rareTraits||[]).forEach(t=>{
    const sHas=has(sireTraits,t.name), dHas=has(damTraits,t.name);
    if(t.type==="conditional"){
      const reqP=requirementMetProb(t.requires, foalGenotypeByLocus);
      if(reqP<=0) return;
      rows.push({ name:t.name, chance:reqP*(Number(t.chance)||0)/100,
        conditional:true, requiresLabel:t.requiresLabel||t.requires?.locus });
    } else {
      const c=carrierChance(t.chance, sHas, dHas);
      if(c<=0) return;
      const row={ name:t.name, chance:c };
      if(t.type==="health" && t.healthName){
        // inbreeding raises the health-roll odds, capped at 100%.
        const baseHealth=(Number(t.healthChance)||0)/100;
        const adjHealth=Math.min(1, baseHealth*mult);
        row.healthName=t.healthName;
        row.healthChance=adjHealth;
        row.healthOverall=c*adjHealth;
        row.healthInflated = mult>1 && adjHealth>baseHealth;
      }
      rows.push(row);
    }
  });
  return rows;
}

// Inbreeding: do the parents share any ancestor? Pedigree is {sire:{...}, dam:{...}}
// nested; we flatten each parent's ancestor ids (incl themselves) and intersect.
function ancestorIds(horse, pedigreeOf, depth){
  const ids=new Set();
  (function walk(h,d){
    if(!h||d<0) return;
    if(h.id) ids.add(h.id);
    const ped=pedigreeOf(h)||{};
    if(ped.sire) walk(ped.sire,d-1);
    if(ped.dam)  walk(ped.dam,d-1);
  })(horse,depth);
  return ids;
}
function sharedAncestors(sire, dam, pedigreeOf, depth=4){
  const a=ancestorIds(sire,pedigreeOf,depth);
  const b=ancestorIds(dam,pedigreeOf,depth);
  const shared=[...a].filter(x=>b.has(x));
  return shared;
}

// Inbreeding coefficient (simplified Wright's COI). For each common ancestor we
// add (1/2)^(n1+n2+1), where n1/n2 are the generations from sire and dam to that
// ancestor. Closer/repeated shared ancestors -> higher COI. Parent-child or
// full-sib crosses land near 0.25; first cousins ~0.0625; distant ties tiny.
function ancestorDepthMap(horse, pedigreeOf, maxDepth){
  // returns Map ancestorId -> shortest generation distance from `horse`
  const dist=new Map();
  (function walk(h,d){
    if(!h||d>maxDepth) return;
    if(h.id!=null){
      if(!dist.has(h.id) || d<dist.get(h.id)) dist.set(h.id,d);
    }
    const ped=pedigreeOf(h)||{};
    if(ped.sire) walk(ped.sire,d+1);
    if(ped.dam)  walk(ped.dam,d+1);
  })(horse,0);
  return dist;
}
function inbreedingCoefficient(sire, dam, pedigreeOf, maxDepth=5){
  // If one parent IS an ancestor of the other (e.g. sire x daughter), treat the
  // shared individual as generation 0 on one side.
  const sMap=ancestorDepthMap(sire,pedigreeOf,maxDepth);
  const dMap=ancestorDepthMap(dam,pedigreeOf,maxDepth);
  let coi=0; const contributors=[];
  const shared=[...sMap.keys()].filter(id=>dMap.has(id));
  shared.forEach(id=>{
    const n1=sMap.get(id), n2=dMap.get(id);
    // exclude the trivial case where the "ancestor" is a parent counted on its
    // own side only via self (n=0 on both would be the same horse bred to itself)
    const c=Math.pow(0.5, n1+n2+1);
    coi+=c; contributors.push({id,n1,n2,contribution:c});
  });
  return { coi:Math.min(coi,0.5), contributors };
}

// Turn a COI into a health-risk multiplier. 0 COI -> x1 (no change). Higher COI
// raises risk, but we cap the multiplier so results stay believable: a severe
// (0.25) cross roughly doubles a trait's health-risk odds; a cousin cross nudges
// it ~+25%. Never more than +150% (x2.5).
function inbreedingRiskMultiplier(coi){
  const m = 1 + Math.min(coi,0.25) * 6;   // 0.25*6 = +1.5 at the cap
  return Math.min(m, 2.5);
}

// Gene risk: a breed defines risky genotypes, e.g.
//   { locus:"silken", codes:["SkSk"], risk:"metabolic issues", severity:"high" }
// We flag any foal-possible genotype that matches, with its probability.
function foalRisks(foalGenotypeByLocus, riskRules){
  const flags=[];
  (riskRules||[]).forEach(rule=>{
    const outcomes=foalGenotypeByLocus[rule.locus]||[];
    outcomes.forEach(o=>{
      if((rule.codes||[]).includes(o.code)){
        flags.push({ locus:rule.locus, code:o.code, p:o.p, risk:rule.risk, severity:rule.severity||"medium" });
      }
    });
  });
  return flags;
}

function appendBreedingTraitsEditor(wrap){

  card.innerHTML=`
    <h3 style="margin-top:0;">Breeding traits & risks</h3>

      <div style="margin-top:12px;border-top:1px solid var(--equi-faint);padding-top:12px;">

          <input id="bt_name" placeholder="Trait name" />
          <select id="bt_type"><option value="flat">Flat %</option><option value="health">Trait + health risk</option><option value="conditional">Conditional (needs gene)</option></select>
          <input id="bt_chance" type="number" min="0" max="100" placeholder="% pass" />
        </div>
        <div id="bt_extra" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;"></div>
        <button id="bt_add" style="margin-top:8px;">Add trait</button>
      </div>
      <div style="margin-top:8px;"><span id="bt_status" class="small"></span></div>
    ` : `<p class="small" style="color:var(--equi-accent);">Create a breed first (above), then configure its breeding traits here.</p>`}
  `;
