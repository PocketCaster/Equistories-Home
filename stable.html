function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML='<div style="padding:30px;color:var(--equi-dim);">Loading…</div>'; return; }

  const params = new URLSearchParams(window.location.search);
  const profileId = params.get('horse');
  if(profileId){
    const localHorse = state.horses.find(x=>x.id===profileId);
    if(localHorse){ renderHorseProfilePage(app, localHorse); return; }
    app.innerHTML='<div style="padding:40px;text-align:center;color:var(--equi-dim);font-family:var(--equi-serif);">Loading horse profile…</div>';
    // FIX: STABLE_URL only ever exists in the browser localStorage of
    // whoever set it up in Admin settings. A visitor opening someone
    // else's shared profile link has never done that, so STABLE_URL was
    // blank for them and the fetch never even ran — it just immediately
    // said "not found". The share link now carries the Stable Data URL
    // as a `stable` query param, so we can use it here even if this
    // visitor has none configured locally. If they don't already have
    // one set, adopt it for the rest of this session too (not persisted,
    // so it won't override anything they configure themselves later).
    const stableOverride = params.get('stable');
    if(stableOverride && !STABLE_URL) STABLE_URL = stableOverride;
    loadPublicHorse(profileId, stableOverride).then(res=>{
      if(res?.success && res.data){ resolveImageRefs(res.data); renderHorseProfilePage(app, res.data); return; }
      // Diagnostic detail so we can tell apart: link missing the stable
      // param entirely, request never reaching the server (network/CORS/
      // timeout), vs. the Google Apps Script backend itself responding
      // with success:false (e.g. its loadPublicHorse action doesn't
      // exist, or genuinely can't find a horse with this id).
      let reason;
      if(!stableOverride && !STABLE_URL){
        reason = 'This link is missing the Stable Data URL (older link, generated before this was fixed). Re-copy the "Shareable link" from the horse\'s profile page and send that one instead.';
      } else if(!res){
        reason = 'No response at all from the Stable Data server — check the URL is correct and the Apps Script is deployed with "Anyone" access.';
      } else if(res.error){
        reason = `Server said: "${res.error}"`;
      } else {
        reason = 'The server responded, but did not return this horse. Check that your Apps Script\'s "loadPublicHorse" action exists and looks up horses by id across all users, not just the current one.';
      }
      app.innerHTML=`<div style="padding:40px;text-align:center;color:var(--equi-dim);font-family:var(--equi-serif);max-width:500px;margin:0 auto;">
        Horse not found.<br>
        <div style="font-size:1em;opacity:.8;margin-top:10px;background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:6px;padding:10px;">${reason}</div>
        <br><a href="${window.location.pathname}" style="color:var(--equi-accent);">← Back</a>
      </div>`;
    });
    return;
  }

  // Handoff from the Hub's results inbox: finish the claim here, where horse
  // records, EXP and levelling live, then confirm.
  const claimShowId = params.get('claim');
  if(claimShowId){
    const claimHorseId = params.get('h') || '';
    app.innerHTML='<div style="padding:40px;text-align:center;color:var(--equi-dim);">Adding the show to your horse…</div>';
    (async()=>{
      await loadShowInbox(true);
      const it = showInbox.items.find(x=>!x.pending && x.receipt &&
                 x.receipt.showId===claimShowId &&
                 (!claimHorseId || x.receipt.horseId===claimHorseId));
      let out;
      if(!it)            out={ok:false,msg:"Couldn't find that show result on this account."};
      else if(!it.horse) out={ok:false,msg:"That horse isn't in this stable any more."};
      else               out= await ingestShowRecord(it.horse, it.rec);
      const back = "index.html";
      app.innerHTML=`<div style="max-width:560px;margin:60px auto;text-align:center;">
        <div class="card">
          <h3 style="margin-top:0;">${out.ok?'Added':'Nothing added'}</h3>
          <p>${escAttr(out.msg||'')}</p>
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;">
            <a class="btn" href="${back}" style="text-decoration:none;">&#8592; Back to the Hub</a>
            <a class="secondary" href="stable.html" style="text-decoration:none;padding:9px 18px;border-radius:6px;">Open my stable</a>
          </div>
        </div></div>`;
    })();
    return;
  }

  const playerProfileId = params.get('player');
  if(playerProfileId){
    // Profiles live on the Hub now. Forward any older ?player= link there so
    // shared links keep working and everyone ends up in the same place.
    window.location.replace("index.html?player=" + encodeURIComponent(playerProfileId));
    return;
  }
  if(false){
    app.innerHTML='<div style="padding:40px;text-align:center;color:var(--equi-dim);font-family:var(--equi-serif);">Loading player profile…</div>';
    const stableOverride = params.get('stable');
    if(stableOverride && !STABLE_URL) STABLE_URL = stableOverride;
    loadPublicPlayer(playerProfileId, stableOverride).then(res=>{
      if(res?.success && res.data){ renderPlayerProfilePage(app, res.data); return; }
      app.innerHTML=`<div style="padding:40px;text-align:center;color:var(--equi-dim);font-family:var(--equi-serif);max-width:500px;margin:0 auto;">
        Player not found.<br><div style="font-size:1em;opacity:.8;margin-top:10px;">${res&&res.error?('Server said: "'+res.error+'"'):'Check the share link, and that the Stable script is redeployed with loadPublicProfile.'}</div>
        <br><a href="${window.location.pathname}" style="color:var(--equi-accent);">← Back</a></div>`;
    });
    return;
  }

  const riderProfileId = params.get('rider');
  if(riderProfileId){
    const localRider = state.riders.find(x=>x.id===riderProfileId);
    if(localRider){ renderRiderProfilePage(app, localRider); return; }
    app.innerHTML='<div style="padding:40px;text-align:center;color:var(--equi-dim);font-family:var(--equi-serif);">Loading rider profile…</div>';
    const stableOverride = params.get('stable');
    if(stableOverride && !STABLE_URL) STABLE_URL = stableOverride;
    loadPublicRider(riderProfileId, stableOverride).then(res=>{
      if(res?.success && res.data){ renderRiderProfilePage(app, res.data); return; }
      let reason;
      if(!stableOverride && !STABLE_URL){
        reason = 'This link is missing the Stable Data URL. Re-copy the share link from the rider\'s profile.';
      } else if(!res){
        reason = 'No response from the Stable Data server — check the Apps Script is deployed with "Anyone" access.';
      } else if(res.error){
        reason = `Server said: "${res.error}"`;
      } else {
        reason = 'The server responded, but did not return this rider. Make sure the stable script has the loadPublicRider action and is redeployed.';
      }
      app.innerHTML=`<div style="padding:40px;text-align:center;color:var(--equi-dim);font-family:var(--equi-serif);max-width:500px;margin:0 auto;">
        Rider not found.<br>
        <div style="font-size:1em;opacity:.8;margin-top:10px;background:var(--equi-ink);border:1px solid var(--equi-line);border-radius:6px;padding:10px;">${reason}</div>
        <br><a href="${window.location.pathname}" style="color:var(--equi-accent);">← Back</a>
      </div>`;
    });
    return;
  }

  if(!bankAccount.linked){
    renderLoginScreen(app);
    return;
  }

  app.innerHTML=`
    <!-- Crest and wordmark live in the site header now, so they are not
         repeated here. The signed-out login screen below still shows the
         large logo, since that page is the front door. -->
    <details ${imageLinkHelpOpen?"open":""} id="imgHelpBox" style="background:var(--equi-panel);border:1px solid var(--equi-line);border-radius:8px;padding:10px 14px;margin-bottom:14px;">
      <summary style="cursor:pointer;color:var(--equi-accent);font-family:var(--equi-display);font-weight:600;">How to add show art, prize photos & art log images (click to expand)</summary>
      <div style="margin-top:10px;line-height:1.65;color:var(--equi-text);font-size:.96em;">
        Show art, prize/ribbon photos, art log images, profile photos, reference sheets, and tack item photos are all added by <b>pasting a direct link to the image</b> — not by uploading a file.
        <br><br>
        <b>The link has to point straight at the image file itself, not the page it's posted on.</b> A page link like <code>deviantart.com/user/art/Title-12345</code> won't preview or save correctly — you need the actual image address, which usually ends in <code>.jpg</code>, <code>.png</code>, or <code>.gif</code>.
        <br><br>
        <b>DeviantArt:</b> open the full-size image, right-click it, choose "Copy Image Address."<br>
        <b>Toyhouse:</b> click through to the full-size image (not the thumbnail), then right-click → "Copy Image Address."<br>
        <b>Tumblr, Bluesky, Twitter/X, Imgur, your own site, etc.:</b> same idea — right-click the actual picture and copy its image address, not the page URL.
        <br><br>
        Paste that link into the image field and it'll preview right there. If you see a "⚠ couldn't load this image" message instead of your art, you likely copied the page link by mistake — go back and copy the image address specifically.
      </div>
    </details>
    <div class="tabs" style="align-items:center;">
      ${["roster","riders","prestige","train","compete","tack","breeding","admin"].map(t=>`
        <div class="tab${activeTab===t?' active':''}" data-tab="${t}">
          ${t==="roster"?"Stable Roster":t==="riders"?"Riders":t==="prestige"?"Rider Prestige":t==="train"?"Training":t==="compete"?"Competitions":t==="tack"?"Inventory":t==="breeding"?"Breeding":"Admin"}
        </div>`).join("")}
      <!-- Name, My Profile and Sign out live in the site header now. -->
    </div>
    <div id="tab-content"></div>
  `;

  const imgHelpBox=app.querySelector('#imgHelpBox');
  if(imgHelpBox) imgHelpBox.ontoggle=()=>{ imageLinkHelpOpen=imgHelpBox.open; };

  app.querySelectorAll('[data-tab]').forEach(b=>{
    b.onclick=()=>{ activeTab=b.dataset.tab; render(); };
  });
  const myProfileBtn=app.querySelector('#btn_myprofile');
  // Profiles live on the Community Hub — viewing AND editing. The tracker used
  // to pop its own modal, which meant two places to keep in step.
  if(myProfileBtn) myProfileBtn.onclick=()=>{
    window.location.href = "index.html?player=" + encodeURIComponent(bankAccount.userId||"");
  };
  // Quietly check for new results so the badge is current on every tab. Cached
  // for a minute, so this doesn't hit the database on every re-render.
  if(bankAccount.userId && !showInbox.loadedAt && !showInbox.loading){
    loadShowInbox().then(items=>{
      if(items && items.length) render();
      if(window.EquiNav) window.EquiNav.setBadge('stable', inboxUnreadCount());
    });
  }
  const signOutBtn=app.querySelector('#btn_signout');
  if(signOutBtn) signOutBtn.onclick=async()=>{
    if(!confirm('Sign out? Your stable data is saved to Google Sheets — sign back in anytime.')) return;
    bankAccount={userId:'',password:'',linked:false};
    window.__loginMode='signin';
    if(window.EquiAuth) await window.EquiAuth.signOut();
    state.horses=[]; state.riders=[]; state.profile=null; state.log=[]; state.tackInventory=[]; state.attireInventory=[]; state.loaded=false;
    saveBankAccount();
    load();
  };

  const content = app.querySelector('#tab-content');
  if(activeTab==="roster")   content.appendChild(renderRoster());
  else if(activeTab==="riders")   content.appendChild(renderRiders());
  else if(activeTab==="prestige")  content.appendChild(renderPrestigeTab());
  else if(activeTab==="train")   content.appendChild(renderTraining());
  else if(activeTab==="compete") content.appendChild(renderCompete());
  else if(activeTab==="tack")    content.appendChild(renderTackInventory());
  else if(activeTab==="breeding") content.appendChild(renderBreeding());
  else if(activeTab==="admin")   content.appendChild(renderAdmin());
}

  app.querySelectorAll('[data-mode]').forEach(el=>el.onclick=async()=>{

    window.__loginMode = el.dataset.mode; render();
  });

  // After a Firebase sign-in, ask the bank which stable this login owns.
  async function afterAuth(){
    say('Checking your stable…','var(--equi-dim)');
    const token = await window.EquiAuth.token();
    const who = await gasPost({ action:'getMyAccount', idToken:token });
    if(who?.success && who.data?.linked){
      bankAccount = { userId: who.data.userId, password:'', linked:true };
      saveBankAccount();
      await upgradeToOwnerSession();
      say(`✓ Welcome back, ${who.data.displayName}! Loading your stable…`, 'var(--equi-good)');
      await loadFromSheets();
      render();

      window.__loginMode = 'link';
      render();

  const go = app.querySelector('#li_go');
  if(go) go.onclick = async()=>{
    go.disabled=true;

    if(mode==='forgot'){
      const email=app.querySelector('#li_email').value.trim();
      if(!email){ say('Enter your email.','var(--equi-bad-soft)'); go.disabled=false; return; }
      say('Sending…','var(--equi-dim)');
      const r = await window.EquiAuth.resetPassword(email);
      go.disabled=false;
      if(r.success) say('✓ Check your email for a reset link. It may take a minute, and check spam.','var(--equi-good)');
      else say('✗ '+r.error,'var(--equi-bad-soft)');
      return;
    }

    const pass =app.querySelector('#li_pass').value;
    if(!email||!pass){ say('Enter your email and password.','var(--equi-bad-soft)'); go.disabled=false; return; }
    say(mode==='signup'?'Creating your account…':'Signing in…','var(--equi-dim)');
    const r = mode==='signup' ? await window.EquiAuth.signUp(email,pass) : await window.EquiAuth.signIn(email,pass);
    go.disabled=false;
    if(!r.success){ say('✗ '+r.error,'var(--equi-bad-soft)'); return; }

  // Link an existing bank account to this login (the migration path).
  const linkBtn = app.querySelector('#li_go');
  if(mode==='link' && linkBtn) linkBtn.onclick = async()=>{
    const userId=app.querySelector('#li_user').value.trim();
    const oldPass=app.querySelector('#li_oldpass').value;
    if(!userId||!oldPass){ say('Enter your old User ID and password.','var(--equi-bad-soft)'); return; }

      saveBankAccount();

    if(!userId){ say('Pick a User ID.','var(--equi-bad-soft)'); return; }
    newBtn.disabled=true; say('Creating your stable…','var(--equi-dim)');

      await loadFromSheets(); render();
    } else say('✗ '+(r?.error||'Could not create that account.'),'var(--equi-bad-soft)');
  };

  const adminUnlockBtn = app.querySelector('#li_admin_unlock');
  if(adminUnlockBtn){
    const adminPassInp = app.querySelector('#li_admin_pass');
    const doUnlock = ()=>{

      }
    };
    adminUnlockBtn.onclick = doUnlock;
    adminPassInp.onkeydown = e=>{ if(e.key==='Enter') doUnlock(); };
  }
}

// Attire equipped on a rider, shown framed with name/category (mirrors the
// equipped-tack images on horses). Falls back to a tag when no image.
function attireHtml(rider){
  const inv=state.attireInventory||[];
  const eq=(rider.attireEquipped||[]).map(id=>inv.find(t=>t.id===id)).filter(Boolean);
  if(!eq.length) return `<span class="small">Nothing equipped.</span>`;
  return eq.map(item=>{
    const cap=`${item.name} · ${item.category}`;
    if(item.image){
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;width:96px;">
        <img src="${item.image}" style="width:96px;height:96px;object-fit:contain;cursor:zoom-in;border:1px solid var(--equi-plum);border-radius:6px;background:var(--equi-ink);"
             onclick="openLightbox('${jsStr(item.image)}','${jsStr(item.name)}')" />
        <div class="small" style="text-align:center;color:var(--equi-accent-2);">${item.name}</div>
        <span data-ract="unequip-attire" data-id="${rider.id}" data-attire="${item.id}" style="cursor:pointer;color:var(--equi-rust);font-size:.85em;">remove</span>
      </div>`;
    }
    return `<span class="tag" style="background:#2a1a3a;color:var(--equi-accent-2);border-color:var(--equi-plum);">${cap} <span data-ract="unequip-attire" data-id="${rider.id}" data-attire="${item.id}" style="cursor:pointer;">✕</span></span>`;
  }).join(" ");
}

  return (state.attireInventory||[]).filter(t=>!eq.includes(t.id));
}

// ---------------- show results inbox ----------------
// Hosts can't write into our account, so nothing is "sent" to us. Instead the
// shows app records — under our OWN ownership — which shows we entered. We read
// those receipts, fetch each show by id (shows are readable by id, same as an
// invite link), and find our own row in the published results. That gives us the
// placement and the claimable record without the host mailing anything.
let showInbox = { items:[], loadedAt:0, loading:false };

function inboxRecordId(showId, horseId, classId){
  return "show_" + showId + "_" + horseId + (classId?("_"+classId):"");
}
// Rebuild the same compHistory record the shows app would hand us in a code.
function inboxRecordFrom(showDoc, receipt, row){
  const sh = showDoc.show || {};
  const placed = row.placement>=1;
  const placeLabel = p=>["1st","2nd","3rd","4th","5th","6th"][p-1]||(p+"th");
  return {
    id: inboxRecordId(sh.id||receipt.showId, row.id, row.classId),
    discipline: row.className || sh.discipline || receipt.discipline || "",
    difficulty: placed ? placeLabel(row.placement) : "Participant",
    venue: sh.title || receipt.showTitle || "",
    date: (showDoc.savedAt ? new Date(showDoc.savedAt) : new Date()).toISOString().slice(0,10),
    placement: placed ? row.placement : null,
    note: placed ? "" : "Entered — no placement",
    image: row.artUrl || null, link: row.artUrl || null, artImage: row.artUrl || null,
    litUrl: row.litUrl || null, litWords: Number(row.litWords)||0,
    artMix: (row.artMix&&row.artMix.length)?row.artMix:null,
    artBonuses: (row.artBonuses&&row.artBonuses.length)?row.artBonuses:null,
    artExp: Number(row.artExp)||0, artLabel: row.artLabel||"",
    prizes: [],
  };
}

async function loadShowInbox(force){
  if(showInbox.loading) return showInbox.items;
  if(!force && showInbox.loadedAt && Date.now()-showInbox.loadedAt < 60000) return showInbox.items;
  if(!bankAccount.userId || !window.EquiDB || !window.EquiDB.available) return showInbox.items;
  showInbox.loading = true;
  try{
    const receipts = await window.EquiDB.listByOwner('entered', bankAccount.userId) || [];
    const docs = await Promise.all(receipts.map(async rc=>{
      try{ return {rc, doc: await window.EquiDB.get('shows', rc.showId)}; }
      catch(e){ return {rc, doc:null}; }
    }));
    const items=[];
    for(const {rc, doc} of docs){
      if(!doc) continue;
      const results = (doc.published && doc.published.results) || null;
      const horse = state.horses.find(x=>x.id===rc.horseId);
      if(!results){
        items.push({ pending:true, receipt:rc, horse,
          title: (doc.show&&doc.show.title) || rc.showTitle || "A show" });
        continue;
      }
      const row = results.find(r=>r.id===rc.horseId);
      if(!row) continue;
      const rec = inboxRecordFrom(doc, rc, row);
      const claimed = !!(horse && (horse.compHistory||[]).some(r=>r.id===rec.id));
      const artLogged = !!(horse && (horse.compHistory||[]).some(r=>r.id===rec.id && r.artLogId));
      items.push({ pending:false, receipt:rc, horse, rec,
        title: rec.venue || rc.showTitle || "A show",
        placement: rec.placement, hasArt: !!rec.artImage,
        claimed, needsArt: claimed && !artLogged && !!rec.artImage });
    }
    items.sort((a,b)=> String(b.receipt.enteredAt||"").localeCompare(String(a.receipt.enteredAt||"")));
    showInbox.items = items;
    showInbox.loadedAt = Date.now();
  }catch(e){
    console.warn('[EquiStories] inbox load failed:', e && e.message);
  }finally{ showInbox.loading=false; }
  return showInbox.items;
}
// How many results are waiting on action (never claimed, or claimed without art).
function inboxUnreadCount(){
  return showInbox.items.filter(i=> !i.pending && i.horse && (!i.claimed || i.needsArt)).length;
}

      <div style="margin-top:8px;"><label>Discord <span class="small">(username or invite/profile link)</span></label><input id="pp_discord" value="${escAttr(p.discord||'')}" placeholder="e.g. pocketcaster or a discord.gg/… link" /></div>
      <div style="margin-top:8px;"><label>Bio <span class="small">(optional)</span></label><textarea id="pp_bio" style="min-height:90px;" placeholder="Tell the community about you and your stable…">${(p.bio||'').replace(/</g,'&lt;')}</textarea></div>
      <div style="margin-top:8px;">
        <label>Links <span class="small">(DeviantArt, Toyhouse, etc.)</span></label>
        <div id="pp_links"></div>
        <button id="pp_addlink" class="secondary" style="font-size:.95em;padding:3px 10px;margin-top:6px;">+ Add link</button>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
        <button id="pp_save" class="btn">Save Profile</button>
        <button id="pp_view" class="secondary">View / Share public page</button>
        <button id="pp_cancel" class="secondary">Cancel</button>
      </div>
    </div>`;
  (document.getElementById('app')||document.body).appendChild(overlay);

  const linksWrap=overlay.querySelector('#pp_links');
  function renderLinks(){
    linksWrap.innerHTML=links.map((l,i)=>`
      <div style="display:flex;gap:6px;margin-top:6px;">
        <input data-lk-label="${i}" value="${escAttr(l.label||'')}" placeholder="Label (e.g. DeviantArt)" style="max-width:180px;" />
        <input data-lk-url="${i}" value="${escAttr(l.url||'')}" placeholder="https://…" style="flex:1;" />
        <button class="secondary" data-lk-del="${i}" style="padding:3px 10px;">✕</button>
      </div>`).join("");
    linksWrap.querySelectorAll('[data-lk-del]').forEach(b=>b.onclick=()=>{ links.splice(Number(b.dataset.lkDel),1); renderLinks(); });
    linksWrap.querySelectorAll('[data-lk-label]').forEach(inp=>inp.oninput=()=>{ links[Number(inp.dataset.lkLabel)].label=inp.value; });
    linksWrap.querySelectorAll('[data-lk-url]').forEach(inp=>inp.oninput=()=>{ links[Number(inp.dataset.lkUrl)].url=inp.value; });
  }
  renderLinks();

  // ---- show results inbox ----
  const inboxList = overlay.querySelector('#pp_inbox_list');
  function renderInbox(){
    if(!inboxList) return;
    const items = showInbox.items;
    if(showInbox.loading && !items.length){
      inboxList.innerHTML = '<div class="small" style="opacity:.7;">Checking for results…</div>'; return;
    }
    if(!items.length){
      inboxList.innerHTML = '<div class="small" style="opacity:.7;">No show results yet. Shows you enter through EquiStories Shows will appear here once the host publishes.</div>'; return;
    }
    inboxList.innerHTML = items.map((it,i)=>{
      const who = it.horse ? escAttr(it.horse.name) : escAttr(it.receipt.horseName||'a horse');
      if(it.pending){
        return `<div style="padding:6px 0;border-top:1px solid #3a2c20;">
          <b>${escAttr(it.title)}</b> <span class="small" style="opacity:.75;">· ${who} · results not posted yet</span></div>`;
      }
      if(!it.horse){
        return `<div style="padding:6px 0;border-top:1px solid #3a2c20;">
          <b>${escAttr(it.title)}</b> <span class="small" style="opacity:.75;">· ${who} is no longer in this stable</span></div>`;
      }
      const place = it.placement ? (["1st","2nd","3rd","4th","5th","6th"][it.placement-1]||it.placement+"th") : "Participant";
      const done = it.claimed && !it.needsArt;
      const label = it.needsArt ? 'Add the artwork' : 'Add to horse';
      return `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:6px 0;border-top:1px solid #3a2c20;">
        <div style="flex:1;min-width:180px;">
          <b>${escAttr(it.title)}</b>
          <span class="small" style="opacity:.85;">· ${escAttr(place)} · ${who}${it.hasArt?' · art attached':''}</span>
        </div>
        ${done
          ? '<span class="small" style="color:var(--equi-good);">✓ logged</span>'
          : `<button class="btn" data-inbox-add="${i}" style="font-size:.92em;padding:3px 10px;margin-top:0;">${label}</button>`}
      </div>`;
    }).join("");
    inboxList.querySelectorAll('[data-inbox-add]').forEach(b=>{
      b.onclick=async()=>{
        const it = showInbox.items[Number(b.dataset.inboxAdd)];
        if(!it || !it.horse) return;
        b.disabled=true; b.textContent='Adding…';
        const out = await ingestShowRecord(it.horse, it.rec);
        if(out.ok || out.already){ it.claimed=true; it.needsArt=false; }
        b.textContent = out.ok ? 'Added' : 'Retry';
        b.disabled = false;
        renderInbox(); render();
      };
    });
  }
  renderInbox();
  loadShowInbox(true).then(renderInbox);
  const inboxReload = overlay.querySelector('#pp_inbox_reload');
  if(inboxReload) inboxReload.onclick=()=>{ showInbox.loadedAt=0; renderInbox(); loadShowInbox(true).then(renderInbox); };
  overlay.querySelector('#pp_addlink').onclick=()=>{ links.push({label:'',url:''}); renderLinks(); };
  overlay.querySelector('#pp_avatar').oninput=e=>{ overlay.querySelector('#pp_avatar_preview').innerHTML=urlImagePreviewHTML(e.target.value.trim()||null,'Avatar'); };
  overlay.querySelector('#pp_cancel').onclick=()=>overlay.remove();

  function collect(){
    return { ...newPlayerProfile(), ...p,
      displayName:overlay.querySelector('#pp_name').value.trim(),
      pronouns:overlay.querySelector('#pp_pronouns').value.trim(),
      avatar:overlay.querySelector('#pp_avatar').value.trim(),
      discord:overlay.querySelector('#pp_discord').value.trim(),
      bio:overlay.querySelector('#pp_bio').value.trim(),
      links:links.filter(l=>(l.label||l.url)).map(l=>({label:(l.label||'').trim(),url:(l.url||'').trim()})),
      joinedAt:p.joinedAt||new Date().toISOString(),
    };
  }
  overlay.querySelector('#pp_save').onclick=async()=>{ await savePlayerProfile(collect()); overlay.remove(); render(); };
  overlay.querySelector('#pp_view').onclick=async()=>{ await savePlayerProfile(collect()); overlay.remove(); goToPlayerProfile(bankAccount.userId); };
}

// Public player profile page — same card layout as horse/rider profiles.
function renderPlayerProfilePage(app, data){
  const prof = data.profile || {};
  const name = (prof.displayName && prof.displayName.trim()) || data.userId;
  const horses = data.horses || [];
  const riders = data.riders || [];
  const owned = bankAccount.linked && bankAccount.userId===data.userId;

  const shareUrl=new URL(window.location.origin+window.location.pathname);
  shareUrl.searchParams.set('player', data.userId);
  if(STABLE_URL) shareUrl.searchParams.set('stable', STABLE_URL);

  const avatar = prof.avatar
    ? `<img src="${prof.avatar}" onclick="openLightbox('${jsStr(prof.avatar)}','${jsStr(name)}')" style="width:min(240px,50vw);height:min(240px,50vw);border-radius:12px;object-fit:cover;border:3px solid var(--equi-accent);cursor:zoom-in;" />`
    : `<div style="width:min(240px,50vw);height:min(240px,50vw);border-radius:12px;border:3px solid var(--equi-line);display:flex;align-items:center;justify-content:center;font-size:3.5em;background:var(--equi-ink);">👤</div>`;

  let discordHtml='';
  if(prof.discord){
    const d=prof.discord.trim();
    discordHtml = /^https?:\/\//.test(d)
      ? `<a href="${d}" target="_blank" rel="noopener">Discord ↗</a>`
      : `Discord: <b>${d.replace(/</g,'&lt;')}</b>`;
  }
  const linksHtml=(Array.isArray(prof.links)?prof.links:[]).filter(l=>l.url).map(l=>
    `<a href="${l.url}" target="_blank" rel="noopener" class="tag" style="margin:2px;">${(l.label||l.url).replace(/</g,'&lt;')} ↗</a>`).join(" ");

  const horseCards = horses.length ? horses.map(h=>`
    <div class="tag" data-act="pp-open-horse" data-id="${h.id}" style="cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin:4px;padding:6px 10px;">
      ${h.image?`<img src="${h.image}" style="width:34px;height:34px;object-fit:cover;border-radius:5px;" />`:''}
      <span><b>${(h.name||'Horse').replace(/</g,'&lt;')}</b> · ${h.breed||''} · Lvl ${h.level||1}</span>
    </div>`).join("") : `<span class="small">No horses yet.</span>`;

  const riderCards = riders.length ? riders.map(r=>`
    <div class="tag" data-act="pp-open-rider" data-id="${r.id}" style="cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin:4px;padding:6px 10px;background:#2a1a3a;color:var(--equi-accent-2);border-color:var(--equi-plum);">
      ${r.image?`<img src="${r.image}" style="width:34px;height:34px;object-fit:cover;border-radius:5px;" />`:''}
      <span><b>${(r.name||'Rider').replace(/</g,'&lt;')}</b> · ${riderTitle(r.pp||0).name} · ${r.pp||0} PP</span>
    </div>`).join("") : `<span class="small">No riders yet.</span>`;

  app.innerHTML=`
    <style>
      body { background:var(--equi-bg); color:var(--equi-text); font-family:var(--equi-serif); }
      .pcard { background:var(--equi-panel); border:1px solid var(--equi-line); border-radius:10px; padding:clamp(18px,3vw,28px); margin-bottom:20px; }
      .pcard h3 { color:var(--equi-accent); margin-top:0; }
      a { color:var(--equi-accent); }
      .tag { display:inline-block; font-size:.97em; padding:4px 10px; border-radius:10px; background:var(--equi-ink); color:var(--equi-dim); border:1px solid var(--equi-line); }
    </style>
    <div style="width:100%;margin:0 auto;padding:clamp(16px,3vw,32px);">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
        <span data-act="pp-back" style="color:var(--equi-accent);cursor:pointer;">← Back to Stable Manager</span>
        ${owned?`<button data-act="pp-edit" class="secondary" style="margin-top:0;">Edit my profile</button>`:''}
      </div>
      <div class="pcard">
        <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
          <div style="flex:none;">${avatar}</div>
          <div style="flex:1;min-width:220px;">
            <h1 style="margin:0;color:var(--equi-accent);font-size:1.9em;">${name.replace(/</g,'&lt;')} ${prof.pronouns?`<span class="small" style="color:var(--equi-faint);font-weight:normal;">${prof.pronouns.replace(/</g,'&lt;')}</span>`:''}</h1>
            <div class="small" style="margin-top:2px;">Account: ${data.userId}</div>
            <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">${discordHtml?`<span class="tag">${discordHtml}</span>`:''} ${linksHtml}</div>
            ${prof.bio?`<div style="margin-top:12px;line-height:1.6;white-space:pre-wrap;">${prof.bio.replace(/</g,'&lt;')}</div>`:''}
          </div>
        </div>
      </div>
      <div class="pcard">
        <h3>Horses (${horses.length})</h3>
        <div>${horseCards}</div>
      </div>
      <div class="pcard">
        <h3>Riders (${riders.length})</h3>
        <div>${riderCards}</div>
      </div>
      <div style="text-align:center;margin:20px 0;">
        <div class="small" style="margin-bottom:6px;">Shareable link to this profile:</div>
        <input readonly value="${shareUrl.toString()}" onclick="this.select()" style="max-width:480px;width:100%;text-align:center;padding:8px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:6px;font-family:var(--equi-mono);" />
      </div>
    </div>`;

  app.querySelector('[data-act="pp-back"]').onclick=()=>{ if(owned){ const u=new URL(window.location.href); u.searchParams.delete('player'); history.pushState({},'',u); render(); } else { location.href=location.pathname; } };
  const editBtn=app.querySelector('[data-act="pp-edit"]'); if(editBtn) editBtn.onclick=()=>showPlayerProfileModal();
  app.querySelectorAll('[data-act="pp-open-horse"]').forEach(b=>b.onclick=()=>goToProfile(b.dataset.id));
  app.querySelectorAll('[data-act="pp-open-rider"]').forEach(b=>b.onclick=()=>goToRiderProfile(b.dataset.id));
}

// RIDER PROFILE EDIT MODAL  (mirrors showProfileModal for horses)

function showRiderProfileModal(riderId){
  const r=state.riders.find(x=>x.id===riderId);
  if(!r) return;
  const pp=riderPP(r);
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';

  function field(id, label, val, placeholder, type='input'){
    const inp = type==='textarea'
      ? `<textarea id="${id}" rows="4" placeholder="${placeholder}" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;margin-top:3px;box-sizing:border-box;font-family:var(--equi-serif);resize:vertical;">${val||''}</textarea>`
      : `<input id="${id}" value="${escAttr(val||'')}" placeholder="${placeholder}" style="width:100%;padding:7px;background:var(--equi-ink);border:1px solid var(--equi-line);color:var(--equi-text);border-radius:5px;margin-top:3px;box-sizing:border-box;" />`;
    return `<div style="margin-bottom:10px;"><label style="font-size:.98em;color:var(--equi-dim);text-transform:uppercase;display:block;">${label}</label>${inp}</div>`;
  }

  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid var(--equi-accent);border-radius:10px;padding:24px;max-width:760px;width:100%;color:var(--equi-text);font-family:var(--equi-serif);margin:auto;">
    <h3 style="margin-top:0;color:var(--equi-accent);">Edit Profile — ${r.name}</h3>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;">${field('rm_name','Rider Name',r.name,'e.g. Natalia Jones')}</div>
      <div style="width:150px;">${field('rm_pronouns','Pronouns (optional)',r.pronouns,'she/her')}</div>
    </div>
    ${field('rm_barn','Barn / Stable (optional)',r.barn,'e.g. Claymont Acres')}
    ${field('rm_image','Profile Image Link (optional)',r.image,'https://… direct image address')}
    <div id="rm_preview" style="margin:-4px 0 10px;">${r.image?urlImagePreviewHTML(r.image,'Rider'):''}</div>
    ${field('rm_link','Reference / Profile Sheet Link (optional)',r.link,'https://…')}
    ${pp>=100?field('rm_title','Custom Prestige Title (100+ PP)',r.customTitle,'Your awarded title'):''}
    ${field('rm_bio','Bio',r.bio,'Name, age, occupation, personality, backstory…','textarea')}
    <button id="rm_save" style="width:100%;background:var(--equi-accent);color:var(--equi-panel);border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1.1em;">Save</button>
    <button id="rm_cancel" style="margin-top:8px;width:100%;background:var(--equi-raised);color:var(--equi-text);border:1px solid var(--equi-line);padding:10px;border-radius:6px;cursor:pointer;font-size:1.1em;">Cancel</button>
    <div id="rm_status" style="margin-top:8px;font-size:.92em;color:var(--equi-dim);text-align:center;min-height:1.2em;"></div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#rm_image').oninput=e=>{
    overlay.querySelector('#rm_preview').innerHTML=urlImagePreviewHTML(e.target.value.trim()||null,'Rider');
  };
  overlay.querySelector('#rm_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#rm_save').onclick=async()=>{
    const btn=overlay.querySelector('#rm_save'), st=overlay.querySelector('#rm_status');
    btn.disabled=true; btn.textContent='Saving…'; st.textContent='Saving…';
    try{
      r.name     = overlay.querySelector('#rm_name').value.trim() || r.name;
      r.pronouns = overlay.querySelector('#rm_pronouns').value.trim();
      r.barn     = overlay.querySelector('#rm_barn').value.trim();
      r.image    = overlay.querySelector('#rm_image').value.trim();
      r.link     = overlay.querySelector('#rm_link').value.trim();
      r.bio      = overlay.querySelector('#rm_bio').value.trim();
      const t=overlay.querySelector('#rm_title'); if(t) r.customTitle=t.value.trim();
      await saveRider(r); await save();
      overlay.remove(); render();
    }catch(err){
      console.error('[Rider save]', err);
      btn.disabled=false; btn.textContent='Save';
      st.textContent='Could not save: '+(err&&err.message?err.message:err);
    }
  };
}

function renderRiderProfilePage(app, rider){
  const shareUrl = new URL(window.location.origin + window.location.pathname);
  shareUrl.searchParams.set('rider', rider.id);
  if(STABLE_URL) shareUrl.searchParams.set('stable', STABLE_URL);

  const pp=riderPP(rider);
  const title=riderTitle(pp);
  const prog=riderProgress(pp);
  const showTitle=(pp>=100 && rider.customTitle)?rider.customTitle:title.name;
  const pct=prog.pct;

  const inv=state.attireInventory||[];
  let eq=(rider.attireEquipped||[]).map(id=>inv.find(t=>t.id===id)).filter(Boolean);
  if(!eq.length && Array.isArray(rider.attireItems)) eq=rider.attireItems;
  const attireHtml = eq.length ? eq.map(item=>{
    if(item.image){
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;width:150px;">
        <img src="${item.image}" style="width:150px;height:150px;object-fit:contain;cursor:zoom-in;border:1px solid var(--equi-plum);border-radius:6px;background:var(--equi-ink);"

        <div class="small" style="text-align:center;color:var(--equi-accent-2);">${item.name}<br><span style="color:var(--equi-faint);">${item.category||""}</span></div>

    }
    return `<span class="tag" style="background:#2a1a3a;color:var(--equi-accent-2);border-color:var(--equi-plum);">${item.name}${item.category?` (${item.category})`:""}</span>`;
  }).join(" ") : `<span class="small">Nothing equipped.</span>`;

  app.innerHTML=`

      .pcard { background:var(--equi-panel); border:1px solid var(--equi-line); border-radius:10px; padding:clamp(18px,3vw,28px); margin-bottom:20px; }
      .pcard h3 { color:var(--equi-accent); margin-top:0; font-family:var(--equi-display); }
      .pcard .small { font-size:1em; color:var(--equi-dim); }
      a { color:var(--equi-accent); }
      .expbar-bg { height:10px; background:var(--equi-ink); border-radius:5px; overflow:hidden; margin-top:6px; }
      .expbar-fill { height:100%; background:linear-gradient(90deg,#8a6fb0,var(--equi-accent-2)); }

      .artlog-panel { background:var(--equi-ink); border:1px solid var(--equi-line); border-radius:6px; padding:12px; overflow-y:auto; }
      .artlog-entry { padding:10px 0; border-bottom:1px dashed var(--equi-raised); }
      .artlog-entry:last-child { border-bottom:none; }
    </style>

    <div style="width:100%;margin:0 auto;padding:clamp(16px,3vw,32px);">
      <div style="margin-bottom:12px;"><span data-act="back-from-rider" style="color:var(--equi-accent);text-decoration:none;cursor:pointer;">\u2190 Back to Stable Manager</span></div>

      <div class="pcard">
        <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">

            ${state.riders.some(x=>x.id===rider.id)?`<button data-act="rider-edit-profile" data-id="${rider.id}" class="secondary" style="margin-top:12px;font-size:.95em;padding:6px 14px;">Edit Profile</button>`:''}
          </div>

function riderProgress(pp){
  const t=riderTitle(pp);
  if(t.max===Infinity) return { pct:100, toNext:0, next:null };
  const span=t.max - t.min + 1;
  const into=pp - t.min;
  const next=RIDER_TITLES[RIDER_TITLES.indexOf(t)+1];
  return { pct: Math.min(100, Math.round((into/span)*100)), toNext: (t.max+1)-pp, next };
}

    deleteRiderFromSheets(rider.id); await save(); render();

    const rider=state.riders.find(r=>r.id===b.dataset.id); if(!rider) return;
    if(!confirm('Delete this entry? Its PP will be removed.')) return;

    rider.artLog=(rider.artLog||[]).filter(e=>e.id!==entryId);
    if(fsReady()){ await saveRider(rider); }          // log lives in the rider doc

      await stableGas({ action:'deleteRiderArtLogEntry', userId:bankAccount.userId, riderId:rider.id, entryId });
    }
    await save(); render();
  });

  // live PP total + save, per open entry form
  bindRiderEntryForm(wrap);
}

// Wire a rider PP entry form (Training-style: type dropdown + stackable add-on pills).
function bindRiderEntryForm(scope){
  scope.querySelectorAll('[data-rider-entry]').forEach(form=>{
    const rid=form.dataset.riderEntry;
    const typeSel=form.querySelector('.rpp_type');
    const addons=form.querySelector('.rpp_addons');
    const imgIn=form.querySelector('.rpp_image');
    const preview=form.querySelector('.rpp_image_preview');
    const selected=new Set();

    const recalc=()=>{
      let sum=Number(typeSel.selectedOptions[0]?.dataset.pp)||0;
      selected.forEach(k=> sum+=Number(RIDER_PP_ADDONS[k])||0);
      form.querySelectorAll('.rpp_total, .rpp_btn_total').forEach(s=>s.textContent=sum);
      return sum;
    };
    typeSel.onchange=recalc;
    addons.querySelectorAll('[data-addon]').forEach(p=>p.onclick=()=>{
      const k=p.dataset.addon;
      if(selected.has(k)){ selected.delete(k); p.classList.remove('active'); }
      else { selected.add(k); p.classList.add('active'); }
      recalc();
    });
    if(imgIn) imgIn.oninput=()=>{ preview.innerHTML=urlImagePreviewHTML(imgIn.value.trim()||null,'Prestige'); };
    recalc();

    form.querySelector('.rpp_save').onclick=async()=>{
      const rider=state.riders.find(r=>r.id===rid); if(!rider) return;
      const primary=typeSel.value;
      const pp=recalc();
      const sources=[`${primary} (+${RIDER_PP_TYPES[primary]})`, ...[...selected].map(k=>`${k} (+${RIDER_PP_ADDONS[k]})`)];
      const words=Number(form.querySelector('.rpp_words').value)||0;
      const entry={
        id:'re_'+Math.random().toString(36).slice(2,10),
        label:form.querySelector('.rpp_label').value.trim()|| primary,
        link:form.querySelector('.rpp_link').value.trim(),
        image:(imgIn&&imgIn.value.trim())||null,
        words: words||undefined,
        pp, sources,
        date:new Date().toISOString(),
      };
      if(!rider.artLog) rider.artLog=[];
      rider.artLog.push(entry);
      addLog(`${rider.name} earned +${pp} PP — ${entry.label}.`);
      await saveRiderEntry(rider, entry);
      openRiderEntry.delete(rid); await save(); render();
    };
  });
}

// duplicate row), recomputes its EXP from art type + bonuses + lit, and lets you
// toggle whether the horse's rider is featured (grants/removes PP).

function showTrainingEditModal(horse, entryId){

  const overlay=el('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:24px;color:var(--text);';

    <div class="card" style="max-width:760px;width:100%;margin-top:20px;background:var(--equi-panel);border:1px solid var(--equi-line);box-shadow:0 12px 40px rgba(0,0,0,.6);">
      <h3 style="margin-top:0;">Edit Training Entry</h3>
      <div style="margin-top:6px;">
        <label>Art Image URL</label>
        <input type="text" id="te_image" value="${escAttr(e.image||'')}" placeholder="https://…jpg / .png / .gif" />
        <div id="te_preview" style="margin-top:6px;">${e.image?urlImagePreviewHTML(e.image,'Training'):''}</div>
      </div>
      <div style="margin-top:8px;"><label>Title / label</label><input id="te_label" value="${escAttr(e.label||'')}" /></div>
      <div class="row" style="margin-top:8px;">
        <div><label>Art Type</label>
          <select id="te_art">
            <option value="">— none —</option>
            ${Object.keys(ART_EXP).map(k=>`<option value="${k}"${e.art===k?' selected':''}>${k} (+${ART_EXP[k]} EXP)</option>`).join("")}
          </select>
        </div>
        <div><label>Literature Word Count</label><input type="number" id="te_lit" min="0" value="${litNum||''}" placeholder="optional" /></div>
      </div>
      <div style="margin-top:8px;">
        <label>Bonus Elements</label>
        <div class="pill-select" id="te_bonuses">
          ${Object.keys(BONUS_EXP).map(k=>`<div class="pill${(e.bonuses||[]).includes(k)?' active':''}" data-bonus="${k}">${k} (+${BONUS_EXP[k]})</div>`).join("")}
        </div>
      </div>
      <div style="margin-top:8px;"><label>Link to Art</label><input id="te_link" value="${escAttr(e.link||'')}" placeholder="https://…" /></div>
      <label style="margin-top:10px;display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="te_featured" ${e.featuredRiderId?'checked':''} style="width:18px;height:18px;" />
        Rider featured here ${rider?`— grants <b>${rider.name}</b> Prestige (+1)`:`<span style="color:var(--equi-rust);">(assign a rider to this horse first)</span>`}
      </label>
      <div class="small" style="margin-top:6px;opacity:.75;">Note: stat gains stay as originally logged — art type/bonuses/lit here adjust EXP only.</div>
      <div style="margin-top:14px;display:flex;gap:8px;">
        <button id="te_save" class="btn">Save changes</button>
        <button id="te_cancel" class="secondary">Cancel</button>
      </div>
    </div>`;
  (document.getElementById('app')||document.body).appendChild(overlay);

  const sel=new Set(e.bonuses||[]);
  overlay.querySelector('#te_image').oninput=ev=>{ overlay.querySelector('#te_preview').innerHTML=urlImagePreviewHTML(ev.target.value.trim()||null,'Training'); };
  overlay.querySelectorAll('#te_bonuses .pill').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(sel.has(k)){sel.delete(k);p.classList.remove('active');} else {sel.add(k);p.classList.add('active');}
  });
  overlay.querySelector('#te_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#te_save').onclick=async()=>{
    let ok=false, errMsg='';
    try{
    const art=overlay.querySelector('#te_art').value;
    const lit=Number(overlay.querySelector('#te_lit').value)||0;
    const bonuses=[...sel];
    let exp=ART_EXP[art]||0;
    const litExp=calcLitExp(lit); if(litExp>0) exp+=litExp;
    bonuses.forEach(k=>{ if(BONUS_EXP[k]) exp+=BONUS_EXP[k]; });

    e.image=overlay.querySelector('#te_image').value.trim()||null;
    e.label=overlay.querySelector('#te_label').value.trim()||e.label;
    e.art=art||null;
    e.lit=lit?`${lit} words`:null;
    e.bonuses=bonuses;
    e.link=overlay.querySelector('#te_link').value.trim()||null;
    e.exp=exp;

    const wantFeatured=overlay.querySelector('#te_featured').checked;
    if(wantFeatured && !e.featuredRiderId){
      if(rider){ e.featuredRiderId=rider.id; }
    } else if(!wantFeatured && e.featuredRiderId){
      e.featuredRiderId=null;
    }

    recomputeHorse(horse);
    }catch(err){ errMsg=(err&&err.message)?err.message:String(err); console.error('Edit apply failed:',err); }

    // Always close the box and refresh the view with the applied edits.
    overlay.remove();
    render();
    if(errMsg){ alert('The edit was applied on screen, but something went wrong: '+errMsg); }

    // Persist in the background (won't block the UI). Handles the rider PP link too.
    (async()=>{
      try{
        const wantFeatured = e.featuredRiderId;
        if(wantFeatured && rider){ await grantRiderPPForEntry(rider,'training',e,horse); }
        else { await removeRiderPPForSource(e.id); }
        const okSave = await saveArtEntry(horse, e);
        await saveHorse(horse); await save();
        if(!okSave) console.warn('saveArtEntry returned false (Stable URL?).');
      }catch(err){ console.error('Background save failed:',err); }
    })();
  };
}

function renderRoster(){
  const wrap = el('div');

  const form = el('div','card',`
    <details id="nh_details" class="collapse">
      <summary>
        <span class="chev" aria-hidden="true">&#9656;</span>
        <span>Add a Horse</span>
        <span class="summary-hint">click to expand</span>
      </summary>
      <div class="collapse-body">
    <div class="row">
      <div><label>Name</label><input id="nh_name" placeholder="e.g. Banshee" /></div>
      <div><label>Age</label><input id="nh_age" type="number" min="0" value="3" style="max-width:80px;" /></div>
      <div><label>Height <span style="opacity:.6;font-weight:normal;">(optional)</span></label><input id="nh_height" placeholder="e.g. 16.2 hh" style="max-width:120px;" /></div>
      <div style="flex:1;min-width:200px;"><label>Import sheet link <span style="opacity:.6;font-weight:normal;">(optional)</span></label><input id="nh_import" placeholder="https://… reference/import sheet" /></div>
      <div><label>Breed</label>
        <select id="nh_breed_select">
          <option value="">— Select a breed —</option>
          ${(()=>{ const {common,custom}=getBreedOptionGroups();
            const commonOpts=common.map(b=>`<option value="${b.key}">${b.name}</option>`).join("");
            const customOpts=custom.length?`<optgroup label="— Custom/Created Breeds —">
              ${custom.map(b=>`<option value="${b.name.toLowerCase()}">${b.name}</option>`).join("")}
            </optgroup>`:"";
            return `<optgroup label="— Common Breeds —">${commonOpts}</optgroup>${customOpts}
              <option value="__other__">Other (type it in)…</option>`;
          })()}
        </select>
        <input id="nh_breed_other" placeholder="Type breed name" style="display:none;margin-top:4px;" />
      </div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Gender <span class="small">(optional)</span></label>
        <select id="nh_gender">
          <option value="">— unset —</option>
          <option>Mare</option><option>Stallion</option><option>Gelding</option>
          <option>Filly</option><option>Colt</option><option>Rig</option>
        </select>
      </div>
    </div>
    <h4 style="margin:14px 0 4px;color:var(--accent);">Genetics</h4>
    <p class="small" style="margin:0 0 8px;">Pick alleles for each gene — the loci shown update based on Breed. This feeds directly into Net Worth.</p>
    <div id="nh_genetics_wrap"></div>

    <h4 style="margin:14px 0 4px;color:var(--accent);">Rare Markings & Custom Traits <span class="small">(optional)</span></h4>
    <p class="small" style="margin:0 0 8px;">Add any rare markings or Custom Breed exclusive traits this horse carries. Each one adds to its Net Worth.</p>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <select id="nh_mod_pick" style="flex:1;">
        <option value="">— Pick a marking/trait —</option>
      </select>
      <button id="nh_add_mod" class="secondary" style="white-space:nowrap;">+ Add</button>
    </div>
    <div id="nh_mod_list" class="prompt-box" style="margin-bottom:10px;"></div>

    <div id="nh_geno_preview" class="prompt-box" style="margin-top:8px;"></div>
    <button id="nh_add" style="margin-top:10px;">Add to Stable</button>
      </div>
    </details>
  `);
  wrap.appendChild(form);

  // render() rebuilds this whole card, so the panel would snap shut every time
  // a horse is added. Mirror the open/closed state into a variable that
  // outlives the re-render.
  const nhDetails=form.querySelector('#nh_details');
  nhDetails.open=addHorseOpen;
  nhDetails.addEventListener('toggle',()=>{ addHorseOpen=nhDetails.open; });

  const genoSelections={extension:"EE", agouti:"AA"};
  const extraModifiers=[];

  function currentBreedKey(){
    const sel=form.querySelector('#nh_breed_select').value;
    if(sel==='__other__') return form.querySelector('#nh_breed_other').value.trim().toLowerCase();
    return sel;
  }
  function currentBreedDisplay(){
    const sel=form.querySelector('#nh_breed_select').value;
    if(sel==='__other__') return form.querySelector('#nh_breed_other').value.trim()||"Unspecified";
    if(!sel) return "Unspecified";
    const {common,custom}=getBreedOptionGroups();
    const found = common.find(b=>b.key===sel) || custom.find(b=>b.name.toLowerCase()===sel);
    return found ? found.name : sel;
  }
  form.querySelector('#nh_breed_select').onchange=()=>{
    const isOther=form.querySelector('#nh_breed_select').value==='__other__';
    form.querySelector('#nh_breed_other').style.display = isOther ? 'block' : 'none';
    renderGeneticsPicker();
    renderModPicker();
  };
  form.querySelector('#nh_breed_other').oninput=()=>{ renderGeneticsPicker(); renderModPicker(); };

  // Rare Markings (built-in + Custom Rare Markings from the Admin panel) is
  // available to every breed by default. A Custom Rare Marking can also be
  // scoped to specific breeds in Admin — if it has a breeds list, it only
  // shows up in the picker for horses of one of those breeds.
  function renderModPicker(){
    const breed=(currentBreedKey()||"").trim().toLowerCase();
    const breedName=(currentBreedDisplay()||"").trim().toLowerCase();
    const hasCode=(locus,code)=>genoSelections[locus]===code;
    const customForBreed=(state.customMarkings||[]).filter(m=>
      !m.breeds || !m.breeds.length || m.breeds.some(b=>b.toLowerCase()===breed || b.toLowerCase()===breedName));
    const groups={
      "Rare Markings":[...GENO_MODIFIERS["Rare Markings"], ...customForBreed]
        .filter(m=>markingMeetsGeneRequirement(m.label, hasCode)),
    };
    const pick=form.querySelector('#nh_mod_pick');
    const prevVal=pick.value;
    pick.innerHTML=`<option value="">— Pick a marking/trait —</option>`+
      Object.entries(groups).map(([group,items])=>`
        <optgroup label="— ${group} —">
          ${items.map(m=>`<option value="${m.value}|${m.label}">${m.label} (+฿${m.value})</option>`).join("")}
        </optgroup>`).join("");
    if([...pick.options].some(o=>o.value===prevVal)) pick.value=prevVal;
  }
  renderModPicker();

  function refreshModList(){
    const list=form.querySelector('#nh_mod_list');
    list.innerHTML=extraModifiers.length ? extraModifiers.map((m,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="flex:1;">${m.label}</span>
        <span class="small" style="color:var(--accent);">+฿${m.value.toLocaleString()}</span>
        <button data-remove="${i}" class="secondary" style="padding:2px 8px;font-size:.9em;">✕</button>
      </div>`).join("") : `<div class="small" style="opacity:.6;">No rare markings or traits added.</div>`;
    list.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{
      extraModifiers.splice(Number(b.dataset.remove),1);
      refreshModList();
      refreshGenoPreview();
    });
  }
  form.querySelector('#nh_add_mod').onclick=()=>{
    const val=form.querySelector('#nh_mod_pick').value;
    if(!val) return;
    const [price, ...labelParts]=val.split('|');
    const label=labelParts.join('|');
    const def=[...Object.values(GENO_MODIFIERS).flat(), ...(state.customMarkings||[])].find(m=>m.label===label);
    extraModifiers.push({label, value:Number(price), genoTag:def&&def.genoTag||null, rare:true});
    refreshModList();
    refreshGenoPreview();
    form.querySelector('#nh_mod_pick').value='';
  };
  refreshModList();

  function renderGeneticsPicker(){
    const breed=currentBreedKey();
    const fixedBase=getFixedBase(breed);
    const loci=[allLoci().find(l=>l.key==="extension"), allLoci().find(l=>l.key==="agouti"),
      ...getAllowedLoci(breed).map(k=>allLoci().find(l=>l.key===k))].filter(Boolean);
    const wrapEl=form.querySelector('#nh_genetics_wrap');
    wrapEl.innerHTML=`<div class="gene-grid">
      ${loci.map(locus=>{
        if(locus.requiresAny){
          const satisfiesAll=Object.entries(locus.requiresAny).every(([reqKey,reqCodes])=>reqCodes.includes(genoSelections[reqKey]));
          if(!satisfiesAll) return "";
        }
        const fixedCode = fixedBase && (locus.key==="extension"||locus.key==="agouti") ? fixedBase[locus.key] : null;
        const options = getLocusOptions(locus, breed);
        let current = fixedCode || genoSelections[locus.key] || options[0].code;
        if(!options.some(o=>o.code===current)) current = options[0].code;
        genoSelections[locus.key]=current;
        const labelAttr=locus.label.replace(/"/g,"&quot;");
        if(fixedCode){
          const opt=options.find(o=>o.code===fixedCode);
          return `<div class="gene-cell">
            <label class="small" title="${labelAttr} — fixed for this breed">${locus.label}</label>
            <div class="small" style="padding:7px 0;opacity:.75;">${fixedCode} — ${opt?opt.desc:""} <span style="opacity:.65;">(fixed for breed)</span></div>
          </div>`;
        }
        return `<div class="gene-cell">
          <label class="small" title="${labelAttr}">${locus.label}</label>
          <select data-locus="${locus.key}">
            ${options.map(o=>`<option value="${o.code}" ${o.code===current?"selected":""}>${o.code} — ${o.desc}</option>`).join("")}
          </select>
        </div>`;
      }).join("")}
    </div>`;
    wrapEl.querySelectorAll('[data-locus]').forEach(sel=>sel.onchange=()=>{
      genoSelections[sel.dataset.locus]=sel.value;
      renderGeneticsPicker();
      renderModPicker();
    });
    refreshGenoPreview();
  }
  function collectExtraModifiers(){
    return [...extraModifiers];
  }
  function refreshGenoPreview(){
    const breed=currentBreedKey();
    const result=computeGenoResult(genoSelections, breed);
    const extras=collectExtraModifiers();
    const extrasTotal=extras.reduce((s,m)=>s+m.value,0);
    const grandTotal=result.totalPrice+extrasTotal;
    const tags=extras.filter(m=>m.genoTag).map(m=>m.genoTag);
    const genotypeStr=tags.length?`${result.genotype} ${tags.join(" ")}`:result.genotype;
    const base=computeBaseColor(genoSelections.extension, genoSelections.agouti);
    const friesianNote = (breed==="friesian" && base.label!=="Black")
      ? `<div class="small" style="opacity:.8;margin-top:4px;">🐴 Bay and chestnut ("Fire Friesian") only make up about 20% of real Friesians — rare, but far from impossible. Have fun with it!</div>`
      : "";
    form.querySelector('#nh_geno_preview').innerHTML=
      `<b>Phenotype:</b> ${result.phenotype}<br><b>Genotype:</b> ${genotypeStr}<br>`+
      (extras.length?`<span class="small">+ ${extras.map(m=>m.label).join(", ")}</span><br>`:"")+
      `<span class="small">Genetics value: ฿${grandTotal.toLocaleString()}</span>${friesianNote}`;
  }
  renderGeneticsPicker();
  form.querySelector('#nh_add').onclick=()=>{
    const name=form.querySelector('#nh_name').value.trim();
    const age=form.querySelector('#nh_age').value;
    const breedKey=currentBreedKey();
    const breed=currentBreedDisplay();
    const gender=form.querySelector('#nh_gender').value;
    if(!name){alert("Give your horse a name first!"); return;}
    const geno=computeGenoResult(genoSelections, breedKey);
    const allExtras=collectExtraModifiers();
    const allModifiers=[...geno.genoModifiers, ...allExtras];
    const tags=allExtras.filter(m=>m.genoTag).map(m=>m.genoTag);
    const genotype=tags.length?`${geno.genotype} ${tags.join(" ")}`:geno.genotype;
    const height=form.querySelector('#nh_height')?.value.trim()||"";
    const importLink=form.querySelector('#nh_import')?.value.trim()||"";
    const h=newHorse({name,age,breed,gender,phenotype:geno.phenotype,genotype,height,importLink,
      genoBasePrice:geno.genoBasePrice, genoModifiers:allModifiers,
      genoObj:Object.assign({}, genoSelections)});
    state.horses.push(h);
    addLog(`${h.name} (${breed}) joined the stable.`);
    // The panel has done its job — fold it away so the roster below is visible
    // straight after adding. render() rebuilds the form, and renderRoster()
    // reads addHorseOpen to decide whether <details> comes back open.
    addHorseOpen = false;
    saveHorse(h); save(); render();
  };

  state.horses.forEach(h=>{
    const open = expandedLogs.has(h.id);
    const pct = h.level>=10?100:Math.min(100,((h.exp-LEVEL_TABLE[h.level].exp)/(LEVEL_TABLE[h.level+1].exp-LEVEL_TABLE[h.level].exp))*100);
    const photoHtml = h.profileImage
      ? `<img src="${h.profileImage}" class="horse-photo" />`
      : `<div class="horse-photo-placeholder"></div>`;
    const dStats = disciplineStats(h);
    const statBars = STATS.map(s=>{
      const base=h.stats[s]||0, bonus=getEquippedStatBonus(h,s), eff=base+bonus;
      const key = dStats.includes(s);
      return `<div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:3px 8px;border-radius:5px;white-space:nowrap;${key?'background:#2a1f12;border:1px solid #4a3a1a;':'border:1px solid transparent;'}" ${key?`title="Key stat for ${h.discipline}"`:''}>
        <span style="font-size:.92em;color:${key?'var(--equi-brass-light)':'var(--dim)'};font-weight:${key?'bold':'normal'};">${key?'★ ':''}${STAT_LABELS[s]}</span>
        <span style="font-size:.92em;font-weight:bold;color:var(--accent);" title="${bonus?`Base ${base} + ${bonus} from tack = ${eff}`:`Base ${base}`}">${base}${bonus?` <span style="color:var(--good);font-weight:normal;">(+${bonus})</span>`:""}</span>
      </div>`;
    }).join("");

    let slots="";
    for(let i=0;i<h.breedingSlots;i++){
      const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===i);
      const reserved = rec && rec.reservedFor && !rec.partnerName;
      const cls = reserved ? " reserved" : (rec ? " filled" : "");
      const title = reserved ? ('Reserved for '+rec.reservedFor) : (rec ? ('Used — '+rec.partnerName) : 'Click to mark used or reserve');
      slots+=`<div class="slot${cls}" data-act="slot-click" data-id="${h.id}" data-slot="${i}" style="cursor:pointer;" title="${escAttr(title)}">${i+1}</div>`;
    }

    const artLogIds = new Set((h.artLog||[]).map(e=>e.id));
    // Shows logged without attached art produce a compHistory record but no
    // artLog entry, so they never showed on the profile — which hid offsite/past
    // shows and most sub-podium results. Surface those here too.
    const profPlace = pl => pl ? (["1st","2nd","3rd","4th","5th","6th"][pl-1]||pl+"th") : "Participant";
    const showOnly = (h.compHistory||[]).filter(r=> !r.artLogId || !artLogIds.has(r.artLogId));
    const showOnlyHtml = showOnly.map(r=>`
          <div class="artlog-entry">
            ${r.image?`<img src="${r.image}" class="artlog-thumb" data-lightbox="${r.image}" data-caption="${escAttr(r.discipline||'Show')}" style="cursor:zoom-in;" />`:""}
            <b>${r.discipline||'Show'}${r.difficulty?` — ${r.difficulty}`:""}</b> <span class="tag">${profPlace(r.placement)}</span>
            ${r.venue?`<span class="small" style="margin-left:6px;">${r.venue}${r.date?` · ${r.date}`:""}</span>`:(r.date?`<span class="small" style="margin-left:6px;">${r.date}</span>`:"")}
            ${r.note?`<div class="small" style="margin-top:2px;opacity:.8;">${r.note}</div>`:""}
          </div>`).join("");
    // Gallery view: images keep their own aspect ratio in a masonry column
    // layout instead of being cropped to a fixed thumbnail.
    const galleryItems = (h.artLog||[]).filter(e=>e.image).map(e=>`
      <div class="equi-gitem">
        <img src="${escAttr(e.image)}" loading="lazy" referrerpolicy="no-referrer"
             data-lightbox="${escAttr(e.image)}" data-caption="${escAttr(e.label||'')}"
             style="cursor:zoom-in;" onerror="this.closest('.equi-gitem').style.display='none'" />
        <div class="equi-gcap">
          <b>${escAttr(e.label||'Untitled')}</b>
          ${e.type==='competition'&&e.placement?` <span class="tag">${["1st","2nd","3rd","4th","5th","6th"][e.placement-1]||e.placement+"th"}</span>`:''}
          <span class="tag">+${e.exp||0} EXP</span>
          ${e.featuredRiderId?' <span class="tag">\u2605 rider</span>':''}
          <div style="margin-top:4px;">
            <span data-act="edit-training" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:var(--equi-accent);font-weight:bold;">Edit</span>
            <span data-act="delete-artlog" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:var(--equi-rust);font-weight:bold;margin-left:8px;">&#10005; Delete</span>
          </div>
        </div>
      </div>`).join("");

    const artLogHtml = open ? `
      ${galleryItems ? `<div class="equi-gallery" style="margin-top:10px;">${galleryItems}</div>` : ''}
      <div class="artlog-panel">
        ${(h.artLog.length || showOnly.length) ? (h.artLog.filter(e=>!e.image).map(e=>`
          <div class="artlog-entry">
            ${e.image?`<img src="${e.image}" class="artlog-thumb" data-lightbox="${e.image}" data-caption="${e.label}" style="cursor:zoom-in;" />`:""}
            <b>${e.label}</b> ${e.type==="competition"&&e.placement?`<span class="tag">${["1st","2nd","3rd","4th","5th","6th"][e.placement-1]||e.placement+"th"}</span>`:""}
            <span class="tag">+${e.exp} EXP</span>
            <span data-act="edit-training" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:var(--equi-accent);font-size:.92em;margin-left:6px;font-weight:bold;" title="Edit this entry (image, art type, link, rider PP)">${e.featuredRiderId?'\u2605 ':''}Edit</span><span data-act="delete-artlog" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:var(--equi-rust);font-size:.92em;margin-left:6px;font-weight:bold;" title="Delete this entry (reverses its EXP/stats)">✕ Delete</span>
            ${e.link?`<a href="${e.link}" target="_blank" class="artlog-link" style="font-size:1em;margin-left:6px;">View</a>`:""}
            <div class="small" style="margin-top:2px;">${e.art||""}${e.lit?` · ${e.lit}`:""}</div>
          </div>`).join("") + showOnlyHtml) : '<div class="small">No entries yet.</div>'}
      </div>` : "";

    const inv = state.tackInventory||[];
    const equippedHtml = (h.tackEquipped||[]).length
      ? (h.tackEquipped||[]).map(tid=>{
          const item=inv.find(t=>t.id===tid);
          if(!item) return "";
          const statsStr=Object.entries(item.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
          return `<span class="tag" style="background:#1a3a2a;color:var(--equi-good-soft);border-color:var(--equi-good);">${item.name}${statsStr?` (${statsStr})`:""} <span data-act="unequip-tack" data-id="${h.id}" data-tack="${item.id}" style="cursor:pointer;">✕</span></span>`;
        }).join(" ")
      : `<span class="small">Nothing equipped.</span>`;
    const availableTack = inv.filter(t=>!(h.tackEquipped||[]).includes(t.id));

    const card = el('div','horse-card');
    card.innerHTML=`
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:none;">
          ${photoHtml}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;">
            <span data-act="view-profile" data-id="${h.id}" style="font-size:1.1em;color:var(--accent);font-weight:bold;text-decoration:none;cursor:pointer;">${h.name}</span>
            <span class="tag">Lvl ${h.level}</span>
            ${(h.badges||[]).map(b=>`<span class="tag" title="${b} Trophy" style="background:#3a2a10;color:var(--equi-brass-light);border-color:var(--equi-accent);">${b}</span>`).join("")}
          </div>
          ${h.barnName?`<div class="small" style="color:var(--equi-faint);margin-top:-2px;">"${h.barnName}"</div>`:""}
          <div class="small">${h.breed} · Age ${h.age} (${h.stage})${h.gender?` · ${h.gender}`:""}${h.height?` · ${h.height}`:""}${h.discipline?` · <span style="color:var(--equi-brass-light);">${h.discipline}</span>`:""}</div>
          ${h.importLink?`<div class="small"><a href="${h.importLink}" target="_blank" rel="noopener" style="color:var(--accent);">Import sheet ↗</a></div>`:""}
          <div class="small" style="margin-top:2px;">Rider:
            <select data-act="assign-rider" data-id="${h.id}" style="width:auto;display:inline-block;font-size:.95em;padding:2px 6px;min-height:0;">
              <option value="">— none —</option>
              ${state.riders.map(r=>`<option value="${r.id}"${h.riderId===r.id?' selected':''}>${r.name} · ${riderTitle(riderPP(r)).name}</option>`).join("")}
            </select>${h.riderFinalBonus?` <span class="tag" style="background:#2a1a3a;color:var(--equi-accent-2);border-color:var(--equi-plum);" title="Fully-trained bonus from ${(state.riders.find(r=>r.id===h.riderId)||{}).name||'rider'}">Lvl 10 +${h.riderFinalBonus} all stats</span>`:""}
          </div>
          <div class="small">EXP: ${h.exp} / ${h.level<10?LEVEL_TABLE[h.level+1].exp:"MAX"}</div>
          <div class="expbar-bg"><div class="expbar-fill" style="width:${pct}%"></div></div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px 12px;margin-top:6px;">${statBars}</div>
        </div>
      </div>

      <div style="margin-top:8px;">
        <div class="small" style="margin-bottom:3px;">Equipped Tack:</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">${equippedHtml}</div>
        ${availableTack.length ? `
          <select data-act="equip-select" data-id="${h.id}" style="margin-top:4px;width:auto;display:inline-block;font-size:1em;">
            <option value="">+ Equip tack…</option>
            ${availableTack.map(t=>`<option value="${t.id}">${t.name} (${t.category})</option>`).join("")}
          </select>` : `<div class="small" style="margin-top:4px;">No more tack available — add some in the Tack Inventory tab.</div>`}
      </div>

      <div class="small" style="margin-top:8px;">Breeding Slots <span style="opacity:.7;">(click a slot to mark used)</span>:</div>
      <div class="breedslots">${slots||'<span class="small">none yet</span>'}</div>

      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="secondary" data-act="toggle-log" data-id="${h.id}" style="font-size:1em;padding:4px 10px;margin-top:0;">${open?"Hide":"Show"} Art &amp; Show Log (${(h.artLog||[]).length + (h.compHistory||[]).filter(r=> !r.artLogId || !(h.artLog||[]).some(e=>e.id===r.artLogId)).length})</button>

        <button class="secondary" data-act="edit-geno" data-id="${h.id}" style="font-size:1em;padding:4px 10px;margin-top:0;">Set Genetics</button>
        <button class="secondary" data-act="edit-marks" data-id="${h.id}" style="font-size:1em;padding:4px 10px;margin-top:0;">Markings</button>
        <button class="danger" data-act="del" data-id="${h.id}" style="font-size:1em;padding:4px 10px;margin-top:0;">Remove</button>
        <button class="secondary" data-act="transfer-horse" data-id="${h.id}" style="font-size:1em;padding:4px 10px;margin-top:0;">Sell / Transfer</button>

  });

  if(!state.horses.length) wrap.appendChild(el('div','small','<div style="padding:12px;color:var(--equi-faint);">No horses yet — add one above!</div>'));

  wrap.querySelectorAll('[data-act="toggle-log"]').forEach(b=>b.onclick=()=>{
    if(expandedLogs.has(b.dataset.id)) expandedLogs.delete(b.dataset.id);

  });
  wrap.querySelectorAll('[data-act="del"]').forEach(b=>b.onclick=async()=>{
    if(!confirm('Remove this horse? This cannot be undone.')) return;
    const delId=b.dataset.id;
    state.horses=state.horses.filter(x=>x.id!==delId);
    const ok=await deleteHorseFromSheets(delId);
    if(bankAccount.linked && !ok){
      alert('⚠ The horse was removed from this screen, but deleting it on the server FAILED — it will reappear on reload.\n\nSign out (top of the page), sign back in, and remove it again.');
    }
    save(); render();
  });
  wrap.querySelectorAll('[data-act="transfer-horse"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.id);
    if(h) transferHorseToMember(h);
  });
  wrap.querySelectorAll('[data-act="equip-select"]').forEach(sel=>sel.onchange=()=>{
    const h=state.horses.find(x=>x.id===sel.dataset.id);
    if(h && sel.value){
      h.tackEquipped=h.tackEquipped||[];
      h.tackEquipped.push(sel.value);
      saveHorse(h); save(); render();
    }
  });
  wrap.querySelectorAll('[data-act="unequip-tack"]').forEach(span=>span.onclick=()=>{
    const h=state.horses.find(x=>x.id===span.dataset.id);
    if(h){ h.tackEquipped=(h.tackEquipped||[]).filter(id=>id!==span.dataset.tack); saveHorse(h); save(); render(); }
  });
  wrap.querySelectorAll('[data-act="slot-click"]').forEach(slot=>slot.onclick=()=>{
    showBreedingSlotModal(slot.dataset.id, Number(slot.dataset.slot));
  });
  wrap.querySelectorAll('[data-act="edit-lineage"]').forEach(b=>b.onclick=()=>showLineageModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-geno"]').forEach(b=>b.onclick=()=>showGeneticsModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-marks"]').forEach(b=>b.onclick=()=>showMarkingsModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-worth"]').forEach(b=>b.onclick=()=>showNetWorthModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-details"]').forEach(b=>b.onclick=async()=>{
    const h=state.horses.find(x=>x.id===b.dataset.id); if(!h) return;
    const height=prompt(`Height for ${h.name} (e.g. "16.2 hh"). Leave blank to clear.`, h.height||"");
    if(height===null) return;
    const importLink=prompt(`Import / reference sheet link for ${h.name} (a URL). Leave blank to clear.`, h.importLink||"");
    if(importLink===null) return;
    h.height=height.trim(); h.importLink=importLink.trim();
    await saveHorse(h); await save(); render();
  });
  wrap.querySelectorAll('[data-act="assign-rider"]').forEach(sel=>sel.onchange=async()=>{
    const h=state.horses.find(x=>x.id===sel.dataset.id); if(!h) return;
    h.riderId = sel.value || null;
    recomputeHorse(h);              // fully-trained bonus depends on the assigned rider
    await saveHorse(h); await save(); render();
  });
  wrap.querySelectorAll('[data-act="view-profile"]').forEach(b=>b.onclick=()=>goToProfile(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-training"]').forEach(b=>b.onclick=()=>{
    beginEditLogEntry(b.dataset.id, b.dataset.entry);
  });
  wrap.querySelectorAll('[data-act="delete-artlog"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.id);
    if(!h) return;
    if(!confirm('Delete this log entry? This will reverse its EXP and stat gains.')) return;
    deleteArtLogEntry(h, b.dataset.entry);
  });

  return wrap;
}
