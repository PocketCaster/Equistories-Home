<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EquiStories — Community Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* Same responsive root size the Stable Manager and Shows use, so the three
     apps read at identical scale instead of the hub looking shrunken. */
  html { font-size: clamp(16px, 0.6vw + 14px, 23px); -webkit-text-size-adjust:100%; }

  /* Palette bridges the Hub's dark walnut with the Bank's brass/honey/parchment,
     so the three apps feel like one place. Variable NAMES are unchanged so every
     existing rule keeps working — only the values and the accents are richer. */
  :root{
    --bg:#1a130c; --panel:#241a12; --panel2:#2c2016; --line:#4a3826;
    --text:#f3e9d8; --dim:#c1ad92;
    --accent:#d29a3e; --accent2:#c9a8e8; --good:#8a9e68; --bad:#b5623a; --deep:#140e07;
    --honey:#c8842a; --rust:#9b4f2a; --moss:#5a6e3a;
    --brass-light:#e8c97a; --brass-mid:#c9a84c; --brass-dark:#8a6820;
    --gold-shine:linear-gradient(135deg,#e8c97a 0%,#c9a84c 30%,#f2d97e 50%,#c9a84c 70%,#8a6820 100%);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Lora',Georgia,'Palatino Linotype',serif; line-height:1.6; }
  a{ color:var(--accent); }

  header{ border-bottom:1px solid var(--line); background:linear-gradient(180deg,#2c1f16,#1b1410); position:relative; }
  header::after{ content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--gold-shine); opacity:.55; }
  .wrap{ max-width:min(1700px, 94vw); margin:0 auto; padding:0 clamp(16px,2vw,32px); }
  h1{ margin:0; font-family:'Playfair Display',serif; font-weight:700; font-size:clamp(1.8rem,4vw,2.6rem);
      background:var(--gold-shine); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:.5px; }
  .tagline{ color:var(--dim); margin:2px 0 0; font-family:'Caveat',cursive; font-size:1.3rem; }
  nav{ display:flex; gap:4px; flex-wrap:wrap; margin-top:14px; }
  .tab{ padding:9px 18px; border:1px solid var(--line); border-bottom:none;
        border-radius:8px 8px 0 0; cursor:pointer; background:#1e1610; color:var(--dim);
        font-family:'Playfair Display',serif; font-size:.98em; letter-spacing:.02em; }
  .tab.active{ background:var(--gold-shine); color:#241a14; font-weight:700; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px; margin:16px 0;
         box-shadow:0 2px 14px rgba(0,0,0,.25), inset 0 0 0 1px rgba(201,168,76,.07); }
  .card h2{ margin:0 0 10px; font-family:'Playfair Display',serif; color:var(--accent); font-size:1.5em; }
  .card h3{ margin:0 0 8px; font-family:'Playfair Display',serif; color:var(--accent); font-size:1.22em; }
  .card h4{ font-family:'Playfair Display',serif; }
  .grid{ display:grid; gap:12px; }
  .small{ font-size:.92em; color:var(--dim); }
  .tag{ display:inline-block; font-size:.9em; padding:3px 9px; border-radius:10px;
        background:var(--deep); color:var(--dim); border:1px solid var(--line); }
  button{ background:linear-gradient(135deg,var(--honey),var(--rust)); color:#fff6ea; border:none; padding:9px 18px; border-radius:6px;
          font-weight:700; cursor:pointer; font-family:'Playfair Display',serif; font-size:1em;
          box-shadow:0 2px 0 rgba(80,32,10,.4), inset 0 1px 0 rgba(255,255,255,.12); }
  button:hover:not(:disabled){ filter:brightness(1.06); }
  button:disabled{ opacity:.6; cursor:not-allowed; }
  button.ghost{ background:#2c2118; color:var(--text); border:1px solid var(--line); box-shadow:none; font-family:'Lora',serif; font-weight:500; }
  button.ghost:hover{ border-color:var(--brass-mid); filter:none; }
  input, textarea, select{ width:100%; padding:9px; font-size:1em; background:var(--deep); border:1px solid var(--line);
          color:var(--text); border-radius:5px; font-family:'Lora',serif; }
  input:focus, textarea:focus, select:focus{ outline:none; border-color:var(--brass-mid); box-shadow:0 0 0 2px rgba(201,168,76,.22); }
  label{ font-size:.88em; color:var(--dim); text-transform:uppercase; display:block; margin-top:10px; letter-spacing:.03em; }
  .muted{ opacity:.7; }
  .hide{ display:none !important; }
  .linkbox{ display:block; background:var(--deep); border:1px solid var(--line); border-radius:8px;
            padding:14px; text-decoration:none; color:var(--text); transition:border-color .15s; }
  .linkbox:hover{ border-color:var(--accent); }
  .linkbox b{ color:var(--accent); display:block; font-size:1.1em; }

  /* ── SHOPS TAB ────────────────────────────────────────────── */
  .shop-tiles{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
  .shop-tile{ border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--deep);
    cursor:pointer; transition:border-color .15s, transform .15s; display:flex; flex-direction:column; }
  .shop-tile:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .shop-tile .banner{ height:120px; background-size:cover; background-position:center;
    background-color:var(--panel2); border-bottom:1px solid var(--line); }
  .shop-tile .banner.noimg{ display:flex; align-items:center; justify-content:center; font-size:2.4em; color:var(--line); }
  .shop-tile .body{ padding:12px 14px; flex:1; display:flex; flex-direction:column; gap:5px; }
  .shop-tile .body b{ font-family:'Playfair Display',serif; color:var(--accent); font-size:1.1em; }

  /* A storefront restyles itself with these locals, so each shop feels custom
     while still living inside the hub. Defaults inherit the hub's palette. */
  .storefront{ --sf-accent:var(--accent); --sf-bg:var(--panel); --sf-panel:var(--deep);
    --sf-text:var(--text); --sf-head:var(--brass-mid); }
  .sf-hero{ border-radius:12px; overflow:hidden; border:1px solid var(--line); margin-bottom:16px;
    background:var(--sf-panel); }
  .sf-hero .banner{ height:180px; background-size:cover; background-position:center; background-color:var(--sf-panel); }
  .sf-hero .banner.noimg{ display:flex; align-items:center; justify-content:center; font-size:3em; color:var(--sf-accent); opacity:.5; }
  .sf-hero .meta{ padding:16px 18px; }
  .sf-hero .meta h2{ margin:0; font-family:'Playfair Display',serif; color:var(--sf-head); }
  .sf-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .sf-item{ border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--sf-panel);
    display:flex; flex-direction:column; }
  .sf-item .img{ height:150px; background-size:cover; background-position:center; background-color:var(--panel2); }
  .sf-item .img.noimg{ display:flex; align-items:center; justify-content:center; font-size:2em; color:var(--line); }
  .sf-item .pad{ padding:12px; flex:1; display:flex; flex-direction:column; gap:6px; }
  .sf-item .pad .nm{ font-family:'Playfair Display',serif; color:var(--sf-head); font-weight:700; }
  .sf-price{ color:var(--sf-accent); font-family:'Caveat',cursive; font-weight:700; font-size:1.5rem; margin-top:auto; }
  .sf-buy{ background:var(--sf-accent); color:#1a130c; border:none; padding:7px 14px; border-radius:6px;
    font-family:'Playfair Display',serif; font-weight:700; cursor:pointer; }
  .sf-buy:disabled{ opacity:.5; cursor:not-allowed; }
  .swatch-row{ display:flex; gap:12px; flex-wrap:wrap; }
  .swatch{ display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
  .swatch input[type=color]{ width:52px; height:36px; padding:2px; border:1px solid var(--line);
    border-radius:6px; background:var(--deep); cursor:pointer; }
  .shop-crumb{ display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }

  /* ── BREEDS TAB ───────────────────────────────────────────── */
  .breed-page{ --sf-accent:var(--accent); --sf-panel:var(--deep); --sf-head:var(--brass-mid); }
  .breed-sub{ display:flex; gap:6px; flex-wrap:wrap; margin:14px 0; }
  .breed-sub .bk-pill{ font-family:'Playfair Display',serif; }
  .imp-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .imp-card{ border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--sf-panel); display:flex; flex-direction:column; }
  .imp-card .img{ height:170px; background-size:cover; background-position:center; background-color:var(--panel2); }
  .imp-card .img.noimg{ display:flex; align-items:center; justify-content:center; font-size:2.2em; color:var(--line); }
  .imp-card .pad{ padding:12px; flex:1; display:flex; flex-direction:column; gap:6px; }
  .imp-card .nm{ font-family:'Playfair Display',serif; color:var(--sf-head); font-weight:700; }
  .imp-status{ font-size:.82em; padding:2px 8px; border-radius:10px; display:inline-block; width:max-content; }
  .imp-status.available{ background:#22301c; color:var(--good); border:1px solid var(--moss); }
  .imp-status.pending{ background:#332a14; color:var(--brass-light); border:1px solid var(--brass-dark); }
  .imp-status.sold{ background:#2a1a1a; color:var(--dim); border:1px solid var(--line); }
  .reg-row{ display:flex; align-items:center; gap:12px; padding:9px 12px; border:1px solid var(--line);
    border-radius:8px; margin-bottom:6px; background:var(--deep); }
  .reg-row .thumb{ width:40px; height:40px; border-radius:6px; background-size:cover; background-position:center; background-color:var(--panel2); flex:0 0 auto; }

  /* ── BANK TAB ─────────────────────────────────────────────── */
  .eyebrow{ font-family:'Caveat',cursive; font-size:1.05rem; letter-spacing:.12em; text-transform:uppercase; color:var(--brass-mid); }
  .bank-hero{ border:1px solid var(--brass-mid);
    background:linear-gradient(180deg,#2a1f14,#20170f);
    box-shadow:0 4px 24px rgba(0,0,0,.35), inset 0 0 0 1px rgba(232,201,122,.15); }
  .bank-hero-row{ display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
  .bank-balance{ font-family:'Caveat',cursive; font-weight:700; font-size:clamp(2.6rem,7vw,3.4rem); line-height:1;
    background:var(--gold-shine); -webkit-background-clip:text; background-clip:text; color:transparent; margin:2px 0 4px; }
  .bank-hero-actions{ display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .bk-badge{ display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px;
    border-radius:9px; background:var(--rust); color:#fff; font-family:'Caveat',cursive; font-weight:700; font-size:.85rem; }
  .bank-filters{ display:flex; gap:6px; }
  .bk-pill{ padding:4px 14px; border:1px solid var(--line); border-radius:20px; cursor:pointer; font-size:.85rem; color:var(--dim); user-select:none; }
  .bk-pill:hover{ border-color:var(--brass-mid); color:var(--text); }
  .bk-pill.active{ background:var(--gold-shine); color:#241a14; font-weight:700; border-color:var(--brass-dark); }
  .bk-tx{ display:flex; align-items:center; gap:12px; padding:10px 12px; border:1px solid var(--line); border-radius:10px;
    margin-bottom:8px; background:var(--deep); }
  .bk-tx.in{ border-left:3px solid var(--good); }
  .bk-tx.out{ border-left:3px solid var(--rust); }
  .bk-tx-ic{ width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:var(--panel); flex:0 0 auto; font-size:1rem; }
  .bk-tx-body{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .bk-tx-body b{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bk-tx-date{ font-family:'Caveat',cursive; color:var(--dim); opacity:.75; font-size:.95rem; }
  .bk-tx-amt{ font-family:'Caveat',cursive; font-weight:700; font-size:1.35rem; white-space:nowrap; }
  .bk-tx-amt.in{ color:var(--good); }
  .bk-tx-amt.out{ color:var(--rust); }
  .bk-notif{ padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; background:var(--deep); }
  .bk-notif.unread{ border-color:var(--brass-mid); background:rgba(200,132,42,.09); }
  .bk-notif b{ color:var(--accent); text-transform:capitalize; }
  /* Even action cards: flex column so every button sits on the bottom edge,
     no matter how many fields the card has. */
  .bank-act{ display:flex; flex-direction:column; }
  .bank-act > button{ margin-top:auto; }
  /* Business section */
  .bk-subnav{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .bk-idbox{ background:var(--gold-shine); border:1px solid var(--brass-dark); border-radius:10px;
    padding:14px 16px; text-align:center; margin:12px 0; box-shadow:0 2px 0 var(--brass-dark); }
  .bk-idbox .lab{ font-family:'Caveat',cursive; font-size:1rem; text-transform:uppercase; letter-spacing:.1em; color:#3e2b15; opacity:.85; }
  .bk-idbox .val{ font-family:'Caveat',cursive; font-size:1.7rem; font-weight:700; color:#241a14; word-break:break-all; line-height:1.15; }
  .bk-idbox .hint{ font-size:.78rem; color:#3e2b15; font-style:italic; opacity:.85; margin-top:4px; }
</style>

<script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs, orderBy, limit }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, signInWithCustomToken, signInWithEmailAndPassword,
         createUserWithEmailAndPassword, sendPasswordResetEmail,
         signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJfBnY0sDc6W_yzzrpm8NKkNZv1cu7jMU",
  authDomain: "equistories-rpg.firebaseapp.com",
  projectId: "equistories-rpg",
  storageBucket: "equistories-rpg.firebasestorage.app",
  messagingSenderId: "801283742596",
  appId: "1:801283742596:web:370951947bf862efcfdbd1"
};

let db=null, authOk=false, auth=null;
const ready = (async()=>{
  try{
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    auth = getAuth(app);
    await new Promise(res=>{ const un=onAuthStateChanged(auth, ()=>{ un(); res(); }); });
    if(!auth.currentUser){
      try { await signInAnonymously(auth); } catch(e){ console.warn('[EquiDB] anon auth off:', e.code||e); }
    }
    authOk = !!auth.currentUser;
    return true;
  }catch(e){ console.error('[EquiDB] init failed:', e); db=null; return false; }
})();

const friendlyAuth = e => ({
  'auth/invalid-email':"That email address doesn't look right.",
  'auth/user-not-found':'No account found with that email.',
  'auth/wrong-password':'Incorrect password.',
  'auth/invalid-credential':'Incorrect email or password.',
  'auth/email-already-in-use':'That email already has an account — sign in instead.',
  'auth/weak-password':'Password must be at least 6 characters.',
  'auth/too-many-requests':'Too many attempts. Wait a minute and try again.',
  'auth/network-request-failed':'Network problem — check your connection.',
}[e && e.code] || (e && e.message) || 'Something went wrong.');

window.EquiAuth = {
  ready,
  get user(){ return auth && auth.currentUser && !auth.currentUser.isAnonymous ? auth.currentUser : null; },
  get email(){ const u=this.user; return u ? u.email : ''; },
  async token(){ const u=this.user; if(!u) return null; try{ return await u.getIdToken(); }catch(e){ return null; } },
  async signIn(email,password){
    try{ const c=await signInWithEmailAndPassword(auth,email,password); return {success:true,user:c.user}; }
    catch(e){ return {success:false,error:friendlyAuth(e)}; }
  },
  async signUp(email,password){
    try{ const c=await createUserWithEmailAndPassword(auth,email,password); return {success:true,user:c.user}; }
    catch(e){ return {success:false,error:friendlyAuth(e)}; }
  },
  async resetPassword(email){
    try{ await sendPasswordResetEmail(auth,email); return {success:true}; }
    catch(e){ return {success:false,error:friendlyAuth(e)}; }
  },
  // Swap the random email-account session for one whose uid IS the bank userId.
  // After this, Firestore rules can trust request.auth.uid as the true owner.
  async upgradeToOwner(customToken){
    try{ await signInWithCustomToken(auth, customToken); return true; }
    catch(e){ console.error('[EquiAuth] owner upgrade failed:', e.code||e); return false; }
  },
  async signOut(){
    try{ await fbSignOut(auth); }catch(e){}
    try{ await signInAnonymously(auth); }catch(e){}
  },
};

window.EquiDB = {
  ready,
  get available(){ return !!db; },
  get authed(){ return authOk; },
  async put(col,id,owner,obj){
    if(!db) return false;
    await setDoc(doc(db,col,String(id)), { owner:String(owner), id:String(id),
      json:JSON.stringify(obj), updatedAt:new Date().toISOString() });
    return true;
  },
  // Breeds need their staff list readable by Firestore RULES (which can't parse
  // the json string), so we mirror it as a flat top-level array. Same envelope
  // otherwise — reads still come back through get()/listAll() unchanged.
  async putBreed(id, owner, obj){
    if(!db) return false;
    const staffUids = Array.isArray(obj.staff) ? obj.staff.map(String) : [];
    await setDoc(doc(db,'breeds',String(id)), { owner:String(owner), id:String(id),
      json:JSON.stringify(obj), staffUids, updatedAt:new Date().toISOString() });
    return true;
  },
  async get(col,id){
    if(!db) return null;
    const s=await getDoc(doc(db,col,String(id)));
    if(!s.exists()) return null;
    try{ return JSON.parse(s.data().json); }catch(e){ return null; }
  },
  async remove(col,id){ if(!db) return false; await deleteDoc(doc(db,col,String(id))); return true; },
  async listByOwner(col,owner){
    if(!db) return [];
    const snap=await getDocs(query(collection(db,col), where('owner','==',String(owner))));
    const out=[]; snap.forEach(d=>{ try{ out.push(JSON.parse(d.data().json)); }catch(e){} });
    return out;
  },
  // The hub needs whole-collection reads (every member, every show) — the player
  // apps never do, which is why this only lives here.
  async listAll(col){
    if(!db) return [];
    const snap=await getDocs(collection(db,col));
    const out=[];
    snap.forEach(d=>{ try{ const v=JSON.parse(d.data().json); v.__owner=d.data().owner; v.__id=d.id; out.push(v); }catch(e){} });
    return out;
  },
};
ready.then(v=>{ try{ window.__equiDBResolve(v); }catch(e){} })
     .catch(()=>{ try{ window.__equiDBResolve(false); }catch(e){} });
</script>

<script>
(function(){
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// The three apps that make up EquiStories.
const BANK_URL = "https://script.google.com/macros/s/AKfycby9WLxUPDAPg9EH5aTPATzTkHd8XeSKXuQ0WYqyQoHusEbws85qxwaML6cSovDod80/exec";

// The hub uses the same Bank account as the other apps, and the same
// localStorage session — sign in on any of the three and you're signed in on all
// of them (they share an origin).
function bankCall(payload){
  return new Promise(resolve=>{
    const cb="hbCb_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
    const sc=document.createElement("script");
    let done=false;
    const finish=d=>{ if(!done){ done=true; delete window[cb]; sc.remove(); resolve(d); } };
    window[cb]=finish;
    sc.onerror=()=>finish({success:false,error:"Couldn't reach the bank."});
    setTimeout(()=>finish({success:false,error:"The bank didn't answer in time."}),15000);
    sc.src=BANK_URL+"?callback="+cb+"&data="+encodeURIComponent(JSON.stringify(payload));
    document.head.appendChild(sc);
  });
}

const APPS = {
  stable: "https://pocketcaster.github.io/Equistories-stable-manager/",
  shows:  "https://pocketcaster.github.io/equistories-shows/",
};

const DEFAULT_DISCORD = "https://discord.gg/54nC2p2qp9";
const STATS = ["stamina","strength","scope","speed","handiness","boldness","balance","gaits","harmony"];
const STAT_LABELS = {stamina:"Stamina",strength:"Strength",scope:"Scope",speed:"Speed",
  handiness:"Handiness",boldness:"Boldness",balance:"Balance",gaits:"Gaits",harmony:"Harmony"};
const statTotal = h => STATS.reduce((n,k)=>n+(Number(h.stats&&h.stats[k])||0), 0);
const imgOk = u => typeof u==='string' && u && !u.startsWith('data:');
const TABS = ["Home","Bank","Shops","Breeds","Members","Community","Forum"];
let tab = "Home";

async function waitForDB(ms=8000){
  try{ await Promise.race([window.__equiDBReady||Promise.resolve(false),
                           new Promise(r=>setTimeout(()=>r(false),ms))]); }catch(e){}
  return (window.EquiDB && window.EquiDB.available) ? window.EquiDB : null;
}
function me(){
  try{ const b=JSON.parse(localStorage.getItem("equi-lite-bank")||"null");
       return (b && b.linked && b.userId) ? b : null; }catch(e){ return null; }
}

// Ask the bank for a token whose uid IS our bank userId, then adopt it. Without
// this, Firestore rules can't tell who owns what, and writes from a login made
// directly on the Hub (rather than adopted from Stable Manager) will fail.
async function upgradeToOwnerSession(){
  try{
    if(!window.EquiAuth || !window.EquiAuth.user) return false;
    const idToken = await window.EquiAuth.token();
    if(!idToken) return false;
    const r = await bankCall({ action:'getFirestoreToken', idToken });
    if(r?.success && r.data?.token){
      const ok = await window.EquiAuth.upgradeToOwner(r.data.token);
      if(ok) console.log('[Hub] signed in to Firestore as owner:', r.data.userId);
      return ok;
    }
    console.warn('[Hub] owner token unavailable:', r?.error||'unknown');
  }catch(e){ console.error('[Hub] upgrade error:', e); }
  return false;
}

// So people show up on the Members list the moment they sign in, even if they've
// never opened the Stable Manager to fill out a profile. Only creates a stub —
// never overwrites a profile that already exists. Shape matches Stable Manager's
// newPlayerProfile() so it merges cleanly if they later edit it there.
async function ensureProfile(userId){
  try{
    const DB = await waitForDB();
    if(!DB) return;
    const existing = await DB.get('profiles', userId);
    if(existing) return;
    await DB.put('profiles', userId, userId, {
      displayName: userId, pronouns:"", avatar: "", bio:"", discord: "", links: [],
      joinedAt: new Date().toISOString()
    });
    console.log('[Hub] auto-created blank profile for', userId);
  }catch(e){ console.warn('[Hub] ensureProfile failed:', e); }
}

    $("bkBalance").textContent = (r && r.success) ? fmtBuxx(r.data.balance) : '—';
  }

  let allTx=[], txFilter='all';
  const TX_ICON = t => ({
    deposit:'💰', transfer:t.direction==='in'?'📨':'📤', transfer_in:'📨', transfer_out:'📤',
    pay_business:'🏪', business_refund:'↩️', refund_received:'↩️', show:'🏆', work:'🔨',
    trail:'🌿', item:'🎁', show_hold:'🎗️', show_refund:'↩️'
  }[t.type] || '✦');
  function drawHist(){
    const list = allTx.filter(t=> txFilter==='all' ? true : t.direction===txFilter).slice(0,25);
    if(!list.length){ $("bkHist").innerHTML='<span class="muted">Nothing here yet.</span>'; return; }
    $("bkHist").innerHTML = list.map(t=>{
      const sign = t.direction==='in'?'+':'−';
      const cls  = t.direction==='in'?'in':'out';
      const d = t.timestamp ? new Date(t.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      return `<div class="bk-tx ${cls}">
        <span class="bk-tx-ic">${TX_ICON(t)}</span>
        <span class="bk-tx-body">
          <b>${esc(t.label||t.type)}</b>
          ${t.note?`<span class="muted small">"${esc(t.note)}"</span>`:''}
          <span class="bk-tx-date">${d}</span>
        </span>
        <span class="bk-tx-amt ${cls}">${sign}฿${(parseFloat(t.amount)||0).toLocaleString()}</span>
      </div>`;
    }).join('');
  }
  async function loadHist(){
    const r = await bankCall({ action:'getTransactionHistory', userId: who.userId });
    allTx = (r && r.success) ? (r.data||[]) : [];
    drawHist();
  }

  async function loadNotifs(){
    const r = await bankCall({ action:'getNotifications', userId: who.userId });
    const ns = (r && r.success) ? (r.data||[]) : [];
    const unread = ns.filter(n=>!n.read).length;
    const badge = $("bkUnread");
    if(unread>0){ badge.textContent = unread>99?'99+':unread; badge.classList.remove('hide'); }
    else badge.classList.add('hide');
    $("bkNotifList").innerHTML = ns.length
      ? ns.slice(0,30).map(n=>`
          <div class="bk-notif ${n.read?'':'unread'}">
            <div><b>${esc((n.type||'').replace(/_/g,' '))}</b></div>
            <div>${esc(n.message)}</div>
          </div>`).join('')
      : '<span class="muted">No notifications yet.</span>';
  }

  // --- wiring ---
  $("bkRefresh").onclick = ()=>{ loadBalance(); loadHist(); loadNotifs(); };
  $("bkBell").onclick    = ()=>{ $("bkNotifs").classList.toggle('hide'); };
  $("bkMarkAll").onclick = async ()=>{ await bankCall({action:'markNotificationsRead', userId:who.userId}); loadNotifs(); };

  $("bkFilters").onclick = e=>{
    const p=e.target.closest('.bk-pill'); if(!p) return;
    document.querySelectorAll('#bkFilters .bk-pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active'); txFilter=p.dataset.f; drawHist();
  };

  $("bkSend").onclick = async ()=>{
    const toUserId=$("bkToUser").value.trim(), amount=parseFloat($("bkToAmt").value), note=$("bkToNote").value.trim();
    if(!toUserId||!amount){ say('bkSendMsg','Enter a User ID and amount.','bad'); return; }
    const btn=$("bkSend"); btn.disabled=true; say('bkSendMsg','Sending…');
    const token=await idToken();
    if(!token){ say('bkSendMsg','Session expired — sign out and back in.','bad'); btn.disabled=false; return; }
    const r=await bankCall({action:'transferBuxx', fromUserId:who.userId, idToken:token, toUserId, amount, note});
    btn.disabled=false;
    if(r&&r.success){ say('bkSendMsg',`Sent ${fmtBuxx(amount)} to ${toUserId}.`,'good');
      $("bkToUser").value='';$("bkToAmt").value='';$("bkToNote").value=''; loadBalance(); loadHist(); }
    else say('bkSendMsg',(r&&r.error)||'Could not send.','bad');
  };

  $("bkPay").onclick = async ()=>{
    const businessName=$("bkBizName").value.trim(), amount=parseFloat($("bkBizAmt").value), note=$("bkBizNote").value.trim();
    if(!businessName||!amount){ say('bkPayMsg','Enter a business name and amount.','bad'); return; }
    const btn=$("bkPay"); btn.disabled=true; say('bkPayMsg','Paying…');
    const token=await idToken();
    if(!token){ say('bkPayMsg','Session expired — sign out and back in.','bad'); btn.disabled=false; return; }
    const r=await bankCall({action:'payBusiness', fromUserId:who.userId, idToken:token, businessName, amount, note});
    btn.disabled=false;
    if(r&&r.success){ say('bkPayMsg',`Paid ${fmtBuxx(amount)} to ${r.data.businessName}.`,'good');
      $("bkBizName").value='';$("bkBizAmt").value='';$("bkBizNote").value=''; loadBalance(); loadHist(); }
    else say('bkPayMsg',(r&&r.error)||'Could not pay.','bad');
  };

  $("bkDep").onclick = async ()=>{
    const amount=parseFloat($("bkDepAmt").value), proofUrl=$("bkDepProof").value.trim(), description=$("bkDepDesc").value.trim();
    if(!amount||!proofUrl){ say('bkDepMsg','Enter an amount and a proof link.','bad'); return; }
    const btn=$("bkDep"); btn.disabled=true; say('bkDepMsg','Submitting…');
    const r=await bankCall({action:'submitDeposit', userId:who.userId, amount, proofUrl, description});
    btn.disabled=false;
    if(r&&r.success){ say('bkDepMsg',`Deposit of ${fmtBuxx(amount)} submitted.`,'good');
      $("bkDepAmt").value='';$("bkDepProof").value='';$("bkDepDesc").value=''; loadBalance(); loadHist(); }
    else say('bkDepMsg',(r&&r.error)||'Could not submit.','bad');
  };

  // --- business accounts ---
  const idBox = (lab,val,hint)=>`<div class="bk-idbox"><div class="lab">${esc(lab)}</div><div class="val">${esc(val)}</div>${hint?`<div class="hint">✦ ${esc(hint)} ✦</div>`:''}</div>`;

  $("bkBizNav").onclick = e=>{
    const p=e.target.closest('.bk-pill'); if(!p) return;
    document.querySelectorAll('#bkBizNav .bk-pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    const map={create:'bkBizCreate', balance:'bkBizBalance', refund:'bkBizRefund'};
    Object.values(map).forEach(id=>$(id).classList.add('hide'));
    $(map[p.dataset.b]).classList.remove('hide');
  };

  $("bkNewBiz").onclick = async ()=>{
    const businessName=$("bkNewBizName").value.trim();
    const passcode=$("bkNewBizPass").value, confirm=$("bkNewBizPass2").value;
    if(!businessName){ say('bkNewBizMsg','Name your business.','bad'); return; }
    if(!passcode||passcode.length<4){ say('bkNewBizMsg','Passcode must be at least 4 characters.','bad'); return; }
    if(passcode!==confirm){ say('bkNewBizMsg','Passcodes do not match.','bad'); return; }
    const btn=$("bkNewBiz"); btn.disabled=true; say('bkNewBizMsg','Creating…');
    const token=await idToken();
    if(!token){ say('bkNewBizMsg','Session expired — sign out and back in.','bad'); btn.disabled=false; return; }
    const r=await bankCall({action:'createBusinessAccount', ownerId:who.userId, idToken:token, businessName, passcode});
    btn.disabled=false;
    if(r&&r.success){
      say('bkNewBizMsg','Business created — save your ID below.','good');
      $("bkNewBizName").value='';$("bkNewBizPass").value='';$("bkNewBizPass2").value='';
      $("bkNewBizOut").innerHTML = idBox('Your Business ID', r.data.businessId, 'Write this down — you need it for balance checks & refunds');
    } else say('bkNewBizMsg',(r&&r.error)||'Could not create.','bad');
  };

  $("bkBizBal").onclick = async ()=>{
    const businessId=$("bkBizId").value.trim();
    if(!businessId){ say('bkBizBalMsg','Enter a Business ID.','bad'); return; }
    say('bkBizBalMsg','Checking…'); $("bkBizBalOut").innerHTML='';
    const r=await bankCall({action:'getBusinessBalance', businessId});
    if(r&&r.success){ say('bkBizBalMsg','');
      $("bkBizBalOut").innerHTML = `<div class="bk-idbox"><div class="lab">${esc(r.data.businessName)}</div><div class="val">${fmtBuxx(r.data.balance)}</div></div>`;
    } else say('bkBizBalMsg',(r&&r.error)||'Not found.','bad');
  };

  $("bkLookup").onclick = async ()=>{
    const businessName=$("bkLookupName").value.trim(), passcode=$("bkLookupPass").value;
    if(!businessName||!passcode){ say('bkLookupMsg','Enter the name and passcode.','bad'); return; }
    say('bkLookupMsg','Looking up…'); $("bkLookupOut").innerHTML='';
    const r=await bankCall({action:'lookupBusinessId', businessName, passcode});
    if(r&&r.success){ say('bkLookupMsg','');
      $("bkLookupOut").innerHTML = idBox(r.data.businessName, r.data.businessId, 'Your Business ID'); }
    else say('bkLookupMsg',(r&&r.error)||'No match.','bad');
  };

  $("bkRefund").onclick = async ()=>{
    const businessId=$("bkRefBizId").value.trim(), passcode=$("bkRefPass").value;
    const toUserId=$("bkRefUser").value.trim(), amount=parseFloat($("bkRefAmt").value), note=$("bkRefNote").value.trim();
    if(!businessId||!passcode||!toUserId||!amount){ say('bkRefundMsg','Fill in Business ID, passcode, player and amount.','bad'); return; }
    const btn=$("bkRefund"); btn.disabled=true; say('bkRefundMsg','Refunding…');
    const r=await bankCall({action:'businessTransfer', businessId, passcode, toUserId, amount, note:note||'Refund from business'});
    btn.disabled=false;
    if(r&&r.success){ say('bkRefundMsg',`Refunded ${fmtBuxx(amount)} to ${toUserId}.`,'good');
      $("bkRefAmt").value='';$("bkRefNote").value=''; loadHist(); }
    else say('bkRefundMsg',(r&&r.error)||'Could not refund.','bad');
  };

  loadBalance(); loadHist(); loadNotifs();
}

//  FORUM (Layer 1: boards + threads + posting + admin-delete)
//  A ProBoards-style board for members who can't/don't use Discord. Data model:
//    config/forum  -> { boards:[{id,name,desc}] }  (admin-managed board list)
//    forumThreads  -> one doc per thread: {id, boardId, owner, title, body,
//                     image, createdAt, updatedAt, pinned, replies:[...]}
//  Layer 1 stores replies inline on the thread doc (simple + cheap); if a board
//  ever gets huge we can split replies into their own collection later.

// A SAFE post formatter. Members type plain text; we escape everything, then
// re-enable a small, safe subset: **bold**, *italic*, line breaks, bare URLs as
// links, and [img]URL[/img] for images. No raw HTML is ever rendered, so there's
// no script-injection surface.
function forumFormat(raw){
  let t = esc(String(raw||""));                                  // escape first — nothing below can inject HTML
  // images: [img]https://...[/img]
  t = t.replace(/\[img\]\s*(https?:\/\/[^\s\]]+?)\s*\[\/img\]/gi,
      (m,u)=>`<img src="${u}" referrerpolicy="no-referrer" style="max-width:100%;max-height:420px;border-radius:8px;display:block;margin:8px 0;" />`);
  // bold / italic
  t = t.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  t = t.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, "$1<i>$2</i>");
  // bare links (that aren't already inside an <img src=)
  t = t.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)(?=[\s)]|$)/g,
      (m,pre,u)=>`${pre}<a href="${u}" target="_blank" rel="noopener noreferrer">${u}</a>`);
  // newlines
  t = t.replace(/\n/g, "<br>");
  return t;
}

let __forumView = { mode:"boards", boardId:null, threadId:null };

async function getForumBoards(DB){
  try{
    const cfg = await DB.get('config','forum');
    if(cfg && Array.isArray(cfg.boards) && cfg.boards.length) return cfg.boards;
  }catch(e){}
  return DEFAULT_FORUM_BOARDS;
}

      <label>WidgetBot channel ID</label>
      <input id="e_wbc" value="${esc(H.wbChannel||'')}" placeholder="e.g. 355719584830980096" />
      <p class="small muted" style="margin:6px 0 0;">To get these: invite the WidgetBot bot at
        <a href="https://widgetbot.io" target="_blank" rel="noopener">widgetbot.io</a>, then in Discord enable
        Developer Mode → right-click your server → Copy Server ID, and right-click the channel → Copy Channel ID.
        Leave blank to hide the chat.</p>
      <label>Community events</label>
      <p class="small muted" style="margin:2px 0 8px;">Each event shows as a card on the Community page. Fill the boxes — no special formatting needed.</p>
      <div id="e_eventRows"></div>
      <button id="e_addEvent" class="ghost" style="margin-top:6px;">+ Add event</button>
      <div style="margin-top:12px;"><button id="e_save">Save community content</button>
        <span id="e_status" class="small" style="margin-left:8px;"></span></div>
    </div>

    <div class="card">
      <h3>Forum boards</h3>
      <p class="small muted">Each board is a section of the forum. Fill in a name and description; the short "id" is filled automatically but you can adjust it. <b>Don't change an existing board's id</b> — its threads would detach.</p>
      <div id="fb_boardRows"></div>
      <button id="fb_addBoard" class="ghost" style="margin-top:6px;">+ Add board</button>
      <div style="margin-top:8px;"><button id="fb_save">Save boards</button> <span id="fb_msg" class="small"></span></div>
    </div>`;

  // ---- friendly EVENT rows (labeled boxes, add/remove) ----
  const eventsState = (H.events||[]).map(e=>({title:e.title||"",when:e.when||"",desc:e.desc||"",link:e.link||""}));
  function drawEventRows(){
    const box=$("e_eventRows"); if(!box) return;
    if(!eventsState.length){ box.innerHTML=`<p class="small muted">No events yet. Click "Add event" to make one.</p>`; return; }

      <div style="border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;">
        <div class="grid" style="grid-template-columns:1fr 1fr;gap:8px;">
          <div><label class="small">Title</label><input data-ev="${i}" data-f="title" value="${esc(e.title)}" placeholder="Spring Art Jam" /></div>
          <div><label class="small">When</label><input data-ev="${i}" data-f="when" value="${esc(e.when)}" placeholder="March 2026" /></div>
        </div>
        <label class="small">Description</label><input data-ev="${i}" data-f="desc" value="${esc(e.desc)}" placeholder="A month-long prompt series" />
        <label class="small">Link (optional)</label><input data-ev="${i}" data-f="link" value="${esc(e.link)}" placeholder="https://…" />
        <button class="ghost" data-evdel="${i}" style="margin-top:6px;color:var(--bad);padding:4px 10px;">Remove</button>
      </div>`).join("");

    box.querySelectorAll('[data-evdel]').forEach(b=>b.onclick=()=>{ eventsState.splice(+b.dataset.evdel,1); drawEventRows(); });

  if($("e_addEvent")) $("e_addEvent").onclick=()=>{ eventsState.push({title:"",when:"",desc:"",link:""}); drawEventRows(); };

  // ---- friendly BOARD rows (labeled boxes, add/remove) ----
  const boardsState = boards.map(b=>({id:b.id||"",name:b.name||"",desc:b.desc||"",_existing:true}));
  const slugify=s=>String(s||"").toLowerCase().replace(/[^a-z0-9_]/g,"").slice(0,24);
  function drawBoardRows(){
    const box=$("fb_boardRows"); if(!box) return;
    box.innerHTML = boardsState.map((b,i)=>`
      <div style="border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;">
        <div class="grid" style="grid-template-columns:2fr 1fr;gap:8px;">
          <div><label class="small">Board name</label><input data-bd="${i}" data-f="name" value="${esc(b.name)}" placeholder="Advertisements" /></div>

      </div>`).join("");

      const b=boardsState[+inp.dataset.bd], f=inp.dataset.f;
      b[f]=inp.value;
      // auto-fill id from name for NEW boards only (never rewrite an existing id)

    box.querySelectorAll('[data-bddel]').forEach(bt=>bt.onclick=()=>{ boardsState.splice(+bt.dataset.bddel,1); drawBoardRows(); });

  $("fb_save").onclick=async()=>{
    const parsed=[]; const seen=new Set();
    boardsState.forEach(b=>{
      const name=(b.name||"").trim();
      let id=slugify(b.id||name);
      if(!name||!id||seen.has(id)) return; seen.add(id);
      parsed.push({id, name, desc:(b.desc||"").trim()});
    });

// Attach Ctrl/Cmd+B and Ctrl/Cmd+I to a textarea: wraps the selected text in
// **bold** or *italic* (the forum's own markup). Makes posting feel normal.
function attachFormatKeys(ta){
  if(!ta) return;
  ta.addEventListener('keydown', e=>{
    if(!(e.ctrlKey||e.metaKey)) return;
    const k=e.key.toLowerCase();
    const wrap = k==='b' ? '**' : k==='i' ? '*' : null;
    if(!wrap) return;
    e.preventDefault();
    const s=ta.selectionStart, en=ta.selectionEnd, val=ta.value;
    const sel=val.slice(s,en) || (k==='b'?'bold text':'italic text');
    ta.value = val.slice(0,s) + wrap + sel + wrap + val.slice(en);
    // reselect the inner text so they can keep typing over it
    ta.selectionStart = s + wrap.length;
    ta.selectionEnd   = s + wrap.length + sel.length;
    ta.focus();
  });
}

function forumWhen(iso){
  if(!iso) return "";
  const d=new Date(iso); if(isNaN(d)) return "";
  const now=Date.now(), diff=now-d.getTime();
  const day=86400000;
  if(diff<60000) return "just now";
  if(diff<3600000) return Math.floor(diff/60000)+"m ago";
  if(diff<day) return Math.floor(diff/3600000)+"h ago";
  if(diff<7*day) return Math.floor(diff/day)+"d ago";
  return d.toLocaleDateString();
}

// Very small markdown-ish renderer: blank lines split paragraphs, "- " makes
// bullets, "## " makes a subheading. Keeps the editor friendly without a library.
function mdish(t){
  if(!t) return "";
  return t.split(/\n{2,}/).map(block=>{
    const lines=block.split('\n');
    if(lines.every(l=>l.trim().startsWith('- ')))
      return `<ul>${lines.map(l=>`<li>${__esc(l.trim().slice(2))}</li>`).join('')}</ul>`;
    if(lines[0].startsWith('## '))
      return `<h4 style="color:var(--accent2);margin:12px 0 4px;">${__esc(lines[0].slice(3))}</h4>`
        + (lines.slice(1).length?`<p>${__esc(lines.slice(1).join(' '))}</p>`:'');
    return `<p>${__esc(block)}</p>`;
  }).join('');
}

          <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:baseline;">
            <b style="color:var(--accent);font-size:1.15em;">${esc(g.title)}</b>
            ${closed?`<span class="tag">CLOSED</span>`:''}
          </div>
          <div class="small">hosted by <a href="${APPS.stable}?player=${encodeURIComponent(g.poster)}">${esc(g.poster)}</a>
            · ${esc((g.createdAt||'').slice(0,10))}${g.updatedAt?` · edited ${esc(String(g.updatedAt).slice(0,10))}`:''}</div>
          <div style="margin-top:8px;white-space:pre-wrap;">${esc(teaser)}</div>
          ${long?`<details style="margin-top:6px;"><summary style="cursor:pointer;color:var(--accent);">Read the full guide</summary>
            <div style="margin-top:8px;white-space:pre-wrap;">${esc(body)}</div></details>`:''}
          ${g.link?`<div style="margin-top:10px;"><a href="${esc(g.link)}" target="_blank" rel="noopener"
            style="display:inline-block;background:var(--accent);color:#241a14;font-weight:bold;padding:8px 16px;border-radius:6px;text-decoration:none;">Enter this show →</a></div>`:''}
          ${mine?`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
              <button class="ghost" data-sgedit="${g.id}" style="padding:3px 10px;font-size:.85rem;">Edit</button>
              <button class="ghost" data-sgclose="${g.id}" style="padding:3px 10px;font-size:.85rem;">${closed?'Re-open':'Mark closed'}</button>
              <button class="ghost" data-sgdel="${g.id}" style="padding:3px 10px;font-size:.85rem;color:var(--bad);">Delete</button>
            </div>`:''}
        </div>
      </div>`;
    }).join("");

    $("sg_list").querySelectorAll('[data-sgedit]').forEach(b=>b.onclick=()=>{
      const g=guides.find(x=>x.id===b.dataset.sgedit); if(!g) return;
      editingId=g.id;
      $("sg_title").value=g.title||""; $("sg_banner").value=g.banner||"";
      $("sg_link").value=g.link||""; $("sg_body").value=g.body||"";
      $("sg_post").textContent="Save changes";
      $("sg_cancel").classList.remove("hide");
      $("sg_status").textContent="Editing “"+(g.title||"")+"”";
      v.scrollIntoView({behavior:"smooth", block:"start"});
    });
    $("sg_list").querySelectorAll('[data-sgdel]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Delete this show guide?')) return;
      const DB2=await waitForDB(); await DB2.remove('showGuides', b.dataset.sgdel); loadGuides();
    });
    $("sg_list").querySelectorAll('[data-sgclose]').forEach(b=>b.onclick=async()=>{
      const DB2=await waitForDB();
      const g=guides.find(x=>x.id===b.dataset.sgclose); if(!g) return;
      g.status = g.status==='closed' ? 'open' : 'closed';
      await DB2.put('showGuides', g.id, g.poster, g); loadGuides();
    });
  }
}

function renderGate(){
  $("nav").innerHTML="";
  if(!window.__gateMode) window.__gateMode = "signin";
  const mode = window.__gateMode;

  const field=(id,label,type,ph,ac)=>`<label>${label}</label>
    <input id="${id}" type="${type}" autocomplete="${ac||(type==='password'?'current-password':'email')}" placeholder="${ph}" />`;

  let body="";
  if(mode==="signin"){
    body=`
      <h2>Members only</h2>
      <p>The Community Hub is for EquiStories members. Sign in with your Bank account —
      the same one you use in the Stable Manager and Shows.</p>
      ${field('g_email','Email','email','you@example.com')}
      ${field('g_pass','Password','password','Your password')}
      <button id="g_go" style="margin-top:14px;width:100%;">Sign In</button>
      <div style="display:flex;justify-content:space-between;margin-top:8px;">
        <span data-mode="forgot" class="small" style="color:var(--accent);cursor:pointer;">Forgot password?</span>
        <span data-mode="signup" class="small" style="color:var(--accent);cursor:pointer;">Create an account</span>
      </div>`;
  } else if(mode==="signup"){
    body=`
      <h2>Create an account</h2>
      <p>Already play EquiStories? Create your login here, then link it to your existing
      stable on the next screen — nothing is lost.</p>
      ${field('g_email','Email','email','you@example.com')}
      ${field('g_pass','Password','password','At least 6 characters','new-password')}
      <button id="g_go" style="margin-top:14px;width:100%;">Create Account</button>
      <div style="margin-top:8px;text-align:center;">
        <span data-mode="signin" class="small" style="color:var(--accent);cursor:pointer;">← Back to sign in</span>
      </div>`;
  } else if(mode==="forgot"){
    body=`
      <h2>Reset your password</h2>
      <p>We'll email you a link to set a new password. No admin needed.</p>
      ${field('g_email','Email','email','you@example.com')}
      <button id="g_go" style="margin-top:14px;width:100%;">Send Reset Email</button>
      <div style="margin-top:8px;text-align:center;">
        <span data-mode="signin" class="small" style="color:var(--accent);cursor:pointer;">← Back to sign in</span>
      </div>`;
  } else { // link
    body=`
      <h2>Connect your stable</h2>
      <p>Signed in as <b>${esc((window.EquiAuth&&window.EquiAuth.email)||"")}</b>.
      Enter your <b>old</b> Bank User ID and password once, and this login takes over from here.
      Your Buxx and horses stay exactly as they are.</p>
      ${field('g_user','Bank User ID','text','e.g. PocketCaster','username')}
      ${field('g_oldpass','Old bank password','password','Your old password','current-password')}
      <button id="g_link" style="margin-top:14px;width:100%;">Link My Stable</button>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid #4a392a;">
        <p class="small" style="margin:0 0 6px;">Brand new to EquiStories? Pick a User ID instead — this is permanent
        and stamps everything you own.</p>
        ${field('g_newid','New User ID','text','3-24 letters, numbers, _ or -','username')}
        <button id="g_new" style="width:100%;">Create a new stable</button>
      </div>
      <div style="margin-top:8px;text-align:center;">
        <span data-mode="signout" class="small muted" style="cursor:pointer;">Sign out</span>
      </div>`;
  }

  $("view").innerHTML=`
    <div class="card" style="max-width:520px;margin:40px auto;">
      ${body}
      <div id="g_msg" class="small" style="margin-top:8px;min-height:1.2em;"></div>
      ${mode==="signin"?`<p class="small muted" style="margin-top:14px;">Need help? Ask in the
        <a href="${DEFAULT_DISCORD}" target="_blank" rel="noopener">Discord</a>.</p>`:""}
    </div>`;

  const msg = $("g_msg");
  const say=(m,kind)=>{
    const color = kind==="good" ? "var(--good)" : kind==="bad" ? "var(--bad)" : "";
    msg.innerHTML = color ? `<span style="color:${color};">${esc(m)}</span>` : `<span class="muted">${esc(m)}</span>`;
  };

  document.querySelectorAll("[data-mode]").forEach(el=>el.onclick=async()=>{
    if(el.dataset.mode==="signout"){ await window.EquiAuth.signOut(); window.__gateMode="signin"; renderGate(); return; }
    window.__gateMode = el.dataset.mode; renderGate();
  });

  // After a Firebase sign-in, ask the bank which stable this login owns.
  async function afterAuth(){
    say("Checking your stable…","muted");
    const token = await window.EquiAuth.token();
    const who = await bankCall({action:"getMyAccount", idToken:token});
    if(who?.success && who.data?.linked){
      localStorage.setItem("equi-lite-bank", JSON.stringify({userId:who.data.userId, password:"", linked:true}));
      await upgradeToOwnerSession();
      await ensureProfile(who.data.userId);
      render();
    } else {
      window.__gateMode = "link";
      renderGate();
    }
  }

  if(mode==="signin" || mode==="signup" || mode==="forgot"){
    const go=$("g_go");
    go.onclick=async()=>{
      go.disabled=true;
      if(!window.EquiAuth){ say("Auth is still loading — try again.","bad"); go.disabled=false; return; }

      if(mode==="forgot"){
        const email=$("g_email").value.trim();
        if(!email){ say("Enter your email.","bad"); go.disabled=false; return; }
        say("Sending…","muted");
        const r=await window.EquiAuth.resetPassword(email);
        go.disabled=false;
        say(r.success ? "Check your email for a reset link." : r.error, r.success?"good":"bad");
        return;
      }

      const email=$("g_email").value.trim(), pass=$("g_pass").value;
      if(!email||!pass){ say("Enter your email and password.","bad"); go.disabled=false; return; }
      say(mode==="signup"?"Creating your account…":"Signing in…","muted");
      const r = mode==="signup" ? await window.EquiAuth.signUp(email,pass) : await window.EquiAuth.signIn(email,pass);
      go.disabled=false;
      if(!r.success){ say(r.error,"bad"); return; }
      await afterAuth();
    };
    $("g_pass") && ($("g_pass").onkeydown=e=>{ if(e.key==="Enter") go.onclick(); });
  }

  if(mode==="link"){
    const linkBtn=$("g_link");
    linkBtn.onclick=async()=>{
      const userId=$("g_user").value.trim(), oldPass=$("g_oldpass").value;
      if(!userId||!oldPass){ say("Enter your old User ID and password.","bad"); return; }
      linkBtn.disabled=true; say("Linking…","muted");
      const token=await window.EquiAuth.token();
      const r=await bankCall({action:"linkFirebaseAccount", idToken:token, userId, password:oldPass});
      linkBtn.disabled=false;
      if(r?.success){
        localStorage.setItem("equi-lite-bank", JSON.stringify({userId:r.data.userId, password:"", linked:true}));
        await upgradeToOwnerSession();
        await ensureProfile(r.data.userId);
        say(`Linked! Welcome back, ${r.data.displayName}.`,"good");
        render();
      } else say(r?.error||"Could not link that account.","bad");
    };

    const newBtn=$("g_new");
    newBtn.onclick=async()=>{
      const userId=$("g_newid").value.trim();
      if(!userId){ say("Pick a User ID.","bad"); return; }
      newBtn.disabled=true; say("Creating your stable…","muted");
      const token=await window.EquiAuth.token();
      const r=await bankCall({action:"registerFirebaseAccount", idToken:token, userId, displayName:userId});
      newBtn.disabled=false;
      if(r?.success){
        localStorage.setItem("equi-lite-bank", JSON.stringify({userId:r.data.userId, password:"", linked:true}));
        await upgradeToOwnerSession();
        await ensureProfile(r.data.userId);
        say(`Welcome to EquiStories, ${r.data.displayName}!`,"good");
        render();
      } else say(r?.error||"Could not create that account.","bad");
    };
  }
}

// Same origin as the tracker and shows, so Firebase already knows us — adopt that
// session instead of demanding a second sign-in.
let __adopting=false;
async function adoptSharedSession(){
  if(__adopting) return; __adopting=true;
  try{
    if(!window.EquiAuth) return;
    await window.EquiAuth.ready;
    if(me() || !window.EquiAuth.user) return;
    const token=await window.EquiAuth.token(); if(!token) return;
    const who=await bankCall({action:"getMyAccount", idToken:token});
    if(who?.success && who.data?.linked){
      localStorage.setItem("equi-lite-bank", JSON.stringify({
        userId:who.data.userId, password:"", linked:true }));
      console.log('[Hub] adopted shared session:', who.data.userId);
      await upgradeToOwnerSession();
      await ensureProfile(who.data.userId);
      render();
    }
  }catch(e){ console.warn('[Hub] session adopt failed:', e); }
  finally{ __adopting=false; }
}

function render(){
  if(!me()){ renderGate(); adoptSharedSession(); return; }
  renderNav();
  const v=$("view");
  v.innerHTML = `<div class="card"><div class="small">Loading…</div></div>`;
  if(tab==="Home") renderHome(v);
  else if(tab==="Bank") renderBank(v);
  else if(tab==="Members") renderMembers(v);
  else if(tab==="Community") renderCommunity(v);
  else if(tab==="Forum") renderForum(v);
  else if(tab==="Admin"){ const w=me(); if(w && isAdminMember(w.userId)) renderAdminPanel(v); else { tab="Home"; renderHome(v); } }
  else if(tab==="Shops") renderShops(v);
  else if(tab==="Breeds") renderBreeds(v);
  else renderForum(v);
}
// ============================================================
//  BREEDS — affiliated breed communities (Irish Lightblood & co.)
//  A breed reuses the bank (business), tokens (breed items), and the
//  tracker (an import IS a stamped horse). Nothing here is ILB-specific;
//  the ILB is just the first document in the `breeds` collection.
//    breeds/{id}        — profile, staff, business, theme
//    breedImports/{id}  — designs for sale (premade / custom slot)
//    breedOrders/{id}   — purchase/custom requests (owner = buyer)
//  Registry is DERIVED from tracked horses stamped with the breed name.
// ============================================================
const BREED_THEME_DEFAULTS = { accent:"#c9a8e8", panel:"#140e07", head:"#c9a84c" };
function breedThemeVars(t){
  t = t || {};
  return `--sf-accent:${t.accent||BREED_THEME_DEFAULTS.accent}; --sf-panel:${t.panel||BREED_THEME_DEFAULTS.panel}; --sf-head:${t.head||BREED_THEME_DEFAULTS.head};`;
}
function isBreedStaff(breed, who){
  if(!breed || !who) return false;
  return breed.owner===who.userId || (Array.isArray(breed.staff) && breed.staff.includes(who.userId));
}

let __breedView = { mode:"browse", breedId:null, tab:"about" };

async function renderBreeds(v){
  const who = me();
  const DB = await waitForDB();
  if(!DB){ v.innerHTML = `<div class="card"><div class="small">Database unavailable.</div></div>`; return; }
  if(__breedView.mode==="found"){ return renderBreedFound(v, DB, who); }
  if(__breedView.mode==="page"){  return renderBreedPage(v, DB, who, __breedView.breedId); }
  return renderBreedBrowse(v, DB, who);
}

  const mine = who ? breeds.filter(b=>isBreedStaff(b, who)) : [];

  v.innerHTML = `
    <div class="card">
      <h2>Affiliated Breeds</h2>
      <p class="small">Breeds run their own communities inside EquiStories — their own imports, registry,
        exclusive tokens, and admin. Buying an import creates a real tracked horse on your account, stamped to the breed.</p>
      ${who ? `<div style="margin-top:10px;"><button id="br_found">Found a breed</button></div>`
             : `<p class="small muted">Sign in to found or join a breed.</p>`}
    </div>
    ${mine.length ? `<div class="card"><h3>Breeds you help run</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${mine.map(b=>`<button class="ghost" data-open="${esc(b.id)}">${esc(b.name)} ⚙</button>`).join("")}</div></div>` : ''}

          <div class="body">
            <b>${esc(b.name)}</b>
            <span class="small">founded by ${esc(b.owner)}</span>
            ${b.blurb?`<span class="small" style="opacity:.85;">${esc(String(b.blurb).slice(0,110))}</span>`:''}
          </div>
        </div>`).join("")}</div>`
        : `<p class="small muted">No breeds yet. ${who?"Found the first one above.":""}</p>`}
    </div>
    <div class="card">
      <h3 style="margin:0 0 6px;">Breed directory</h3>
      <p class="small">Every breed you can register a horse as. Affiliated breeds are community-made and come with their own genetics.</p>
      <div id="brDirectory" class="small">Loading…</div>
    </div>`;

  // Breed directory: affiliated (from breeds collection) + standard base breeds.
  (async()=>{
    const dir=$("brDirectory"); if(!dir) return;
    let custom=[]; try{ const g=await DB.get('config','global'); custom=(g&&g.customBreeds)||[]; }catch(e){}
    // also treat any breeds-collection entries as affiliated
    const affiliatedNames = Array.from(new Set([...custom.map(b=>b.name), ...breeds.map(b=>b.name)].filter(Boolean)));
    dir.innerHTML =
      `<h4 style="color:var(--accent);margin:0 0 6px;">Affiliated breeds (${affiliatedNames.length})</h4>`
      + (affiliatedNames.length
          ? `<div style="display:flex;flex-wrap:wrap;gap:6px;">`

            + `</div>`
          : `<span class="muted">No affiliated breeds yet — yours could be the first.</span>`)
      + `<h4 style="color:var(--accent);margin:14px 0 6px;">Standard breeds (${BASE_BREEDS.length})</h4>
         <div style="display:flex;flex-wrap:wrap;gap:6px;">`
      + BASE_BREEDS.map(b=>`<span class="tag">${esc(b)}</span>`).join("") + `</div>`;

  if(who && $("br_found")) $("br_found").onclick = ()=>{ __breedView={mode:"found"}; renderBreeds(v); };

  const staff = isBreedStaff(breed, who);
  const sub = __breedView.tab || "about";

  const tabs = ["about","imports","registry"].concat(staff?["admin"]:[]).concat(who?["my orders"]:[]);
  v.innerHTML = `

  $("bp_back").onclick = ()=>{ __breedView={mode:"browse"}; renderBreeds(v); };
  $("bp_nav").querySelectorAll('[data-sub]').forEach(el=>el.onclick=()=>{
    __breedView={mode:"page", breedId, tab:el.dataset.sub}; renderBreeds(v);
  });

  const body = $("bp_body");
  if(sub==="about")      return breedAbout(body, DB, who, breed, staff);
  if(sub==="imports")    return breedImportsView(body, DB, who, breed, staff);
  if(sub==="registry")   return breedRegistry(body, DB, who, breed);
  if(sub==="my orders")  return breedMyOrders(body, DB, who, breed);
  if(sub==="admin" && staff) return breedAdmin(body, DB, who, breed);

}

async function breedOrderPremade(body, DB, who, breed, imports, importId){
  const imp = imports.find(i=>i.id===importId);
  if(!imp || !who) return;
  const horseName = prompt(`Order “${imp.name}” for ✦${Number(imp.price)||0}?\n\nName the horse as you'd like it registered (you can change it later):`, imp.name);
  if(horseName===null) return;

  if(window.EquiAuth && window.EquiAuth.uid !== who.userId){ await upgradeToOwnerSession(); }
  // Create the order (owner = buyer) and put the import on hold so it can't be double-sold.
  const orderId="order_"+Math.random().toString(36).slice(2,10);
  const order={ id:orderId, owner:who.userId, breedId:breed.id, importId:imp.id, kind:"premade",
    horseName:horseName.trim()||imp.name, price:Number(imp.price)||0, note:"",
    designUrl:imp.designUrl||"", image:imp.image||"",
    status:"submitted", submittedAt:new Date().toISOString() };
  try{
    await DB.put('breedOrders', orderId, who.userId, order);
    // hold the import — best effort (only staff own the import doc; if this fails,
    // staff still see the order and can decline duplicates)
    try{ imp.status='pending'; imp.heldBy=who.userId; await DB.put('breedImports', imp.id, imp.owner||breed.owner, imp); }catch(e){}
    __breedView={mode:"page",breedId:breed.id,tab:"my orders"}; renderBreeds(document.getElementById('view'));
  }catch(err){ alert("Couldn't submit the order: "+(err.message||err)); }
}

// Buyer claims an approved order: pay the breed's business, then create the
// stamped horse on THEIR OWN account (owner = buyer — rules-clean, no cross writes).
async function breedClaimOrder(body, DB, who, breed, order){
  if(!order) return;
  const price = Number(order.price)||0;
  if(!confirm(`Add “${order.horseName}” to your tracker?\n\n${price>0?`✦${price} will be paid to ${breed.name}.`:'No charge.'}\nA blank horse profile is created — upload your own art anytime.`)) return;

  if(window.EquiAuth && window.EquiAuth.uid !== who.userId){ await upgradeToOwnerSession(); }

  // 1) pay the breed business (buyer's token authorizes it)
  if(price>0){
    if(!breed.businessName){ alert("This breed has no business linked — ask staff to fix it before claiming."); return; }
    const token = await (async()=>{ try{ await window.EquiAuth.ready; return await window.EquiAuth.token(); }catch(e){ return null; } })();
    if(!token){ alert("Session expired — sign out and back in."); return; }
    const pay = await bankCall({ action:'payBusiness', fromUserId:who.userId, idToken:token,
      businessName:breed.businessName, amount:price, note:`${breed.name} import: ${order.horseName}` });
    if(!pay || !pay.success){ alert((pay&&pay.error)||"Payment failed — nothing was created."); return; }
  }

  // 2) create the stamped tracked horse on the buyer's account
  const horseId = "h_"+Math.random().toString(36).slice(2,9);
  const horse = {
    id:horseId, name:order.horseName||"New Import", breed:breed.name,
    age:3, stage:"adult", level:1, exp:0,
    importLink: order.designUrl || "",
    ownerName: who.userId,
    fromBreedOrder: order.id,
    createdAt: new Date().toISOString()
  };
  try{
    await DB.put('horses', horseId, who.userId, horse);
  }catch(err){ alert("Paid, but the horse couldn't be created — tell breed staff. ("+(err.message||err)+")"); return; }

  // 3) close out the order and mark the import sold
  try{
    order.status="placed"; order.horseId=horseId; order.placedAt=new Date().toISOString();
    await DB.put('breedOrders', order.id, who.userId, order);
  }catch(e){}
  alert(`“${order.horseName}” is now in your tracker and the ${breed.name} registry. Open the Stable Manager to add art and details.`);
  renderBreeds(document.getElementById('view'));
}

    // only the founder owns the breed doc; staff edits need the founder, so guard:
    if(breed.owner!==who.userId){ $("ba_msg").textContent="Only the founder can edit the breed page."; return; }
    try{ await DB.putBreed(breed.id, who.userId, patch); Object.assign(breed,patch); $("ba_msg").textContent="Saved."; }
    catch(err){ $("ba_msg").textContent="Failed: "+(err.message||err); }
  };

  // staff management (founder only)
  if($("st_go")) $("st_go").onclick = async ()=>{
    const uid=$("st_add").value.trim(); if(!uid){ return; }
    breed.staff = Array.from(new Set([...(breed.staff||[]), uid]));
    try{ await DB.putBreed(breed.id, who.userId, breed); $("st_add").value=""; renderBreeds(document.getElementById('view')); }
    catch(err){ $("st_msg").textContent="Failed: "+(err.message||err); }
  };
  body.querySelectorAll('[data-unstaff]').forEach(a=>a.onclick=async(e)=>{
    e.preventDefault();
    breed.staff=(breed.staff||[]).filter(s=>s!==a.dataset.unstaff);
    try{ await DB.putBreed(breed.id, who.userId, breed); renderBreeds(document.getElementById('view')); }catch(err){}
  });
}

// Approve: mark the order approved so the BUYER can claim it (which pays + creates
// the horse on their own account). Staff attach a design URL for customs here.
async function breedApproveOrder(body, DB, who, breed, order, designEl, noteEl){
  if(!order) return;
  order.status="approved";
  order.reviewedBy=who.userId;
  order.reviewNote=(noteEl&&noteEl.value.trim())||"";
  order.decidedAt=new Date().toISOString();
  if(designEl && designEl.value.trim()) order.designUrl=designEl.value.trim();
  try{
    await DB.put('breedOrders', order.id, order.owner, order);
  }catch(err){
    alert("Couldn't approve — this needs the Firestore rule that lets breed staff update orders for their breed (see the rules guide). ("+(err.message||err)+")");
    return;
  }
  // mark a premade import sold
  if(order.importId){
    try{ const imp=await DB.get('breedImports',order.importId); if(imp){ imp.status='sold'; imp.buyer=order.owner; await DB.put('breedImports', imp.id, imp.owner||breed.owner, imp); } }catch(e){}
  }
  alert(`Approved. ${order.owner} can now claim “${order.horseName}” from their My Orders tab — that's when they pay and the horse is created on their account.`);
  renderBreeds(document.getElementById('view'));
}

// ============================================================
//  SHOPS — player-run stores, listed and managed inside the hub
//  Collections (same {owner,id,json} shape as everything else):
//    shops      : one per shopkeeper {id, owner, name, banner, blurb,
//                 businessName, theme:{accent,bg,panel,head}, createdAt}
//    shopItems  : owner-scoped goods {id, owner, shopId, name, desc,
//                 image, price, stock, uses, category, active}
//  Checkout pays the shopkeeper's bank business (buyer's idToken) then
//  writes the item into the buyer's own inventory/{userId} doc — the same
//  document the tracker and Emporium share.
// ============================================================
const SHOP_THEME_DEFAULTS = { accent:"#d29a3e", panel:"#140e07", head:"#c9a84c" };
// Premium storefronts: these owners may replace their shop's standard hero with
// their own custom HTML (rendered in a scripts-disabled sandbox so it can't touch
// anyone's session). Edit this list to grant more accounts; matched by bank userId.
// Premium members (by bank userId). One source of truth for every premium
// perk: custom shop look, multiple shops, profile CSS, the name badge, and the
// higher stat-gear cap. Admins (below) are premium + uncapped.
const PREMIUM_MEMBERS = ["PocketCaster"];
const ADMIN_MEMBERS   = ["PocketCaster"];   // uncapped gear; site owner(s)
// Back-compat alias — old code referenced PREMIUM_SHOP_OWNERS.
const PREMIUM_SHOP_OWNERS = PREMIUM_MEMBERS;
// Premium status = on the permanent list OR holding an unexpired premiumUntil
// date (granted by the Ko-fi service). We cache the stored dates so these checks
// can stay synchronous everywhere they're already used.
const __premiumCache = {};   // userId -> premiumUntil (ms)
async function loadPremiumCache(DB){
  try{
    const recs = await DB.listAll('premiumMembers');
    recs.forEach(r=>{
      const uid = r.__owner || r.__id || (r.userId);
      const until = Number(r.premiumUntil)||0;
      if(uid) __premiumCache[uid] = until;
    });
  }catch(e){ /* premium store may not exist yet — that's fine */ }
}
function hasActiveStoredPremium(uid){
  const until = __premiumCache[uid];
  return !!until && until > Date.now();
}
function isPremiumMember(uid){ return !!uid && (PREMIUM_MEMBERS.includes(uid) || hasActiveStoredPremium(uid)); }
function isAdminMember(uid){ return !!uid && ADMIN_MEMBERS.includes(uid); }
// Per-stat gear cap: regular +2, premium +3, admin unlimited.
function gearStatCap(uid){ return isAdminMember(uid) ? Infinity : (isPremiumMember(uid) ? 3 : 2); }
// A small crown badge shown beside premium members' names across the hub.
function premiumBadge(uid){
  if(!isPremiumMember(uid)) return "";
  return ` <span title="Premium member" style="display:inline-block;font-size:.85em;color:#d4af37;vertical-align:baseline;">&#128081;</span>`;
}
// A friendly status line for the signed-in member: shows premium expiry (or
// "permanent" for the list) if active, otherwise a gentle invite to support.
function premiumStatusLine(uid){
  if(ADMIN_MEMBERS.includes(uid) || PREMIUM_MEMBERS.includes(uid)){
    return `<div class="small" style="color:#d4af37;margin-top:2px;">&#128081; Premium member</div>`;
  }
  const until = __premiumCache[uid];
  if(until && until > Date.now()){
    const days = Math.ceil((until - Date.now())/(24*60*60*1000));
    const dateStr = new Date(until).toLocaleDateString();
    return `<div class="small" style="color:#d4af37;margin-top:2px;">&#128081; Premium active — ${days} day${days===1?'':'s'} left (until ${dateStr}). Renew anytime; early renewals add on.</div>`;
  }
  return `<div class="small muted" style="margin-top:2px;">Not premium. <a href="https://ko-fi.com/" target="_blank" style="color:var(--accent);">Support EquiStories</a> to unlock the crown, custom shop looks, multiple shops, and +3 gear. Enter your User ID <b>${esc(uid)}</b> at checkout.</div>`;
}

// Premium storefronts let owners style the WHOLE page, but safely: their CSS and
// wrapper HTML are sanitized so nothing can run script or break out of the shop.
// (The buy buttons are always real hub markup, so buying is never their code.)
function sanitizeShopCss(css){
  css = String(css||"");
  // No closing the style tag, no javascript: urls, no expression()/behavior
  // (legacy IE script vectors), no bindings.
  if(/<\/?\s*style/i.test(css)) return "";
  // @import is a data-exfil / external-fetch vector in general, BUT font
  // imports from Google Fonts are safe (they load fonts, can't run script), so
  // we allow ONLY those and strip any other @import.
  css = css.replace(/@import\s+url\(\s*['"]?(https:\/\/fonts\.googleapis\.com\/[^)'"]*)['"]?\s*\)\s*;?/gi,
                    (m,u)=>`@import url('${u}');`);
  css = css.replace(/@import(?!\s+url\(\s*['"]?https:\/\/fonts\.googleapis\.com\/)[^;]*;?/gi, "");
  css = css.replace(/url\(\s*['"]?\s*javascript:[^)]*\)/gi, "url()");
  css = css.replace(/expression\s*\(/gi, "(");
  css = css.replace(/-moz-binding[^;]*;?/gi, "");
  css = css.replace(/behavior\s*:[^;]*;?/gi, "");
  return css;
}
function sanitizeShopHtml(html){
  html = String(html||"");
  // Strip anything that could execute: script/iframe/object/embed/link/meta tags,
  // on* event attributes, and javascript: URLs. Pure layout/markup survives.
  html = html.replace(/<\s*(script|iframe|object|embed|link|meta|base|form)\b[^>]*>/gi, "");
  html = html.replace(/<\s*\/\s*(script|iframe|object|embed|link|meta|base|form)\s*>/gi, "");
  html = html.replace(/\son\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, "");
  html = html.replace(/(href|src)\s*=\s*(["']?)\s*javascript:[^"'>\s]*\2/gi, '$1="#"');
  return html;
}

function shopThemeVars(t){
  t = t || {};
  const a = t.accent || SHOP_THEME_DEFAULTS.accent;
  const p = t.panel  || SHOP_THEME_DEFAULTS.panel;
  const h = t.head   || SHOP_THEME_DEFAULTS.head;
  return `--sf-accent:${a}; --sf-panel:${p}; --sf-head:${h};`;
}
// canonical inventory entry — matches the Emporium / tracker shape exactly
function shopInvEntry(shop, item, qty){
  const uses = Number(item.uses)||0;
  const disc = Number(item.discountValue)||0;
  const consumable = uses>0 || disc>0;
  // A "single-use" token (uses<=1) stacks by quantity — each copy = one use.
  // A "multi-use" token (uses>1) pools its uses into usesLeft.
  const multiUse = uses > 1;
  const hasStats = item.stats && Object.keys(item.stats).length>0;
  return {
    id:        shop.id + "_" + item.id,
    itemId:    item.id,
    name:      item.name,
    type:      consumable ? "consumable" : "shopgood",
    category:  item.category || "",
    desc:      item.desc || "",
    price:     Number(item.price)||0,
    qty:       qty,
    usesLeft:  multiUse ? uses*qty : undefined,
    discountValue: disc>0 ? disc : undefined,
    singleUse: (consumable && !multiUse) ? true : undefined,
    // consumable effect rides along so the Stable Manager can apply it on use
    kind:        item.kind || undefined,
    effect:      item.effect || undefined,
    effectValue: item.effectValue!=null ? Number(item.effectValue) : undefined,
    effectStat:  item.effectStat || undefined,
    effectTag:   item.effectTag || undefined,
    // tack/apparel bonuses ride along so the Stable Manager can apply them
    wearKind:  item.wearKind || undefined,
    stats:     hasStats ? item.stats : undefined,
    exp:       Number(item.exp)>0 ? Number(item.exp) : undefined,
    pp:        Number(item.pp)>0 ? Number(item.pp) : undefined,
    shopName:  shop.name,
    source:    shop.id
  };
}

let __shopView = { mode:"browse", shopId:null };
// modes: browse | store | manage | bag | create

// How an item behaves. Anything with uses>0 is consumable; a discountValue
// makes it a coupon spent at checkout, otherwise it's a token used in
// breeding/customs (Twin, Reroll, Stat Reset, Treats, trait tokens…).
function itemKind(item){
  if(Number(item.discountValue) > 0) return "discount";
  if(Number(item.uses) > 0 || item.kind === "token") return "token";
  return "good";
}
function invEntryKind(e){
  if(Number(e.discountValue) > 0) return "discount";
  // Treats are consumed on training IMAGES (in the Stable Manager), so they get
  // NO "Use" button here — they just wait in the saddlebag.
  if(e.effect === "exp" || e.effect === "stat" || e.kind === "treat_exp" || e.kind === "treat_stat") return "treat";
  // Tokens (breeding/custom) DO get a Use button that writes a redemption record.
  if(e.kind === "token" || e.effect === "breed_token") return "token";
  // Legacy generic consumables (no kind/effect) keep the old token behavior.
  if(Number(e.usesLeft) > 0 || e.singleUse === true || e.type === "consumable") return "token";
  return "good";
}

// Append-only redemption ledger. Each use writes its OWN document (unique id),
// so there's no read-modify-write race and Firestore rules can forbid editing
// or deleting a record after the fact — that's what makes it cheat-proof.
async function logRedemption(DB, userId, entry, detail){
  const rec = {
    id: "rdm_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7),
    userId, itemId: entry.itemId, name: entry.name,
    source: entry.source || "", shopName: entry.shopName || "",
    kind: invEntryKind(entry),
    detail: detail || "",
    usedAt: new Date().toISOString()
  };
  await DB.put('redemptions', rec.id, userId, rec);
  return rec;
}

async function renderShops(v){
  const who = me();
  const DB = await waitForDB();
  if(!DB){ v.innerHTML = `<div class="card"><div class="small">Database unavailable.</div></div>`; return; }

  if(__shopView.mode === "create"){ return renderShopCreate(v, DB, who); }
  if(__shopView.mode === "manage"){ return renderShopManage(v, DB, who); }
  if(__shopView.mode === "store"){  return renderStorefront(v, DB, who, __shopView.shopId); }
  if(__shopView.mode === "bag"){    return renderSaddlebag(v, DB, who); }
  return renderShopBrowse(v, DB, who);
}

/* ---------------- browse: every shop on the street ---------------- */

    <div class="card">
      <h2>Player Shops</h2>
      <p class="small">Stores run by fellow members. Buy with Buxx — purchases land in your saddlebag and the
        money goes straight to the shopkeeper's business account.</p>
      ${who ? `<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
        <button id="sh_bag">My saddlebag</button>
        <button id="sh_manage">${mine ? "Manage my shop" : "Open my shop"}</button>
      </div>` : `<p class="small muted">Sign in to buy or open a shop.</p>`}
    </div>
    <div class="card">
      <h3 style="margin:0 0 12px;">Browse</h3>
      ${shops.length ? `<div class="shop-tiles">${shops.map(s=>`
        <div class="shop-tile" data-shop="${esc(s.id)}">
          <div class="banner ${imgOk(s.banner)?'':'noimg'}" ${imgOk(s.banner)?`style="background-image:url('${esc(s.banner)}')"`:''}>${imgOk(s.banner)?'':'🏪'}</div>
          <div class="body">
            <b>${esc(s.name)}</b>
            <span class="small">by ${esc(s.owner)}</span>
            ${s.blurb?`<span class="small" style="opacity:.85;">${esc(String(s.blurb).slice(0,110))}</span>`:''}
          </div>
        </div>`).join("")}</div>`
        : `<p class="small muted">No shops yet. ${who?"Be the first — open yours above.":""}</p>`}
    </div>`;

  if(who && $("sh_bag")) $("sh_bag").onclick = ()=>{ __shopView={mode:"bag"}; renderShops(v); };
  if(who && $("sh_manage")) $("sh_manage").onclick = ()=>{ __shopView={mode:"manage",shopId:null}; renderShops(v); };
  v.querySelectorAll('[data-shop]').forEach(el=>el.onclick=()=>{
    __shopView={mode:"store", shopId:el.dataset.shop}; renderShops(v);
