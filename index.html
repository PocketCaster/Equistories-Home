}

/* ---------------- a single storefront (buyer view) ---------------- */
async function renderStorefront(v, DB, who, shopId){
  const shop = await DB.get('shops', shopId);
  if(!shop){ __shopView={mode:"browse"}; return renderShops(v); }
  let items = [];
  try{ items = await DB.listByOwner('shopItems', shop.owner); }catch(e){}
  items = items.filter(i=>i && i.shopId===shopId && i.active!==false && !i.redeemOnly);

  // Coupons the buyer owns that THIS shop issued (discounts are per-shop).
  let coupons = [];
  if(who){
    try{
      const inv = await DB.get('inventory', who.userId);
      coupons = ((inv && inv.items)||[]).filter(e=> e.source===shop.id && Number(e.discountValue)>0 && (Number(e.qty)||0)>0);
    }catch(e){}
  }

  v.innerHTML = `
    <div class="shop-crumb">
      <button class="ghost" id="sf_back">← All shops</button>
      ${who ? `<button class="ghost" id="sf_bag">My saddlebag</button>` : ``}
      ${who && who.userId===shop.owner ? `<button id="sf_manage">Manage this shop</button>` : ``}
    </div>
    ${buildStorefrontHtml()}`;

  function buildStorefrontHtml(){
    const premium = PREMIUM_SHOP_OWNERS.includes(shop.owner);
    // Standard hero (used unless a premium owner supplies wrapper HTML).
    const heroHtml = `<div class="sf-hero">
        <div class="banner ${imgOk(shop.banner)?'':'noimg'}" ${imgOk(shop.banner)?`style="background-image:url('${esc(shop.banner)}')"`:''}>${imgOk(shop.banner)?'':'🏪'}</div>
        <div class="meta">
          <h2>${esc(shop.name)}</h2>
          <div class="small">Kept by ${esc(shop.owner)}${premiumBadge(shop.owner)}${shop.businessName?` · pays to <b>${esc(shop.businessName)}</b>`:''}</div>
          ${shop.blurb?`<p style="margin:8px 0 0;">${esc(shop.blurb)}</p>`:''}
        </div>
      </div>`;

    // The live, hub-powered shop content: coupon picker + item grid + buy buttons.
    // This is ALWAYS real hub markup — a premium owner's CSS restyles it, but the
    // buying logic is never theirs, so it can't touch anyone's session.
    const liveShop = `
      ${!who ? `<div class="card"><span class="small muted">Sign in to buy.</span></div>` : ''}
      ${who && coupons.length ? `<div class="card sf-coupons" style="margin-bottom:14px;">
        <label>Discount ticket</label>
        <select id="sf_coupon">
          <option value="">No ticket — pay full price</option>
          ${coupons.map(c=>`<option value="${esc(c.itemId)}">${esc(c.name)} — ✦${Number(c.discountValue)} off${(Number(c.qty)||1)>1?` (×${c.qty})`:''}</option>`).join("")}
        </select>
        <p class="small muted" style="margin:6px 0 0;">A ticket is spent when you buy. Discounts never take a price below ✦0.</p>
      </div>` : ''}
      ${items.length ? `<div class="sf-grid">${items.map(i=>{
        const soldOut = Number(i.stock)===0;
        const uses = Number(i.uses)||0;
        const disc = Number(i.discountValue)||0;
        return `<div class="sf-item">
          <div class="img ${imgOk(i.image)?'':'noimg'}" ${imgOk(i.image)?`style="background-image:url('${esc(i.image)}')"`:''}>${imgOk(i.image)?'':'✦'}</div>
          <div class="pad">
            <div class="nm">${esc(i.name)}</div>
            ${i.category?`<span class="tag">${esc(i.category)}</span>`:''}
            ${disc>0?`<span class="small" style="color:var(--accent2);">🎟️ Discount ticket · ✦${disc} off</span>`
              :(uses>0?`<span class="small" style="color:var(--accent2);">✨ ${uses} use${uses>1?'s':''} each</span>`:'')}
            ${i.desc?`<span class="small" style="opacity:.85;">${esc(i.desc)}</span>`:''}
            <span class="small ${soldOut?'':'muted'}">${soldOut?'Sold out':(i.stock===''||i.stock==null?'In stock':`${i.stock} left`)}</span>
            <span class="sf-price">✦ ${Number(i.price)||0}</span>
            <button class="sf-buy" data-buy="${esc(i.id)}" ${(!who||soldOut)?'disabled':''}>${soldOut?'Sold out':'Buy'}</button>
            <div class="small" data-msg="${esc(i.id)}" style="min-height:1em;"></div>
          </div>
        </div>`;
      }).join("")}</div>` : `<div class="card"><span class="small muted">No items stocked yet.</span></div>`}`;

    // Premium styling: owner CSS is scoped under .storefront-custom and sanitized
    // (no </style>, @import, or url(javascript:) escapes). Their wrapper HTML frames
    // the page; {{SHOP}} marks where the live shop drops in. No scripts, ever.
    if(premium && (shop.customCss || shop.customWrap)){
      const css = sanitizeShopCss(shop.customCss||"");
      // IMPORTANT: sanitize the OWNER's wrapper HTML on its own, THEN drop the
      // trusted, hub-generated live shop into the already-clean wrapper. The
      // live shop contains <select> and buy buttons that the HTML sanitizer
      // would otherwise strip — it must never pass through sanitizeShopHtml.
      const liveBlock = `<div class="sf-live">${liveShop}</div>`;
      // Strip HTML comments from the wrapper FIRST — otherwise a stray {{SHOP}}
      // mentioned in a comment would swallow the substitution. Then replace
      // EVERY {{SHOP}} occurrence (global), so the live shop always lands.
      const wrapClean = (shop.customWrap || "").replace(/<!--[\s\S]*?-->/g, "");
      const hasPlaceholder = /\{\{\s*SHOP\s*\}\}/.test(wrapClean);
      let frame;
      if(hasPlaceholder){
        frame = sanitizeShopHtml(wrapClean).replace(/\{\{\s*SHOP\s*\}\}/g, liveBlock);
        // Safety net: if the placeholder didn't survive for any reason, append
        // the shop so items always show rather than vanishing.
        if(!frame.includes(liveBlock)) frame += liveBlock;
      } else {
        frame = (wrapClean.trim() ? sanitizeShopHtml(wrapClean) : heroHtml) + liveBlock;
      }
      return `<div class="storefront storefront-custom" style="${shopThemeVars(shop.theme)}">
        ${css?`<style>${css}</style>`:''}
        ${frame}
      </div>`;
    }
    // Standard storefront.
    return `<div class="storefront" style="${shopThemeVars(shop.theme)}">
      ${heroHtml}
      ${liveShop}
    </div>`;
  }

  $("sf_back").onclick = ()=>{ __shopView={mode:"browse"}; renderShops(v); };
  if($("sf_bag")) $("sf_bag").onclick = ()=>{ __shopView={mode:"bag"}; renderShops(v); };
  if($("sf_manage")) $("sf_manage").onclick = ()=>{ __shopView={mode:"manage",shopId:null}; renderShops(v); };

  v.querySelectorAll('[data-buy]').forEach(btn=>btn.onclick=()=>buyFromShop(v, DB, who, shop, items, btn.dataset.buy));
}

async function buyFromShop(v, DB, who, shop, items, itemId){
  const item = items.find(i=>i.id===itemId);
  const msg = v.querySelector(`[data-msg="${CSS.escape(itemId)}"]`);
  if(!item || !msg) return;
  if(!shop.businessName){ msg.innerHTML = `<span style="color:var(--bad)">This shop has no business linked — it can't take payment.</span>`; return; }
  const btn = v.querySelector(`[data-buy="${CSS.escape(itemId)}"]`);
  btn.disabled = true; msg.textContent = "Paying…";

  const token = await (async()=>{ try{ await window.EquiAuth.ready; return await window.EquiAuth.token(); }catch(e){ return null; } })();
  if(!token){ msg.innerHTML = `<span style="color:var(--bad)">Session expired — sign out and back in.</span>`; btn.disabled=false; return; }

  const listPrice = Number(item.price)||0;

  // Read the buyer's inventory up front — we may spend a coupon and we deliver here.
  let inv;
  try{ inv = (await DB.get('inventory', who.userId)) || { id:who.userId, items:[] }; inv.items = inv.items||[]; }
  catch(err){ msg.innerHTML = `<span style="color:var(--bad)">Couldn't read your saddlebag — try again.</span>`; btn.disabled=false; return; }

  // Resolve a chosen discount ticket (must be owned, issued by this shop).
  const sel = $("sf_coupon");
  const couponItemId = sel ? sel.value : "";
  let coupon = null, discount = 0;
  if(couponItemId){
    coupon = inv.items.find(e=> e.source===shop.id && String(e.itemId)===String(couponItemId) && Number(e.discountValue)>0 && (Number(e.qty)||0)>0);
    if(coupon) discount = Math.min(Number(coupon.discountValue)||0, listPrice); // clamp: never below 0
  }
  const charge = Math.max(0, listPrice - discount);

  // Charge (skip the bank entirely if a ticket makes it free).
  if(charge > 0){
    const pay = await bankCall({ action:'payBusiness', fromUserId:who.userId, idToken:token,
      businessName:shop.businessName, amount:charge,
      note:`Shop: ${shop.name} — ${item.name}${discount?` (ticket −✦${discount})`:''}` });
    if(!pay || !pay.success){ msg.innerHTML = `<span style="color:var(--bad)">${esc((pay&&pay.error)||'Payment failed.')}</span>`; btn.disabled=false; return; }
  }

  // Deliver + spend the ticket in the SAME inventory write (one save, consistent).
  try{
    if(coupon){
      coupon.qty = (Number(coupon.qty)||0) - 1;
      if(coupon.qty <= 0) inv.items = inv.items.filter(x=>x!==coupon);
      // ticket use is itself a redemption record (audit trail for discounts too)
      logRedemption(DB, who.userId, coupon, `Applied ✦${discount} to “${item.name}” at ${shop.name}`).catch(()=>{});
    }
    const existing = inv.items.find(x=>x.itemId===item.id && x.source===shop.id);
    if(existing){
      existing.qty = (Number(existing.qty)||0) + 1;
      // multi-use tokens pool their uses; single-use/discount stack by qty only
      if(Number(item.uses) > 1) existing.usesLeft = (Number(existing.usesLeft)||0) + Number(item.uses);
      else if(existing.singleUse) existing.usesLeft = existing.qty;
    } else {
      inv.items.push(shopInvEntry(shop, item, 1));
    }
    await DB.put('inventory', who.userId, who.userId, inv);
  }catch(err){
    msg.innerHTML = `<span style="color:var(--bad)">Paid, but delivery hit a snag — tell ${esc(shop.owner)}. (${esc(err.message||err)})</span>`;
    return;
  }

  // Decrement stock if the shop tracks it (best-effort; shopkeeper owns the doc).
  if(typeof item.stock === 'number' && item.stock > 0){
    try{ item.stock -= 1; await DB.put('shopItems', item.id, shop.owner, item); }catch(e){}
  }
  const paidLine = charge>0 ? `✦ ${charge} paid` : `free with ticket`;
  msg.innerHTML = `<span style="color:var(--good)">Bought! ${paidLine}${discount?` (saved ✦${discount})`:''} · check your saddlebag.</span>`;
  // Refresh so the coupon dropdown and stock reflect the purchase.
  setTimeout(()=>renderShops(v), 900);
}

    if($("it_discRow")) $("it_discRow").classList.toggle("hide", k!=="ticket");
    // uses field only matters for consumables (treat/token/ticket); hide for gear/good
    const isConsumable = (k==="treat_exp"||k==="treat_stat"||k==="token"||k==="ticket");
    if($("it_usesCell")) $("it_usesCell").classList.toggle("hide", !isConsumable);
    // token tag sub-field label already lives in it_effToken (shown when eff===breed_token)
  };
  if($("it_kind")) $("it_kind").onchange=syncKind;
  syncKind();

  const resetItem = ()=>{
    editingId=null;
    ["it_name","it_cat","it_image","it_desc"].forEach(id=>{ if($(id)) $(id).value=""; });
    $("it_price").value="0"; $("it_stock").value=""; $("it_uses").value="0"; if($("it_disc")) $("it_disc").value="0";
    STATS.forEach(s=>{ if($("it_stat_"+s)) $("it_stat_"+s).value="0"; });
    if($("it_exp")) $("it_exp").value="0"; if($("it_pp")) $("it_pp").value="0";
    if($("it_wear")){ $("it_wear").value=""; syncWearFields(); }
    if($("it_effect")){ $("it_effect").value=""; if($("it_eff_exp"))$("it_eff_exp").value="0"; if($("it_eff_statval"))$("it_eff_statval").value="1"; if($("it_eff_tokentag"))$("it_eff_tokentag").value=""; syncEffectFields(); }
    if($("it_kind")){ $("it_kind").value="tack"; syncKind(); }
    $("it_add").textContent="Add item"; $("it_cancel").classList.add("hide"); $("it_msg").textContent="";
  };
  $("it_cancel").onclick = resetItem;

  $("it_add").onclick = async ()=>{
    const name=$("it_name").value.trim();
    if(!name){ $("it_msg").textContent="Name the item."; return; }
    const stockRaw=$("it_stock").value.trim();
    const rec = {
      id: editingId || ("item_"+Math.random().toString(36).slice(2,10)),
      owner: who.userId, shopId: shop.id, name,
      category: $("it_cat").value.trim(),
      image: $("it_image").value.trim(),
      desc: $("it_desc").value.trim(),
      price: Math.max(0, Number($("it_price").value)||0),
      stock: stockRaw==="" ? null : Math.max(0, Math.floor(Number(stockRaw)||0)),
      uses: Math.max(0, Math.floor(Number($("it_uses").value)||0)),
      discountValue: Math.max(0, Math.floor(Number($("it_disc").value)||0)),
      active: true
    };
    // Master Kind: the single source of truth for what this item is.
    const kind = $("it_kind") ? $("it_kind").value : "good";
    rec.kind = kind;
    // Tickets are redeem-code-only: never listed for sale. Mark + hide from shelf.
    if(kind==="ticket"){
      rec.redeemOnly = true;
      rec.active = false;                 // not shown on the storefront
      if(!(rec.uses>0)) rec.uses = 1;     // a ticket is a single-use consumable
      if(!(rec.discountValue>0)) rec.discountValue = 0;
    }
    // Tokens & treats are consumables — ensure they can actually be spent.
    if((kind==="token"||kind==="treat_exp"||kind==="treat_stat") && !(rec.uses>0)) rec.uses = 1;
    // Wearable bonuses, gated by kind: tack = Stats+EXP, apparel = PP.
    const wearKind=$("it_wear")?$("it_wear").value:"";
    if(wearKind) rec.wearKind=wearKind;
    if(wearKind==="tack"){
      const tkStats={};
      const cap=gearStatCap(who.userId);
      let capped=false;
      STATS.forEach(s=>{
        let val=Number($("it_stat_"+s).value)||0;
        if(val>cap){ val=cap; capped=true; }
        if(val<-cap){ val=-cap; capped=true; }   // symmetric for any negative gear
        if(val!==0) tkStats[s]=val;
      });
      if(Object.keys(tkStats).length) rec.stats=tkStats;
      const tkExp=Number($("it_exp").value)||0; if(tkExp) rec.exp=tkExp;
      if(capped){ $("it_msg").textContent = `Note: stat bonuses were capped at +${cap} per stat (${isPremiumMember(who.userId)?'premium':'standard'} limit).`; }
    } else if(wearKind==="apparel"){
      const tkPp=Number($("it_pp").value)||0; if(tkPp) rec.pp=tkPp;
    }
    // Consumable effect (applied when the player uses the item on a horse/order).
    const effect=$("it_effect")?$("it_effect").value:"";
    if(effect==="exp"){
      const n=Math.max(0,Math.floor(Number($("it_eff_exp").value)||0));
      if(n>0){ rec.effect="exp"; rec.effectValue=n; }
    } else if(effect==="stat"){
      const n=Math.max(0,Math.floor(Number($("it_eff_statval").value)||0));
      if(n>0){ rec.effect="stat"; rec.effectStat=$("it_eff_stat").value; rec.effectValue=n; }
    } else if(effect==="breed_token"){
      rec.effect="breed_token"; rec.effectTag=($("it_eff_tokentag").value||"").trim();
    }
    // Any effect item must be consumable — force at least 1 use if the shopkeeper forgot.
    if(rec.effect && !(rec.uses>0)){ rec.uses=1; }
    $("it_msg").textContent = editingId ? "Saving…" : "Adding…";
    try{ await DB.put('shopItems', rec.id, who.userId, rec); resetItem(); renderShops(v); }
    catch(err){ $("it_msg").textContent = "Failed: "+(err.message||err); }
  };

  const box = $("mg_items");
  if(items.length){
    box.innerHTML = items.map(i=>`
      <div class="bk-tx" style="border-left:3px solid var(--brass-mid);">
        <div class="bk-tx-ic">${imgOk(i.image)?`<img src="${esc(i.image)}" style="width:34px;height:34px;object-fit:cover;border-radius:50%;">`:(Number(i.uses)>0?'✨':'✦')}</div>
        <div class="bk-tx-body">
          <b>${esc(i.name)}</b>
          <span class="small">✦ ${Number(i.price)||0} · ${i.stock==null?'∞ stock':(i.stock+' in stock')}${Number(i.uses)>0?` · ${i.uses} uses`:''}${i.active===false?' · <span style="color:var(--bad)">hidden</span>':''}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="ghost" data-edit="${esc(i.id)}" style="padding:5px 10px;">Edit</button>
          <button class="ghost" data-toggle="${esc(i.id)}" style="padding:5px 10px;">${i.active===false?'Show':'Hide'}</button>
          <button class="ghost" data-del="${esc(i.id)}" style="padding:5px 10px;color:var(--bad);">Delete</button>
        </div>
      </div>`).join("");

    box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
      const i=items.find(x=>x.id===b.dataset.edit); if(!i) return;
      editingId=i.id;
      $("it_name").value=i.name||""; $("it_cat").value=i.category||""; $("it_image").value=i.image||"";
      $("it_desc").value=i.desc||""; $("it_price").value=Number(i.price)||0;
      $("it_stock").value=(i.stock==null?"":i.stock); $("it_uses").value=Number(i.uses)||0;
      if($("it_disc")) $("it_disc").value=Number(i.discountValue)||0;
      STATS.forEach(s=>{ if($("it_stat_"+s)) $("it_stat_"+s).value=(i.stats&&i.stats[s])||0; });
      if($("it_exp")) $("it_exp").value=Number(i.exp)||0; if($("it_pp")) $("it_pp").value=Number(i.pp)||0;
      if($("it_wear")){
        $("it_wear").value = i.wearKind || (Number(i.pp)>0 ? "apparel" : ((i.stats&&Object.keys(i.stats).length)||Number(i.exp)>0 ? "tack" : ""));
        syncWearFields();
      }
      if($("it_effect")){
        $("it_effect").value = i.effect || "";
        if(i.effect==="exp" && $("it_eff_exp")) $("it_eff_exp").value=Number(i.effectValue)||0;
        if(i.effect==="stat"){ if($("it_eff_stat"))$("it_eff_stat").value=i.effectStat||STATS[0]; if($("it_eff_statval"))$("it_eff_statval").value=Number(i.effectValue)||1; }
        if(i.effect==="breed_token" && $("it_eff_tokentag")) $("it_eff_tokentag").value=i.effectTag||"";
        syncEffectFields();
      }
      // Master Kind: use stored kind, or infer from legacy items (pre-Kind).
      if($("it_kind")){
        let k = i.kind;
        if(!k){
          if(i.wearKind==="tack") k="tack";
          else if(i.wearKind==="apparel") k="apparel";
          else if(i.effect==="exp") k="treat_exp";
          else if(i.effect==="stat") k="treat_stat";
          else if(i.effect==="breed_token") k="token";
          else if(Number(i.discountValue)>0 || i.redeemOnly) k="ticket";
          else if((i.stats&&Object.keys(i.stats).length)||Number(i.exp)>0) k="tack";
          else if(Number(i.pp)>0) k="apparel";
          else k="good";
        }
        $("it_kind").value=k; syncKind();
      }
      $("it_add").textContent="Save changes"; $("it_cancel").classList.remove("hide");
      $("it_msg").textContent="Editing “"+(i.name||"")+"”";
      v.scrollIntoView({behavior:"smooth",block:"start"});
    });
    box.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=async()=>{
      const i=items.find(x=>x.id===b.dataset.toggle); if(!i) return;
      i.active = i.active===false; await DB.put('shopItems', i.id, who.userId, i); renderShops(v);
    });
    box.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Delete this item? Copies already bought stay in buyers\u2019 saddlebags.')) return;
      await DB.remove('shopItems', b.dataset.del); renderShops(v);
    });
  }
}

have a <b>Use one</b> button — using it removes the token and records it permanently so mods can verify it.

// Gift ONE unit of a saddlebag item to another member. Works for any kind —
// treats, tokens, tickets, tack, apparel, plain goods. Moves one copy (with its
// uses) out of the giver's inventory and into the recipient's, confirming first.
async function giftItem(v, DB, who, entryId){
  let inv;
  try{ inv = await DB.get('inventory', who.userId); }catch(e){ inv=null; }
  const items = (inv && inv.items) || [];
  const e = items.find(x=>x.id===entryId);
  if(!e){ renderShops(v); return; }

  const to = prompt(`Gift “${e.name}” to which member?\n\nType their exact EquiStories User ID:`, "");
  if(to === null) return;                       // cancelled
  const toId = to.trim();
  if(!toId){ return; }
  if(toId === who.userId){ alert("That's your own account — pick someone else."); return; }
  if(!confirm(`Gift ONE “${e.name}” to ${toId}? This leaves your saddlebag and lands in theirs. This can't be undone.`)) return;

  if(window.EquiAuth && window.EquiAuth.uid !== who.userId){ await upgradeToOwnerSession(); }

  // Build the single unit to transfer (one copy, one "use" worth for uses-items).
  const perUses = e.singleUse ? 1
                : (Number(e.usesLeft)>0 ? Math.max(1, Math.round(Number(e.usesLeft)/Math.max(1,Number(e.qty)||1))) : 0);
  const gift = Object.assign({}, e, {
    qty: 1,
    usesLeft: (Number(e.usesLeft)>0 ? perUses : e.usesLeft),
    giftedFrom: who.userId
  });

  // Remove one unit from the giver.
  if(e.singleUse){
    e.qty = Math.max(0, (Number(e.qty)||0) - 1);
    e.usesLeft = e.qty;
  } else if(Number(e.qty) > 0){
    e.qty -= 1;
    if(Number(e.usesLeft) > 0) e.usesLeft = Math.max(0, Number(e.usesLeft) - perUses);
  }
  const nowEmpty = (Number(e.qty)||0) <= 0 && !(e.singleUse===false && Number(e.usesLeft)>0);
  if(nowEmpty) inv.items = items.filter(x=>x!==e);

  try{
    // Recipient inventory: merge with any identical stack they already own.
    let rInv;
    try{ rInv = await DB.get('inventory', toId); }catch(_){ rInv=null; }
    if(!rInv || !rInv.items){ rInv = { id: toId, items: [] }; }
    const hit = rInv.items.find(x=>x && x.id===gift.id);
    if(hit){
      hit.qty = (Number(hit.qty)||0) + 1;
      if(Number(gift.usesLeft)>0) hit.usesLeft = (Number(hit.usesLeft)||0) + Number(gift.usesLeft);
    } else {
      rInv.items.push(gift);
    }
    // Write recipient FIRST, then remove from giver — so a failure can't destroy
    // the item (worst case it's briefly in both, never in neither).
    await DB.put('inventory', toId, toId, rInv);
    await DB.put('inventory', who.userId, who.userId, inv);
    alert(`🎁 Sent one “${e.name}” to ${toId}!`);
  }catch(err){
    alert("Gift failed — nothing was sent. ("+(err.message||err)+")");
  }
  renderShops(v);
}

// Redeem an event code: verify against the code doc + the append-only ledger
// (one claim per member, max total claims), record the claim FIRST, then
// deliver the prize into the member's own inventory doc — same trust model
// as token use: the ledger is permanent, so a claim can't be hidden or repeated.
async function claimShopCode(v, DB, who){
  const msg=$("bag_code_msg");
  const raw=($("bag_code").value||'').toUpperCase().replace(/\s+/g,'');
  if(!raw){ if(msg) msg.textContent="Type a code first."; return; }
  if(msg) msg.textContent="Checking…";
  try{
    if(window.EquiAuth && window.EquiAuth.uid !== who.userId){ await upgradeToOwnerSession(); }
    let codes=[]; try{ codes=await DB.listAll('shopCodes'); }catch(e){}
    const c=codes.find(x=>x && String(x.code||'').toUpperCase()===raw);
    if(!c){ msg.textContent="No such code — check the spelling."; return; }
    if(c.active===false){ msg.textContent="That code is no longer active."; return; }
    let claims=[]; try{ claims=(await DB.listAll('redemptions')).filter(r=>r && r.kind==='code_claim' && r.codeId===c.id); }catch(e){}
    if(claims.some(r=>String(r.userId)===String(who.userId))){ msg.textContent="You've already claimed this code."; return; }
    if(claims.length >= (Number(c.maxClaims)||1)){ msg.textContent="This code has been fully claimed."; return; }

    // Resolve what it grants
    let entry=null, grantName='';
    const qty=Math.max(1,Number(c.qtyPerClaim)||1);
    if(c.itemId){
      const item=await DB.get('shopItems', c.itemId);
      if(!item){ msg.textContent="The prize item no longer exists — tell the shopkeeper."; return; }
      const shopDoc=(await DB.get('shops', c.shopId)) || {id:c.shopId, name:c.shopName||'a shop'};
      entry=shopInvEntry(shopDoc, item, qty); grantName=item.name;
    } else if(c.prize){
      const uses=Number(c.prize.uses)||0;
      entry={ id:c.shopId+"_prize_"+c.id, itemId:0, name:c.prize.name,
        type:uses>0?"consumable":"shopgood", category:c.prize.category||"", desc:c.prize.desc||"",
        image:c.prize.image||"", price:0, qty,
        usesLeft:uses>1?uses*qty:undefined, singleUse:(uses===1)?true:undefined,
        shopName:c.shopName||"", source:c.shopId };
      grantName=c.prize.name;
    } else { msg.textContent="This code grants nothing — tell the shopkeeper."; return; }

    // Ledger FIRST (the permanent record), then delivery.
    const rec={ id:"rdm_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7),
      userId:who.userId, itemId:entry.itemId, name:grantName,
      source:c.shopId, shopName:c.shopName||"", kind:"code_claim",
      codeId:c.id, code:c.code, detail:"Event code "+c.code, usedAt:new Date().toISOString() };
    await DB.put('redemptions', rec.id, who.userId, rec);

    let inv=null;
    try{ inv=(await DB.get('inventory', who.userId)) || {id:who.userId, items:[]}; }catch(e){ inv={id:who.userId, items:[]}; }
    inv.items=inv.items||[];
    const hit=inv.items.find(x=>x && x.id===entry.id);
    if(hit){ hit.qty=(Number(hit.qty)||0)+qty; if(entry.usesLeft) hit.usesLeft=(Number(hit.usesLeft)||0)+entry.usesLeft; }
    else inv.items.push(entry);
    await DB.put('inventory', who.userId, who.userId, inv);

    alert("🎉 Claimed "+qty+"× "+grantName+"!");
    renderShops(v);
  }catch(err){ if(msg) msg.textContent="Failed: "+(err.message||err); }
}

async function useToken(v, DB, who, entryId){
  // Re-read fresh so we never act on a stale count.
  let inv;
  try{ inv = await DB.get('inventory', who.userId); }catch(e){ inv=null; }
  const items = (inv && inv.items) || [];
  const e = items.find(x=>x.id===entryId);
  if(!e || invEntryKind(e)!=="token"){ renderShops(v); return; }

  const remaining = Number(e.usesLeft) || Number(e.qty) || 0;
  if(remaining <= 0){ renderShops(v); return; }

  const detail = prompt(
    `Use one “${e.name}”?\n\nThis is permanent. Add a note for the mod reviewing it — e.g. which horse or breeding it's for (optional):`,
    ""
  );
  if(detail === null) return; // cancelled

  // Ensure our writes are attributed to us in Firestore.
  if(window.EquiAuth && window.EquiAuth.uid !== who.userId){ await upgradeToOwnerSession(); }

  // Decrement one use. Single-use tokens keep usesLeft in lockstep with qty
  // (each copy = 1 use); multi-use tokens just spend one use.
  if(e.singleUse){
    e.qty = Math.max(0, (Number(e.qty)||0) - 1);
    e.usesLeft = e.qty;
  } else if(Number(e.usesLeft) > 0){
    e.usesLeft -= 1;
  } else if(Number(e.qty) > 0){
    e.qty -= 1;
  }
  const nowEmpty = (Number(e.usesLeft)||0) <= 0 && (Number(e.qty)||0) <= 0;
  if(nowEmpty) inv.items = items.filter(x=>x!==e);

  try{
    // Write the redemption record FIRST — the audit trail must exist even if
    // the inventory update were to fail, never the reverse.
    await logRedemption(DB, who.userId, e, detail);
    await DB.put('inventory', who.userId, who.userId, inv);
  }catch(err){
    alert("Couldn't record that use — nothing was spent. ("+(err.message||err)+")");
    return renderShops(v);
  }
  renderShops(v);
}

/* ---------------- create a shop (needs a bank business) ---------------- */
async function renderShopCreate(v, DB, who){
  // One shop per member; premium may open more. If a non-premium owner already
  // has a shop, show the upsell rather than a second create form.
  if(who){
    let existing=[]; try{ existing = await DB.listByOwner('shops', who.userId); }catch(e){}
    const isPremium = PREMIUM_SHOP_OWNERS.includes(who.userId);
    if(existing.length>=1 && !isPremium){
      v.innerHTML = `
        <div class="shop-crumb"><button class="ghost" id="cr_back">← All shops</button></div>
        <div class="card">
          <h2>You already have a shop</h2>
          <p class="small">Every member can run one storefront. Running <b>multiple shops</b> is a
            Premium feature — handy if you want a separate breed store, event stall, or themed shop.</p>
          <p class="small muted">Want another? Premium access is granted per account — reach out to an admin.</p>
          <div style="margin-top:10px;"><button id="cr_tomanage">Manage my shop</button></div>
        </div>`;
      $("cr_back").onclick=()=>{ __shopView={mode:"browse"}; renderShops(v); };
      $("cr_tomanage").onclick=()=>{ __shopView={mode:"manage",shopId:existing[0].id}; renderShops(v); };
      return;
    }
  }
  v.innerHTML = `
    <div class="shop-crumb"><button class="ghost" id="cr_back">← All shops</button></div>
    <div class="card">
      <h2>Open a Shop</h2>
      <p class="small">Your own storefront inside EquiStories — your name, banner, colors, and item list.
        Purchases pay a <b>business account</b> at the bank, so create one first (Bank tab → Businesses)
        and enter its exact name here.</p>
      <label>Shop name</label>
      <input id="cr_name" placeholder="e.g. Maeve's Tack Corner" />
      <label>Bank business name (exactly as registered)</label>
      <input id="cr_biz" placeholder="the business that receives payments" />
      <label>Banner image link (optional)</label>
      <input id="cr_banner" placeholder="https://…/banner.png" />
      <label>Blurb (optional)</label>
      <textarea id="cr_blurb" rows="2" placeholder="A line about your shop…"></textarea>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button id="cr_go">Open my shop</button>
        <span id="cr_msg" class="small"></span>
      </div>
      <p class="small muted" style="margin-top:10px;">Don't have a business yet? Head to the <b>Bank</b> tab, open one under Businesses, then come back.</p>
    </div>`;

  $("cr_back").onclick = ()=>{ __shopView={mode:"browse"}; renderShops(v); };
  $("cr_go").onclick = async ()=>{
    const name=$("cr_name").value.trim();
    const biz=$("cr_biz").value.trim();
    if(!name){ $("cr_msg").textContent="Name your shop."; return; }
    if(!biz){ $("cr_msg").textContent="Enter your bank business name so you can take payment."; return; }
    $("cr_msg").textContent="Opening…";
    // ensure the owner session so Firestore accepts the write
    if(window.EquiAuth && window.EquiAuth.uid !== who.userId){ await upgradeToOwnerSession(); }
    const id = "shop_"+Math.random().toString(36).slice(2,10);
    const rec = { id, owner:who.userId, name, businessName:biz,
      banner:$("cr_banner").value.trim(), blurb:$("cr_blurb").value.trim(),
      theme: Object.assign({}, SHOP_THEME_DEFAULTS), createdAt:new Date().toISOString() };
    try{ await DB.put('shops', id, who.userId, rec); __shopView={mode:"manage",shopId:id}; renderShops(v); }
    catch(err){ $("cr_msg").textContent = "Failed: "+(err.message||err)+" — make sure you're signed in on this browser."; }
  };
}

window.__render = render;
window.__waitForDB = waitForDB;
window.__me = me;
window.__esc = esc;
window.__APPS = APPS;
// Load stored premium (Ko-fi-granted, with expiry) before the first paint so
// badges / gear caps are correct from the start; then a normal render.
(async ()=>{
  try{ const DB = await waitForDB(4000); if(DB) await loadPremiumCache(DB); }catch(e){}
  render();
})();
})();
</script>
